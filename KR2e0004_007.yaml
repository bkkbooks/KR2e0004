body:
  text: 戰國策卷七宋鮑彪注魏自髙陵以東盡河東河內南有陳留及汝南之召陵隱彊新汲西華長平潁川之舞陽郾許傿陵河內之開封中牟陽武酸棗卷桓子智伯索地於魏桓子魏桓子弗豫任章魏人曰何故弗豫桓子曰無故索地故弗豫任章曰無故索地鄰國必恐重欲無厭重猶多天下必懼君豫之地智伯必驕驕元作憍而輕敵鄰國懼而相親以相親之兵待輕敵之國智氏之命不長矣周書曰將欲敗之必姑輔之將欲取之必姑與之君不如與之以驕智伯君何釋以天下圖智氏釋猶舍也何舍此而不為而獨以吾國為智氏資元作質乎舍此不圖適足為智氏來伐之資君曰善乃與之萬家之邑一智伯大說因索蔡臯狼元作梁於趙趙弗與因圍晉陽韓魏反於外趙氏應之於內智氏遂亡文侯桓子之孫元年威烈王二年丁巳韓趙相難韓索兵於魏曰願得借師以伐趙魏文侯曰曰寡人與趙兄弟不敢從趙又索兵以攻韓文侯曰寡人與韓兄弟不敢從二國不得兵怒而反已乃知文侯已講於已也二國不伐知魏和之皆朝魏樂羊為魏將而攻中山其子在中山中山之君烹其子而遺之羮樂羊坐於幕下而啜之啜飲也盡一柸文侯謂覩師贊魏人曰樂羊以我之故食其子之肉贊對曰其子之肉尚食之其誰不食樂羊既罷中山文侯賞其功而疑其心彪謂樂羊所謂隱忍以成就功名者也子則既烹矣敵人遺之羮將以亂其心也有如不忍而以慈愛沮其殺敵之心則大事去矣何救於亡子故羊忍為此以怒衆而成功乃其情非恝然無以天性為者也覩師贊之言其謗書之渠乎雖然羊之義視分羮為有餘比覆醢為不足使其投柸慷慨一鼓而攄家國之憤亦收功必矣介胄之士未可望之以聖人之地也西門豹為鄴令鄴屬魏郡而辭乎魏文侯文侯曰子往矣必就子之功而成子之名西門豹曰敢問就功成名亦有術乎文侯曰有之矣鄉邑老者而先受坐之士老者坐先於衆子入而問其賢良之士而師事之求其好掩人之美而掦人之醜者而參驗之夫物多相類而非也幽莠之幼也似禾莠禾下生草幽言其色茂黧元作驪牛之黃也似虎黧黑黃色也驪乃深黑馬耳白骨疑象武夫類玉武夫石似玉此皆似之而非者也文侯與虞人期獵虞人掌山澤之官是日飲酒樂天雨文侯將出左右曰今日飲酒樂天又雨公將焉之文侯曰吾與虞人期獵雖樂豈可不一㑹期哉昔與之期今往㑹之乃往身自罷之魏於是乎始强魏文侯與田子方飲酒而稱樂音嶽文侯曰鍾聲不比乎比猶協左髙言左方之聲田子方笑文侯曰奚笑子方曰臣聞之君明則樂官音洛以治官為樂不明則樂音今君審於聲審言聽之察臣恐君之聾於官也文侯曰善敬聞命彪謂周襄世主無如魏文侯之賢者夫其師友淵源有子夏子方之徒誘誨規切之雖欲無賢可得乎然則用真儒無敵於天下信矣武侯文侯子元年未安王十六年乙魏武侯與諸大夫浮於西河稱曰河山之險不亦信固哉王鍾侍坐元作王曰此晉國之所以强也若善修之則霸王之業具矣吳起對曰吾君之言危國之道也而子又附之是重危也武侯忿然曰子之言有說乎吳起對曰河山之險信不足保也是霸王之業不從此也昔者三苗之居左有𥙷彭蠡之波彭蠡湖在豫章彭澤右有洞庭之水汶元作文山在其南而衡山在其北衡南嶽在長沙湘南恃此險也為政不善而禹放逐之衍夫字夏桀之國左天門之隂後志髙都有天井關注云戰國策桀居天門即此關也而右天溪之陽今按天門即史太華伊闕彼言右故此言左之隂天溪即河濟彼言左故此言右之陽盧睪在其北地缺伊洛出其南孔曰伊水出陸渾洛水之上洛有此險也然為政不善而湯伐之殷紂之國左孟門太公世家注晉山險而右漳滏元作釜前帶河後被山有此險也然為政不善而武王伐之且君親從臣而勝降城城非不髙人民非不衆也然而可得并者政惡故也從是觀之地形險阻奚足以霸王矣武侯曰善吾乃今日聞聖人之言也西河之政專委之子矣起專有小異惠王武侯子元年烈王六年辛亥魏公叔痤為魏將而與韓趙戰澮北說文澮水出靃山西南入汾此二年敗韓馬陵敗趙于懷禽樂祚趙將魏王說郊迎以賞田百萬祿之間田以待賞冇功者公叔痤反走再拜辭曰夫使士卒不崩直而不倚直直前倚邪行棟撓而不避者撓折也喻敵之壓已此吳起餘教也臣不能為也前脉形地之險阻脉見其幽形見其顯決利害之備使三軍之士不迷惑者巴寧爨襄之力也二人下所謂能士縣賞罰於前使民昭然信之於後者王之明法也見敵之可也鼓之不敢怠倦者臣也王特為臣之右手不倦賞臣可也若以臣之有功臣何力之有乎王曰善於是索吳起之後賜之田二十萬巴寧爨襄田各十萬王曰公叔豈非長者哉既為寡人勝强敵矣又不遺賢者之後不掩能士之迹公叔何可無益乎故又與田四十萬加之百萬之上使百四十萬故老子曰聖人無積盡以為人已愈有既以與人既亦盡也已愈多公叔當之矣彪謂公叔此言何其似魏絳也方之郤至驟稱其伐彼已隘矣魏公叔痤病惠王往問之曰公叔病即不可諱死者人之所不能避故云將奈社稷何公叔痤對曰痤有御庶子此公族官别於國官及太子官公孫鞅願王以國事聽之也為弗能聽勿使出境王弗應出而謂左右曰豈不悲哉以公叔之賢而謂寡人必以國事聽鞅不亦悖乎公孫痤死公孫鞅聞之已葬西之秦孝公受而用之秦果日以强魏日以削此非公叔之悖也惠王之悖也悖者之惠固以不悖者為悖商君傳略同秦衍韓字圍梁秦獻公二十三年戰少梁此九年燕趙救之謂山陽君楚宣策言此人正同時也曰秦戰而勝三國秦必過周韓而有梁三國而勝秦三國之力雖不足以攻秦足以拔鄭新鄭鄭近梁故云計者為梁計不如構三國以攻秦元在趙策龐葱與太子質於邯鄲魏太子謂魏王曰今一人言市有虎王信之乎王曰否二人言市有虎王信之乎王曰寡人疑之矣三人言市有虎王信之乎王曰寡人信之矣龐葱曰夫市之無虎明矣然而三人言而成虎今邯鄲去大梁也遠於市而議臣者過於三人矣願王察之也元作矣王曰寡人自為知言不信人於是辭行而讒言先至後太子罷質果不得見史不害太子質事以下章年時因舊次之於此梁王魏嬰史作罃音相近觴諸侯於范臺此十五年魯衛宋鄭君來朝酒酣請魯君舉觴魯共公魯君興避席擇言擇善而言曰昔者帝女蓋堯舜女令儀狄博物志言禹時人作酒而美進之禹禹飲而甘之遂疏儀狄絶㫖酒曰後世必有以酒亡其國者齊桓公夜半不嗛嗛口有所銜也言不喜食易牙太公世家注維巫字乃煎熬元作敖燔炙燔火爇物調和五味而進之桓公食之而飽至旦不覺飽而寢安曰後世必有以味亡其國者晉文公得南之威未詳三日不聽朝遂推南之威而遠之曰後世必有以色亡其國者楚王登强臺而望崩山左江而右湖以臨倣徨自上觀下曰臨集韻倣徨仿佯仿佯徙倚也其樂忘死遂盟强臺而弗登曰後世必有以髙臺陂池書注澤障曰陂停水曰池亡其國者蓋莊王云今主君之尊儀狄之酒也主君之味易牙之調也左白台而右閭須皆美人南威之美也前夾林而後蘭臺强臺之樂也臺山林地缺皆在其國有一於此足以亡其國今主君兼此四者可無戒與梁王稱善相屬彪謂魯周公之後也其教澤存焉故齊仲孫湫曰猶秉周禮韓起亦曰周禮盡在魯矣仲尼氏作縉紳先生萃馬於是特為中國禮義之邦觀魯君之所稱說則周孔之澤深矣舉觴一時而為天下萬世之明戒魯君豈非賢君哉魏惠王起境內衆將太子申而攻齊客謂公子理申弟也之傅曰何不令公子泣王太后止太子之行事成則樹德不成則為王矣太子年少不習於兵田朌宿將也而孫子臏也善用兵戰必不勝不勝必禽公子爭之於王王聽公子公子必封不聽公子太子必敗敗公子必立立必為王也彪謂止太子之行正誼也而志於樹德為王則譎矣故夫譎正之間不容髮人論議豈不或出於正言未卒而譎隨唯其心不正之故也魏太子自將過宋外黃外黃徐子劉向别録徐子外黃人曰臣有百戰百勝之術太子能聽臣乎太子曰願聞之客曰固願效之今太子自將攻齊大勝并莒則富不過有魏而貴不益為王為王之外無加也若戰不勝則萬世無魏此臣之百戰百勝之術也太子曰諾請必從公之言而還客曰太子雖欲還不得矣彼利太子之戰攻而欲滿其意者衆希賞也太子雖欲還恐不得矣太子上車請還其御曰將出而還與比同不如遂行遂行與齊人戰而死卒不得魏元在宋策魏記三十年有彪謂此申生伐臯落之例晉國之覆轍也里克之諌惠王非忘之而忍為之故孟子謂之不仁齊魏戰於馬陵齊大勝魏殺太子申覆十萬之軍魏王召惠施而告之曰夫齊寡人之讎也怨之至死不忘國雖小吾常欲悉起兵而攻之何如對曰不可臣聞之王者得度法度而霸者知計今王所以告臣者疏於度而遠於計王固先屬怨於趙記三十年伐趙趙告急於齊齊救趙伐魏而後與齊戰今戰不勝國無守戰之備王又欲悉起而攻齊此非臣之所謂也謂謂得度知計王若欲報齊乎則不如因變服不為人君服折節而朝齊楚王必怒矣威王王游人而合其鬭游謂使人游二國之間也則楚必伐齊以休楚而伐罷齊罷音疲則必為楚禽矣是王以楚毁齊也魏王曰善乃使人報於齊願臣畜而朝畜自比犬馬也田嬰許諾張丑曰不可戰不勝魏此設辭也而得朝禮與魏和而下楚此可以大勝也勝謂不敗耳非戰勝今戰勝魏覆十萬之軍而禽太子申臣萬乘之魏而甲秦楚居二國之上此其暴戾定矣言二國謂齊暴戾決矣且楚王之為人也好用兵而甚務名終為齊患者必楚也田嬰不聽遂納魏王而與之並朝齊侯再三趙氏醜之楚王怒自將而伐齊趙應之大敗齊於徐州彪謂施之策齊楚如視白黑數一二可謂明矣而不能止太子之將何耶豈言之而不聽耶以施之智其於䇿馬陵之戰不勞慮矣張丑者亦施之倫與惠施為齊元作韓魏交為猶合令太子鳴魏記唯申及赫名餘不名為質於齊王欲見之魏王朱倉魏人謂王曰何不稱病臣請說嬰子曰魏王之年長矣今有疾公不如歸太子以德之不然公子髙在楚楚將內而立之是齊抱空質而行不義也襄王忠王子元年丁赧王三十五年亥魏惠王死葬有日矣天大雨雪至於牛目駕車用牛故以及其目為深候壞城郭且為棧道而葬羣臣多諫太子者曰雪甚如此而喪行民必甚病之官費又恐不給請㢮期㢮解也昔約今解更日太子曰為人子而以民勞與官費用之故而不行先王之喪不義也子勿復言羣臣皆不敢言而以告犀首犀首曰吾未有以言之也未得其說以說是其唯惠公乎施也請告惠公惠公曰諾駕而見太子曰葬有日矣太子曰然惠公曰昔王季厯葬於楚山之尾灓水齧其墓灓漏流也見棺之前和和棺兩頭木文王曰嘻先君必欲一見羣臣百姓也夫故使灓水見之於是出而為之張朝張幕帟如朝廷然百姓皆見之三日而後更葬此文王之義也今葬有日矣而雪甚及牛目難以行太子為及日之故得毋嫌於欲亟葬乎願太子更日先王必欲少留而扶社稷安黔首也秦稱民黔首非此時語也故使雪甚因㢮期而更為日為猶撰此文王之義也若此而弗為意者羞法文王乎太子曰甚善敬㢮期更擇日惠子非徒行其說也又令太子未葬其先王而因又說文王之義說文王之義以示天下豈小功也哉徐州之役楚敗齊也齊宣十年此二年犀首謂梁王曰何不陽與齊而隂結於楚二國恃王衍齊字必戰齊戰勝楚而與乘之與齊乘楚必取方城之外楚戰勝齊衍敗字而與乘之是太子之讎報矣太子申蘇子為趙合從說魏王曰大王之地南有鴻溝項羽紀注詳在滎陽陳汝汝水出𢎞農入淮南有許鄢昆陽邵陵舞陽鄢下並屬潁川新郪屬南陽東有淮潁水出潁川陽城沂水出泰山蓋縣黃即陳留外黃煮棗無疏西有長城之界滎陽卷縣冇長城經陽武到密北有河外卷衍燕酸棗地方千里名雖小然而盧田廡舍盧田間屋廡堂下周屋曽無所芻牧牛馬之地居人多故人民之衆車馬之多日夜行不休已無以異於三軍之衆行人多故如軍陳臣竊料之大王之國不下於楚然橫人訹元作謀史作怵王外交强虎狼之秦以侵天下卒有國患國謂魏不被其禍謂橫人夫挾强秦之勢以內劫其主罪無過此者且魏天下之强國也大王天下之賢主也今乃有意西面而事秦稱東藩築帝宫為秦築宫備其巡幸受冠帶受服於秦祠春秋助秦祭臣竊為大王愧之臣聞越王勾踐以散卒三千散則非梟勇禽夫差於干遂武王卒三千人革車三百乘斬紂於牧之野豈其士卒衆哉誠能振其威也今竊聞大王之卒武力二十餘萬蒼頭二十萬蓋以青帕首項紀注士卒皂巾奮擊二十萬厮徒十萬車六百乘騎五千匹此其過越王勾踐武王遠矣今乃劫於羣臣之說而欲臣事秦夫事秦必割地效質故兵未用而國已虧矣凡羣臣之言事秦者皆姦臣非忠臣也夫為人臣割其主之地以外交偷取一旦之功偷茍且也而不顧其後破公家而成私門外挾强秦之勢以內劫其主以求割地願大王之熟察之也周書曰綿綿不絶綿薄弱也蔓蔓元作縵若何蔓延也若縵則無文之稱耳若何言不可奈何毫毛不拔喻樹之萌將成斧柯柯斧柄前慮不定後有大患將奈之何大王誠能聽臣六國從親專心并力則必無强秦之患故弊邑趙王肅侯使使臣獻愚計奉明約在大王詔之魏王曰寡人不肖未嘗得聞明教今主君以趙王之詔詔之敬以國從張儀欲并相秦魏儀相魏在此十三年故謂魏王曰儀請以秦攻三川王以其問約南陽約謂使韓以此與魏韓氏亡史厭韓史之亡者名厭謂趙獻與厭俱在楚曰公何不以楚佐儀求相之於魏韓恐亡必南走楚儀兼相秦魏則公亦必并相楚韓也儀因獻得相必德獻楚得韓儀必緩攻韓亦德獻也魏王將相張儀犀首弗利故令人謂韓公叔曰張儀已合秦魏矣其言曰魏攻南陽秦攻三川韓氏必亡且魏王所以貴張子者欲得地也則韓之南陽舉矣子盍少委焉請以事委衍以為衍功有功魏乃任之則秦魏之交可廢矣魏任衍則聽其所為如此則魏必圖秦而棄儀收韓而相衍公叔以為然因而委之犀首以為功果相魏衍傳有楚許魏六城與之伐齊而存燕張儀欲敗之謂魏王曰齊畏三國之合也楚魏燕必反燕地此齊宣因喪伐燕所得以下楚楚衍趙字必聽之而不與魏六城是王失謀於楚而樹怨衍而字於齊秦也齊遂伐趙趙魏鄰也伐之以動魏取乘邱屬泰山收侵地虛頓邱危頓邱屬濮陽楚破南陽九夷疑當為九嶷內沛豫州郡內言入其地許鄢陵危王之所得者新觀也屬魏郡而道涂宋衛為制言雖得新觀路所從出又限二國事敗為趙驅敗謂楚不與也楚不與則齊伐趙亡將及魏故奔走援之事成功縣宋衛成謂楚與之地受地必由二國縣言輕重繫之魏王弗聽也張儀告公仲令以饑故賞韓王以近河外賞猶勸也韓時饑因勸之就粟於河外河外近魏故魏恐韓王宣惠也魏王懼問張子張子曰秦欲救齊韓欲攻南陽秦韓合而欲攻南陽無異也言無他且以遇卜王兩君相遇則講信修睦故遇者相好也王不遇秦韓之卜也決矣決無他疑韓以魏不與秦遇知其惡我必合秦而攻魏魏王遂尚遇秦信韓尚言欲之甚廣魏救趙廣猶心廣體胖云樂之也此著書者述其遇秦之效魏昔懼而今心廣又能止齊伐趙也斥元作尺楚人遽於革下地缺革豈鬲邪遽傳遽楚以傳來許地魏斥之也伐齊之事遂敗張儀惡陳軫於魏王曰軫善事楚為求壤地也甚刀衍之字左華未詳謂陳軫曰儀善於魏王魏王甚愛之公雖百說之猶不聽也公不如以𥙷儀之言為資而反於楚王反言報之王懷王陳軫曰善因使人先言於楚軫自是如楚張儀欲窮陳軫時在楚令魏王召而相之來將倍元作悟音背之將行其子陳應止其公之行公翁同項羽紀注謂父曰物之湛者湛謂其謀之深不可不察也鄭彊出秦彊自秦出在楚曰應為智言能止其父夫魏欲絶楚齊必重迎公軫在楚必合齊而魏欲離之故迎軫郢中不善公者欲公之去也必勸王多公之車王楚懷公至宋道稱疾而毋行使人謂齊王閔曰魏之所以迎我者欲以絶齊楚也齊王曰子東使東來齊無之魏而見寡人也請封子因以魯侯之車迎之以嘗所迎魯侯者迎之重之也張儀欲以魏合於秦韓而攻齊楚惠施欲以魏合於齊楚以案兵人多為張子於王所所猶處惠子謂王曰小事也謂可者謂不可者正半况大事乎以魏合於秦韓而攻齊楚大事也而王之羣臣皆以為可不知是其可也如是其明邪亡羣臣之智術也亡得無也如是其同邪是其可也未如是其明也而羣臣之智術也又非皆同也是其有半塞也塞不明所謂劫王者失其半者也事不明而欲王必從是劫王也王而從之失其半矣張衍子字儀以秦相魏齊楚怒而欲攻魏雍沮魏人謂張子曰魏之所以相公者以公相則國家安而百姓無患今公相而魏受兵是魏計過也齊楚攻魏公必危矣張子曰然則奈何雍沮曰請令齊楚解攻雍沮謂齊楚之君閔懷曰王亦聞張儀之約秦王乎惠曰王若相儀於魏齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得魏矣若不勝衍魏字魏必事秦以持其國必割地以賂王若欲復攻秦攻齊楚其弊不足以應秦二國嘗戰今必弊故不能當秦此儀之所以與秦王隂相結也今儀相魏而攻之是使儀之計當於秦也非所以窮儀之道也齊楚之王曰善乃遂解攻於魏哀王襄王子元年卯慎靚王三年癸謂𥙷張儀臣𥙷謂齊王閔曰王不如資韓朋與之逐張儀於魏魏因相犀首齊使相之因以齊魏廢韓朋而相公叔以伐秦公仲聞之必不入於齊據公於魏此士言其效也齊廢公仲而逐儀故公仲據儀不合齊是公無患此士計非先逐儀不能得衍合魏非合魏不能廢朋朋怒則復善儀矣於此然後知公仲之名朋也元在韓策陳軫為秦使於齊過魏求見犀首犀首謝陳軫辭不之見陳軫曰軫之所以來者事也公不見軫軫且行不得待異日矣犀首乃見之陳軫曰公惡事乎何為飲食而無事衍無事必來四字犀首曰衍不肖不能得事焉何敢惡事陳軫曰請移天下之事於公犀首曰奈何陳軫曰魏王使李從李從趙人以車百乘使於楚公可以居其中而疑之公謂魏王曰軫教衍臣與燕趙故矣言與之故數令人召臣也曰無事必來今臣無事請謁而往無久言不久於彼旬五之期期以十日五日王必無辭以止公公得行因自言於庭曰臣急使燕趙言有急事出使急約車為行具行所當具犀首曰諾謁魏王魏王許之即明言使燕趙諸侯客聞之皆使人告其王曰李從以車百乘使楚犀首以車三十乘使燕趙齊王閔聞之恐後天下得魏恐得魏後於諸侯以事屬犀首犀首受齊事魏王止其行使初以無事請行今有齊事魏亦且任之故止之燕趙聞之亦以事屬犀首楚王懷聞之曰李從約寡人今燕齊趙皆以事因犀首魏為主約故諸侯因衍以合魏犀首必欲寡人寡人欲之乃倍李從而以事因犀首從與衍皆為魏約耳而因衍者衆故楚亦因之背從者欲專於衍也魏王曰所以不使犀首者以為不可不可任今四國屬以事寡人亦以事因焉犀首遂主天下之事復相魏復言得四國又相魏也非已相罷而又復衍傳有在張儀初相之後彪謂軫之所言惟此有七國捭闔風氣不然醇乎醇矣齊王閔將見燕趙楚之相於衛約外魏不親之魏王懼恐其謀伐魏也告公孫衍公孫衍曰王與臣百金臣請敗之王為約車載百金犀首期齊王至之日度其至衛之日先以車五十乘至衛間齊行人𥙷以百金間私見之以請先見齊王乃得見因久坐安從容談二國之相怨謂齊王曰王與三國約外魏魏使公孫衍來今久與之談是王謀三國也齊王曰魏王聞寡人來使公孫子勞寡人寡人無與之語也三相之相不元作不相信齊王之遇遇事遂敗按上章張儀將相魏犀首以計去之乃得相而儀實相魏四歲則所謂以計去之在儀欲相之初衍得相宜在儀復相秦之時也魏令公孫衍請和於秦綦毋恢教之語曰無多割和成固有秦重和以與王遇和不成則後必莫能以魏合於秦者矣衍已悟秦故公孫衍為魏將與其相田需元作繻從下章及史不善季子末詳為衍謂梁王曰獨不見夫服牛驂驥乎不可以行百步今王以衍為可使將故用之也而聽相之計是服牛驂驥也牛馬俱死而不能成其功王之國必傷矣願王察之彪謂此用賢而使不肖間之之說也而衍也非其人也犀首田盼欲得齊魏之兵以伐趙梁君與田侯閔王不欲犀首曰請國出五萬人不過五月而趙破田盼曰夫輕用其兵者其國易危易用其計者其身易窮公今言破趙太易恐有後咎犀首曰公之不慧也夫二君者固已不欲矣今公又言難以懼之是趙不伐而二士之謀困也二士衍盼且公直言易而事已去矣夫難構而兵結田侯梁君見其危又安敢釋卒不我豫乎田盼曰善遂勸兩君聽犀首犀首𥙷二字田盼遂得齊魏之兵兵未出境梁君田侯恐其至而戰敗也悉起兵從之大敗趙氏犀首見梁居曰臣竭力盡智欲以為王廣土取尊名田需從中敗君王又聽之是臣終無成功也需亡臣將侍需侍臣請亡王曰需寡人之股掌之臣也猶股肱為子之不便也殺之亡之毋謂天下何內之無若羣臣何也內謂親之稱羣臣則衍與焉今吾為子外之令毋敢入子之事入猶與入子之事者吾為子殺之亡之胡如胡猶何犀首許諾於是東見田嬰與之約結召文子田文而相之魏身相於韓身衍之身蘇代為田需說魏王曰臣請問文之為魏孰與其為齊也王曰不如其為齊也衍之為魏孰與其為韓也衍隂晉人時屬韓故下蘇代說昭魚亦云王曰不如其為韓也衍而字蘇代曰衍將右韓而左魏右言助之力文將右齊而左魏二人者將用王之國舉事於世中道而不可中道猶中立也言不能兩全二國王且無所聞之矣不聞所以救之王之國雖滲言浸微浸弱如漏器然樂而從之可也言如漏器尚足樂雖從二子可也然從二子必亟亡不得如是也王不如舍需於側舍猶厝以稽二人者之所為二人者曰需非吾人也需非二人之黨吾舉事而不利於魏需必挫我於王二人者必不敢有外心矣二人者之所為之利於魏與不利於魏王厝需於側厝措同以稽之臣以為身利身王身而國便於事王曰善果厝需於側彪謂哀王於是亦有人君之言不亡需是也惜其不旋踵需不入衍之事蘇代入之矣待衍如是可也如得賢而付之閫外若此者不亦殆乎史舉即甘茂所事非犀首於王犀首欲窮之謂張儀曰請令王讓先生以國衍以此說儀使之為已解舉故舉後見之王為堯舜矣而先生弗受亦許由也衍因令王致萬户邑於先生弗受國故致邑張儀說因令史舉數見犀首王聞之而弗任也任猶信也舉既非之而數見之故王疑之史舉不辭而去楚王懷攻梁南韓氏因圍黃元作薔下同成恢魏人為犀首謂韓王襄曰疾攻黃楚師必進矣魏不能支交臂而聽楚韓氏必危故王不如釋黃魏無韓患必與楚戰戰而不勝大梁不能守而又況存黃乎若戰勝兵罷敝罷音疲大王之攻黃易矣張儀為秦連橫說魏王曰魏地方不至千里卒不過三十萬人地四平諸侯四通條遠輻湊如木枝四分而四方湊之如輻於轂無有名山大川之限從鄭至梁不過百里從陳至梁二百餘里馬馳人趨不待倦而至梁言陳鄭所至皆平地南與楚境西與韓境北與趙境東與齊境卒戍四方它國境或有山川關塞唯梁無之皆以卒戍守守亭障者參列十里一亭障隔也築城壘為之粟糧漕庾漕水運庾水漕倉不下十萬魏之地勢故戰場也魏南與楚而不與齊則齊攻其東東與齊而不與趙則趙攻其北不合於韓則韓攻其西不親於楚則楚攻其南此所謂四分五裂之道也且夫諸侯之為從者以安社稷尊主强兵顯名也合從者一天下約為兄弟刑白馬以盟於洹水之上以相堅也夫親昆弟同父母尚有爭錢財而欲恃詐僞反覆蘇秦之餘謀其不可以成亦明矣大王不事秦秦下兵攻河外拔卷衍燕酸棗劫衛取晉陽則趙不南趙不南則魏不北魏不北則從道絶主從者趙故不言其它則大王之國欲求無危不可得也秦挾韓而攻魏韓劫於秦不敢不聽秦韓為一國魏之亡可立而須也此臣之所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王髙枕而卧國必無憂矣且夫秦之所欲弱莫如楚而能弱楚者莫若魏楚雖有富大之名其實空虛其卒雖衆多然而輕走易北不敢堅戰悉補魏之兵南面而伐勝楚必矣夫虧楚而益魏攻楚而適秦適猶歸內嫁禍安國此善事也大王不聽臣秦甲出而東伐雖欲事秦而不可得也且夫從人多奮辭猶大言而寡可信說一諸侯之王出而乘其車約一國而成反而取補封侯之基是故天下之游士莫不日夜扼腕扼把腕手也瞋目瞋張目也切齒言之力也以言從之便以說人主人主覽其辭牽其說惡得無眩哉臣聞積羽沈舟羣輕折軸衆口鑠金故願大王之熟計之也魏王曰寡人憃愚前計失之請稱東藩築帝宫受冠帶祠春秋效河外儀傳在諸國之先彪謂魏邇秦而無阻固凡橫人之辭若可聽唯魏也故儀先之魏一搖而諸國動矣敗從之約魏其過與使魏而繹其說曰秦豈能有愛於我哉兵來不除道何為以說客先之是知其不可而訹我也且我事秦安得高卧而無憂哉如是展轉計之則儀之辭屈矣魏不搖諸侯將又曰彼魏四達之國又邇於秦彼猶堅約不動我何懼乎秦如是則諸侯一矣惜魏之不知出此也齊魏約而伐楚以董慶為質於齊楚攻齊大敗之而魏弗救田嬰怒將殺董慶盱夷皆魏人謂田嬰曰楚攻齊大敗之而不敢深入者以魏為將內之於齊言縱楚使深入乃擊之也而擊其後今殺董慶是示楚無魏也魏怒合於楚齊必危矣不如貴董慶以善魏而疑之於楚也張儀走之魏傳言秦武元年羣臣惡之乞之梁此九年魏將迎之張丑諌於王欲勿內不得於王王不聽也張丑退復諌於王曰王亦聞老妾事其主婦者乎子長色衰重嫁而已重猶再今臣之事王若老妾之事其主婦者魏王因不納張儀彪謂丑之自比若此豈可望以士君子之行哉哀王聽其說是亦魏媪之耄者耳衍魏字文子田文田需周霄孟子時有此人至是三十年矣相善欲罪犀首犀首患之謂魏王曰今所患者齊也嬰子言行於齊王閔王欲得齊則胡不召文子而相之彼必務以齊事王王曰善因召文子而相之犀首以倍田需周霄二人雖善文今衍薦文文必善衍善衍則復背其所善魏王令惠施施自孟子時至是亦三十餘年之楚令犀首之齊鈞二子者言恩禮之等乘數鈞車乘之數將測交也測猶卜也視何國厚吾使因知其厚我聞下衍楚王之四字施因令人先之楚言曰魏王令犀首之齊惠施之楚鈞二子者將測交也施欲楚之厚已楚王聞之因郊迎惠施田需貴於魏王惠子曰子必善左右今夫楊橫樹之則生倒樹之則生折而樹之又生然使十人樹楊一人拔之則無生楊矣故以十人之衆樹易生之物然而不勝一人者何也樹之難而去之易也今子雖自樹於王而欲去子者衆則子必危矣田需死昭魚謂蘇代曰田需死吾恐張儀薛公嬰犀首之有一人相魏者代曰然則相者以誰而君便之也昭魚曰吾欲太子之自相也代曰請為君北見梁王必相之矣昭魚曰奈何代曰若其為梁王若汝也代請說君昭魚曰奈何對曰代也從楚來昭魚甚憂代曰君何憂曰田需死吾恐張儀薛公犀首有一人相魏者代曰勿憂也梁王長主也必不相張儀張儀相魏必右秦而左魏薛公相魏必右齊而左魏犀首相魏必右韓而左魏梁王長主也必不使相也王曰然則寡人孰相以史補王曰下八字代曰莫如太子之自相是三人皆以太子為非固相也固猶久皆將務以其國事魏而欲丞相之璽印也以魏之强而持三萬乘之國輔之魏必安矣故曰不如太子之自相也遂北見梁王以此語告之太子果自相魏記九年有周最善齊翟强善楚二子者欲傷張儀於魏張子聞之因使其人儀之人為見者嗇夫見者最與强見王也間見者間以伺候之因無敢傷張子此九年儀再相魏時周最入齊魏不善之秦王武怒令姚賈讓魏王最蓋秦所置以相魏者魏王為之為最蓋秦亦怒最之去魏謂秦王曰魏之所以為王通天下者以周最也今最遁寡人入齊齊無通於天下矣齊秦為敵魏既以最通天下於秦則外齊矣今最入齊天下不知以謂魏使之之齊敗齊事因不通齊矣敝邑之事王亦無齊纍矣齊納魏所不善則可以絶之大國欲急兵伐齊則趣趙而已促使應秦也魏不善最而言為最所以自為也按此姚賈與始皇所問之人相去八十餘年高誘欲以為陳賈若此人者可也蓋陳舜後得為姚姓而孟子與秦武魏哀時猶相及獨以毁韓非相毁之人為此人則年時相絶大遠矣可乎哉秦召魏相信安君史不書信安君不欲往蘇代為說秦王武或昭曰臣聞之忠不必黨為信安說疑於黨之黨不必忠今臣願為補大王陳臣之愚意恐其不忠於下吏自使有要領之罪要領斬刑也願大王察之今大王令人執事於魏謂别置相以代信安以完其交臣恐魏交之益疑也將以塞趙也信安必右趙者秦召而代之欲魏不通趙臣又恐趙之益徑也交魏益堅夫魏王之愛習魏信也甚矣魏信即信安省言之其智能而任用之也厚矣其畏惡尊嚴秦也明矣惡猶憚今王之使人入魏而不用則王之使人入魏無益也若用用秦所使魏必舍所愛習而用所畏惡此魏王之所不安也夫舍萬乘之事而退謂去相位此魏信之所難行也夫令人之君處所不安令人之相行所不能以此為親則難久矣臣故恐魏交之益疑也且魏信舍事亦去信也則魏元作趙之謀者必曰舍於秦此舍猶棄奪其愛習是秦棄魏也秦必令其所愛信者用趙是趙存而我亡也我魏也秦本欲塞趙而云然此魏自疑之辭非必秦意趙安而我危也則上有野戰之氣將與秦戰下有堅守之心臣故恐趙之益徑也魏不能獨抗秦必結趙大王欲完魏補之交而使趙小心乎不如用魏信而尊之以名魏信事王國安而名尊離王不事之國危而權輕然則魏信之事王也上所以為其主者忠矣下所以自為者厚矣彼其事王必完矣趙之用事者必曰魏氏之名族不髙於我土地之實不厚於我魏信以衍韓字魏事秦秦甚善之國得安焉身得尊焉今我構元作講難於秦兵為招質言於用兵為招為質招言召兵質猶本也為之張本國處削危之形非得計也結怨於外主患於中身處死亡之地非完事也彼將傷其前事而悔過其行冀其利必多割地以深下王下亦事也則是大王垂拱多割地以為利重得地則益重堯舜之所求而不能得也臣願大王察之彪謂堯舜讓天下而何愛於地此時辨士欲重其事而言之過若此者不一也樓牾魏人後又作梧約秦魏魏太子為質此十二年朝秦紛彊魏人欲敗之謂太后曰國與還者也還猶反也兩國相與好惡循環不定敗秦而利魏魏必負之負言魏得利而强將不事秦所謂還反負秦之日太子為糞矣即所謂糞之太后坐王而泣使王坐而泣於前王因疑於太子不決遣令之留於酸棗樓子患之昭衍為周之梁樓子告之昭衍見梁王梁王曰何聞曰聞秦且伐魏王曰為期與我約矣言期以太子結約而不遣為此故伐耶曰秦疑於王之約以太子之留酸棗而不之秦秦王昭之計曰魏不與我約必攻我我與其處而待之見攻不如先伐之以秦强折節而下與國與與國共伐魏臣恐其害於東周不欲正言魏受伐魏與周鄰言周則魏可知元在秦䇿秦楚攻圍皮氏亦十三年為魏謂楚王懷曰秦楚勝魏魏王之恐衍也字見亡也元作矣必合於秦王何不背秦而與魏王魏王喜必內太子豈秦歸太子而攻邪秦恐失楚必效城地於王王雖復與之攻魏可也楚王曰善乃背秦而與魏魏內太子於楚秦恐許楚城地欲與之復攻魏樗里疾怒欲與魏攻楚恐魏之以太子在楚不肯也為疾謂楚王曰外臣疾使臣謁之曰敝邑之王昭欲效城地前許之未入也而為魏太子之尚在楚也是以未敢王出魏質臣請效之而復固秦楚之交以疾攻魏此疾速也非名楚王曰諾乃出魏太子秦因合魏以攻楚魏太子在楚為元作謂樓子也從太子為質而楚任之於鄢陵楚用事者所封曰公必且待齊楚之合也以救皮氏今齊楚之理必不合矣彼翟子强也魏人仕齊之所惡於國者無公矣無如鄢陵其人皆欲合齊秦外楚以輕公人翟之人公必謂齊王閔曰魏之受兵非秦實首伐之也楚惡魏之事王也故勸秦攻魏齊王故欲伐楚此士言齊本自欲爾而又怒其不已善也必令魏以地聽秦而為和以强子之强言儀往日有秦韓之重齊王惡之而魏王不敢據也言魏襄為齊逐儀今以齊秦之重外楚以輕公臣為公患之鈞之出地以為和於秦也鈞言齊與楚豈若由楚乎秦疾攻楚衍楚字還兵魏王必懼公因割元作寄汾北以與秦而為和汾北魏地鄢陵宜因其懼使割豫秦此所謂由楚合親以孤齊秦趙魏合秦楚重公公必為相矣臣意秦王昭與樗里疾之欲之也臣請為公說之乃謂樗里子曰攻皮氏此王之首事也首言主兵而不能拔天下且以此輕秦且有皮氏於以攻韓魏利也樗里子曰吾已合魏矣無所用之故史書未拔而解對曰臣願以鄙心意公意猶度公無以為罪有皮氏國之所大利也而以與魏公終自以為不能守也故以與魏今公之力有餘守之於守為有餘何故而弗有也樗里子曰奈何曰魏王之所恃者齊楚也所用者樓翟强也今齊王謂魏王曰欲講攻於齊言欲講秦攻秦皆於我夫魏求救欲講而已而齊兼言攻故下言主兵主兵之辭也是弗救也楚王懷怒於魏之不用樓子而使翟强為和也和齊秦怨顔已絶之矣怨魏欲絶之見於顔色魏王之懼也見亡以有亡形而懼翟强欲合齊秦外楚以輕樓此强之和樓欲合秦楚外齊以輕翟强公不如按魏之和按謂主之使人謂樓子曰子能以汾北與我乎請合於楚外齊以重公也此吾事也疾言此事吾所欲為樓子與楚王必疾矣言應之速又謂翟子子能以汾北與我乎强亦魏人必為合於齊外衍於字楚以重公也翟强與齊王必疾矣是公外得齊楚以為用內得樓翟强以為佐主魏言之故言內何故不能有地於河東乎言且得皮氏按此蓋樓在楚欲因楚和秦以息攻鄢陵不順也故此士說之又說樗里凡其辭兩言齊楚翟樓示無所偏也而於楚獨曰吾事則是為樓子也獻書秦王昭曰臣竊聞大王之謀出事於梁謂攻之謀恐不出於計矣非得計也願大王之熟計之也梁者山東之要也腰人身之中有蛇於此兵法所謂率然擊其尾其首救擊其首其尾救擊其中身首尾皆救今梁者天下之脊也夫秦攻梁者是示天下要斷山東之脊也要猶欲是山東首尾皆救中身之時也山東見亡必恐恐必大合山東尚强臣見秦之必大憂可立而待也臣竊為大王計不如南出事於南方謂楚其兵弱天下不補必能救地可廣大言秦地國可富兵可强主可尊王不聞湯之伐桀乎試之弱密須氏試謂先之以其弱可必克也周紀注密須在安定隂密以為武教得密須氏而湯知服桀矣今秦欲與山東為讎不先以弱為武教兵必大挫國必大憂秦果南攻藍田鄢郢藍田秦地疑衍文彪謂攻伐先後理正應爾故司馬錯為秦議以伐蜀為先而我藝祖欲平太原諸國亦先平蜀魏秦伐楚秦昭六年與魏韓共攻楚此十八年魏王不欲樓縷謂魏王曰王不與秦攻楚楚且與秦攻王王不如令秦楚戰王交制之緩時為秦計耳故明年相秦昭王哀王子元年赧王二十年丙寅秦敗東周與魏戰於伊闕殺犀武此三年魏令公孫衍乘勝而留於境乘言因秦勝我留而與之講若秦既去則無及已請卑辭割地以講於秦為竇屢魏人謂魏王曰臣不知衍之所以聽於秦之少多然而臣能半衍之割而令秦講於王王曰奈何對曰王不若與竇屢關內侯侯於關內耳此時未為爵而令之趙王重其行而厚奉之因揚言曰聞周魏令竇屢已割魏於奉陽君而聽秦矣因趙講秦夫周君竇屢奉陽君之與穰侯貿首之仇也今行和者竇屢也制割者奉陽君也太后恐其不因穰侯也后穰侯之姊而欲敗之必以少割請合於王而和於東周與魏也秦約趙而伐魏魏王患之芒卯曰王勿憂也臣請發張倚魏人使謂趙王惠文曰夫鄴寡人固形元作刑弗有也形猶勢也髙注為刑法雖通而此書多作形今大王收秦而攻魏寡人請以鄴事大王趙王喜召相國而命之曰魏王請以鄴事寡人使寡人絶秦相國曰收秦攻魏利不過鄴今不用兵而得鄴請許魏張倚因謂趙王曰敝邑之吏效城者已在鄴矣大王且何以報魏趙王因令閉關絶秦秦趙大惡芒卯應趙使曰敝邑所以事大王者為完鄴也今效元作郊鄴者使者之罪也卯不知也趙王恐魏承秦之怒遽割五城以合於魏而支秦此六年書卯以詐重者此也之彪謂此馮亭上黨之事也惠文失之於魏孝武失於韓雖所喪敗有寡多之差其貪而不明真父子也芒卯謂秦王昭曰王之士未有為之中者也中謂用事於諸國之中猶內應云臣聞明王不背元作咠中而行王之所欲於魏者長平元作羊下同屬汝南王屋在河東垣縣東北洛林即蘇代所謂林中河南宛陵林鄉也之地也王能使臣為魏之司徒本周官此所謂為之中則臣能使魏獻之秦王曰善因任以為魏之司徒謂魏王曰王所患者上地也上流之地近秦秦之所欲於魏者長平王屋洛林之地也王獻之秦則上地無憂患因請以下兵東擊齊攘地必逺矣魏王曰善因獻之秦地入數月而秦兵不下魏王謂芒卯曰地入數月而秦兵不下何也芒卯曰臣有死罪雖然臣死則契折於秦折毁也言不可有責於秦王無以責秦王因赦其罪臣為王責約於秦乃之秦謂秦王曰魏之所以獻長平王屋洛林之地者欲以下大王之兵東擊齊也今地已入而秦兵不可下臣則死人也雖然後山東之士無以利事王者矣秦王懼然曰國有事未贍元作淡下兵也贍給也今以兵從後十日秦兵下芒卯并將秦魏之兵以東擊齊啓地二十二縣蘇代元作秦下同拘於魏欲走而之齊元作韓魏氏閉關而不通齊使蘇厲為之謂魏王曰齊請以宋地時未舉宋此侵代所得耳封涇陽君而秦不受也夫秦非不利有齊而得宋地然其所以不受者不信齊王閔與蘇代也疑其善魏今秦見齊魏之不合衍也字如此其甚也則齊必不欺秦而秦信齊矣齊秦合而涇陽君有宋地則非魏之利也故王不如復東蘇代使得之齊秦必疑齊而不聽也夫齊秦不合天下無憂伐齊成則地廣矣齊無秦而魏伐之可以得地蘇傳有在齊伐宋之前五國伐秦成澤之伇此十年無功而還其後齊欲伐宋而秦禁之齊令宋郭之秦請合而以伐宋秦王昭許之魏王畏齊秦之合也欲講於秦謂魏王曰秦王謂宋郭曰分宋之城服宋之强者六國也乘宋之敝而與王爭得者王齊閔楚魏也請為王母楚楚之伐魏也而王獨舉宋王之伐宋也請剛柔而皆用之宋强宋弱皆必代之如宋者欺之不為逆殺之不為讎者也王無與之講以取地既已得地又以力攻之期於啖宋而已矣臣聞此言而竊為王患元作悲秦必且用此於王矣用楚伐魏又必且劫元作曰王以求地既已得地又且以力攻王又必謂王衍曰字使王輕齊齊魏之交已醜惡也又且收齊以東索於王秦嘗用此於楚矣又嘗用此於韓矣願王之深計之也秦善魏不可知也已言不可信故為王計太上伐秦其次賔秦其次堅約而詳講與國無相讎也秦齊合國不可為也已王其聽臣也必無與講與秦講秦權重魏魏冉明熟元作孰是言慮此明且熟故有謂元作又為足下或人謂魏王為足下傷秦者傷猶不敢顯也恐秦覺之天下可令伐秦則隂勸而弗敢圖也見天下之傷秦也則先鬻與國而以自解也言與國為之非我也天下可令賔秦則為劫於與國而不得已者天下不可則先去背諸國也而以秦為上交以自重也如是人者鬻王以為資者也而焉能免國於患免國於患者必窮三節而行其上上不可則行其中中不可則行其下下不可則明不與秦而生以殘秦生猶進言伐之不已使秦皆無百怨百利唯已之曽安已止曽則也言使秦見殘不擇利害唯務止魏之殘以自安也無補令天元作足下鬻之以合於秦所謂鬻王以秦為上交者是免國於患者之計也臣何足以當之雖然願足下之論臣之計也燕齊讎國也兩國自宣閔易昭再世相讎秦兄弟之交也燕齊與秦合讎國以伐婚姻猶兄弟也此士欲為魏合燕齊以伐秦臣為之苦矣言伐秦之難而已為之黃帝戰於涿鹿之野而西戎之兵不至禹攻三苖而東夷之民不赴元作起言帝王用兵猶有不從者不經見以燕齊補伐秦黃帝之所難也而臣已致燕甲而起齊兵矣臣又編事三晉之吏奉陽君孟嘗君韓珉元從口周最周韓餘為徒與為徒友從而下之恐其伐秦之報也又身自醜於秦與秦惡扮之扮并也握也言合諸國請焚天下之秦符者臣也次𫝊焚符之約者臣也𫝊之諸國次元作欲使五國約閉秦關者臣也不通秦奉陽君韓餘為既和矣蘇修朱嬰此皆三晉之吏皆隂在邯鄲臣又說齊王而往敗之敗宋郭合秦之約天下共講因使蘇修游天下之語游揄揚之而以齊為上交蓋詐兵請伐魏兵齊兵臣又爭之以死而果西因蘇修重報修在邯鄲齊之西也報以齊不伐魏臣非不知秦權元作勸之重也然而所以為之者為足下也彪謂此非蘇代不能也故史言代復約從親如蘇秦時獨所謂行其上不可則行其中下為不可用也夫伐秦不勝竄走求成之不給安能賔之諸侯見其敗輕之矣豈有聽其堅約之說哉蓋代之計専以伐之為上而游辭以見其多䇿耳計不出於此也葉陽君趙人約魏魏王將封其子謂魏王曰王嘗身濟漳朝邯鄲抱葛孽元作薛隂成以為趙養邑供養之邑而趙無為王有也王能又封其子河元作問陽姑密元作衣乎趙惠文十三年有與此語同云封李兌子則葉陽者兌之封乎臣為王不取也魏王乃止惠文十三年此十年秦使趙攻魏魏謂趙王惠文曰攻魏者亡趙之始也昔者晉人欲亡虞而先伐虢伐虢者亡虞之始也故荀息以馬與璧假道於虞宫之竒諫而不聽卒假晉道晉人伐虢反而取虞故春秋書之以罪虞公今國莫强於趙而并衍齊字秦王昭賢而有聲者相之并猶兼聲威聲相助也言趙强矣兼得秦助所以為心腹之疾者趙也言秦以趙為疾魏者趙之虢也趙者魏之虞也聽秦而攻魏者虞之為也願王之熟計之也秦將伐魏魏王聞之夜見孟嘗君本傳齊閔驕故奔魏魏相之此十一年告之曰秦且攻魏子為寡人謀奈何孟嘗君曰有諸侯之救則國可存也王曰寡人願子之行也重為之約車百乘孟嘗君之趙謂趙王惠文曰文願借兵以救魏趙王曰寡人不能孟嘗君曰夫敢借兵者以忠王也王曰可得聞乎孟嘗君曰夫趙之兵非能强於魏之兵魏之兵非能弱於趙也然而趙之地不嵗危而民不嵗死而魏之地嵗危而民嵗死者何也以其西為趙蔽也魏在趙西為之蔽秦今趙不救魏魏歃盟於秦歃啜血也是趙與强秦為界也地亦且嵗危民亦且歲死矣此文之所以忠於大王也趙王許諾為起兵十萬車三百乘又北見燕王昭曰先日公子稱其父嬰嘗約兩主之交矣今秦且攻魏願大王之救之燕王曰吾嵗不熟二年矣今又行數千里而以助魏且奈何田文曰夫行數千里而救人者此國之利也今魏王出國門而望見軍雖欲行數千里而助人可得乎燕王尚未許也田文曰臣效便計於王王不用臣之忠計文請行矣恐天下之將有大變也王曰大變可得聞乎曰秦攻魏未能克之也而臺已燔游已奪矣不暇游觀而燕不救魏魏王折節割地以國之半與秦秦必去矣秦已去魏魏王悉韓魏之兵又西借秦兵以因趙之衆以四國攻燕王且何利利行數千里而助人乎利出燕南門而望見軍乎則道里近而輸又易矣輸以餉軍王何利燕王曰子行矣寡人聽子乃為之起兵八萬車三百乘以從田文魏王大說曰君得燕趙之兵甚衆且亟矣秦王昭大恐割地請講於魏因歸燕趙之兵而封田文彪謂田文可謂善言者矣其說趙也邇而不逼其說燕也直而不倨與夫嚂口虛喝者異矣穰侯攻大梁秦昭二十四年攻魏至大梁此十三年乘郢北元作北郢郢楚别邑其北近魏魏王且從從順服也謂穰侯曰君攻楚得宛穰以廣陶攻齊得剛博並屬太山以廣陶攻魏得許鄢陵以廣陶秦王昭不問者何也以大梁之未亡也今日大梁亡許鄢陵必議議其不當得議則君必窮為君計者勿攻便白圭魏人孟子稱之趙岐以為周人非也蓋至是三四十年矣謂新城君曰夜行者能無為姧不能禁狗使無吠已也故臣能無議君於王戎貴於秦王宜為秦王今圭說之豈非圭使魏戎來魏不能禁人議於君也秦䇿段彥語同秦攻韓之管後志河南管城注在京縣東北魏王發兵救之昭忌曰夫秦强國也而韓魏壤言地與秦接秦元作梁不出攻則已若出攻非於韓也必於魏也今幸而於韓此魏之福也王若救之夫解攻者必韓之管也致攻者必魏之梁也魏王不聽曰若不因救韓韓怨魏西合於秦秦韓為一則魏危遂救之秦果釋管而攻魏魏王大恐謂昭忌曰不用子之計而禍至為之奈何昭忌乃為之見秦王昭曰臣聞明主之聽也不以挾私為政與正同是參行也以諸國參考而行言參彼已也願大王無攻魏聽臣也秦王曰何也昭忌曰山東之從時合時離何也秦王曰不識也曰天下之合以王之不必也猶言不可測也方攻韓又攻魏是也其離也以王之必也伐一不移伐則諸國知免不急於從也今攻韓之管國危矣未卒而移兵於梁合天下之從無精於此者矣精猶明以為秦之求索必不可支也今為王計者不如制元作齊趙秦已制趙則燕不敢不事秦荆濟不能獨從荆楚濟齊天下爭敵於秦則弱矣言諸國合而競與秦敵則秦弱秦王乃止彪謂鄰國有兵救之恤鄰之義昭王言是也秦伐韓而魏救之挑秦之禍昭忌之言亦是也要之從約堅則宜救猶救同室之鬬也無從約而救之則是鄊鄰有鬬被髮纓冠而往是豈不可已乎芮宋魏人欲絶秦趙之交故令魏氏收秦太后之養地宣太后秦王昭怒芮宋謂秦王曰魏委國於王委與之而王不受故委國於趙也李郝趙人謂臣曰子言無秦而養秦太后以地是欺我也故敝邑收之秦王怒遂絶趙為魏謂楚王頃襄曰索攻魏於秦楚以攻魏索於秦秦必不聽王矣是智困於秦而交疏於魏也楚魏有怨則秦重矣故王不如順天下天下不欲秦伐魏遂伐齊與魏便地言以所得齊地與魏易兩便也兵不傷交不變所欲必得矣管鼻之魏人令翟强與秦事鼻之不欲故推之於强謂魏王曰鼻之謂之鼻之與强猶晉人之與楚人也晉人見楚人之急帶劒而緩之楚人惡其緩而急之今鼻之入秦之傳舍酈食其傳注止息𫝊置之舍舍不足以舍之侍衛之盛舍不能容强之入無蘇於秦者言秦輕之無與為樵蘇者强王貴臣也而秦若此其甚安可秦待己巳厚可以不與秦事秦輕强矣欲其重之必令與秦事乃可成陽君秦昭十七年入朝者於此知為韓人不疑欲以韓魏聽秦魏王弗利白圭謂魏王曰王不如隂使人說成陽君曰君入秦秦必留君而以多割於韓矣韓不聽秦必留君而伐韓矣故君不如安行安猶徐求質於秦質事有不留之驗乃可入成陽君必不入秦秦韓不衍敢字合則王重矣安釐王昭王子元年乙赧王三十九年酉秦敗魏於華華山在𢎞農華隂秦紀作華陽注亭名在密縣事在此二年走芒卯而圍大梁須賈魏人為魏謂穰侯曰臣聞魏氏大臣父兄皆謂魏王曰初時惠王伐趙戰乎三梁春秋秦取梁漢夏陽也河南有梁周小邑也陳留浚儀大梁為三皆魏地十萬之軍拔邯鄲秦十二年攻趙虜莊賈趙氏不割而邯鄲復歸齊人攻燕殺子之破故國燕不割而燕國復歸燕趙之所以國全兵徑而地不并乎諸侯者以其能忍難而重出地也宋中山數伐數割而隨以亡臣以為此臣魏大臣所稱燕趙可法而宋中山可無為也夫秦貪戾之國而無親蠶食魏盡晉國戰勝睪子地缺割八縣地未畢入而兵復出矣夫秦何厭之有哉今又走芒卯入北地梁之北非郡此非但攻梁也且劫王以多割也王必勿聽也今王循楚趙而講循猶順也以下文考之秦時蓋合楚趙共攻魏魏見二國為秦用遂欲講秦不反覆思之也楚趙怒而與王爭事秦秦必受之秦挾楚趙之兵以復攻則國救亡不可得衍也字已願王之必無講也王若欲講必少割而有質亦事驗也不然必欺是臣之所聞於魏也願君之以是慮事也周書曰維命不於常此言幸之不可數也夫戰勝睪子而割八縣此非兵力之精非計之功也天幸為多矣今又走芒卯入北地以攻大梁是以天幸自為常也智者不然臣聞魏氏悉其百縣勝兵以止戍大梁臣以為不下三十萬以三十萬之衆守十仭之城臣以為雖湯武復生弗易攻也夫輕信楚趙之兵陵十仭之城載三十萬之衆而志必舉之臣以為自天下之始分以至於今未嘗有之也攻而不能拔秦兵必罷音疲隂必亡隂穰侯别邑則前功必棄矣今魏方疑可以少割收也願君補之及楚趙之兵未任於大梁也未以攻梁自任亟以少割收魏魏方疑而得以少割為和必欲之則君得所欲矣楚趙怒於魏之先已講也已兵未至而與秦講必爭事秦從是以散從橫之從而君後擇焉擇其所與於從散之後且君之嘗割晉國取地也何必以兵哉先割取時不用兵夫兵不用而魏效絳安邑又為隂啓言得二縣以拓隂之封地兩機盡兩謂得縣啓封盡無遺也故宋衛效魏自比二國二國小國也尤憚元作憚尤秦兵出地而小故愈畏秦已合魏合秦而君制之何求而不得何為而不成臣願君之熟計而毋行危也穰侯曰善乃罷梁圍彪謂賈之說不足以已秦也為其為魏也過深而說秦也不切夫以秦為天幸而欲其毋行危也秦豈信之哉秦行是何危之有且其為魏之過深也適足以疑秦豈沮於是哉梁圍之解將别有故非賈力也秦敗魏於華魏王且入朝於秦周訴謂王曰宋人有學者三年反而名其母其母曰子學三年反而名我者何也其子曰吾所賢者無過堯舜堯舜名吾所大者無大天地天地名今母賢不過堯舜母大不過天地是以名母也其母曰子之於學者於其所學將盡行之乎願子之有以易名母也子之於學也將有所不行也願子之且以名母為後也今王之事秦尚有可以易入朝者乎願王之有以易之而以入朝為後魏王曰子患寡人入而不出邪許綰為我祝曰入而不出請殉寡人以頭周訴對曰如臣之賤也今人有謂臣曰入不測之淵而必出不出請以一鼠首為汝殉者臣必不為也今秦不可知之國也猶不測之淵也而許綰之首猶鼠首也內王於不可知之秦而殉王以鼠首臣竊為王不取也且無梁孰與無河內急王曰梁急無梁孰與無身急王曰身急曰以三者身上也河內其下也秦未索其下而王效其上可乎王尚未聽也支期曰王視楚王頃襄楚王入秦絶句王以三乘先之先楚至秦楚王不入楚魏為一尚足以捍秦王乃止王謂支期曰吾始已諾於應侯矣今不行者欺之矣支期曰王勿憂也臣使長信侯魏相之善應侯者請無內王王待臣曰支期說於長信侯曰王命召相國長信侯曰王何以臣為支期曰臣不知也王急召君長信侯曰吾內王於秦者寧以為秦邪吾以為魏也支期曰君無為魏計君其自為計且安死乎問何所安安生乎安窮乎安貴乎君其先自為計後為魏計長信君曰樓公將入矣緩也俟其入欲與之議臣今從支期曰王急召君君不行血濺君襟矣長信侯行支期隨其後且見王支期先入謂王曰僞病者乎而見之令王見而辭疾臣已恐之矣長信侯入見王王曰病甚奈何吾始已諾於應侯矣意雖道死行乎雖死於路猶將行長信侯曰王母行矣臣能得之於應侯矣能使應侯止王之行願王無憂彪謂周訴之愛王也甚忠其諭王也甚明賢智人也釐王不能聽而聽支期期豈賢於訴哉蓋期之所效者事而訴之所諭者理庸主固可示以事而難以理論也微二臣者釐其為楚懷與華軍之戰魏不勝秦明年將使段干崇割地而講孫臣並魏人謂魏王曰魏不以敗之上割上謂當其時可謂善用不勝矣而秦不以勝之上割可謂不善用勝矣今處期年乃欲割是羣臣之私計不及也而王不知也且夫欲璽者得秦封受其璽段干子也王因使之割地欲地者秦也而王因使之授元作受璽夫欲璽者制地而欲地者制璽其勢必無魏矣且夫姧臣固皆欲以地事秦以地事秦譬猶抱薪而救火也薪不盡則火不止今王之地有盡而秦之求無窮是薪火之說也魏王曰善雖然吾已許秦矣不可以革也革更也對曰王獨不見夫博者之用梟邪猶上善用勝矣欲食則食欲握則握握不食也食者行棊握不行也故史曰便則行不便則止今君劫於羣臣而許秦因曰不可革何用智之不若梟也魏王曰善乃按其行按猶止記四年有秦魏為與國齊楚約而欲攻魏魏使人求救於秦冠蓋相望秦救不出魏人有唐雎元作且者年九十餘謂魏王曰老臣請出西說秦令兵先臣出可乎魏王曰敬諾遂約車而遣之唐睢見秦王昭秦王曰丈人芒然乃逺至此甚苦矣魏來求救數矣寡人知魏之急矣唐睢對曰大王已知魏之急而救不至者是大王籌䇿之臣無任矣不堪其事且夫魏一萬乘之國稱東藩受冠帶祠春秋者以為秦之强足以為與也今齊楚之兵已在魏郊矣大王之救不至魏急則且割地而約齊楚王雖欲救之豈有及哉是亡一萬乘之魏而强二敵之齊楚也竊以為大王籌䇿之臣無任矣秦王喟然愁悟遽發兵日夜赴魏齊楚聞之乃引兵而去魏氏復全唐睢之說也說十一年有虞卿謂趙王惠文曰人之情寧朝人乎寧朝於人也趙王曰人亦寧朝人耳何故寧朝於人虞卿曰夫魏為從主而違者范痤也魏相今王能以百里之地若萬户之都請殺范痤於魏范痤死則從事可移於趙趙王從也趙王曰善乃使人以百里之地請殺范痤於魏魏王許諾使司徒本周卿此特主徒𨽻者耳執范痤而未殺也范痤獻書魏王曰臣聞趙王以百里之地請殺痤之身夫殺無罪范痤衍痤字薄故也猶細事而得百里之地大利也臣竊為大王美之雖然而有一焉百里之地不可得而死者不可復生也則王必為天下笑矣臣竊以為與其以死人市不若以生人市便元作使也又遺其後相信陵君書曰夫趙魏敵戰之國也趙王以咫尺之書來而魏王輕為之殺無罪之痤痤雖不肖故魏之免相衍望字也嘗以魏之故得罪於趙夫國無用臣用言可任者外雖得地勢不能守今能守魏者莫如君矣王聽趙殺痤之後强秦襲趙之欲襲言猶因趙之故態也倍趙之割則君將何以止之此君之纍也信陵君曰善遽言之王而出之十一年有與其以死市下元在趙䇿魏將與秦攻韓朱已史作無忌謂魏王曰秦與戎翟同俗有虎狼之心貪戾好利而無信不識禮義德行茍有利焉不顧親戚兄弟若禽獸耳此天下之所同知也非所施厚積德也故太后母也而以憂死秦昭四十二年此十二年穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此其於親戚兄弟若此而又況於仇讎之敵國也今大王與秦伐韓而益近秦臣甚惑之而王弗識也則不明矣羣臣知之而莫以此諌則不忠矣今夫韓氏以一女子承一弱主此十二年桓惠立八年矣內有大亂外安能支强秦魏之兵王以為不破乎韓亡秦有鄭地時鄭亡屬韓與大梁鄰王以為安乎王欲得故地蓋嘗喪地於韓今欲取之而今負强秦之禍也王以為利乎秦非無事之國也韓亡之後必且便事便事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絶韓之上黨而攻强趙則是復閼與之事也先時趙奢敗秦於此秦必不為也若道河內倍鄴朝歌倍音背絶漳滏之水而以與趙兵決勝於邯鄲之郊是受智伯之禍也秦又不敢伐楚道涉山元作而谷行三千里而攻危隘之塞所行者甚逺而所攻者甚難秦又弗為也若道河外背大梁而右上蔡召陵以與楚兵決於陳郊秦又不敢也故曰秦必不伐楚與趙矣又不攻衛與齊矣韓亡之後兵出之日非魏無攻矣秦故有懷地邢丘之城垝津地缺而以之臨河內河內之共汲莫不危矣秦有鄭地得垣雍秦紀注河內卷有垣雍城決滎澤屬滎陽書注在敖倉東南而水大梁大梁必亡矣王之使者大過矣乃惡安陵氏於秦安陵魏之不欲攻韓者與羣臣異故惡之秦之欲許之久矣許言聽之久言秦之先自惡之然而秦之葉陽昆陽與舞陽髙陵鄰髙陵屬琅邪此二縣安陵封地以與昆陽葉陽鄰故秦久惡安陵聽使者之惡也隨安陵氏而欲亡之秦繞舞陽之北以東臨許則南國必危矣周紀注南國江漢之間又曰南陽也今詳此時屬韓南國雖無危則魏國豈得安哉且夫憎韓不受安陵氏可也夫不患秦之不愛南國非也異日者異猶它秦乃在河西晉國之去梁也千里有餘言都絳安邑時有補河山以䦨元作蘭下同之䦨入之䦨有周韓而間之從橫元作林軍橫之軍以至於今秦十攻魏五入國中邊城盡拔文臺墮垂都焚勾陽有垂都亭林木伐麋鹿盡而國繼以圍又長驅梁北東至陶衛之郊衛在河淇之間與陶接故范蠡亦云北至乎闞魏記注在東平須昌所亡乎秦者山北山吳華之屬河外河內大縣數百名都數十秦乃在河西晉國之去大梁也尚千里而禍若是矣又況於使秦無韓而有鄭地無河山以䦨之無周韓以間之去大梁百里禍必百此矣異日者從之不成也元作矣楚魏疑而韓不可得而約也今韓受兵三年矣受秦兵秦撓之以講以求地擲撓之韓知亡猶弗聽投質於趙質約也見下而請為天下鴈行頓刃鴈行言以次進以臣之愚補觀之則楚趙必與之攻矣此何也則皆知秦欲補之無窮也非盡亡天下之兵而臣海內之民必不休矣是故臣願以從事乎王王速受楚趙之約而挾韓衍魏字之質以存韓為務因求故地於韓韓必效之如此則士民不勞而故地得其功多於與秦共伐韓然而無與强秦鄰之禍夫存韓安魏而利天下此亦王之大時已通韓之上黨於共寧使使去音通其道不通它使將為關也道已通因而關之出入者賦之賦征取是魏重質韓以其上黨也質有要也共有其賦韓魏共之足以富國韓必德魏愛魏重魏畏魏韓必不敢反魏韓是魏之縣也魏得韓以為縣則衛大梁河外必安矣衛時已附梁今不存韓則二周必危安陵必易秦輕之也楚趙衍楚字大破衛齊甚畏皆為秦所勝制天下之西鄉而馳秦入朝為臣之日不久記有與上二章相次彪謂言秦之情者衆矣與白於此者也秦趙構難而戰長平之役此十七年謂魏王曰不如收元作齊趙而構之秦構者合其戰也收趙而助之趙必與秦合戰王不構趙趙不以毁構矣毁折也言不收趙趙不能以毁折之兵獨與秦合戰而構之秦趙必復鬬鬬必重魏是并制秦趙之事也王欲焉而收齊趙攻荆欲意或欲也欲焉而收荆趙攻齊欲王之東長之也荆齊在魏東不樂屬秦而欲魏為之長待之也待魏之東長平之役平都君田單說魏王曰王胡不為從魏王曰秦許吾以垣雍韓所得魏地平都君曰臣以垣雍為空割也魏王曰何謂也平都君曰秦趙久相持於長平之下而無決天下合於秦則無趙合於趙則無秦秦恐王之變也故以垣雍餌王也秦戰勝趙王敢責垣雍之割乎王曰不敢秦戰不勝趙王能令韓出垣雍之割乎韓不畏秦故王曰不能臣故曰垣雍空割也魏王曰善樓梧約秦魏將令秦王昭遇於境謂魏王曰或謂非梧遇而無相無相魏者秦必置相不聽之則交惡於秦聽之則後王之臣自遇之後將皆務事諸侯之能令於王上者言處魏上而能使之從令若秦者且遇於秦而相秦者相秦所置是無齊也獨言齊者時君王后賢與秦敵也秦必輕王之强矣無齊助故有齊者羣臣能得齊事者王不若相之齊必喜是以有齊者與秦遇秦必重王矣十補八年此八月春申未封謂魏王曰昔曹恃齊曹今定陶而輕晉齊伐釐莒釐疑扶風漦而晉人亡曹史曹伯陽十五年背晉宋滅之哀八年繒恃齊而輕越繒禹後屬東海齊和子亂太公田和而越人亡繒哀六年莒人滅鄫與此異鄭恃魏以輕韓魏補伐榆關九域圖在平州界而韓氏亡鄭原恃秦翟以輕晉秦翟年穀大凶而晉人亡原僖二十五年原降使趙衰處原中山恃齊魏以輕趙齊魏伐楚而趙亡中山此五國所以亡者皆有元作其所恃也非獨此五國為然而已也天下之亡國皆然矣夫國之所以不可恃者多其變不可勝數也或以政教不修上下不輯而不可恃者或有諸侯鄰國之虞而不可恃者或以年穀不登畜積竭盡而不可恃者或化於利化猶移比於患比猶近臣以此知國之不可必恃也今王恃楚之强而信春申君之言以是賔元作質秦而久不可知久猶後即春申君有變是王獨受秦患也即王有萬乘之國即猶是而以一人之心為命也臣以此為不完願王之熟計之也魏王問張旄曰吾欲與秦攻韓何如張旄對曰韓且坐而咠亡乎咠胥同待也且割而從天下乎王曰韓且割而從天下張旄曰韓怨魏乎怨秦乎王曰怨魏張旄曰韓强秦乎强魏乎問以何國為强王曰强秦張旄曰韓且割而從其所强與所不怨乎且割而從其所不强與其所怨乎王曰韓將割而從其所强與其所不怨張旄曰攻韓之事王自知矣客謂司馬食其魏人音異基曰慮久以天下為可一者慮久熟慮也是不知天下者也欲獨以魏支秦者是又不知魏者也謂兹公指合從之人不知此兩者又不知茲公者也然而茲公為從其說何也從則茲公重不從則茲公輕茲公之處重也不實為期言期於不可必子何不疾及三國方堅也自賣於秦謂隂倍從以收秦利秦必受子不然橫者將圖子以合於秦是取子之資資謂從食其所資者從也而以資子之讎也謂橫人將以食其之從惡之於秦讎秦也秦拔寧邑此二十年魏王令人謂秦王昭曰王歸寧邑吾請先天下講元從才從冓下同謂與秦講魏衍魏字冉曰王無聽無聽其講魏王見天下之不足恃也故欲先講夫亡寧者宜割二寧以求講夫得寧者安能歸寧乎秦罷邯鄲攻魏取寧邑吳慶吳人恐魏王之講元從才從冓於秦也謂魏王曰秦之攻王也王知其故乎天下皆曰王近也近親也天下以魏為親秦故外之秦因攻之王不近秦秦之所去去猶逺皆曰王弱也無秦之助王不弱二周言實不弱視二周猶强也秦人去邯鄲過二周而攻王者以王為易制也王亦知弱之召攻乎若講於秦復示弱也魏王欲攻邯鄲季梁魏人非莊子所稱聞之中道而反衣焦不申此於行路犯風日故焦焦故不申濡閏乃申耳頭塵不去皆以欲見之速故不暇往見王曰今者臣來見人於大行方北面而恃其駕告臣曰我欲之楚臣曰君之楚將奚為北面曰吾馬良臣曰馬雖良此非楚之路也曰吾用多用所資也臣曰用雖多此非楚路也曰吾御者善此數者愈善而離楚愈逺耳今王動欲成霸王舉欲信於天下恃王國之大兵之精鋭而攻邯鄲以廣地尊名王之動愈數而離王愈逺耳猶至楚而北行也周肖疑即霄謂宫他曰子為肖謂齊王王庭曰肖願為外臣令齊資我於魏宫他曰不可是示齊輕也肖魏臣而假重於外是示齊以無魏之重夫齊不以無魏者以害有魏者所不重為無肖是也故公不如示有魏公曰令肖以此說齊王齊之所求於魏者臣請以魏聽齊必資公矣是公有齊以齊有魏也因齊之資以得魏重肖當作霄信陵君殺晉鄙救邯鄲破秦人存趙國趙王孝成自郊迎唐雎元作且謂信陵君曰臣聞之曰事有不可知者有不可不知者有不可忘者有不可不忘者信陵君曰何謂也對曰人之憎我也不可不知也吾憎人也不可得而知也人不能知人之有德於我也不可忘也吾有德於人也不可不忘也今君殺晉鄙救邯鄲破秦人存趙國此大德也今趙王自郊迎卒然見趙王卒猝同臣願君之忘之也信陵君曰無忌謹受教彪謂唐睢此十一年求救年已九十餘至是又十年其陳誼益髙所謂耄期稱道不亂者與賢矣魏攻管而不下安陵人魏記注召陵有安陵縮髙其子為管守信陵君使人謂安陵君曰君其遣縮髙吾將仕之以五大夫使為持節尉尉之持節者安陵君曰安陵小國也不能必使其民使者自往請使道使者使人道之至縮髙之所復信陵君之命復猶重也信陵言之矣今申之縮髙曰君之幸髙也將使高攻管也夫以父攻子守人大笑也守人其子之人見臣而下是背王也王魏王父教子背亦非君之所喜也敢再拜辭使者以報信陵君信陵君大怒遣大使之安陵曰安陵之地亦猶魏也雖趙猶魏今吾攻管而不下則秦兵及我管在秦東可以扞魏社稷必危矣願君之生束縮髙而致之若君弗致無忌將發十萬之師以告安陵之城安陵君曰吾先君成侯趙主也安陵屬召陵召陵屬魏而此謂成侯為先君蓋先時兩屬趙魏故上曰猶魏受詔襄王趙襄子以守此地也手受大府之憲大府謂魏受詔襄子而受魏之憲則此兩屬明矣憲法令也憲之上篇曰子弒父臣弒君有常刑補不赦國雖大赦降城亡子以城降人及亡人之子不得與焉今縮髙謹雖辭大位以全父子之義而君曰必生致之是使我負襄王詔而廢大府之憲也雖死終不敢行縮髙聞之曰信陵君為人悍而自用也此辭反必為國禍吾已全已無違元作為人臣之義矣豈可使吾君有魏患也乃之使者之舍刎頸而死信陵君聞縮髙死衍素字服縞素避舍使使謝安陵君曰無忌小人也困於思慮困猶不通失言於君敢再拜釋罪拜所以謝也以安陵釋其罪故謝彪謂縮髙之義直而善處死夫以信陵之愎而好遂髙不死必加兵安陵城破之日固不免死而以此死易一國之命可不謂仁乎魏王與龍陽君魏之幸臣共船而釣龍陽君得十餘魚而涕下王曰有所不安乎如是何不相告也對曰臣無敢不安也王曰然則何為涕出曰臣為臣元作王之所得魚也王曰何謂也對曰臣之始得魚也臣甚喜後得又益大今臣直欲棄臣前之所得矣今以臣之凶惡而得為王拂枕席今臣爵至人君走人於庭在庭則人為之趙走避人於途在途則行者避四海之內美人亦甚多矣聞臣之得幸於王也必褰裳而趨大王褰揭也臣亦猶曩臣之前所得魚也臣亦將棄矣臣安能無涕出乎魏王曰誤以不告為誤有是心也何不相告也於是布令於四境之內曰有敢言美人者族死及其族由是觀之近習之人其摯諂也固矣摯猶進其自羃元作幕繫元作繁也完矣羃覆也言自芘自結於王今由千里之外欲進美人所效者庸必得幸乎假之得幸庸必為我用乎我謂欲進之人而近習之人相與怒我見有禍未見有福見有怨未見有德非用智之術也或謂魏王王警四疆之內將出兵先令以警之其從於王者凡兵械當從者十日之內備不具者死王因取其游旄旗之旒之舟上繫之之猶於也亦楚以攻秦臣為王之楚王咠臣之反而行行兵春申君聞之謂使者即此說者曰子為我反無見王矣欲其亟反不必見考烈十日之內數萬之衆令涉魏境秦使聞之以告秦王莊襄秦王謂魏王曰大國有意必來以是而足矣秦恐楚魏合故言魏兵自足不待楚也今詳春申在時魏嵗受秦兵唯此三十年年忌率五國攻秦可當此語此及下二章元在韓䇿魏鞅魏人為魏說謂春申曰人皆以楚為强而君用之弱也其於鞅也不然先君者先春申用事之人二十餘年未嘗見攻今秦欲踰兵於鄳元作澠隘之塞魏記所謂冥厄注楚險塞或以為江夏郢縣不使假道兩周倍韓以攻楚不可倍者背此昔者所以未嘗見攻今則不然魏且旦暮亡矣不能愛其許鄢陵與梧梧屬楚國此時為魏割以與秦相補去百六十里言秦伐楚之近不須假道臣之所見者秦楚鬬之日近元作也已安邑之御史死其次恐不得也輸人輸安邑里名為之謂安邑補令曰公孫綦為人請御史於王王曰彼固有次吾難敗之因遽置之令聞王言故立其次元並在韓䇿景閔王安釐子元年秦始皇五年己未魏攻魏急始皇五年攻魏取二十城此元年或謂魏王曰棄之不如用之之易也棄謂戰而喪地用謂割地賂之死之不如棄之之易也死謂敗死能棄之弗能用之能死之弗能棄之此人之大過也今王亡地數百里亡城數十而國患不解是王棄之非用之也今秦之强也天下無敵而魏之弱也甚而王以是賔元作質秦王又能死而弗能棄之此重過也今王能用臣之計虧地不足以傷國卑體不足以苦身解患而怨報怨謂不韋主攻者也秦自四境之內執法以下執政之臣至於長挽者長為挽車之人故畢曰畢猶盡與嫪氏乎嫪毐秦太后私人與吕氏乎不韋也此言與嫪氏耳雖至於門閭之下廊廟之上猶之如是也今王割地以賂秦以為嫪毐功因毐而割故功在毐卑體以尊秦以因嫪毐王以國贊嫪毐毐貴矣今又因之以割是以魏助之也以嫪毐勝矣以不敗為勝王以國贊嫪毐太后之德王也深於骨髓王之交最為天下上矣秦魏百相交也百相欺也言昔之交皆卒歸於欺今由嫪氏善秦而交為天下上天下孰不棄吕氏而從嫪氏時二人已惡天下必舍元作合吕氏而從嫪氏則王之怨報矣秦王始皇使人謂安陵君曰寡人欲以五百里之地易安陵安陵君其許寡人安陵君曰大王加惠以大易小甚善雖然受地於先王願終守之弗敢易秦王不說安陵君因使唐睢元作且下同使於秦秦王謂唐睢曰寡人以五百里之地易安陵安陵君不聽寡人何也且秦滅韓十八年亡魏二十二年而君以五十里之地存者以君為長者故不錯意也今吾以十倍之地請廣於君廣其地而君逆寡人者輕寡人與唐雎對曰否非若是也安陵君受地於先王而守之雖千里不敢易也豈直五百里哉秦王怫然怒謂唐睢曰公亦嘗聞天子之怒乎唐睢對曰臣未嘗聞也秦王曰天子之怒伏尸百萬流血千里唐雎曰大王嘗聞布衣之怒乎秦王曰布衣之怒亦免冠徒跣以頭搶地耳搶突也唐睢曰此庸夫之怒也非士之怒也夫專諸之刺王僚也僚吳王昭二十七年彗星襲月聶政之刺韓傀也傀相韓見韓䇿及刺客𫝊白虹貫日要離之刺慶忌也吳越春秋要離吳人吳王闔閭欲殺王子慶忌要離詐以罪亡令吳王焚其妻子走見慶忌以劍刺之倉鷹擊於殿上此三子者皆布衣之士也懷怒未發休祲降於天休吉徵祲戾氣自三子言之為吉與臣而將四矣若士必怒伏尸二人流血五步天下縞素今日是也挺劍而起秦王色撓撓擾也長跪而謝之曰先生坐何至於此寡人諭矣諭曉也夫韓魏滅亡而安陵以五十里之地存者徒以有先生也睢自釐十二年請救至是五十餘年矣若彪謂諸刺劫之士自曹沫以至荆軻皆未聞道唯唐雎者可也為其激而發而不専志於此也戰國䇿卷七
