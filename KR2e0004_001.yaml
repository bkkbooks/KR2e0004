body:
  text: 戰國䇿卷一宋鮑彪注西周漢志河南洛陽榖城平陰偃師鞏緱氏皆周地也安王威烈王子此類並以事見紀表世家新出嚴氏為賊嚴仲殺韓相傀列侯三年書殺俠纍是也殺人不以道曰賊於此為五年而陽豎與焉鴻烈人間訓注豎小使也韓䇿名堅道周出亡過周周君留之十四日載以乘車駟馬而遣之乘四馬也一車駕四馬所謂駟馬車韓使人讓周讓譙責也然則此時周之令已不行於諸侯矣周君患之客謂周君正語之曰使以留之之情告之寡人孤寡不穀王侯之稱知嚴氏之為賊而陽豎與之故留之十四日以待命也待韓之命小國不足衍亦字以容賊君之使又不至是以遣之也元在東周䇿時周未分也彪謂客之辨雖足以文周而周君實為天下逋逃主所謂欲蓋而彰者何以示天下乎赧王周紀慎靚王子嵗丁未立徙都西周西周鎬京也宋忠曰卒諡西周武公周共太子死周紀云西周武公之共太子死有五庶子皆愛之而無適立也適猶定也故與莫反司馬翦司馬楚卿疑即昭翦謂楚王懷曰何不封公子咎周君别子而為之請太子請於周使立為太子左成楚人謂司馬翦曰周君不聽是公之智困困不通也而交絶於周也不如謂周君曰孰欲立也微告翦翦令楚王資之以地封之以為之資公若欲為太子此左成告翦之辭為皆去音猶助也因令人謂相國御展子楚相之御姓展牆夫空牆嗇字同小臣也空其名曰王類欲令若為之王楚王類猶似若汝也言楚王之意然此健士也此亦左成喻翦之言健猶悍也居中國中不便於相國二士居中與國事以其悍故相國不之便若出而使周則不居中用事相國之所欲也故以此説之相國必從相國令之為太子此䇿周紀有元在東周謂齊王凡言謂言為而不人失之也猶言或謂或為王閔王曰王何不以地齎周最齎持遺也最周之庶子凡周皆周之族以為太子也齊王令司馬悍齊人以賂進周最於周進猶薦左尚齊人謂司馬悍曰周不聽是公之智困而交絶於周也公不如謂周君曰何欲置置猶立令人微告悍悍一本悍請令令王進之以地左尚以此得事以教悍得齊王意故委任之疑此即上章楚王楚人司冦布司冦周官布其名為周最謂周君曰君使人告齊王以周最不肯為太子也閔王善最欲其為太子以賂進之最時讓立周以最不肯立告齊臣為君不取也函冶氏冶銷鐡也函蓋其姓為齊太公田和也始代吕氏為齊侯買良劍公不知善歸其劒而責之金歸還之也責取也金買劒之金越人請買之千金折而不賣折折劒將死函冶氏將死而屬其子屬囑同集韻託辭曰必無無以告人獨知自知其良今君之使最為太子周雖以最不肯立告齊猶欲立之特未定耳獨知之契也契約也當兩知之今則獨天下未有信之者也臣恐齊王之謂元作為君實立果亦周子而讓之於最讓飾説也以嫁之於齊嫁猶賣也言欺齊君為多巧巧猶詐最為多詐心欲之而言不肯君何不買信貨哉可信之貨非獨知也奉餋無有愛於最也愛猶吝使天下見之然則立最信矣從周紀皆當為楚王秦令樗里疾秦惠王弟其居在渭南隂鄉樗里故號樗里子後相武王以車百乘入周周君迎之以卒百人為卒甚敬楚王怒懷王讓周以其重秦客謂疾遊騰周人謂楚王曰昔智伯晉卿智襄子之孫瑶欲伐厹由夷國屬臨淮漢志由作猶又九域圖并州有仇猶城引此遺之大鍾載以廣車欲開道也因隨入以兵厹由卒亡無備故也受其鍾不防有兵桓公伐蔡也僖二年蔡姬沈舟蕩公公怒歸之未絶也蔡嫁之故伐之蔡蔡叔度所封屬汝南後徙沛下蔡號言伐楚號聲言也以伐楚號衆其實襲蔡無鍾鼓曰襲今秦虎狼之國也喻其貪殘兼有吞周之意使樗里疾以車百乘入周周君懼焉以蔡厹由惑之以二國為惑故使長兵在前戈矛之屬強弩在後名曰衛疾衛行列為護也而實囚之周君豈能無愛國哉恐一日之亡國恐秦亡之而憂大王為楚王憂楚王乃悅樗里傳有雍氏之役周紀注陽翟有雍氏城韓紀注赧王三年十五年楚再圍雍氏此十五年也韓徴甲與粟於周徴猶索周君患之告蘇代秦之弟洛陽人蘇代曰何患焉代能為君令韓不徴甲與粟於周又能為君得髙都屬上黨周君大悅曰子茍能寡人請以國聽以國事從之蘇代遂往見韓相國公仲元作中下同韓公族曰公不聞楚計乎昭應楚將也昭屈景皆楚之族姓後有不重注謂楚王懷曰韓氏罷於兵罷疲同勞也倉廩空並榖所入無以守城吾攻之以飢因其飢攻之不過一月必拔之得城曰拔曰拔物然今圍雍氏五月不能拔是楚病也病猶困楚王始不信昭應之計矣今公乃徴甲與元作及粟於周此告楚病也猶以飢疲告之昭應聞此必勸楚王益兵守雍氏雍氏必拔公仲曰善然吾使者已行矣代曰公何不以髙都與周公仲怒曰吾無徴甲與粟於周亦已多矣何為與髙都代曰與之髙都則周必折而入於韓折猶屈入猶歸秦聞之必大怒而焚周之節節符信也行者所執焚之者不通周也周官通達於天下必有節無節則不達不通其使是公以敝髙都得完周也何不與也公仲曰善不徴甲與粟於周而與髙都楚卒不拔雍氏而去紀有而略周君為東周薛公靖郭君田嬰之子孟嘗君田文也襲其父封薛薛屬魯國以齊為韓魏攻楚楚懷二十六年齊韓魏攻楚此十二年也又與韓魏攻秦齊閔二十六年為韓魏攻秦此十七年也而藉兵乞食於西周藉猶借韓慶凡韓皆韓人其在周去韓仕周也凡非本國人皆自其國來仕者也為西周謂薛公曰君以齊為韓魏攻楚九年取宛葉以北二縣屬南陽九字誤當云六或五為強韓魏為猶是今又攻秦以益之益其強韓魏南無楚憂西無秦患則地廣而益重齊必輕矣夫本末更盛更猶迭虛實有時言不可常竊為君危之並言齊薛今雖善韓魏後或為患君不如令敝邑周也隂合為秦隂猶私而君無攻但出兵臨秦不用攻也又無藉兵乞食勿示秦以弱君臨函谷臨言以兵至其地函谷關名在𢎞農而無攻令敝邑以君之情心所欲也謂秦王昭襄曰薛公必不補不字破秦以張韓魏張去音大之也所以進兵者欲王令楚割東國以與齊楚之束地即楚䇿下束國云而元作也秦王出楚王懷以為和楚懷三十年張儀誘楚王會秦秦留之此十六年也君令敝邑以此忠秦秦得無攻周之力也秦得無攻元作破而以楚之東國自免也必欲之楚王出必德齊齊出之齊之恩也齊得東國而益強而薛世世無患秦不大弱無三國之兵故而處之三晉之西趙魏韓本晉三卿分晉而君之故曰三晉三晉必重齊秦居晉西不弱而善齊三晉畏秦故齊重薛公曰善因令韓慶入秦而使三國無攻秦而使不藉兵乞食於周孟嘗傳有今按楚記三國攻楚秦救之引去與此言取宛葉小駮三國攻秦反反猶還西周恐魏之藉道也藉亦借為西周謂魏王哀曰楚宋不利秦之聽元作德三國也聽猶順從三國近楚宋秦聽之則強而害楚宋故不利也彼且攻王之聚楚宋攻魏之廩庫以利元作到秦若為秦報魏然魏王懼令軍設舍速東舍軍次也魏東還必道周周必賔之故恐今速東則無賔之之費矣韓魏易地韓策書此在楚圍雍氏後西周弗利樊餘周人謂楚王懷曰周必亡矣韓魏之易地韓得二縣魏亡二縣易地則魏亦有得而獨言亡者亡多於得也所以為之者魏雖多亡然且為之盡包二周東西多於二縣九鼎存焉漢志武王遷九鼎於郟鄏郟鄏屬河南為東周且魏有南陽鄭地三川河內修武注晉始啓南陽是也京兆山陽皆有鄭河南有新鄭此在楚魏之間新鄭也河南郡注秦三川郡也周紀三川震注涇渭洛而包二周則楚方城之外危南陽郡注葉公邑號方城韓兼兩上黨漢并州郡甘茂傳注逺韓近趙故言兩此韓所得也今按東䇿周最再説金投秦䇿藍田徑山三章所言則上黨亦屬魏以臨趙即趙羊腸以上危上黨壺關有羊腸坂髙注趙險塞山形屈折如羊腸此皆以所近之國強故危故易成之日楚趙皆輕楚王恐因趙兵以止易秦攻魏將犀武軍於伊闕唐志為縣屬河南注北有伊闕故關此役秦昭十四年此二十二年進兵而攻周為周最謂李兊趙司冦曰君不如禁秦之攻周禁猶止趙之上計莫如令秦魏復戰趙魏鄰也魏有秦兵則趙無事今秦攻周而得之得猶勝則衆必多傷矣秦欲持元作待周之得持猶保必不攻魏恐重傷秦若攻周而不得前有勝魏之勞後有攻周之敗又必不攻魏今君禁之而秦未與魏講也講和解也而全趙令其止必不敢不聽是君却秦而定周也却猶退秦去周必復攻魏魏不能支支猶拒必因君而講與秦和也則君重矣凡言重皆制人而不制於人者也若魏不講而疾支之是君存周而戰秦魏也重亦盡在趙犀武敗於伊闕周君之魏求救白起既敗魏遂進攻周周以魏怨之故往求救魏王昭以上黨之急辭之意者有趙或韓兵也周君反見梁囿陳留浚儀注魏惠王自安邑徙大梁有林池曰囿而樂之也綦毋恢周人謂周君曰溫囿不下此溫屬河南言其樂不在梁下而又近近周臣能為君取之反見魏王王曰周君怨寡人乎對曰不怨且誰怨乎臣為王有患也周君謀主也猶為天子故而設以國為王扞秦設施陳扞衛也而王無之扞也無為周扞者臣見其必以國事秦也秦悉塞外之兵與周之衆以攻南陽而兩上黨絶矣言趙韓援魏之路絶魏王曰然則奈何綦毋恢曰周君形不好小利形猶勢也小利謂溫囿國小多憂其勢宜不得遊觀事秦而好小利有秦助則無國患乃得遊觀今王許戍三萬人戍守邊也許為周扞秦與溫囿周君得以為辭於父兄百姓云得戌卒之援而私元作利溫囿以為樂得戍公也得囿私也必不合於秦臣嘗聞溫囿之利計嵗八十金魏人貢其上之數周君得溫囿其以事王者嵗百二十金周許魏之數是上黨無患周善事魏則趙韓必不加兵而贏四十金贏有餘賈利也魏王因使孟卯鴻烈泛論注齊人即芒卯致溫囿於周君致送也而許之戍彪謂周君非賢君也秦兵在境而樂於囿其志荒矣恢雖能得囿非君子所以事其君者也犀武敗周使周足周相之秦或謂周足曰何不謂周君曰臣之秦秦周之交必惡皆美惡之惡主君之臣主君稱周君又秦重秦之所重而欲相者欲得相周且惡臣於秦此人欲代足相周故敗其使事此二國所以必惡而臣不能為使矣臣願免而行免已之相以順欲者君因相之彼得相不惡周於秦矣君重秦此下或人復説足也故使相往行而免是元作且輕秦也公必不免雖以免自請勢不可免也公言是而行交善於秦是公之事成元作成事也交惡於秦不善於公者補者字且誅矣意其惡足於秦也蘇厲亦秦之弟謂周君曰敗韓魏殺犀武攻趙取藺離石祁者藺及離石屬西河祁屬太原皆白起秦將武安君是攻用兵攻功字言善巧也又有天命也得天之助今攻梁魏都梁必破破則周危君不若止之謂白起曰楚有養由基者楚共王將善射去栁葉者百步而射之百發百中發發矢左右皆曰善有一人過曰善射可教射也矣意欲其息養由基曰人皆善善善我子乃曰可教射子何不代我射之也客曰我不能教子支左屈右支去竹之支也蓋取其直左右臂夫射栁葉者百發百中而不以善息百中善也此時宜息少焉氣力倦弓撥矢鉤元作拘今從史撥弓反也鉤矢鋒屈也一發不中前功盡矣盡猶滅今公破韓魏殺犀武而北攻趙取藺離石祁者公也公之功甚多今公又以秦兵出塞過兩周踐韓而以攻梁踐履也猶過一攻而不得前功盡滅公不若稱病不出也周紀三十四年有楚兵在山南山吳嶽屬扶風禮所謂嶽山也伍元作吾下同得楚將也髙注吾作五將為楚王傾襄屬怨於周屬連也猶結或謂周君曰不如令太子將軍正周太子也將去音軍正猶卒正軍之率也迎伍得於境而君自郊迎令天下皆知君之重伍得也因泄之楚曰微漏其言使楚知之周君所以事伍得者器必名曰謀楚此以間得於楚言與得之器其欵識云然王必求之楚王而伍得無效也效猶致也得實未嘗得器故無以效王必罪之以其欺也彪謂此謀雖不出於正而免國於難可也楚請道於兩周之間以假道請以臨韓魏周君患之蘇子元作秦秦字季子洛陽人其死時東西周未分此當為代若厲諸如此處不一謂周君曰除道屬之於河除去穢也夏紀注河出金城積石蓋道行兩周之間使楚所假連及之韓魏必惡之惡楚齊秦恐楚之取九鼎也道廣可以出鼎必救韓魏而攻楚楚不能守方城之外安能道二周之間若四國弗惡齊秦韓魏君雖不欲與也與之道楚必將自取之矣秦召周君周君難往意不欲往或為周君謂魏王安釐曰秦召周君將以使攻魏之南陽王何不出兵於河南河南洛陽也時未為郡言河之南耳周君聞之將以為辭於秦而不往以魏兵在境為言周君不入秦秦必不敢越河越度也而攻南陽周君之秦謂周最曰最時從不如譽秦王之孝也秦昭因以原為太后養地齊記注河內沁水有原城后昭王母宣太后也供養之地湯沐邑也秦王太后必喜是公有秦也有言得其意交善周秦之交周君必以為公功交惡勸周君入秦者必有罪矣紀四十五年有秦欲攻周周最謂秦王昭曰為王之國計者不攻周攻周實不足以利國而聲畏天下聲猶名也周天子也今見攻故天下畏秦天下以聲畏秦必東合於齊兵敝於周攻雖勝不無傷失而合天下於齊則秦孤而不王矣是天下欲罷秦罷疲同下同故勸王攻周秦與天下俱罷天下合齊而與秦戰戰則必疲則令不橫行於周矣橫行無畏忌也紀有宮他周人謂周君曰宛恃秦而輕晉宛屬南陽故申伯國南陽三晉時屬韓韓釐五年秦拔我宛蓋宛亡在春秋之晉三晉分晉乃屬韓也秦飢而宛亡此下皆恃逺輕近而亡秦飢不暇救宛故晉滅之其亡不經見鄭恃魏而輕韓魏攻蔡而鄭亡鄭河南新鄭鄭君乙二十一年韓哀侯滅之邾莒亡於齊魯鄒縣故邾也邾曹姓國二十九世楚滅之莒屬城陽國故盈姓國三十世楚滅之蓋恃齊也陳蔡亡於楚陳舜後漢淮陽國楚惠王十年滅陳四十二年滅蔡皆不見所恃蓋即恃楚不備之也此皆恃援國而輕近敵也援引也故有助意今君恃韓魏而輕秦國恐傷矣君不如使周最元作早隂合於趙以備秦則不毁戰國策卷一
