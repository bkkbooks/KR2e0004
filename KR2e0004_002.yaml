body:
  text: 戰國策卷二宋鮑彪注東周漢志河南鞏東周君所居惠公周紀考王封其弟河南是為桓公桓公子威公威公子惠公惠公封其子於鞏號東周惠公然則河南鞏父子同諡也又紀西周武王赧王則諡也蓋以避秦不敢稱尊楚記頃襄十八年王赧使武公此武公赧王臣也而徐注以為惠公之子踈矣惠公之子自為東周君豈為西周用耶然兩周西先亡至莊襄元年俱滅秦興師臨周而求九鼎周君患之以告顔率周人顔率曰大王勿憂臣請東借救於齊顔率至齊謂齊王閔曰夫秦之為無道也欲興兵臨周而求九鼎周之君臣內自盡盡其心思計與秦計猶謀不若歸之大國謂齊夫存危國周有秦兵危也美名也得九鼎厚寶也厚猶重願大王圖之齊王大發師五萬人使陳臣思即後田臣思凡陳田皆齊公族將以救周而秦兵罷齊將求九鼎周君又患之顔率曰大王勿憂臣請東解之束之齊解免之顔率至齊謂齊王曰周賴大國之義得君臣父子相保也願獻九鼎不識大國何涂之從問其路所從出禮遂上有徑洫上有涂而致之齊齊王曰寡人將寄徑於梁徑步道也猶言假涂顔率曰不可夫梁之君臣欲得九鼎謀之暉臺之下臺名曰暉故孟子稱梁有臺池之樂沙元作少海之上九域圖開封有沙海引此其日久矣鼎入梁必不出齊王曰寡人將寄徑於楚楚非適齊之途既不可入梁亦無從至楚其云然不可曉也對曰不可楚之君臣欲得九鼎謀之於葉庭之中即南陽葉也其日久矣若入楚鼎必不出王曰寡人終何涂之從而致之齊顔率曰敝邑固竊為王患之夫鼎者非效壺醯醬瓿耳壺昆吾圜器瓿甂也可懷挾提挈以至齊者非效鳥集烏飛兔興馬逝並喻其輕疾灕然止於齊者集韻灕滲流貌昔周之伐殷得九鼎凡一鼎而九萬人挽之挽引也九九八十一萬人士卒師徒士一人也二千五百人為師徒步行者械器被具械器之總名被具士卒所服用之具所以備者稱此備人之所應用使稱足此八十一萬人今大王縱有其人何涂之從而出竊為大王私憂之齊王曰子之數來猶無與耳言許之而實不與也顔率曰不敢欺大國疾定所從出敝邑遷鼎以待命齊王乃止秦攻宜陽韓邑屬𢎞農秦武三年攻宜陽赧之七年也周君謂周纍曰子以為如何對曰宜陽必拔也君曰宜陽城方八里材士十萬士之有材武者粟支數年公仲之軍二十萬景翠楚將以楚之衆臨山而救之楚與韓鄰而與秦相圖故救之秦必無功對曰甘茂下蔡人仕秦羇旅也集韻羇旅寓也攻宜陽而有功則周公旦也言且相秦無功則削迹於秦言不得留秦王不聽羣臣父兄之議而攻宜陽宜陽不拔秦王恥之臣故曰拔君曰子為寡人謀且奈何對曰君謂景翠曰公爵為執圭官為柱國楚卿戰而勝則無加焉矣不勝則死不如背秦援宜陽翠時蓋援宜陽而有秦相故說之云公進兵秦恐公之乘其敝也乘謂因而攻之必以寶事公公仲慕公之為己乘秦也亦必盡其寶秦拔宜陽景翠果進兵秦懼遽效煮棗屬濟隂寃句韓氏果亦效重寶景翠得城於秦受寶於韓而德東周德恩之也東周與西周戰韓救西周為東周謂韓王襄曰西周者故天子之國也多名器重寶按兵而勿出按下與舉兵反可以德東周西周之寶可盡矣欲韓出兵故賂之紀八年有東周與西周爭西周欲和於楚韓和二國以為已援齊明疑楚人兩見楚策謂東周君曰臣恐西周之與楚韓寶令之為己求地於東周也不如謂楚韓曰西周之欲入寶持二端言東兵急則入不急則已今東周之兵不急西周西周之寶不入楚韓楚韓欲得寶則且趣我攻西周趣疾也督使疾戰我謂東周西周寶出是我為楚韓取寶以德之也言有恩於楚韓西周弱矣東周欲為稻為謂種之西周不下水稻宜濕西周居河之上流東周患之蘇子非代則厲謂東周君曰臣請使西周下水可乎乃往見西周之君曰君之謀過矣今不下水所以富東周也今其民皆種麥麥宜燥也無他種矣君若欲害之不若一為下水以病其所種下水東周必復種稻種稻而復奪之若是則東周之民可令一仰西周有望於上則仰而受命於君矣西周君曰善遂下水蘇子亦得兩國之金也彪謂此䇿不可行東西周壤地相接豈不能候其所種蘇子東人也為東遊說西豈得不疑且今下水安能保其不奪雖一為下何補哉昭獻在陽翟屬潁川周君將令相國往往與獻會相國將不欲蘇厲為之謂周君曰楚王與魏王遇也主君令陳封之楚此言疇昔之事陳向許皆仕周而位在相下令向公之魏楚韓之遇也亦其王遇主君令許公之楚令向公之韓今昭獻非人主也而主君令相國往若其王在陽翟主君將令誰往言必君自往周君曰善乃止其行秦假道於周以伐韓周恐假之而惡於韓不假而惡於秦史黶韓史疑即厭謂周君曰君何不令人謂韓公叔韓公族曰秦敢絶塞絶橫渡塞障也為垣壘以遮止鄰國往來而伐韓者信東周也公何不與周地發重使使周發使使之楚秦必疑秦楚相圖之國也周使使楚故秦疑其圖已不信周是韓不伐也不受秦伐又謂秦王武曰韓强與周地將以疑周於秦寡人不敢弗受秦必無辭而令周弗受是得地於韓而聽於秦也紀八年有彪謂十有國之士設心措辭無不出於詐若此者君子之所恕也下章次之楚攻雍氏此亦赧之十五年也周粻秦韓粻食米也時秦救韓周以米餉之楚王懷怒周周之君患之為周謂楚王曰以王之强而怒周周恐必以國合於所與粟之國則是徑王之敵也徑强也故王不如速解周恐周以楚怒之故恐彼前得罪而後得解必厚事王矣蘇厲為周最謂蘇子元作秦曰君不如令王君稱蘇子王周君也此時與赧俱王其稱公後避秦也聽最以地合於魏趙地周地故必怒稱故者特為之怒蘇子怒最合於齊怒最而及其所合是君以合齊與强楚吏産子時齊與楚善合齊則得與楚為與國可至再世産子言易世也與黨與也君若欲因最之事與最同合魏趙此厲本謀也前皆遊辭耳故為為周最則合齊者君也割地者最也謂周最曰仇赫之相宋將以觀秦之應趙宋絶句敗三國韓魏齊也魏紀哀二十一年與韓齊敗秦函谷蓋此時秦欲敗之反為所敗也赧十八年三國不敗將與趙宋合於東方即三國以孤秦亦將觀韓魏之於齊也不固則將與宋敗三國此應秦也則賣宋於三國此應三國也以國情輸之曰賣言赫不忠於宋不應秦則應三國以此知赫本非宋人公何不令人謂韓魏之王韓襄魏哀曰欲秦趙之相賣乎此賣猶欺何不合周最兼相使韓魏皆相之視之不可離視示字二國同相最可見其交之固則秦趙必相賣以合於王也為周最謂魏王哀曰秦知趙之難與齊戰也難言其不利將恐齊趙之合也必隂徑之助趙以兵使之强趙不敢戰難先戰恐秦不已收也違其徑之之意先合於齊秦趙爭齊齊固秦所欲合故其徑趙謂之隂徑而王無人焉無主其事於齊者不可王不去周最最時在魏欲之齊故此士為之言使得去合與收齊與即謂齊齊魏之與國而以兵急之元作之急急之以兵則非合矣則伐齊無因事矣言秦見齊有魏兵必伐之有此有彼曰因猶言無他事矣齊敗魏馬陵宜為魏讐因此言合與蓋其國形宜相依也謂周最曰魏王哀以國與先生以德齒尊稱之也與謂相之貴合於秦以伐齊貴猶欲薛公田文故主齊閔王也最嘗仕齊故稱之輕忘其薛不顧其先君之丘墓謂齊王田文欲去國以避秦兵而公獨修虛信最本善齊固不背齊然今相魏魏有以秦伐齊之形猶為虛信信謂親之為茂行茂盛美也明羣臣明猶示也臣魏臣據故主據仗持也猶言為之此言最在魏示朝臣以為齊王不欺之此所謂茂行不與伐齊與去音産以忿强秦産猶生也魏欲伐齊已獨不與猶生此節目也違秦不伐齊故秦忿不可公不如謂魏王薛公曰請為王入齊天下不能傷齊最之智略足以全齊而有變萬一有傷齊者臣請為救之此則非虛信矣無變王遂伐之伐秦且臣為齊奴也為去音言其為之如奴事主如纍王之交於天下纍者事相連及猶誤也交謂齊魏不可此言非人之情王為臣賜厚矣臣入齊則王亦無齊之纍也此纍猶患趙取周之祭地周君患之告於鄭朝凡鄭皆鄭人鄭朝曰君勿患也臣請以三十金一斤為一金復取之周君豫之鄭朝獻之趙太卜因告以祭地事及王病使卜之太卜譴之曰譴謫問也周之祭地為祟神禍也趙乃還之杜赫周人欲重景翠於周謂周君曰君之國小盡君之重寶珠玉以事諸侯不可不察也國小必賂以求援不可勝賂故宜察譬之如張羅者張之於無鳥之所則終日無所得矣張於多鳥處則又駭鳥矣多鳥處有觸羅者傍鳥必覺覺則羣驚而去矣必張於有鳥無鳥之際然後能多得鳥矣今君將施於大人大人輕君施於小人小人無可以求又費財焉均之費財而小人多則多費也君必施於今之窮士不必且為大人者不必猶不可知也言不終窮或且為大人者此指翠也故能得欲矣齊䇿楚䇿皆有杜赫在齊則威王時於周顯王時也自顯威至是八十年矣疑赫字誤景翠實此時人三國隘秦赧十八年注具前隘謂隔絶之周令其相之秦以秦之輕也見其隘於三國留其行不進有人謂相國曰秦之輕重未可知也秦欲知三國之情公不如遂見秦王昭曰請為一作謂王聽東方之處聽偵候之東三國也處其所為秦必重公是公重周下衍重周二字以取秦也秦重相則周重矣齊重故有周齊重天下重之也故猶舊也有言善之而已取齊此時秦齊為天下重已善秦不可忽齊故又勸之取齊是周常不失重國之交也宮元作昌下同此書作宫不一他亡西周以罪去國曰亡之東周盡輸西周之情於東周輸言委以告之東周大喜西周大怒馮雎元作且雎之省也猶趙作肖齊作立故後唐且史作雎裴駰亦曰唐雎以華顛悟秦也此西人下同曰臣能殺之君豫金三十斤馮雎使人操金與書間遺宫他為反間書以遺之曰告宫他事可成勉成之不可成亟亡來亡來亟急也事久且泄自令身死事泄露則死而不亟來自取之也因使人告東周之候偵候之吏揚雄曰西北一候曰今夕有姦人當入者矣候得而獻東周得其人與書東周立殺宫他昭翦與東周惡或謂昭翦曰為公畫隂計為人謀者畫之以籌昭翦曰何也曰補此字西周甚憎東周常元作嘗欲東周與楚惡西周必令賊賊公因宣言東周也集韻宣揚也以惡元作西周二字之於王也王楚懷也昭翦曰善吾又恐東周之賊已此翦自計而以輕西周惡之於楚翦惡東必善西西善翦則楚亦因重西矣東欲壞其交故賊翦翦死則西無內主於楚東因得使楚惡之遽和東周彪謂周衰君臣惟貪利而畏禍故一切趨避變亂於遊談之口而無有持操翦之慮死如此其能復固其所守乎周最謂吕禮凡吕皆齊人禮以秦昭十三年奔魏十九年復歸秦其相齊在薛公歸薛後見孟嘗傳蓋赧二十一年後也曰子何不以秦攻齊臣請令齊相子秦攻齊禮使之也齊欲免攻故可使之相禮子以齊事秦必無慮元作處矣子因令下衍周字最居魏以共之與齊俱事秦是天下制於子也子東重於齊西貴於秦秦齊合則子常重矣謂薛公田文曰周最於齊王厚也閔王而逐之聽祝弗齊人相吕禮者欲取秦也秦𥙷此二字齊合上章所謂以齊事秦弗與禮重矣與猶如也言二國合則齊所重無如禮者有下衍周字齊秦有之秦必輕君君弗如急北兵趨趙亦與趙攻秦以秦魏能左右之曰以以猶使收周最以為後行齊初逐最欲取秦合也今攻秦收最用之可圖後舉行猶舉且反齊王之信齊前與秦合今與趙攻之信反也又禁天下之率率猶從也謂從齊齊無秦天下果弗必走果猶决也走去音趨之也言不趨齊齊王誰與為其國舍必重文孟嘗傳有齊聽祝弗外周最謂齊王閔曰逐周最聽祝弗相吕禮者欲深取秦也秦得天下則伐齊深矣秦得齊則益强故能得天下得天下則亦不能存齊夫秦𥙷齊合則趙恐伐秦伐之故急兵以示秦趙兵攻齊秦以趙攻攻齊與之齊伐趙之猶趨其實同理以趙攻齊則得齊趨齊伐趙亦得趙故其理同必不處矣處猶據也言秦不據齊理同而獨不據齊齊無兵而趙已出兵故也故用祝弗即天下之理也理在受兵於趙周相吕倉見客於周君言之於君使得見前相工師籍恐客之傷已也傷猶毁此即後工陳籍因令人謂周君曰客者辨士也然而所以不可者不可聽用好毁人彪謂工師籍非端人也禮義不愆何恤人之言周文君史書東周略甚豈惠公後有此君耶不然則惠公别稱也鴻烈道應訓亦稱周昭文君此後書訓皆鴻烈也免下衍士字工師籍相吕倉國人不說也君有閔閔之心亦不說也謂周文君曰國必有誹譽誹謗也忠臣令誹在已譽在上宋君奪民時以為臺而民非之見襄十一年無忠臣以掩蓋之也子罕釋相為司空司空主土工𫝊言子罕親執撲以行築者是也民非子罕而善其君齊桓公宫中女元作士市女閭七百閭里中門也為門為市於宫中使女子居之國人非之管仲故為三歸之家婦人謂嫁曰歸夫家曰家仲蓋三取女也以掩桓公非自傷於民也管仲為此人皆毁之仲非樂於毁也其意欲掩蓋桓公耳一說仲欲掩公之非寧自毁也春秋記臣弒君者以百數皆大臣見譽者也故大臣得譽非國家之美也彪謂此言掩君之非可耳而齒見譽者於弒君之列則後世名卿賢相何道而可以安於朝廷之上不仁哉此言也故衆庶成强言師藉之得衆增積如山周君遂不免卒相倉也溫人之周溫時為西邑綦毋恢請之也周不納並東周客即對曰主人也矯稱東人問其巷而不知也吏因囚之君使人問之曰子非周人而自謂非客何也對曰臣少而誦詩詩曰普天之下莫非王土率土之濵莫非王臣小雅北山詩普遍率循也今周君天下則我天子之臣而又為客哉故曰主人君乃使吏出之或為周最謂金投蓋趙人之不善齊者曰秦以周最之齊疑天下周使最之齊秦以此疑周齊與天下合而謀已而又知趙之難子不敢違投齊人戰恐秦既疑齊投又不善齊故齊懼伐齊下衍韓字之合必先合於秦秦齊合則公之國虛矣言趙必破而為墟墟虛字同大丘也公不如救齊因佐秦而伐韓魏上黨長子屬上黨並韓地趙之有已二國有秦兵故趙得取其邉地公東收寶於秦佐秦故南取地於韓魏因以困韓魏唇齒之國故也徐為之東為猶謀也東謂齊則有合矣齊合趙也始時趙與齊隙無合理今得秦韓故齊懼而合其實最時相齊慮有趙患故為最謀者移之韓魏也周最謂金投曰公負令秦與强齊戰負猶失也其失在此戰勝勝齊秦且收齊而封之封謂疆理之使無多割割謂出地而聽天下之戰諸國求地於齊齊不多割則必戰此秦弱齊之計不勝國大傷趙傷也時趙令秦與齊戰戰不勝則秦必咎趙能無傷乎不得不聽秦趙聽也秦盡韓魏之上黨太原魏地從為秦郡西土元作止秦之有已秦之所難者齊也已收齊則韓魏不守秦地天下之半也制齊楚三晉之命趙以大傷故亦見制覆元作復國且身危覆如覆器然國趙也身謂投是何計之道也言非計此䇿最為齊使趙拒秦也石行秦周人謂大梁造秦爵梁作良秦孝十年衛鞅惠文五年公孫衍昭襄十五年白起皆為之此蓋起也曰欲決霸王之名不如備兩周辨智之士備謹待之謂周君曰行秦謂之君不如令辨智之士為君爭於秦秦欲卑周爭者爭此也既謹待之則爭必得矣戰國策卷二
