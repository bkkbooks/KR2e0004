body:
  text: 戰國䇿卷十宋鮑彪注宋沛梁楚山陽濟陰東平及東郡之穎昌夀張景公嗣元公元年酉恭王四年乙公輸般魯之巧人為楚設機天地疏機關也雲梯之屬將以攻宋墨子宋人名翟聞之百舍重繭百里一舍往見公輸般謂之曰吾自宋聞子聞其善吾欲藉子殺王藉猶因公輸般曰吾義固不殺王墨子曰聞公為雲梯梯之髙上切雲將以攻宋宋何罪之有義不殺王而攻國是不殺少而殺衆敢問攻宋何義也公輸般服焉請見之王見翟於王墨子見楚王非昭則惠曰今有人於此矣其文軒車有雕飾者鄰有敝輿而欲竊之舍其錦繡鄰有裋褐豎使之衣而欲竊之舍其梁肉鄰有糟粳而欲竊之此為何若人也王曰必為有竊疾矣疾猶癖墨子曰荆之地方五千里宋方五百里此猶文軒之與敝輿也荆有雲夢犀兕麋鹿盈之江漢魚鱉黿鼉為天下饒宋所謂無雉兔鮒魚者也附魚之小者此猶梁肉之與糟粳也荆有長松文梓楩楠豫章大小凡五宋無長木此猶錦繡之與裋褐也臣元作惡以王吏之攻宋為與此同類也王曰善哉請無攻宋彪謂翟之説美矣然此時諸侯固有竊疾強吞弱大并小直患其力不給爾豈為若説止攻哉意者墨守之嚴輸般服病焉假此説以縮兵則有之彼楚國非止足而無有竊疾者也梁王襄伐邯鄲而徴師於宋宋君使使者請於趙王武靈曰夫梁兵徑而權重今徵師於敝邑敝邑不從則恐危社稷若夫梁伐趙扶謂助之以害趙國則寡人不忍也願王之有以命敝邑趙王曰然夫宋之不如梁也寡人知之矣弱趙以強梁宋必不利也則吾何告子而可乎雖知宋不助梁然無辭使宋不聽梁使者曰臣請受邊城請得攻一城以應梁徐其攻而留其日以待下吏之有城而已攻之不力使趙無失城趙王曰善宋人因遂舉兵入趙境而圍一城焉梁王甚説曰宋人助我攻矣趙王亦曰宋人止於此矣故兵退難解德施於梁而無怨於趙故名有所加而實有所歸君偃宜無此善以在犀首伐黃下蘇秦論攻宋前故次之説謂大尹宋卿曰君日長矣君宋君自知政言親國事則公無事公不如令楚賀君之孝則君不奪太后之事矣后時與政則公常用宋矣見用於宋尹蓋太后之人宋與楚為兄弟齊攻宋楚王威言救宋宋因賣楚重以求講於齊賣謂衒鬻之齊不聽蘇秦為宋謂齊相曰不如與之聽其講以明宋之賣元作資楚重於齊也楚怒怒其背已而與齊講必絶於宋而事齊齊楚合則攻宋易矣蘇秦與剔成齊宣同時知非閔時剔成嗣辟公元年立立王七年壬子齊攻宋宋使臧子索救於荆荆王威大説許救甚勸臧子憂而反其御曰索救而得有憂色何也臧子曰宋小而齊大夫救於小宋而惡於大齊此王之所憂也而荆王説甚必以堅我我堅而齊敝荆之利也臧子乃歸齊王宣果攻拔宋五城而荆王不至此四章有蘇秦語得為君偃而君偃弒立怒鄰宜不能曲折如此故係之剔成然則孟子所稱審亦皆剔成也君偃辟公子剔成君弟弒立已元年顯王四十一年癸宋衍康字下同王之時安史君偃在年表世家傳並不書諡有雀生􅞖集韻音欺今江東呼鵂鶻為鵋鶀於城之陬陬隅也使史占之曰小而生巨必霸天下蓋言遜也王大喜於是滅滕隱七年注在沛國公邱縣伐薛取淮北之地乃愈自信欲霸之速成故射天笞地斬社稷而焚滅之曰威服天下鬼神罵國老諫臣元作曰為無顔之冠冠不覆額以示勇剖傴之背鍥朝涉之脛鍥刻脛胻也而國人大駭齊聞而伐之民散城不守王乃逃倪侯之館侯其臣也遂得而死見祥而不為祥反為禍凡六章衛東郡及魏郡黎陽河內之野王朝歌後文公徙楚邱濮陽是也靈公襄公子元年卯景王三十年丁衛靈公近癰疽孟子有其人蓋醫之幸者彌子瑕二人者専君之勢以蔽左右復塗偵衛人謂君曰昔日臣夢見君君曰子何夢曰夢見竈君君忿然作色曰吾聞夢見人君者夢見日今子曰夢見竈君而言君也有説則可無説則死對曰日并燭天下者也一物不能蔽也若竈則不然前之人煬煬炙燥也則後之人無從見也今臣疑人之有煬於君者也是以夢見竈君君曰然於是因廢癰疽彌子瑕而立司空狗元在趙䇿悼公出公弟元年酉定王十四年癸犀首魏官也非公孫衍伐黃過衛使人謂衛君此䇿以文南子與智伯同時知為悼公曰敝邑之師過大國之郊曽無一介之使以存之乎敢請其罪今黃城將下矣已將移兵造大國之城下已言已下黃衛君懼束組三百緄組邪文紛綬之屬十首為一緄黃金三百鎰以隨使者南文子衛大夫止之曰是勝黃城必不敢來不勝亦不敢來是勝黃城則功大名美內臨其倫臨言以功處其上倫其輩類夫在中者國中之臣惡臨議其事議謂譖短之蒙大名蒙冒處之也挾成公坐御以待中之議坐其御言不營為犀首雖愚必不為也是不勝黃城破心而走歸破心懼罪也恐不免於罪也彼安敢攻衛以重其不勝之罪哉果勝黃城帥師而歸遂不敢過衛智伯欲伐衛遺衛君野馬騊駼也四百璧一衛君大説羣臣皆賀南文子有憂色衛君曰大國大權而子有憂色何文子曰無功之賞無力之禮不可不察也野馬四百璧一此小國之禮而大國致之君其圖之衛君以其言告邊境智伯果起兵而襲衛至境而反曰衛有賢人先知吾謀也智伯欲襲衛乃佯亡其太子使奔衛南文子曰太子顔為君子也顔太子名君謂智伯甚愛而有寵非有大罪而亡必有故使人迎之於境曰車過五乘慎勿納也智伯聞之乃止彪謂南文子衛之賢智人也慮無遺算嗣君平侯子元年酉顯王四十五年丁秦攻衛之蒲秦昭四年取蒲坂此二十三年胡衍謂樗里疾曰公之伐蒲以為秦乎以為魏乎為魏則善為秦則不賴矣賴猶利衛所以為衛者以有蒲者今蒲入於魏衛恐秦取蒲必自入之魏衛必折於魏往求援也魏亡西河之外秦惠六年而弗能取者弱也今并衛於魏魏必強魏強之日西河之外必危且秦王昭亦將觀公之事害秦以善元作害魏秦王必怨公樗里疾曰奈何胡衍曰公釋蒲勿攻臣請為公入戒蒲守戒告之以釋攻以德衛君樗里疾曰善胡衍因入蒲謂其守曰樗里子知蒲之病也其言曰吾必取蒲今臣能使釋蒲勿攻蒲守再拜因效金三百鎰元並作溢焉曰秦兵誠去請厚子於衛君胡衍取金於蒲以自重於衛樗里子亦得三百金而歸又以德衛君也衛使客事魏三年不得見衛客患之乃見吾下先生蓋以所居為號許之以百金梧下先生曰諾乃見魏王哀曰臣聞秦出元作入兵未知其所之秦魏交而不修之日久矣願王専元作博事秦無有他計魏王曰諾客趨出客謂梧下王郎門而反曰佯若不為衛客偶思念得之臣恐王事秦之晚王曰何也先生曰夫人於事已者過急過猶多於事人者過緩今王緩於事已者安能急於事人奚以知之王問衛客曰梧下稱之事王三年不得見臣以是知王緩也魏王趨見衛客彪謂此一時氣俗無不汲於利者以先生稱于世其人不薄矣而以百金諾人為之行狡獪之計況小子乎彼哉彼哉衛嗣君時胥靡有罪人蓋賢者也逃之魏衛贖之百金不與乃請以左氏衛地缺請亦贖也羣臣諫曰以百金之地贖一胥靡無乃不可乎君曰治無小亂無大大小謂國教化喻於民三百之城足以為治民無廉恥雖有十左氏將何以用之彪謂衛君之言及此足以興起而不得霸豈輔之者無其人乎以羣臣之所諫知不及其君逺矣然享國四十餘年不受外兵則三百為治之言允蹈之者與衛嗣君病富術謂殷順且曰皆衛人子聽吾言也以説君勿益損也使之一如其教君必善子人生之所行與死之心異始君之所行於世者食髙麗也凡有養於口體皆得言食所用者緤錯拿薄也二臣名羣臣盡以為君輕國而好髙麗必無與君言國事者子謂君君之所行天下者甚謬緤錯主斷於國而拿薄輔之自今以往者公孫氏衛國姓也故商君衛之庶孽公子也姓公孫氏不血食矣君曰善與之相印曰我死子制之嗣君死殷順且以君令相公子補期嗣君子緤錯拿薄之族皆逐之也彪謂嗣君賢君也富術稱之貶矣蓋諫者之言多務為深切詭激之辭使嗣君不賢安能受其言而委之以二臣乎衛人迎新婦婦上車問驂馬誰馬也御曰借之新婦謂僕曰拊驂無笞服皆言愛也拊尤愛之車至門扶人扶婦下教送母母送婦者將還故戒之曰滅竈將失火入室見臼曰徙之牖下妨往來者主人笑之此三言者皆至言也然而不免為笑者早晚之時失也初為婦而去然失之早也凡六章中山漢為國有盧奴北平北新城唐深澤苦陘安國曲逆望都新市中山君史不出不名諡饗都士大夫霍光傳都士注都試也此言已試而饗之司馬子期中山人後為楚昭卿在焉羊羮不遍司馬子期怒而走於楚説楚王昭伐中山中山君亡亡去國也有二人挈戈而隨其後者中山君顧謂二人子奚為者也二人對曰臣有父嘗餓且死君下壺餐臣父下以與之餐小食臣父且死曰中山有事戎事汝必死之故來死君也將為君死中山君喟然而仰歎曰與不期衆少其於當厄其指物辭猶在也言施與當在厄時怨不期深淺其於傷心傷人之心雖淺怨也吾以一杯羊羮亡國以一壺餐得士二人魏文侯欲殘中山殘謂滅之常莊談趙人謂趙桓元作襄子曰魏并中山必無趙矣公何不請公子傾魏君女以為正妻因封之中山是中山復立也魏必不殘其女之封樂羊為魏將攻中山其子時在中山中山君烹之作羮致於樂羊樂羊食之古今稱之曰補樂羊食子以自信明害父以求法此害于父道而羊為之求為殉君之法也犀首立五王秦韓燕宋中山也楚春秋時王齊宣魏惠顯王三十五年王趙武靈獨不王其後秦惠十二年韓宣惠燕易王王明年秦惠始王秦惠改元之七年宋偃始王故武靈八年書五國相印即秦七年也而中山後持持猶疑也立之後而復疑齊謂趙魏曰寡人羞與中山並為王願與大國伐之以廢其王中山聞之大恐召張登而告之曰寡人且王齊謂趙魏曰羞與寡人並為王而欲伐寡人恐亡其國不在索王今所謀者救亡耳不求為王非子莫能吾救登對曰君為臣多車重幣臣請見田嬰中山君遣之齊見嬰子曰臣聞君欲廢中山之王將與趙魏伐之過矣以中山之小而三國伐之中山雖益廢王益猶甚也言事有甚於此者猶且聽也且中山恐必為趙魏廢其王而務附焉附趙魏也主廢者齊故不附之是君為趙魏驅羊也非齊之利也豈若中山廢其王而事齊哉田嬰曰奈何張登曰今君召中山與之遇而許之王中山必喜而絶趙魏趙魏怒而攻中山中山急而為君難其王難則所謂羞與為王則中山必恐為君廢王事齊不王中山齊志也今為齊發之所以事齊彼患亡其國是君廢其王而立其國賢於為趙魏驅羊也田嬰曰諾張丑曰不可臣聞之同欲者相憎同憂者相親今五國相與王也負海不與焉負海齊也先已王此是欲皆在為王而憂在負海憂齊廢之今召中山與之遇而許之王是奪四元作五下同國而益負海也中山與四國同欲今與齊遇是奪彼而益我也致中山而塞四國四國寒心必先與之王而故親之是君臨中山而失四國也且張登之為人也善以微計薦中山之君久矣薦進也難信以為利田嬰不聽果召中山君而許之王張登因謂趙魏曰齊欲伐河東河東魏地何以知之齊羞與中山並元作之為王甚矣今召中山與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許諾果與中山王而親之中山果絶齊而從趙魏中山與燕趙為王齊閉關不通中山之使其言曰我萬乘之國也中山百乘之國也何侔名於我欲割平邑屬代郡以賂燕趙出兵以攻中山藍諸君中山相也患之張登謂藍諸君曰公何患於齊藍諸君曰齊強萬乘之國恥與中山侔名不憚割地以賂燕趙出兵以攻中山燕趙好倍而貪地倍為背約吾恐其不吾據也大者危國次者廢王奈何吾弗患也張登曰請令燕趙固輔中山固言輔之堅而成其王事遂定公欲之乎藍諸君曰此所欲也曰請以公為齊王閔而登試説公可乃行之藍諸君曰願聞其説登曰王之所以不憚割地以賂燕趙出兵以攻中山者其實欲廢中山之王也王曰然然則王之為費且危夫割地以賂燕趙是強敵也出兵以攻中山首難也首為攻伐之難王行二者所求中山未必得王如用臣之道地不虧而兵不用中山可廢也王必曰子之道奈何藍諸君曰然則子之道奈何張登曰王發重使使告中山君寡人所以閉關不通使者為中山之獨與燕趙為王而寡人不與聞焉此王此君皆中山是以隘之隘亦不通也王茍舉玊補趾以見寡人請亦佐君中山恐燕趙之不已據也今齊之辭云即佐王必遁燕趙與王相見此並齊王燕趙聞之必怒絶之王亦絶之是中山孤孤何得無廢以此説齊王齊王聽乎藍諸君曰是則必聽矣此所以廢之何在其所以存之矣張登曰此王所以存者也此王中山齊以是辭來因言告燕趙而無往以齊王言告之而不往齊以積厚於燕趙燕趙必曰齊之欲割平邑以賂我者非欲廢中山之王也徒欲以離我於中山而已親之也雖百平邑燕趙必不受也藍諸君曰善遣張登往果以是辭來中山因告燕趙而不往燕趙果俱輔中山而使其王事遂定彪謂張登臆則屢中言之必可行者也雖其用智有捭闔風氣而術無害亦狡獪可喜非君子之所排也司馬喜中山臣使趙為已求相中山公孫𢎞隂知之中山君出司馬喜御公孫𢎞參乘公孫𢎞曰為人臣招大國之威以為已求相於君何如君曰吾食其肉不以分人司馬喜頓首於軾曰臣自知死至矣君曰何也曰補臣抵罪君曰行吾知之矣行使之行車二臣雅不相善𢎞無故云然似欲中喜者故知居頃之趙使來為司馬喜求相中山君大疑公孫𢎞公孫𢎞走出司馬喜三相中山陰簡難之簡陰姬名也難謂忌之田簡謂司馬喜曰趙使者來屬耳霍光傳注屬近也獨不可語陰簡之美乎趙使近至宜有報可因報使言之趙也趙必請之君與之即公無內難矣君弗與趙公因勸君立之以為正妻隂簡之德公無所窮矣果令趙請之補君弗與司馬喜曰君弗與趙趙王武靈必大怒大怒則君必危矣然則立以為妻固無請人之妻不得而怨人者也田簡自謂取使取請為使也可以為司馬喜可以為陰簡可以令趙勿請也簡請使耳實喜自使見下陰姬與江姬爭為后司馬喜謂陰姬公姬父也曰事成則有土得民言公得封不成則恐無身欲成之何不見臣乎怪其不來謀陰姬公稽首首至地下曰誠如君言事何可豫道者言將厚報之未可先言司馬喜即奏書中山王補曰臣聞弱趙強中山中山王説而見之曰願聞弱趙強中山之説司馬喜曰臣願之趙觀其地形險阻人民貧富君臣賢不肖商敵為資商較之未可預陳也中山王遣之見趙王武靈曰臣聞趙天下善為音佳麗人之所出也今者臣來至境入都邑觀人民謡俗徒歌曰謡容貌顔色殊無佳麗好美者以臣所行多矣周流無所不至未嘗見人如中山陰姬者也不知者特以為人人元作力言不能及也其容貌顔色固已過絶人矣若其眉目準頞權衡準鼻頞鼻莖權輔骨當作權衡眉上犀角偃月犀角首骨偃月額角彼乃帝王之后非諸侯之姬也趙王意移大説曰吾願請之何如司馬喜曰臣竊見其佳麗口不能無道爾即欲請之是非臣所敢議願王無泄也司馬喜辭去歸報中山王曰趙王非賢王也不好道德而好聲色不好仁義而好勇力臣聞其乃欲請所謂陰姬者中山王作色不説司馬喜曰趙強國也其請之必矣王如不與即社稷危矣與之即為諸侯笑中山王曰為將奈何司馬喜曰王立為后以絶趙王之意世無請后者雖欲得請之鄰國不與也中山王遂立以為后趙王亦無請言也此兩章一事耳而曲折小差著書者自以所聞駮異也然則此書之作至至慎矣主父欲伐中山使李疪觀之李疪曰可伐也君弗攻恐後天下主父曰何以對曰中山之君所傾蓋與車者傾者却不御也與之同車皆所尊禮者而朝窮閭隘巷之士者君而朝士亦尊禮也七十家主父曰是賢君也安可伐李疪曰不然舉士則民務名不存本本謂農業朝賢則耕者惰而戰士懦皆不強力也以賢者不耕戰故若此不亡者未之有也彪謂李疪小人也乃欲使人君廢賢而置士夫賢者在位將使耕者愈力戰士愈奮而誰敢惰懦且不賢而耕且戰民之分也何敢與賢者並民唯不務名耳豈有務名而不趨於善者乎若疪者小人之無忌憚者也凡六章戰國䇿卷十
