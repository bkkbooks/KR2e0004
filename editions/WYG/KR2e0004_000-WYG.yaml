front:
  text: 欽定四庫全書史部五
  hash: sha256:b14f67abc523da03d0f3895f0bd1a4fc487d6483a8f1f723ef9860afcb5d9dd6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0004_WYG_000-1a, image: WYG0406/WYG0406-0469a.png}
body:
  text: 戰國策雜史類提要臣等謹案戰國䇿十卷宋鮑彪注案黄鶴杜詩補注引彪之說郭知達集註九家杜詩皆稱為鮑文虎說則其字為文虎也縉雲人官尚書郎戰國策一書編自劉向注自髙誘至宋而誘注殘缺曽鞏始合諸家之本校之而于注文無所増損姚宏始稍補誘注之缺而較正者多訓釋者少彪此注成於紹興丁卯其序中一字不及姚本盖二人同時宏又因忤秦檜死其書尚未盛行于世故彪未見也彪書雖首載劉向曽鞏二序而其編次先後則自以已意改移非復向鞏之舊是書竄亂古本實自彪始然向序稱中書餘卷錯亂相雜莒又有國别者八案莒字未詳今姑仍原本録之篇少不足臣向因國别者略以時次之分别不以序者以相補除重複得三十三篇又稱中書本號或曰國策或曰國事或曰短長或曰事語或曰長書或曰修書云云則向編此書本裒合諸國之記删併重複排比成帙所謂三十三篇者實非其本來次第彪核其事迹年月而移尚與妄改古書者有間其更定東西二周自以為考據之特筆元吳師道作補正極議其誤考趙與旹賔退録曰戰國策舊傳髙誘注殘缺疎略殊不足觀姚令威寬補注案補注乃姚寛之兄姚宏所作此作姚寛殊誤謹附訂於此亦未周盡獨縉雲鮑氏校注為優雖間有小疵多不害大體惟東西二周一節極其舛謬深誤學者反不若二氏之説是則南宋人已先言之矣師道注中所謂補者即補彪注所謂正者亦即正彪注其精核實勝于彪然彪注疏通詮解實亦殫一生之力故其自記稱四易稿後始悟周策之嚴氏陽􅆆即韓策之嚴逐陽堅而有校書如塵埃風葉之嘆雖踵事者益密正不得遽沒剏始之功矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀戰國策序䕶左都水使者光禄大夫臣向言所校中戰國策書中書餘卷錯亂相糅舛又有國别者八篇少不足臣向因國别者略以時次之分别不以序者以相補除復重得三十三篇本字多誤脱為半字以趙為肖以齊為立如此字者多中書本號或曰國䇿或曰國事或曰短長或曰事語或曰長書或曰修書臣向以為戰國時游士輔所用之國為之策謀宜為戰國策其事繼春秋以後訖楚漢之起二百四十五年間之事皆定以殺青書可繕寫叙曰周室自文武始興崇道徳隆禮義設辟雍泮宫庠序之教陳禮樂弦歌移風之化叙人倫正夫婦天下莫不曉然論孝悌之義惇篤之行故仁義之道滿乎天下卒致之刑措四十餘年逺方慕義莫不賔服雅頌歌詠以思其徳下及康昭之後以思其徳一作恩徳其上下及一無下字雖有衰徳其綱紀尚明及春秋時已四五百載矣然其餘業遺烈流而未滅五霸之起尊事周室五霸之後時君雖無徳人臣輔其君者若鄭之子産晉之叔向齊之晏嬰挾君輔政以並立於中國猶以義相支持歌詠以相感聘覲以相交期會以相一盟誓以相救天子之命猶有所行㑹享之國猶有所恥小國得有所依百姓得有所息孔子曰能以禮讓為國乎何有周之流化豈不大哉及春秋之後衆賢輔國者既沒而禮義衰矣孔子雖論詩書定禮樂王道粲然分明以匹夫無勢化之者七十二人而已皆天下之俊也時君莫尚之是以王道遂用不興故曰非威不立非勢不行仲尼既沒之後田氏取齊六卿分晉道徳大廢上下失序至秦孝公捐禮讓而貴戰爭棄仁義而用詐譎茍以取强而已矣夫簒盗之人列為侯王詐譎之國興立為强是以轉相放效後嗣師之遂相吞滅并大兼小暴師經嵗流血滿野父子不相親兄弟不相安夫婦離散莫保其命湣然道徳絶矣晚世益甚萬乘之國七千乘之國五敵侔爭權盡為戰國貪饕無恥競進無厭國異政教各自制斷上無天子下無方伯力功爭强勝者為右兵革不休詐偽並起當此之時雖有道徳不得施設有謀之强負阻而恃固連與交質重約結誓以守其國故孟子荀卿儒術之士棄捐於世而游説權謀之徒見貴於俗是以蘇秦張儀公孫衍陳軫代厲之屬生從横短長之説左右傾側蘇秦為從張儀為横横則秦帝從則楚王所在國重所失國輕然當此之時秦國最雄諸侯方弱蘇秦結之合六國為一以儐背秦秦人恐懼不敢闚兵於闗中天下不交兵者二十有九年然秦國勢便形利權謀之士咸先馳之蘇秦初欲横秦弗用故東合從及蘇秦死後張儀連横諸侯聴之西向事秦是故始皇因四塞之國據崤函之阻跨隴蜀之饒聴衆人之䇿乘六世之烈以蠶食六國兼諸侯并有天下仗於詐謀之積終無信篤之誠無道徳之教仁義之化以綴天下之心任刑罰以為治信小術以為道遂燔燒詩書炕殺儒士上小堯舜下邈三王二世愈甚惠不下施情不上逹君臣相疑骨肉相疏化道淺薄綱紀壞敗民不見義而懸於不寧撫天下十四嵗天下大潰詐偽之弊也其比王徳豈不逺哉孔子曰道之以政齊之以刑民免而無恥道之以徳齊之以禮有恥且格夫使天下有所恥故化可致也茍以詐偽偷活取容自上為之何以率下秦之敗也不亦宜乎戰國之時君徳淺薄為之謀䇿者不得不因勢而為資據時而為脱字故其謀扶急持傾為一切之權雖不可以臨教化兵革救急之勢也皆髙才秀士度時君之所能行出奇䇿異智轉危為安運亡為存亦可喜皆可觀䕶左都水使者光禄大夫臣向所校戰國䇿書録戰國䇿序劉向所定著戰國䇿三十三篇崇文總目稱十一篇者闕臣訪之士大夫家始盡得其書正其誤謬而疑其不可考者然後戰國䇿三十三篇復完叙曰向叙此書言周之先明教化修法度所以大治及其後詐謀用而仁義之路塞所以大亂其説既美矣卒以謂此書戰國之謀士度時君之所能行不得不然則可謂惑於流俗而不篤於自信者也夫孔孟之時去周之初已數百嵗其舊法已亡其舊俗其熄久矣二子乃獨明先王之道以為不可改者豈將强天下之主以後世之所不可為哉亦將因其所遇之時所遭之變而為當世之法使不失乎先王之意而已二帝三王之治其變固殊其法固異而其為天下國家之意本末先後未嘗不同也二子之道如是而已盖法者所以適變也不必盡同道者所以立本也不可不一此理之不易者也故二子者守此豈好為異論哉能勿茍而已矣可謂不惑於流俗而篤於自信者也戰國之游士則不然不知道之可信而樂於説之易合其設心注意偷為一切之計而已故論詐之便而諱其敗言戰之善而蔽其患其相率而為之者莫不有利焉而不勝其害也有得焉而不勝其失也卒至蘇秦商鞅孫臏具起李斯之徒以亡其身而諸侯及秦用之亦滅其國其為世之大禍明矣而俗猶莫之悟也惟先王之道因時適變為法不同而考之無庛用之無敝故古之聖賢未有以此而易彼也或曰邪説之害正也宜放而絶之則此書之不泯其可乎對曰君子之禁邪説也固將明其説於天下使當世之人皆知其説之不可從然後以禁則齊使後世之人皆知其説之不可為然後以戒則明豈必滅其籍哉放而絶之莫善於是故孟子之書有為神農之言者有為墨子之言者皆著而非之至於此書之作則上繼春秋下至秦漢之起二百四五十年之間載其行事固不得而廢也此書有髙誘注者二十一篇或曰三十二篇崇文總目存者八篇今存者十篇云編校史舘書籍臣曽鞏序戰國䇿序國䇿史家者流也其文辯博有煥而明有婉而微有約而深太史公之所考本也自漢稱為戰國䇿雜以短長之號而有蘇張縱横之説學者諱之置不論非也夫史氏之法具記一時事辭善惡必書初無所决擇楚曰檮机書惡也魯曰春秋善惡兼也司馬史記班固漢書有佞幸等列傳學者豈以是為不正一舉而棄之哉矧此書若張孟談魯仲連發䇿之慷慨諒毅觸讋納説之從容養叔之息射保功莫大焉越人之投石謀賢莫尚焉王斗之愛縠憂國莫重焉諸如此類不一皆有合先王正道孔孟之所不能違也若之何置之曽鞏之序美矣而謂禁邪説者固將明其説於天下則亦求其故而為之説非此書指邪起秦迄今千四百嵗由學者不習或衍或脱或後先失次故肖立半字時次相楺劉向已病之矣舊有髙誘注既疎略無所稽據注又不全浸微浸滅殆於不存彪於是考史記諸書為之注定其章條正其衍説而存其舊慎之也地理本之漢志無則缺字訓本之説文無則稱猶雜出諸書亦别名之人姓名多不傳見欲顯其所説故繫之一國亦時有論説以翊宣教化可以正一史之謬備七略之缺於之論是非辨得失而考之興亡亦有補於世紹興十七年丁夘仲冬二十有一日辛巳冬至縉雲鮑彪序
