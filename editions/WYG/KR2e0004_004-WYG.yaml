body:
  text: 戰國䇿卷四宋鮑彪注齊東有菑川東萊瑯邪髙宻膠東南有泰山城陽北有千乗清河以南勃海之髙樂髙城重合信陽西有濟南平原威王田齊桓公子元年安王二十四年癸卯上之事此東郡濮水之上實衞地贅子死章子走皆以名子之猶嬰子文子章匡章盼子謂齊王曰田盼也威王言使守髙唐者並齊將不如易餘糧於宋易移與之宋王辟公必説梁氏不敢過宋伐齊齊固弱固猶信是以餘糧收宋也齊國復强雖復責之宋可可責其償不償因以為辭攻之亦可盼子威王臣威自九年後未嘗敗撓此言二子死盖九年前也邯鄲之難趙成侯二十一年魏圍邯鄲此二十五年趙求救於齊田侯召大臣而謀曰救趙孰與勿救鄒子名忌二十一年相明年封下邳號成侯曰不如勿救段干綸曰弗救則我不利我我齊田侯曰何哉對曰補二字夫魏氏兼邯鄲其於齊何利哉田侯曰善乃起兵甲軍於邯鄲之郊以軍法陳之於此段干綸曰臣之求利且不利者非此也且猶與夫救邯鄲軍於其郊是趙不拔而魏全也兩國不戰故故不如南攻襄陵以敝魏襄屬河東魏邑也攻之使魏困邯鄲拔而承魏之敝承言繼其後是趙破而魏弱也田侯曰善乃起兵南攻襄陵七月邯鄲拔齊因承魏之敝大破之桂陵諸注止言魏地年齊記有云二十六秦假道韓魏以攻齊齊威王使章子將而應之與秦交和而舍孫子兩軍相對曰交和楚記注軍門曰和使者數相往來章子為變其徽章徽幟也以絳帛着於背章其别也以雜秦軍候者言齊之偵者章子以齊入秦威王不應頃衍之字間候者復言章子以齊兵降秦威王不應而此者三而猶如有司請曰言章子之敗者異人而同辭王何不廢將而擊之廢謂罷之王曰此不叛寡人明矣曷為而擊之頃間言齊兵大勝秦軍大敗於是秦王稱元作拜西藩之臣按威王與秦獻公孝公同時齊雖强而秦不弱此語未詳而謝於齊左右曰何以知之曰章子之母啓其母名得罪其父其父殺之而埋馬棧之下棧為棚以立焉吾使衍者字章子將也勉之曰夫子之强全兵而還必更𦵏將軍之母對曰臣非不能更𦵏先妾也臣之母啓得罪臣之父臣之父未教而死未有教命夫不得父之教而更𦵏母是欺死父也故不敢彪謂君父一也雖無父命而以君命更𦵏何損於義凡章子之孝皆過所謂過孝夫為人子而不欺死父豈為人臣欺生君哉彪謂周衰齊威不世之主也列子曰君非自知我也以人之言賜我其罪我又將以人之言故人君於其臣欲其自知之也威王之於章子有焉夫如是雖百市虎不摇也豈以三告而投杼乎哉楚將伐齊魯親之親楚齊王患之張丐曰齊人疑即張丑臣請令魯中立於兩國之間無所親踈乃為齊見魯君康公魯君曰齊王懼乎曰非臣所知也臣來弔足下魯君曰何弔乎曰君之謀過矣君不與勝者而與不勝者楚時末敗而云然盖楚有勝齊之勢楚雖勝士卒多死魯合齊以兩國擊之楚必敗故言其不勝何故也魯君曰子以齊楚為孰勝哉對曰鬼且不知也然則子何以弔寡人曰齊楚之權敵也不用有魯與無魯足下豈如全衆而合二國之後哉楚大勝齊其良士選卒材武見選者必殪殪死也其餘兵足以待天下齊為勝其良士選卒亦殪而君以魯衆合戰勝後合合敗者也勝者雖合之不必見徳今以全衆合敗者彼勝者既士卒多死可勝也敗者因見徳矣此其為徳也亦大矣徳敗者其見恩徳也亦甚大矣敗者徳之魯君以為然乃退師成侯鄒忌為齊相田忌為將不相説公孫閈齊人謂鄒忌曰公何不為王謀伐魏勝則是君之謀也君可以有功戰不勝田忌不進戰而不死曲撓而誅曲撓言師不直前而敗鄒忌以為然乃説王而使田忌伐魏田忌三戰三勝鄒忌以吿公孫閈公孫閈乃使人操十金而往卜於市曰我田忌之人也吾三戰而三勝聲威天下天下畏其威聲欲為大事反齊而王亦吉否卜者出田忌之人因令人捕捕取也為人卜者亦驗其辭於王前田忌遂走齊記三十五年有彪謂齊威賢王也其知章子察阿即墨大夫明矣獨於是失之然忌之走亦非威王譴之也鄒忌脩八尺有餘而形䫉昳麗昳徒結切日側也故有光艶意又疑作佚朝服衣冠窺鏡謂其妻曰我孰與城北徐公美其妻曰君美甚徐公何能及君也城北徐公齊國之美麗者也忌不自信而復問其妾曰吾孰與徐公美妾曰徐公何能及君也旦日旦明也客從外來與坐談問之吾與徐公孰美客曰徐公不若君之美也明日徐公來孰視之自以為不如窺鏡而自視又弗如逺甚暮寢而思之曰吾妻之美我者私我也私猶親妾之美我者畏我也客之美我者欲有求於我也於是入朝見威王曰臣誠知不如徐公美臣之妻私臣臣之妾畏臣臣之客欲有求於臣皆以美於徐公今齊地方千里百二十城宫婦左右莫不私王朝廷之臣莫不畏王四境之内莫不有求於王由此觀之王之蔽甚矣王曰善乃下令羣臣吏民能面刺寡人之過者受上賞上書諫寡人者受中賞能謗議於市朝聞寡人之耳者受下賞令初下羣臣進諫門庭若市數月之後時時而間進進諫者有暇隙朞年之後雖欲言無可進者燕趙韓魏聞之皆朝於齊此所謂戰勝於朝廷坐朝廷之上四國朝之不待兵也彪謂鄒忌嘗以詐走田忌則其人亦傾險士耳唯此言者萬世之言也宣王威王子元年顯王二十七年己夘南梁之難魯國蕃縣有南梁水此二年魏伐朝趙與韓共擊魏趙不利敗於南梁韓氏請救於齊田侯猶上陳侯召大臣而謀曰早救之孰與晩救之便張丐對曰晚救之韓且折而入於魏不如早救之田臣思曰不可夫韓魏之兵未敝而我救之我代韓而受魏之兵顧反聴命於韓也且夫魏有破韓之志韓見且亡必東愬於齊愬告也我因隂結韓之親而晚承魏之敝承繼其後也則國可重利可得名可尊矣田侯曰善乃隂告韓使者而遣之告者許之也韓自以有齊國五戰五不勝東愬於齊齊因起兵擊魏大破之馬陵魏破韓弱韓魏之君因田嬰北面而朝田侯齊記有為兩章一為桓公臣思一為宣王孫子彪謂臣思之䇿則幸中矣非仁義舉也孟子曰行一不義而得天下不為也况朝韓魏乎田忌為齊將此二年召復位係梁太子申禽龎涓魏將孫子臏也齊人武之孫為田忌軍師謂田忌曰將軍可以為大事乎田忌曰奈何孫子曰將軍無解兵而入齊使彼罷敝於先罷疲同彼謂齊齊軍已與魏戰雖勝亦罷今使當前弱守於主弱弱卒也忌所自將使齊不疑也主地缺盖齊險隘主者循軼之途也軼轍同車迹也言其險狹不得方􅁤適相循耳鎋擊摩車而相過鎋牽同車軸耑鍵也路狹車宻故相擊相摩使彼罷敝先弱守於主必一而當十得地利故十而當百百而當千然後背太山在太山博縣西北左濟右天唐盖盼子所守所謂髙唐屬平原軍重踵髙宛重輜重也後志髙宛屬樂安使輕車銳騎衝雍門始皇紀注在髙陵若是則齊君可正正猶制治而成侯可走不然則將軍不得入於齊矣田忌不聴果不入齊彪謂臏非武流也武雖運竒用詭豈嘗語人以是乎忌不聴忌賢也田忌亡齊而之楚鄒忌代之相齊恐田忌欲以楚權復於齊復猶返杜赫曰臣請為留楚為鄒留田於楚謂楚王威曰鄒忌所以不善楚者恐田忌之以楚權復於齊也王不如封田忌於江南以示忌之不返齊也鄒忌必𥙷以齊厚事楚田忌亡人也而得封必徳王若復於齊必以齊事楚言此示不為鄒忌遊説也此用二忌之道也楚果封之於江南鄒忌事宣王仕人衆薦於王使之仕宣王不説晏首齊人貴而仕人宣王説之鄒忌謂宣王曰忌聞以為有一子之孝不如有五子之孝今首之所進仕者以㡬何人宣王因以晏首壅塞之言其不薦逹人楚威王戰勝於徐州後志魯之薛六國時曰徐州事在楚威七年此十年欲逐嬰子於齊逐使齊逐之田嬰時未封故田嬰子猶盼子嬰子恐張丑齊人謂楚王曰王戰勝於徐州也盼子不用也盼子有功於國百姓為之用嬰子不善不與盼善而用申縳申縳者大臣弗補與史曰不附百姓弗為用故王勝之也今嬰子逐盼子必用復整其士卒以與王遇必不便於王也楚王因弗逐權之難後志南郡編注鬬緍以權叛又當陽注縣東南有權城楚地也盖燕自北進齊自東進而戰於楚境燕䇿為文公時齊燕戰秦使魏冉之趙冉𫝊言自恵王時任事然則此役文公末年也出兵助燕擊齊薛公嬰時未封後人稱之耳嬰𫝊言自威王時任職使魏處之趙謂李向趙人曰君助燕擊齊齊必急急必以地和於燕而身與趙戰矣然則是君自為燕束兵束猶歛燕齊和成歛兵不戰為燕取地也取齊地故為君計者不如按兵勿出齊必緩趙之助燕不力故齊無危急之勢緩必復與燕戰戰而勝兵罷敝罷疲同趙可取唐曲逆並屬中山國言二國戰不暇北顧趙可以其間取中山也戰而不勝命懸於趙縣繫也然則吾中立吾謂趙而割窮齊與疲燕也割割齊地兩國之權懸於君矣蘇秦為趙合從趙肅侯十七年此當十年説齊宣王曰齊南有太山東有琅邪徐州郡西有清河冀州郡北有渤海幽州郡此所謂四塞之國也言四方皆有險固齊地方二千里帶甲數十萬粟如丘山齊車之良五家之兵管仲軍令始於五家為􅁤疾如錐矢錐銳也戰如雷電其威大也解如風雨言疾也即有軍役未嘗倍泰山絶清河渉渤海也臨淄之中屬齊郡七萬户臣竊度之下户三男子三七二十一萬不待𤼵於逺縣而臨淄之卒固已二十一萬矣臨淄甚富而實其民無不吹竽似笙三十六篁鼓瑟似琴二十五絃擊筑以竹曲五絃之樂彈琴鬬雞走犬六博蹋鞠者劉向别録蹙鞠黄帝作盖因娛戯以練武士蹋即蹙也臨淄之途車轂元作䡰擊人肩摩連袵成幃帳屬在旁者舉袂成幕袂袖也揮汗成雨家敦而富敦厚也志髙而揚夫以大王之賢與齊之强天下不能當今乃西面事秦竊為大王羞之且夫韓魏所以補畏秦者以與秦接界也兵出而相當不至十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折折猶敗以弱敵强雖勝猶為失半也四境不守戰而不勝以亡隨其後是故元作後韓魏之所以重與秦戰而輕為之臣也今秦攻齊則不然倍韓魏之地倍言二國在其後至衞元作闈陽晉之道魏襄十六年秦抜魏蒲坂陽晉張儀𫝊刼衞取陽晉注皆不地盖衞地時屬魏也徑亢父之險屬東平車不得方􅁤爾雅方舟併兩舟則此亦兩也軌車轍馬不得並行百人守險千人不能過也秦雖欲深入則狼顧驚貎恐韓魏之議其後也是故恫疑虚喝元作猲恫痛也言疑之甚集韻喝呵也髙躍而不敢進則秦不能害齊亦明矣夫不料秦之不奈我何也而欲西面事秦是羣臣之計過今臣無事秦之名而有强國之實臣故元作固願大王之少留計留意計之齊王曰寡人不敏此敏謂猶明明則疾於事今主君以趙王之教詔之詔告也敬奉社稷以從凡蘇張從横之説本𫝊皆有此在説燕趙韓魏後淳于髠齊人見滑稽𫝊一日而見七人於宣王王曰子來寡人聞之千里而一士是比肩而立比謂肩相次也言士難得千里有一猶為並肩也百世而一聖若隨踵而至也今子一朝而見七士則士不亦衆乎淳于髠曰不然夫鳥同翼者而聚居獸同足者而俱行今求柴胡桔梗於沮澤二草山生而沮水也故求不可得孟子注菹澤生草者水名出漢中則累世不得一焉及之睪黍地缺疑為負黍盖此與梁父皆東地也梁父之隂梁父在泰山山北曰隂則郄車而載耳郄却同言多獲車重不前夫物各有疇耕治之田禾所聚也故為𩔖今髠賢者之疇也王求士於髠若挹水於河挹酌也而取火於燧也夫燧鍳也髠將復見之豈特七士也齊欲伐魏淳于髠謂元作為齊王曰韓子盧者天下之疾犬也東郭逡者逡㕙同狡兔名海内之狡兔也集韻狡獪也疾也韓子盧逐東郭逡環山者三騰山者五兔極於前犬廢於後犬兔俱罷各死其處田父見之無勞勌之苦而擅其功擅者無與争也今齊魏久相持以頓其兵頓亦勞敝敝其衆臣恐强秦大楚承其後有田父之功齊王懼謝將休士謝辭去之言不用也齊欲伐魏魏使人謂淳于髠曰齊欲伐魏能解魏患唯先生也敝邑有寶璧二雙文馬二駟文毛色成文馬四足為駟請致之先生淳于髠曰諾入説齊王曰楚齊之仇敵也魏齊之與國也魏䇿馬陵之敗魏請臣畜朝齊楚王怒伐齊則此所言也夫伐與國使仇敵制其餘敝言楚將因齊兵勞而伐之名醜而實危伐與國醜也而有楚伐之危為王弗取也齊王曰善乃不伐魏客謂齊王曰淳于髠言不伐魏者受魏之璧馬也王以謂淳于髠曰聞先生受魏之璧馬有諸曰有之然則先生之為寡人計之何如淳于髠曰伐魏之事不便魏雖刺髠於王何益伐魏不便魏所欲也而髠止之故魏刺之雖刺髠而齊實不便非益也此設也詞若誠不便魏雖封髠於王何損且夫王無伐與國之誹魏無見亡之危百姓無被兵之患髠有璧馬之寶於王何傷乎元在魏䇿齊宣王見顔斶集韻音觸引吕春秋齊有顔斶曰斶前斶亦曰王前並使之即也宣王不説左右曰王人君也斶人臣也王曰斶前斶亦曰王前可乎斶對曰夫斶前為慕勢王前為趨士趨就之與使斶為慕勢不如使王為趨士王忿然作色曰王者貴乎士貴乎對曰士貴耳王者不貴王曰有説乎斶曰有昔者秦攻齊令有敢去栁下季壟五十步而樵採者魯展禽字季食采栁下亦云居之壟其冢埒秦伐齊先徑魯故云死不赦令曰有能得齊王頭者封萬户侯賜金千鎰由是觀之生王之頭曽不若死士之壟也宣王黙然不説左右皆曰斶來斶來大王據千乘之地而建千石鍾一石百二十斤萬石簴鐘鼓之桴天下之士皆為役處役為之使處在其位辯智並進莫不來語東西南北莫敢不來服元作服求萬物無不備具而百姓無不親附今夫士之髙者乃稱匹夫徒步而處農􅅕下則鄙野五鄼為鄙郊外曰野亦所處也監門閭里閭在鄉里在野並五百家皆有門士之賤也亦甚矣斶對曰不然斶聞古大禹之時諸侯萬國何則徳厚之道得貴士之力也言能貴士故徳厚故舜起農畆出於野鄙而為天子及湯之時諸侯三千當今之世南面稱寡者乃二十四由此觀之非得失之策與昔諸侯多由得䇿也今失䇿故誅㓕而寡得䇿貴士也稍稍誅㓕㓕亡無族之時欲為監門閭里安可得而有也哉是故易𫝊不云乎居上位未得其實而元作以喜其為名者必以驕奢為行倨慢驕奢則凶必從之是故無其實而喜其名者削削地也無徳而望其福者約約窮也無功而受其祿者辱禍必握言禍辱隨之不捨也故曰矜功不立言徒有矜大好功之志而不為故功不立虛願不至不求不為而欲得之虚願也物不自至此皆幸樂其名而無其實徳者也是以堯有九佐九官也舜有七友雄陶方回續牙伯陽東不訾秦不虚靈補見陶淵明四八臣禹有五丞楚辭八師三后外有益稷臯陶垂契湯有三輔商書伊虺二伯外有誼伯仲伯咎單豈此未詳自古及今而能虚成名於天下者無有是以君王無羞亟問亟猶數不愧下學學於臣下是故成其道徳而揚功名於後世者堯舜禹湯周文王是也故曰無形元並作刑者形之君也無形謂削約之未著者無端者事之本也夫上見其原下通其流至聖衍人字明學明學學之明者言上見下通聖明之事何不吉之有哉老子曰雖貴必以賤為本雖髙必下為基是以侯王稱孤寡不榖是其賤之本與非夫猶言非耶孤寡者人之困賤下位也而侯王以自謂豈非下人以身下人而尊貴士與夫堯𫝊舜舜𫝊禹周成王任周公旦而世世稱曰明主是以明乎士之貴也宣王曰嗟乎君子焉可侮哉寡人自取病耳及今聞君子之言乃今聞細人之行細人王自稱願請受為弟子且顔先生與寡人遊食必太牢牛羊豕具為太牢出必乗車妻子衣服麗都皆美稱顔斶辭去曰夫玉生於山制則破焉制裁斷之非弗寶貴矣然大璞不完士生乎鄙野推選則禄焉非不尊遂也遂猶逹然而形神不全斶願得歸晚食以當肉晩言飢而食也其美比於食肉安步以當車無罪以當貴清净貞正以自虞虞娛同樂也制言者王也言謂命令盡忠直言者斶也言要道已備矣願得賜歸安行反臣之邑屋則再拜衍而字辭去君子補二字曰斶知足矣歸真補反璞則終身不辱先生王斗齊人造門而欲見齊宣王宣王使謁者延入謁者掌賔贊受事延引也王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者復還報王曰先生徐之使待其至寡人請從就之也宣王因趨而迎之於門與入曰寡人奉先君之宗廟守社稷聞先生直言正諫不諱王斗對曰王聞之過不如所聞斗生於亂世事亂君焉敢直言正諫宣王忿然作色不説有間王斗曰昔先君桓公此桓公雖非田氏之先斗齊人也得稱為先所好者五補九合諸侯一匡天下天子授元作受籍土地人民之籍猶賜履也立為太伯二伯之伯今王有四焉宣王説曰寡人愚陋守齊國唯恐夫抎之抎失也春秋傳抎子辱矣焉能有四焉王斗曰否先君好馬王亦好馬先君好狗王亦好狗先君好酒王亦好酒先君好色王亦好色先君好士而元作是王不好士宣王曰當今之世無士寡人何好王斗曰世無騏驎騄耳字書不説騏驎不載唯玊篇云馬黒脊亦不言良馬陸機䟽麒麟行中律吕則此馬以麒麟比也騄耳八駿之一王之補駟已備矣世無東郭俊盧氏之狗王之走狗已具矣世無毛嬙西施荘小疏毛嬙越王嬖妾西施越女吳王姬王宫已充矣王亦不好士也何患無士王曰寡人憂國愛民固願得士以治之王斗曰王之憂國愛民不若王愛尺縠也縠細繗也王曰何謂也王斗曰王使人為冠不使左右便辟便順其所好辟避其所惡而使工者何也為能之也今王治齊非左右便辟無使也臣故曰不如愛尺縠也宣王謝曰寡人有罪國家於是舉士五人任官齊國大治彪謂王斗之義無所出出門求見自卑甚矣而徒以趨見於咫尺之間以為髙此孟子所謂不能三年而緦小功之察者也抑其陳誼迂而不切獨所謂學縠者可知耳然不若魏牟之言之慤而彪為序舍牟而取斗為牟之言出於斗也齊人見田駢齊處士曰聞先生髙議設為不宦設者虛假之辭而願為役為駢給使田駢曰子何聞之對曰臣聞之鄰人之女田駢曰何謂也對曰臣鄰人之女設為不嫁行年三十而有七子不嫁則不嫁然嫁過畢矣畢猶已言過於嫁已矣今先生設為不宦訾養千鍾訾資同所資所養也昭三年注四豆為區自四以登至於釡十則鍾又㮚氏注四升為豆則鍾凡六斛四斗也徒百人徒從車者不宦則然矣而富過畢矣田子辭謝之也管燕齊人得罪齊王謂其左右曰子孰而與我赴諸侯乎而辭也左右黙然莫對管燕連然流涕連與漣同泣下也曰悲夫士何其易得而難用也田需對曰士三食不得饜飽也而君鵞鶩有餘食鶩舒鳧下宫糅羅紈下宫後宫下列糅雜紈素也曵綺縠綺文繒而士不得以為縁縁衣純且財者君之所輕死者士之所重君不肯以所輕與士而責士以所重事君非士易得而難用也閔王宣王子元年顯王四十六年戊戌昭陽為楚伐魏覆軍殺將得八城楚懐六年此元年移兵而攻齊陳軫為齊王衍使字史言軫為秦使齊齊王問之為齊見陽見昭陽再拜賀戰勝起而問楚之法覆軍殺將其官爵何也昭陽曰官為上柱國爵為上執珪陳軫曰異貴於此者何也問此外復有貴者否曰唯令尹耳楚相也陳軫曰令尹貴矣主非置兩令尹也臣竊為公譬可也楚有祠者祠春祭賜其舍人始皇紀注主廐内小史或曰侍從賔客者巵酒巵器也舍人相謂曰數人飲之不足一人飲之有餘請畫地為虵先成者飲酒一人虵先成引酒且飲乃左手持巵右手畫虵曰吾能為之足未成一人之虵成奪其巵曰虵固無足子安能為之足遂飲其酒為虵足者終亡其酒今君相楚而攻魏破軍殺將得八城不弱兵言恃其强欲攻齊齊畏公甚公以是為名亦元作居足矣官之上非可重也戰無不勝而不知止者身且死爵且後歸言身死後爵歸於國故史言爵奪猶為虵足也昭陽以為然解軍而去楚記同彪謂此䇿雖其指為齊亦持勝之善秦攻趙趙令樓緩以五城求講於秦而與之伐齊齊王恐因使人以十城求講於秦樓子恐因以上黨二十四縣許秦王恵文趙足凡趙皆趙人之齊謂齊王曰王欲秦趙之解乎不如從合於趙趙必背秦背秦則齊無患矣齊將封田嬰於薛定封在此三年楚王懐聞之大怒將伐齊齊王有輟志集韻輟止也公孫閈曰封之成與不非在齊也又將在楚閈説楚王令其欲封公也又甚於齊嬰子曰願委之於子公孫閈為謂楚王曰魯宋事楚而齊不事者齊大而魯宋小王獨利魯宋之小不惡齊大何也夫齊之削地而封田嬰是其所以弱也願勿止楚王曰善因不止彪謂此説不可行也嬰齊相也雖得薛不决裂於外猶齊地耳齊薛為一如穰侯應侯之於秦也何弱小乎其初哉靖郭君田嬰謚將城薛客多以諫靖郭君謂謁者無為客通齊人有請者曰臣請三言而已矣益一言臣請烹所謂鼎鑊之誅靖郭君因見之客趨而進曰海大魚因反走君曰客有於此言此言外應復有客曰鄙臣不敢以死為戯君曰亡亡無同言無此也更言之對曰君不聞大魚乎網不能止鈎不能牽蕩而失水集韻蕩放也言自放肆則螻蟻得意焉螻螻蛄一曰慤天螻得意飫飽也今夫齊亦君之水也君長齊雄長之長奚以薛為夫齊雖隆薛之城到於天猶之無益也君曰善乃輟城薛靖郭君謂齊王曰五官之計曲禮司徒司空司馬司士司冦典司五衆計其事之凡也不可不日聴也而數覽王曰説吾而厭之言汝既説我則不得自厭故以委之今與靖郭君以五官之計委之靖郭君善齊貎辨齊人齊貎辨之為人也多疵疵病也謂過失門人弗説士尉齊人以証靖郭君証諌也靖郭君不聴士尉辭而去孟嘗君嬰子文又竊以諌竊猶私靖郭君大怒曰剗而𩔖集韻剗翦也以翦草為喻而汝也𩔖族𩔖破吾家茍可慊齊貎辨者集韻慊愜也吾無辭為之言有可滿貎辨之意雖家族破㓕猶為之不辭也於是舍之上舍猶甲第令長子御之集韻御侍也旦暮進食數年宣元作威下同王薨閔元作宣下同王立嬰之封薛在閔王初下言之薛則此不得言宣王立也靖郭君之交大不善於閔王辭而之薛與齊貎辨俱留無幾何齊貎辨辭而行請見閔王靖郭君曰王之不説嬰甚公往必得死焉齊貎辨曰固不求生也請必行靖郭君不能止齊貎辨行至齊閔王聞之藏怒以待之齊貎辨見閔王曰子元作子曰靖郭君之所聴愛夫愛而聴用其言齊貎辨曰愛則有之聴則無有王之方為太子之時辨謂靖郭君曰太子相不仁過頤豕視過謂豐頥過人豕多反視若是者信反始信後反不若廢太子更立衞姬嬰兒郊師靖郭君泣而曰不可吾不忍也若聴辨而為之必無今日之患也此為一至於薛昭陽請以數倍之地易薛辨又曰必聴之靖郭君曰受薛於先王封嬰於薛閔王也而曰受於先王盖宣王有㫖封之雖惡於後王吾獨謂先王何言無以告於先王且先王之廟在薛吾豈可以先王之廟與楚乎又不肯聴辨此為二閔王太息長出氣也動於顔色曰靖郭君之於寡人一至此乎寡人少殊不知此客肯為寡人來靖郭君乎齊貎辨對曰敬諾靖郭君衣宣王之衣冠舞其劒先時所賜閔王自迎靖郭君於郊望之而泣靖郭君至因請相之靖郭君辭不得已而受之七日謝病强辭强固辭不得三日而聴王聴其辭當是時靖郭君可謂能自知人矣能自知人故人非之不為沮集韻沮止也此齊貎辨之所以外生以生為外物無所愛也樂患趣難者也彪謂知人之難貴於知其心齊人曰辨之為人多疵論其迹也靖郭君獨深善之不可奪知其心也士為知己者死此辨所以不求生與秦伐魏陳軫合三晉而東謂齊王曰古之王者之伐也欲以正天下而立功名以為後世也今齊楚燕趙韓梁六國之遞甚也遞言其更相伐不足以立功名適足以强秦而自弱也非山東之上計也能危山東者强秦也不憂强秦而遞相罷弱罷疲同而兩歸其國於秦兩彼我也此臣之所以為山東之患天下為秦相割以割肉喻其相伐秦曽不出力天下為秦相烹煮也秦曾不出薪喻秦無所事何秦之智而山東之愚耶願大王之察也古之五帝三王五霸之伐也伐不道者今秦之伐天下不然必欲反之反古主必死辱死於辱民必死虜今韓梁之目未嘗乾戰死者多也而齊民獨不也非齊親而韓梁疏也齊逺秦而韓梁近今齊將近矣今秦欲攻梁絳安邑絳屬河東秦得絳安邑以東下河必表裏河山補而東攻齊舉齊屬之海舉言得其地南面而孤楚韓梁三國在秦之南孤謂稱孤以臣之北向而孤燕趙絶句齊無所出其計矣願王熟慮之今三晉已合矣復為兄弟約而出銳師以戌梁絳安邑此萬世之計也齊非急以銳師合三晉必有後憂三晉合秦必不敢攻梁必南攻楚楚秦構難三晉怒齊不與已也必東攻齊此臣之所謂齊必有大憂不如急以兵合於三晉齊王敬諾果以兵合於三晉秦恵後七年韓趙魏燕齊共攻秦此六年韓齊為與國張儀以秦魏伐韓儀復相時齊王曰韓吾與國也秦伐之吾將救之田臣思曰王之謀過矣不如聴之子噲燕王與子之國之燕相百姓不戴諸侯弗與秦伐韓楚趙必救之是天下以燕賜我也我我齊王曰善乃許韓使者而還之韓自以得交於齊遂與秦戰楚趙果遽起兵而救韓齊因起兵攻燕三十日而舉燕國燕噲七年此十年張儀為秦連横儀𫝊連横在鄭袖出儀後説楚説韓齊趙卒説燕歸報而恵王死則此當秦十四年此十三年説補齊王曰天下强國無過齊者大臣父兄殷衆富樂無過齊者然而為大王計者皆為一時説而不顧萬世之利從人説大王者必謂齊西有强趙南有韓魏負海之國也地廣人衆兵强士勇雖有百秦將無奈我何大王覽其説而不察其至實夫從人朋黨比周比相親周相芘也與論語意異莫不以從為可臣聞之齊與魯三戰而魯三勝國以危亡隨其後魯戰勝齊史傳不書時魯故在有無形耳雖有勝名而有亡之實是何故也齊大而魯小今趙之與秦也猶齊之於魯也秦趙戰於河漳之上史不書説文濁漳出上黨長子鹿谷山東入清漳清漳出沾山大黽谷入河南漳出南郡再戰而再勝絶句秦戰於畨吾之下不書蘇秦𫝊注常山有蒲吾再戰而再勝秦四戰之後趙亡卒數十萬邯鄲僅存雖有勝秦之名而國破矣是何故也秦强而趙弱也今秦楚嫁子取婦為昆弟之國儀説懐王亦云然韓獻冝陽魏效河外趙入朝黽池屬𢎞農割河間以事秦據此則説趙當在齊前大王不事秦秦驅韓魏攻齊之南地悉趙渉河闗悉悉起其兵河闗屬金城之作清河是也指博闗蘇秦傳注齊威六年晉伐齊至博陵東郡有博平以為博闗今按泰山有博亦近齊也臨菑即墨屬膠東國非王之有也國一日被攻雖欲事秦不可得也是故願大王熟計之齊王曰齊僻陋隐居託於東海之上未嘗聞社稷之長利今大客禮大行人掌大客之儀幸而教之請奉社稷以事秦獻魚鹽之地三百於秦三百里也張儀事秦恵王恵王死武王立左右惡張儀曰儀事先王不忠言未巳齊讓又至儀嘗曰儀之所甚憎無大齊王則儀齊所惡也而秦任之故齊以此貴秦張儀謂武王曰儀有愚計願効之王王曰奈何曰為社稷計者東方有大變言有兵然後王可以多割地割諸侯地今齊王甚憎衍張字儀儀之所在必舉兵伐之故儀願乞不肖身而之梁齊必舉兵伐之齊梁之兵連於城下連謂不解不能相去王以其間伐韓入三川出兵函谷而無伐以臨周祭器必出周有先周宗社禮器諸侯所不備今必出以賂秦挾天子按圖籍此王業也王曰善乃具革車三十乘納之梁齊果舉兵伐之梁王大恐張儀曰王勿患請令罷齊兵乃使其舍人馮喜之楚藉使之齊齊楚之事已畢事使事因謂齊王王甚憎張儀雖然厚矣王之託儀於秦王也齊王曰寡人甚憎張儀儀之所在必舉兵伐之何以託儀也對曰是乃王之託儀也儀之出秦因與秦王約曰為王計者東方有大變然後王可以多割地齊王甚憎儀儀之所在必舉兵伐之故儀願乞不肖身而之梁齊必舉兵伐梁梁齊之兵連於城下不能去王以其間伐韓入三川出兵函谷而無伐以臨周祭器必出挾天子按圖籍是王業也秦王以為然與革車三十乗而納儀於梁而果伐之是王内自罷音疲勞師故而伐與國廣鄰敵以自臨而信儀於秦王也此臣之所謂託儀也王曰善乃止儀𫝊有彪謂此計之必售䇿之必行者也儀之所謨於時有妾婦之所羞市人之所不為者若譽南后以取金欺商於以賣楚皆可鄙也唯此為文無害儀亦明年死矣宜其言之善與犀首以梁與齊戰於承匡本宋地見陳留襄邑注而不勝張儀謂梁王哀不用臣言以危國梁王因相儀魏九年此十四年儀以秦梁之齊合横親犀首欲敗敗其横事謂衞君嗣君曰時儀過衛衍非有怨於儀值所以為國者不同耳值適當也君必解衍解説衍於儀使之釋怨衞君為告儀儀許諾因與之參坐於衞君之前三人合坐犀首跪行為儀千金之祝明日張子行犀首送之至於齊疆齊王聞之怒於儀曰衍也吾讎衍嘗與齊戰故而儀與之俱是必與儀鬻吾國矣遂不聴彪謂此一時岌乎殆哉一言一動盡為機穽豈可與同羣哉此在衍術中而不悟是以知儀之踈也故其智暗於秦其辯屈於軫而此謀敗於衍也楚王死懐王太子在齊質楚二十九年使太子質於齊名横是為頃襄王按史楚三十年懐王入秦秦留之明年頃襄王立立三年懐王乃死與此駮蘇子元作秦下並同秦死至是二十年矣此非代則厲也謂薛公田文曰君何不留楚太子以市其下東國楚䇿云與我東地盖楚國之東其地近齊楚地髙而此下薛公曰不可我留太子郢中立王然則是我抱空質而行不義於天下也蘇子曰不然郢中立王君因謂其新王曰與我下東國吾為王殺太子不然吾將與三國共立之齊嘗與秦韓魏敗楚三國謂此重立然則下東國必可得也蘇子之事此著書者叙説可以請行可以令楚王並新王亟入下東國可以益割於楚可以忠太子而使楚益入地可以為楚王走太子可以忠太子使之亟去可以惡蘇子於薛公可以為蘇子請封於楚可以使人説薛公以善蘇子可以使蘇子此二子字因舊自解於薛公蘇子謂薛公曰臣聞謀泄者事無功計不决者名不成今君留楚補太子者以市下東國也非亟得下東國者則楚之計變變則是君抱空質而負名於天下也負荷不義之名薛公曰善為之奈何對曰臣請為君之楚使亟入下東國之地楚得成得猶與也齊求地而楚與之為得成則君無敗矣薛公曰善因遣之故曰可以請行也此七字元作注字此𩔖亦著書者叙説謂楚王以為懐王則上言已死以為頃襄則頃襄即太子也以為新襄王則頃襄外無它王未詳曰齊欲奉太子而立之臣觀薛公之留太子者以市下東國也今王不亟入下東國則太子且倍王之割倍多於前而使齊奉已楚王曰謹受命因獻下東國故曰可以使楚亟入地也謂薛公曰楚之勢可多割也薛公曰奈何請吿太子其故請告蘇子辭也告以楚獻地之故使太子謁之君君薛公也使太子白以亦欲割地以忠太子使楚王聞之可以益入地故曰可以益割於楚謂太子曰齊奉太子而立之楚王請割地以留太子齊少其地太子何不倍楚之割地而資齊齊必奉太子太子曰善倍楚之割而延齊延長行也故有饒益意楚王聞之恐益割地而獻之尚恐事不成故曰可以使楚益入地也謂楚王曰齊之所以敢多割地者挾太子也今已得地而求不止者以太子權王也權者輕重所在故臣能去太子使人去齊太子去齊無辭必不倍於王也多割王因馳强齊而為交馳亟往齊辭齊之説必聴王然則是王去讎而得齊交也楚王大説曰請以國因因蘇子交齊故曰可以為楚王使太子亟去也謂太子曰夫剬楚者王也剬斷齊也猶制以空名市者太子也齊未必信太子之言也而楚功見矣功謂入地楚交成太子必危矣太子其圖之太子曰謹受命乃約車而暮去故曰可以使太子急去也蘇子使人請薛公曰夫勸留太子者蘇子也蘇子非誠以為君也且以便楚也太子去楚之便也蘇子恐君之知之故多割楚以㓕迹也没其使楚之迹今勸太子去𥙷者又蘇子也而君弗知也臣竊為君疑之薛公大怒於蘇子故曰可以使人惡蘇子於薛公也又使人謂楚王曰夫使薛公留太子者蘇子也奉王而代立楚太子者代太子立為王又蘇子也割地因約者因為之約齊又蘇子也忠王而走太子者又蘇子也今人惡蘇子於薛公之以其為齊薄而為楚厚也願王之知之楚王曰謹受命因封蘇子為武貞君封以美名非邑故曰可以為蘇子請封於楚也又使景鯉請薛公曰君之所以重於天下者以能得天下之士而有齊權也今蘇子天下之辯士也世與少有言如之者少君因不善蘇子則是圍塞天下士而不利說途也夫不善君者且奉蘇子而於君之事殆矣於猶與今蘇子善於楚王而君不蚤親則是與楚為讎也此亦非薛公之恐楚王立未能自定安能難齊哉故彪於楚䇿謂蘇子以此䇿干薛公不見用世猶載其語也故君不如因而親之貴而重之是君有楚也薛公因善蘇子故曰可以為蘇子說薛公以善蘇子按此則懐王死楚立新王太子卒不得立而頃襄非太子也史不謂然故其書東國之事亦略齊王夫人死有七孺子皆近言其親幸薛公欲知王所欲立乃獻七珥瑱也所以充耳美其一明日視美珥所在勸王立為夫人孟嘗君將入秦𫝊言秦昭王聞其賢求見之故將入止者千數而弗聴蘇代元作秦今並從𫝊欲止之孟嘗君曰人事者吾已盡知之矣吾所未聞者獨鬼事耳蘇代曰臣之來也固不敢言人事也固且以鬼事見君孟嘗君見之謂孟嘗君曰今者臣來過於淄上淄水出泰山萊蕪原有土偶人偶相人也比土為之與桃梗集韻梗略也荒也此蓋枯木海外經東海中有山名度索有大桃樹屈蟠三千里枝間東北曰鬼門萬鬼所由往來上有二神人曰荼與鬱雷主治害鬼故使世人刻桃畫其首正嵗置門上辟鬼相與語桃梗謂土偶人曰子西岸之土也挺子以為人挺拔也拔於土中至嵗八月降雨下降大雨自上下也異於飄洒淄水至則汝殘矣殘敗壊也土偶曰不然吾西岸之土也土則復西岸耳今子東國之桃梗也刻削子以為人降雨下淄水至流子而去則子漂漂者將如何耳如往也不知其所在今秦四塞之國譬若虎口而君入之則臣不知君所出矣孟嘗君乃止𫝊有孟嘗君在薛史言文代立在薛時未相也荆人攻之淳于髠為齊使於荆還反過薛孟嘗君補令人體貌有禮容也而郊迎之謂淳于髠曰荆人攻薛夫子弗憂文無以復侍矣言且死淳于髠曰敬聞命至於齊畢報以使事悉報齊王王曰何見於荆對曰荆甚固言其不通而薛亦不量其力王曰何謂也對曰薛不量其力而為先王立清廟詩注祭有清徳之宫荆固而攻之清廟必危故曰薛不量力而荆亦甚固齊王和其顔色曰譆集韻痛也先君之廟在焉疾興兵救之顛蹶之請此著書者詞也言善說者不勞而功顛倒蹶僵也言其請救之遽望拜之謁望而拜之言謁之恭雖得則薄矣言他人請謁雖有得不如髠之厚善說者陳其勢言其方方大略也人之急也言應之疾若自在隘窘之中隘險也豈用彊力哉孟嘗君奉夏侯章齊人以四馬百人之食言饗之厚遇之甚懽夏侯章每言未嘗不毁之也或以告孟嘗君孟嘗君曰文有以事夏侯公矣勿言言事之厚彼不我害董之蘩菁齊人以問夏侯公夏侯公曰孟嘗君重非諸侯也而奉我四馬百人之食我無分寸之功而得此然吾毁之以為之也君所以得為長者賢有容之稱髙祖曰為其母不長者以吾毁之也吾以身為孟嘗君豈得待元作持言也彪謂君子所以報知我者亦多術矣豈必毁之而後為為之哉此其說有似侯嬴而不及嬴非正議也孟嘗君讌坐讌合語也謂三先生曰願聞先生有以補文闕者也一人曰訾天下之主訾不稱意也言孟嘗有不得意於諸侯者有侵君者侵陵之侵臣請以臣之血湔其衽湔濺同集韻水激也田瞀曰車軼之所能至軼轍也請掩足下之短衍者字誦足下之長千乗之君與萬乗之相其欲有君也有言欲得之如使而弗及也若有使之如恐弗及滕元作勝臀元作字書無之亦可作股齊人曰臣願以足下之府庫財物收天下之士能為君決疑應卒與猝同若魏文侯之有田子方段干木也二人文侯師友此臣之所為君取矣求以此為孟嘗所取孟嘗君舍人有與君之夫人相愛者夫人姬媵之通稱非其配也與下十妃同或以問孟嘗君曰為君舍人而内與夫人相愛者亦甚不義矣君其殺之君曰睹貌而相說者人之情也其錯之錯措同也勿言也居朞年君召愛夫人者而謂之曰子與文游久矣大官未可得小官公又弗欲衛君嗣君與文布衣交言交於未貴時請具車馬皮幣皮羔狐之屬宗伯孤執皮帛願君以此從衛君遊舍人補三字遊於衛甚重衛之交惡衛君甚欲約天下之兵以攻齊是人謂君曰孟嘗君不知臣不肖以臣欺君欺者已不肖而孟嘗言其賢也且臣聞齊衛先君刑馬壓羊殺馬歃其血又壓羊殺之以盟使諭者如此盟曰齊衛後世無相攻伐有相攻伐者令其命如此令君約天下之兵以攻齊是足下背先君盟約而欺孟嘗君也願君勿以齊為心君聴臣則可不聴臣若臣不肖也言或以此人為不肖輒以頸血湔足下衿交袵也衛君乃止齊人聞之曰孟嘗君可語言可與語善為事矣轉禍為功彪謂周衰禮義消亡以若孟嘗者為能愛士愛則愛矣然非禮之愛也以若舍人者為能强争强則强矣然亦非義之强也孟嘗君有舍人而弗說欲逐之魯連齊人仲連謂孟嘗君曰猿獮猴錯木言自置木上據水則不若魚鼈據猶處下衍處字歴險乗危則騏驥不如狐狸曹沬衍之字奮三尺之劒一軍不能當魯記莊公與齊桓公㑹柯沬執七首刼桓公歸魯侵地使曹沬釋其三尺之劒而操銚耨與農人居壠畆之中隴田埒則不若農夫故物捨其所長之其所短之猶於堯亦有所不及矣今使人而不能則謂之不肖教人而不能則謂之拙拙則罷之不肖則棄之使人有棄逐不相與處言黨友以此士見棄逐不屑與處而來害相報者棄逐者必之他國自彼來而害我報其棄逐之怨豈非世之立教首也哉言後人視此為戒孟嘗君曰善乃弗逐彪謂仲連立言士也言必有中孟嘗君出行國按行之行兼相他國故至楚獻象牀象齒為牀郢之登徒楚官也好色賦登徒子注以為姓非直使送之直猶當不欲行見孟嘗君門人公孫戌曰臣郢之登徒也直送象牀象牀之直千金傷此若髮漂漂飄同言其細若飛髮賣妻子不足償之足下能使僕無行先人有寳劒願得獻之公孫戌補曰諾入見孟嘗君曰君豈受楚象牀哉孟嘗君曰然公孫戌曰臣願君勿受孟嘗君曰何哉公孫戌曰小國所以皆致相印於君者聞君於齊能振達貧窮有存亡繼絶之義小國英桀之士才出萬人曰英千人曰桀皆以國事累君累猶諉諉之以事所以累之說君之義慕君之廉也今君到楚而受象牀所未至之國將何以待君臣戍願君勿受孟嘗君曰諾公孫戌趨而去未出至中閨特立之户上圜下方君召而返之曰子教文無受象牀甚善今何舉足之髙志之揚也公孫戌曰臣有大喜三重之寳劔一重言三喜外復有此孟嘗君曰何謂也公孫戌曰門下百數莫敢入諫臣獨入諫臣一喜諫而得聽臣二喜諫而止君之過臣三喜輸象牀輸亦送也郢之登徒不欲行許戌以先人之寶劒孟嘗君曰善受之乎公孫戌曰未敢曰急受之因書門版曰有能揚文之名止文之過私得寶於外者疾入諫彪謂孟嘗君於是能立徳矣吾知欲止吾過而已彼得寶於我庸何傷且諫者士之所難因得寳而摧折之後孰敢輕以過聞乎吾哉齊人有馮煖史作驩並況袁切者貧乏不能自存使人屬孟嘗君屬囑同願寄食門下孟嘗君曰客何好曰客無好也曰客何能曰客無能也孟嘗君笑而受之曰諾左右以君賤之也食以草具草不精也具饌具居有頃倚柱彈其劒歌曰長鋏歸來乎鋏劒把也欲與劒俱去食無魚左右以告孟嘗君曰食之比門下之客居有頃復彈其鋏歌曰長鋏歸來乎出無車左右皆笑之以告孟嘗君曰為之駕比門下之車客乗車之客於是乗其車揭其劒集韻揭舉也檐也過其友曰孟嘗君客我待我以客後有頃復彈其劒鋏歌曰長鋏歸來乎無以為家左右皆惡之以為貪而不知足孟嘗君問馮公有親乎對曰有老母孟嘗君使人給其食用無使乏於是馮煖不復歌後孟嘗君出記記疏也問門下諸客誰習計㑹計㑹㑹總合也能為文收責於薛者乎責債同集韻逋財也馮煖署曰能署書也孟嘗君怪之曰此誰也左右曰乃歌夫長鋏歸來者也孟嘗君笑曰客果有能也言果則孟嘗固意其能也吾負之未嘗見也請而見之謝曰文倦於是是謂國事憒於憂憒潰同憒亂也以憂思昏亂而性懧愚懧當作儜集韻弱也沈於國家之事開罪於先生得罪於煖自我啟之先生不羞乃有意欲為收責於薛乎馮煖曰願之於是約車治裝載券契而行券亦契契别書之以刀判其旁辭曰責畢收以何市而反孟嘗君曰視吾家所寡有者驅而之薛使吏召諸民當償者悉來合券券徧合赴凡券取者與者各收一責則合驗之徧合矣乃來聴命矯命汲黯𫝊注矯託也託言孟嘗之命以責賜諸民因燒其券民稱萬嵗祝孟嘗也長驅到齊行不留也晨而求見孟嘗君怪其疾也衣冠而見之曰責畢收乎來何疾也曰收畢矣以何市而反孟嘗問也馮煖曰君云視吾家所寡有者臣竊計君宫中積珍寶狗馬實外廏美人充下陳陳猶列君家所寡有者以義耳竊以為君市義孟嘗君曰市義奈何曰今君有區區之薛不拊愛子其民拊循猶摩也因而賈利之臣竊矯君命以責賜諸民因燒其券民稱萬嵗乃臣所以為君市義也孟嘗君不說曰諾先生休矣休息也後朞年齊王謂孟嘗君曰寡人不敢以先王之臣為臣孟嘗君就國於薛未至百里民扶老攜幼迎君道中終元作正日孟嘗君顧謂馮煖先生所為文市義者乃今日見之馮煖曰狡兔有三窟僅元作今得免其死耳今有一窟未得髙枕而卧也請為君復鑿二窟孟嘗君予車五十乗金五百斤西遊於梁謂梁元作恵王昭曰齊放其大臣孟嘗君此非當時所稱追書云爾於諸侯諸侯先迎之者富而兵强於是梁王虛上位以故相為上將軍遣使者黄金千斤車百乗往聘孟嘗君馮煖先驅誡孟嘗君曰千金重幣也百乗顯使也齊其聞之矣梁使三反孟嘗君固辭不往也齊王聞之君臣恐懼遣太傅本周官此齊大臣也齎黄金千斤文車二四文馬彩繪也服劒一王所自佩者封書一謝孟嘗君曰寡人不祥被於宗廟之祟沈於諂諛之臣開罪於君寡人不足為也願君顧先王之宗廟姑反國統萬人乎集韻統攝理也馮煖誡孟嘗君曰願請先王之祭器立宗廟於薛前自靖郭時既立廟矣今又請立則所謂宗廟非一王也廟成還報孟嘗君曰三窟已就君姑髙枕為樂矣孟嘗君為相數十年無纎介之禍者介獨也獨則不衆故為微細之詞一說喻草芥也馮煖之計也孟嘗傳有彪謂能者客之人孰不能客無能者孟嘗於是為不可幾也煖之市義賢矣而為之營窟則亦聲利之客耳嗟乎氣俗之移人莫覺寤也以煖之賢而不能自擢於衆況不賢者乎孟嘗君逐於齊而復反此三十年孟嘗奔薛此言復反傳言王召之因謝病老於薛與此駮譚拾子齊人迎之於境謂孟嘗君曰君得無有所怨於齊士大夫孟嘗君曰有君滿意殺之乎拾子借以殺之為愜乎孟嘗君曰然譚拾子曰事有必至理有固然君知之乎孟嘗君曰不知譚拾子曰事之必至者死也理之固然者富貴則就之貧賤則去之此事之必至理之固然者請以市諭市朝則滿夕則虚非朝愛市而夕憎之也求存故往所求者存故往趨之亡故去願君勿怨孟嘗君乃取所怨五百牒牒札也書所怨人削去之不敢以為言馮驩𫝊略同以此䇿及驩𫝊考之蓋反而後謝病也蘇子元作秦史作代是自燕之齊此三十六年見於章華南門史作東門注齊都賦注少城北門不知是一門非也齊王曰嘻集韻有所多大之聲子之來也秦使魏冉致帝致帝號於齊子以為何如對曰王之問臣也卒與猝同而患之所從往者微患在後故言從往與從來異也今未著故言微今不聽是恨秦也違秦秦恨之聽之是恨天下也不如聽之以為元作卒秦為猶善勿庸稱也庸用也以為天下秦稱之天下聽之王亦稱之先後之事帝名為無傷也雖稱有先後無害於帝秦稱之而天下不聽王因勿稱衍具字於以收天下此大資也齊記三十六年有彪謂此䇿自為智則明為人謀則忠蘇張之巨擘也蘇子元作秦謂齊王曰齊秦立為兩帝王以天下為尊秦乎且尊齊乎王曰尊秦釋帝蘇子問則天下愛齊乎且愛秦乎王曰愛齊而憎秦兩帝立亦問辭約伐趙孰與伐宋之利也對曰伐宋利補此五字對曰夫約然然其伐宋之約與秦為帝而天下獨尊秦而輕齊齊釋帝則天下愛齊而憎秦伐趙不如伐宋之利故臣願王明釋帝以就天下倍約儐秦倍背同儐擯同集韻棄也勿使争重而王以其間舉宋夫有宋則衛之陽城危汝南潁川皆有有淮北淮水之北淮出平氏桐栢則楚之東國危有濟西莊十八注濟水之西則趙之河東危趙河之東非郡也有隂平陸隂屬南陽後志東平國東平陸則梁門不啓大梁之門故釋帝而貳之以伐宋之事貳不與秦合也秦約伐趙而此伐宋則國重而名尊燕楚以刑服刑猶威也言畏威而服天下不敢不聽此湯武之舉也敬秦以為名非實敬之而後使天下憎之此所謂以卑易尊者也願王之熟慮之也齊記與上為一章今詳上章猶欲聴秦此章決欲儐之非一日之談為二章可也蘇子元作秦說齊閔王曰臣聞用兵而喜先天下者憂為天下先約結而喜主怨者孤為約以結與國而伐人人必怨之又為之主衆所不與也故孤夫後起者藉也藉言有所資權是也而逺怨者時也得其時也人怨之則雖欲乗時不能也是以聖人從事必藉於權權者事之宜重之所在也上言後起者藉藉此而已而務興於時夫權藉者萬物之率也率帥同猶長也而時勢者百事之長也故無權藉倍時勢倍背同而能事成者寡矣今雖干將莫邪博物志干將陽龍文莫邪隂漫理此二劒吳王使干將作干將越人莫邪其妻亦善作劒非得人力則不能割劌矣劌利傷也堅箭利金不得弦機之利則不能逺殺矣矢非不銛集韻利也而劒非不利也何則權藉不在焉何以知其然也昔者趙氏襲衛車舍人主車者不休𫝊𫝊驛遞也言其警急衛國城割平言城中割地求成平成也衛八門土以土塞門而守而二門墮矣此亡國之形也衛君跣行告遡於魏遡愬同魏王身被甲底劒底砥同礪也挑趙索戰邯鄲之中騖騖亂馳也河山之間亂衛得是藉也亦收餘甲而北面殘剛平墮中牟之郭中牟屬河南趙獻侯自耿徙此趙記注詳衛非强於趙也譬之衛矢而魏弦機也藉力魏而有河東之地趙敬侯四年築剛平以侵衛五年齊魏為衛敗趙剛平趙氏懼楚人救趙而伐魏戰於州西州屬河内出梁門軍舍林中魏記注宛有林鄉馬飲於大河趙得是藉也亦襲魏之河北屬河東燒棘蒲元作溝下同敬侯六年借兵楚取魏棘蒲不注宣二年注大棘在陳留襄邑南蒲南蒲蒲坂也謂此墜黄城八年拔魏黄城陳留外黄是故剛平之殘也中牟之墮也黄城之墜也棘蒲之燒也此皆非趙魏之欲也然二國勸行之者何也衛明於時權之藉也今世之為國者不然矣兵弱而好敵强國罷而好衆怨罷疲同音下同樂與衆為怨事敗而好鞠之鞠窮也言遂事兵弱而憎下人衍也字地狹而好敵大事敗而好長詐長益之行此六者而求霸則逺矣臣聞善為國者順民之意而料兵之能然後從於天下從謂後之故約不為人主怨伐不為人挫强不以兵為人挫强敵如此則兵不費權不輕地可廣欲可成也昔者齊之與韓魏伐衍秦字楚也戰非甚疾也分地又非多韓魏也言得地等耳然而天下獨歸咎於齊者何也以其為韓魏主怨也是楚懐二十六年此二十一年且天下徧用兵矣齊燕戰而趙氏兼中山秦楚戰韓魏不休而宋越専用其兵未詳此十國者皆以相敵為意而獨舉心於齊者何也約而好主怨伐而好挫强也且夫强大之禍常以王人為意也欲為人王夫弱小之殃常以謀人為利也是以大國危小國滅也大國之計莫若後起而重伐不義不義雖可伐亦不可輕夫後起之藉與多而兵勁人與之多則是元作事以衆强敵元作適罷寡也兵必立也事不塞天下之心則利必附矣大國行此則名號不攘而至攘猶取覇王不為而立矣小國之情莫如謹元作僅下同静而寡信諸侯信猶恃也莒蔡是矣謹静則四鄰不反寡信諸侯則天下不賣外不賣内不反則稸積元作檳禍朽腐而不用幣帛矯蠹矯揉箭箝也故有變意此言變其初也蠹猶蝕小國道此道猶行則不祠而福矣不貸而見足矣貸音貣從人求物也故曰祖仁者王立義者霸用兵窮者亡何以知其然也昔吳王夫差以强大為天下先衍强字襲郢而棲越身從諸侯之君諸侯從之而卒身死國亡為天下戮者何也此夫差平居而謀王强大而喜先天下之禍也昔者萊莒好謀東萊故萊子國陳蔡好詐莒恃越而滅莒蔡皆恃逺忽近故亡蔡恃晉而亡此皆内長詐外信諸侯之殃也由此觀之則强弱大小之禍可見於前事矣語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之夫駑馬女子筋力骨勁非賢於騏驥孟賁也何則後起之藉也今天下之相與也不並滅與猶恃也言與國之相恃亦不皆亡在所處耳有能元作而案兵而後起寄怨而誅不直寄言假手於人不為主也微用兵而寄於義猶假也則亡天下可跼足而須也跼不伸也明於諸侯之故察於地形之理者不約親不相質而固質質子不趨而疾衆事而不反衆事猶共事交割而不相憎交言彼此割地俱强而加以親何則形同憂而兵趨利也何以知其然也昔者燕齊戰於桓之曲家語所謂桓山葢在齊魯之間燕不勝十萬之衆盡胡人襲燕樓煩數縣樓煩屬雁門取其牛馬此葢之噲敗時夫胡之與齊非素親也而用兵又非約質而謀燕也然而甚於相趨者何也衍何字則形同憂而兵趨利也由此觀之約於同形則利長後起則諸侯可趨役也可使趨我而為我役故明主察相相之明察者誠欲以霸王衍也字為志則戰攻非所先戰者國之殘也有害於國而都縣之費也隠元年注邑有宗廟之主曰都周制二千五百家為縣殘費已先而能從諸侯者寡矣彼戰者之為殘也士聞戰則輸私財而富軍市士衆所聚有市井焉輸飲食而待死士令折轅而炊之轅輈也殺牛而觴士觶實曰觴葢以飲之則是路君之道也路疑作露言國中所有悉出於外又疑作路窘言財用窘於道路中人禱祀國中之人為行者祈君翳釀翳華葢也故有隠義言釀於中以待飲至通都小縣置社戮不用命者有市之邑莫不正事而奉王事謂則賦驚備之事則此虛中之計也夫戰之明日尸死扶傷尸未殮也雖若有功也軍出費中哭泣則傷主心矣死者破家而葬夷傷者空財而共藥夷亦傷共供同完者内酺而華樂酺大飲也華猶奢故其費與死傷者鈞與均同故民之所費也十年之田而不償也軍之所出矛㦸折矛酋矛也兵車所建鐶鉉絶鐶刀鐶傷弩破車罷馬亡矢之太半甲兵之具宫之所私出也宫如父子異宫之宫故者寓兵於農故私家出之士大夫之所匿厮養士之所竊厮析薪養馬者十年之田而不償也天下有此再費者而能從諸侯者寡矣攻城之費百姓理襜蔽襜衣蔽前者襜蔽疊言也言士作苦衣易敝故亟治之舉衝櫓衝陷陣車正作䡴家雜總全家併作身窟穴中謂地道罷於刀金兵器也而士困於土功將不釋甲朞數而能拔城者數數月為亟耳上倦於教士斷於兵斷音短截也故三下城而能勝敵者寡矣故曰彼戰攻者非所先也何以知其然也昔智伯瑤攻范中行氏殺其君滅其國又西圍晉陽吞併二國而憂一主趙襄子此用兵之盛也然而智伯卒身死國亡為天下笑者何謂也兵先戰攻而滅二子之補患也患在滅二子昔者中山悉起而迎燕趙南戰於長子敗趙氏北戰於中山克燕軍殺其將夫中山千乗之國也而攻萬乗之國二再戰比勝比相次此用兵之上節也節猶等然而國遂亡君臣於齊者此二十九年書佐趙滅中山何也不嗇於戰攻之患也嗇吝也由此觀之則戰攻之敗可見於前事矣補今世之所謂善用兵者終戰比勝終謂窮兵而守不可拔守城期於不拔天下稱為善一國得而保之得所稱為善者保恃之則非國之利也臣聞戰大勝者其士多死而兵益弱守而不可拔者其百姓罷而城郭露外無居人故暴露夫士死於外民殘於内而城郭露於境則非王之樂也今夫鵠的的即鵠也所謂侯中非咎罪於人也便弓引弩而射之便謂巧審弓得便巧乃發中者則善人善之不中則愧少長貴賤則同心於貫之者何也惡其示人以難也的以難中人争欲貫之如惡之然人如的者人所惡也今窮戰比勝而守必不拔則是非徒示人以難也又且害人者也然則天下仇之必矣夫罷士露國而多與天下為仇則明君不居也素用强兵而弱之素猶常也言兵常用雖强必弱則察相不事不從事於此彼明君察相者則五兵不動五戎注刃劒矛㦸矢而諸侯從辭讓而重賂至矣故明君之攻戰也甲兵不出於軍而敵國勝衝櫓不施而邊城降士民不知而王業至矣彼明君之從事也用財少曠日逺而利長者曠濶也日雖濶逺其利不窮故曰兵後起則諸侯可趨役也臣之所聞攻戰之道非師者師旅也言不用師雖有百萬之軍北之堂上言謀之於堂彼自敗也雖有闔閭吳起之將闔閭將孫武也此以君臣互言之禽之户内千丈之城拔之尊爼之間爼肉在豆上百尺之衝折之衽席之上鄭𤣥注記衽卧席也故鍾鼓竽瑟之音不絶地可廣而欲可成和樂倡優侏儒之笑倡優倡樂也侏儒短小人不乏諸侯可同日而致也故名配天地不為尊利制海内不為厚言其功徳之崇雖名利若此猶不足稱也故夫善為王業者在勞天下而自逸亂天下而自安諸侯無成謀圖我之謀不成則其國無宿憂也言無一夕之憂何以知其然也𥙷佚治在我勞亂在天下則王之道也銳兵來則拒之患至則趨之趨言往應之使諸侯無成謀則其國無宿憂矣何以知其然也元作矣昔者魏王惠擁土千里帶甲三十六萬恃𥙷其强而拔邯鄲十八年西圍定陽屬上黨又從十二諸侯朝天子以西謀秦秦王恐之此孝公也此史秦人故尊稱之寢不安席食不甘味令於境内盡堞中堞城上女牆為戰具競元作竟為守備為死士置將以待魏氏衛鞅謀於秦王曰夫魏氏其功大而令行於天下有十二諸侯而朝天子其與必衆人與之故以一秦而敵大魏恐不如王何不使臣見魏王則臣請必北魏矣秦王許諾衛鞅見魏王曰大王之功大矣令行於天下矣今大王之所從十二諸侯非宋衛也則鄒魯陳蔡此固大王之所以鞭箠使也箠馬策不足以王天下大王不若北取燕東伐齊則趙必從矣西取秦南伐楚則韓必從矣大王有伐齊楚心而從天下之志使天下從則王業見矣大王不如先行王服王者服飾然後圖齊楚魏王說於魏鞅之言也故身廣公宫制丹衣柱以丹帛為柱衣建九斿旗旒從七星之旟鳥隼為旟又繪星焉此天子之位也而魏王處之於是齊楚怒諸侯奔齊齊人伐魏殺其太子覆其十萬之軍魏王大恐跣行跣足親地也按兵於國而東次於齊過信為次往服齊也然後天下乃舎之當是時秦王垂拱而受西河之外垂衣拱手言無所事西喪地於秦謂此與而不以徳魏王故衍曰字衛鞅之始與秦王計也謀約不下席言於尊爼之間謀成於堂上而魏將已禽於齊矣衝櫓未施而西河之外已𥙷入於秦矣此臣之所謂北之堂上禽將户内拔城於尊爼之間折衝席上者也彪謂此策輾轉皆中事機而不詭於聖雖鍾竽倡樂非所以啓人主者亦孟子色貨之比閔王驕不能聴以及鼓里之禍百世之戒也齊負郭之民負猶背有孤狐咺者正議閔王斮之檀衢斮斬也檀衢葢齊市名百姓不附齊孫室子陳舉公孫家子猶宗室云直言殺之東閭宗室離心司馬穰苴田完之裔為景公將去此時逺甚葢誤其名為政者也殺之大臣不親以故燕舉兵使昌國君樂毅魏樂羊之後將而擊之齊使向子及下達子史不書將而應之後起為應齊軍破向子以輿一乗亡達子收餘卒復振與燕戰求所以賞元作償者閔王不肯與軍破走王奔莒此四十年淖齒數之曰夫千乗青州郡博昌之間屬千乗方數百里雨血霑衣王知之乎王曰不知嬴博之間二縣屬泰山地圻至泉王知之乎王曰不知人有當闕而哭者闕門觀求之則不得去之則聞其聲王知之乎王曰不知淖齒曰天雨血霑衣者天以告也地坼至泉者地以告也人有當闕而哭者人以告也天地人皆以告矣而王不知戒焉何得無誅乎於是殺閔王於鼓里莒中里也太子名法章是為襄王乃解衣免服逃太史之家為溉園溉灌注君王后太史后氏女后姓也以其姓后不可曰后后故曰君王后也知其貴人善事之田單以即墨之城破亡餘卒破燕兵紿騎刼紿欺也刼燕將代樂毅者毅傳言單設詐誑燕軍遂以復齊襄五年遽迎太子於莒立之以為王時立五年矣迎而立之齊耳襄王即位立補君王后以為后生齊王建王孫賈年十五事閔王王出走失王之處其母曰女朝出而晚來則吾倚門而望女暮出而不還則吾倚閭而望女今事王王出走女不知其處女尚何歸責其親王不如我之親女王孫賈乃入市中曰淖齒亂齊國殺衍閔字王欲與我誅者袒右右肩市人從者四百人與之誅淖齒刺而殺之襄王閔王子元年燕攻齊取七十餘城唯莒即墨未下齊田單以即墨破燕殺騎刼初燕將史亦不名攻下聊城屬東郡髙紀注在平原人或讒之燕將懼誅遂保守聊城不敢歸田單攻之嵗餘士卒多死而聊城不下魯連乃為補書約之矢纒束書於矢上以射城中遺燕將曰吾聞之智者不倍時而棄利倍背同勇士不怯死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣惠王非忠也殺身亡聊城而威不信於齊非勇也功廢名滅後世無稱非智也故智者不再計勇士不怯死今死生榮辱尊卑貴賤此其一時也此釋上不再計故史云時不再至願公之詳計而無與俗同也且楚攻南陽史云齊之南陽然則此荆州郡時屬齊魏攻平陸齊無南面之心楚魏在齊之南齊有燕難不急此二縣故不南面與争以為亡南陽之害不若得濟北之利故定計而堅守之今秦人下兵此時齊善秦故下兵救之魏不敢東面不攻齊也横秦之勢合齊善秦為横則楚國之形危且棄南陽斷右瓖謂平陸斷亦棄也存濟北計必為之今楚魏交退言其皆退燕救不至不救聊城齊無天下之規規猶謀也秦救之而楚魏退無謀齊者與聊城共據朞年之敝據相持也即臣見公之不能得也不能勝齊齊必決之於聊城公無再計彼燕國大亂君臣過計過猶失上下迷惑栗腹燕將以十萬之衆五折於外萬乗之國被圍於趙壤削主困為天下戮按燕王喜四年趙孝成十五年亷頗圍破燕殺栗腹在齊襄燕惠聊城事二十八年以為此時則自騎刼敗死外不書它將及趙國也公聞之乎今燕王方寒心獨立大臣不足恃國敝禍多民心無所歸今公又以聊城之民距全齊之兵距拒同捍也朞年不解是墨翟之守也墨子曰公輸般為雲梯將以攻宋墨子聞之見般以帯為城以牒為械般九設機變墨九距之般之械盡墨之守固有餘食人炊骨士無反北之心是孫臏吳起之兵也能已見於天下矣故為公計不如罷兵休士全車甲歸報燕王燕王必喜士民見公如見父母交游攘臂而議於世攘言推臂前也功業可明矣上輔孤主以制羣臣下養百姓以資說士辯說之士資以籍口矯國革俗於天下矯革言變其國俗功名可立也意者亦捐燕棄世捐亦棄東游於齊乎請裂地定封富比陶衛陶穰侯邑衛自梁襄王後稱君世世稱寡與齊久存此亦一計也二者顯名厚實也願公熟計而審處一也且吾聞効小節者不能行大威惡小恥者不能立榮名昔管仲射桓公中鈎簒也遺公子糾遺忘也而不能死怯也束縳桎梏桎足械梏手械辱身也此三行者鄉里不通也世主不臣也使管仲終窮抑抑按也人所按故為困幽囚而不出慙恥而不見窮年沒夀不免為辱人賤行矣然管子并三行之過據齊國之政一匡天下九合諸侯為五霸首名髙天下光照鄰國曹沬為魯君將三戰三北而喪地千里使曹子之足不離陳計不顧後出必死而不生出計所出也則不免為敗軍禽將曹子以敗軍禽將非勇也功廢名滅後世無稱非智也故去三北之恥退而與魯君計也曹子以為遭齊桓公有天下朝諸侯此霸者之事欲興霸則可責以義故沬與魯君計言此曹子以一劒之任刼桓公於壇位之上顔色不變而辭氣不悖三戰之所喪一朝而反之天下震動驚駭威信吳楚𫝊名後世若此二公者非不能行小節死小恥也以為殺身絶世功名不立非智也故去忿恚之心恚恨也而成終身之名除感忿之恥而立累世之功故業與三王争流名與天壤相敝也言天地敝此名乃敝公其圖之燕將曰敬聞命矣因罷兵到韣元作到讀而去韣弓衣倒示無弓故解齊國之圍救百姓之死仲連之說也仲連傳有彪按此書以齊閔為宣王蘇代為蘇秦事時不合如此者甚衆殆為後人𫝊録之謬至於此章引栗腹之事說聊城之將則非後人謬矣葢好事者聞約矢之說惜其書不存擬為之以補亡而其人意氣横溢肆筆而成不暇檢校細處此史及太史公亦愛其千里而略其牝牡驪黄至于今二千嵗莫有知其非者也又按燕昭二十八年書齊之不下者唯聊莒即墨聊即聊城也徐廣注此栗腹事云去長平十年而不論其在聊城事後蘇氏故史亦因之疏矣故備論之燕攻齊齊破閔王奔莒淖齒殺閔王田單守即墨之城破燕兵復齊墟襄王為太子徵徵猶信也太子初易姓名為庸人疑之至是始有狀可信也齊已破燕田單之立疑人疑單也齊國之衆皆以田單為自立也襄王立田單相之過菑水菑淄同有老人涉菑而寒出不能行坐於沙中田單見其寒欲使後車分衣無可以分者單解裘而衣之襄王惡之曰田單之施將欲以取我國乎不早圖之恐後之恐單先發左右顧無人巖下有貫珠者齊人襄王呼而問之曰女聞吾言乎對曰聞之王曰女以為何若對曰王不如因以為已善王嘉單之善下令曰寡人憂民之饑也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單亦憂之稱寡人之意稱猶副單有是善而王嘉之善單之善亦王之善已王曰善乃賜單牛酒嘉其行後數日貫珠者復見王曰王至朝日宜召田單而揖之於庭口勞之乃布令求百姓之饑寒者收穀之穀猶養乃使人聴於閭里聞丈夫之相衍舉字與語曰田單之愛人嗟乃王之教澤也彪謂單之取疑所謂威震主者與襄王亦不明甚矣使單有異志闔城陽而王孰敢不聴豈俟今日哉貫珠者可謂君子人矣為是言也上足以掩王之非下足以救單之死一言而齊國定君子哉貂勃齊人常惡田單曰安平君小人也安平君聞之故為酒而召貂勃曰單何以得罪於先生故常見譽於朝不欲正言其毁貂勃曰跖之狗吠堯跖柳下季之弟盜跖非貴跖而賤堯也狗固吠非其主也且今使公孫子賢而徐子不肖然而使公孫子與徐子鬬徐子之狗猶元作山將攫公孫子之腓而噬之也攫持腓脛腨噬啗也若乃得去不肖者而為賢者狗豈特攫其腓而噬之耳哉安平君曰敬聞命明日任之於王白王使任用之王有所幸臣九人之屬欲傷安平君相與語於王曰燕之伐齊之時楚王頃襄使將軍淖齒也將萬人而佐齊今國已定而社稷已安矣何不使使者謝於楚王王曰左右孰可九人之屬曰貂勃可欲去單之助貂勃使楚楚王受而觴之數日不反九人之屬相與語於王曰夫一人身而牽留萬乗者豈不以據勢也哉言勃據單勢且安平君之與王也君臣無禮而上下無别且其志欲為不善謂反畔内收百姓循撫其心振窮補不足振舉救也布徳於民外懐戎翟天下之賢士懐翟與士隂結諸侯之雄俊豪英諸侯之人其志欲有為也為不善願王之察之異日而王曰召相單来田單免冠徒跣肉袒而進肉袒露肢體示欲受刑退而請死罪五日而王曰子無罪於寡人子為子之臣禮吾為吾之王禮而已矣貂勃從楚來王賜諸前酒酣酣酒樂王曰召相田單而來貂勃避席稽首曰王惡得此亡國之言乎王上者孰與周文王王曰吾不若也貂勃曰然臣固知王不若也下者孰與齊桓公王曰吾不若也然則周文王得吕望以為太公桓公得管夷吾以為仲父今王得安平君而獨曰單且自天地之闢開也民人之治為人臣之功者誰有厚於安平君者哉而王曰單單惡得此亡國之言乎且王不能守乎王之社稷燕人興師而襲齊墟王走而之城陽之山中城陽兖州國莒其縣也安平君以惴惴之即墨惴惴憂懼也三里之城五里之郭敝卒七千禽其司馬主兵之官謂騎刼而反千里之齊安平君之功也當是時也闔城陽而王不通王而自王城陽天下城陽與天下之人莫之能止然而計之於道歸之於義以為不可故為棧道木閣木閣閣道皆以通險而迎王與后於城陽山中元作中山王乃得反子臨百姓今國已定民已安矣王乃曰單單補且嬰兒之計不為此王不亟殺此九子者以謝安平君不然國危矣王乃殺九子而逐其家益封安平君以夜邑萬户夜一作劇屬淄川又東萊有掖有不夜疑夜字為掖不全或不夜省不田單將為大將攻狄狄北胡往見魯仲子連也仲子曰將軍攻狄不能下也田單曰臣以五里之城七里之郭破亡餘卒破萬乗之燕復齊墟攻狄而不下何也上車弗謝而去遂攻狄三月而不克之也齊嬰兒謠曰大冠若箕箕􅉫器修劒拄頤攻狄不能下壘枯丘壘軍壁也言大不能降一壘小不能枯一丘枯言無人物田單乃懼問魯仲子曰先生為單不能下狄請問其說魯仲子曰將軍之在即墨坐而織蕢蕢草器立則杖挿挿鍤同刺土器為士卒倡曰倡導也可往矣宗廟亡矣亡日尚矣尚猶久也言見亡之兆其日已久歸於何黨矣黨猶鄉也言無所歸當此之時將軍有死之心而士卒無生之氣聞若言若如此也莫不揮泣奮臂而欲戰此所以破燕也當今將軍東有夜邑之奉西有菑上之虞黄金横帯而馳乎淄澠之間昭十二年注澠水出臨淄縣入時水有生之樂無死之心所以不勝者也田單曰單有心先生志之矣明日乃厲氣循城厲激昂也立於矢石之所乃援枹鼓之枹擊鼓杖狄人乃下孟嘗君為從文以襄王初中立為諸侯楚頃襄二十三年天下合從此八年公孫𢎞齊人謂孟嘗君曰君不如元作以使人先觀秦王昭意者設疑之辭秦王帝王之主也君恐不得為臣為秦臣奚暇從以難之意者秦王不肖之主也君從以難之未晩孟嘗君曰善願因請公往矣公孫𢎞敬諾以車十乗之秦昭王聞之而欲愧之以辭使𢎞愧公孫𢎞見昭王曰薛公之地大小㡬何公孫𢎞對曰百里昭王笑而曰寡人地數千里猶元作由下同未敢以有難也為人之難今孟嘗君之地方百里而因欲以難寡人猶可乎公孫𢎞對曰孟嘗君好人人賢人大王不好人昭王曰孟嘗君之好人也奚如公孫𢎞曰義不臣乎天子不友乎諸侯得志不慙為人主不得志不肯為人臣如此者三人而治可為管商之師管仲商鞅說義聴行所說有義或能聴而行之能致其主霸王如此者五人萬乗之嚴主也辱其使者退而自刎集韻刎斷也必以其血洿其衣如臣者十人昭王笑而謝之曰客胡為若此寡人直與客論耳寡人善孟嘗君欲客之必諭寡人之志也以己之志曉告孟嘗公孫𢎞曰敬諾公孫𢎞可謂不侵矣著書者美其不可侵辱昭王大國也孟嘗千乗也立千乗之義而不可陵可謂足使矣足猶能彪謂公孫所陳亦士之一槩爾自曹沬刼桓公辯說士莫不以籍口彼葢未學禮也夹谷之會孔子詔之士付之有司耳矣豈厓柴若世之猘狗然哉帝曰曉人不當如是乎此說客之所當知也魯仲連謂孟嘗君曰君好士未補也雍門子補子字此士以所居為稱養椒亦養猶公養之養椒姓亦名雍門子之所養陽得子養此下脫所養人飲食衣裘與之同皆得其死並未詳今君之家富於二公雍門陽得而士未有為君盡游者也游猶友也言不盡於交游之道君曰文不得是二人故也椒亦等使文得二人文豈獨不得盡對曰君之廏馬百乗無不被繡衣而食菽粟者豈有麒麟騄耳哉後宫十妃皆縞紵縞鮮色繒也紵麻屬細者食梁肉梁米名本草注青梁粟𩔖豈有毛廧西施哉色與馬取於今之世士何必待古哉故曰君之好士未也王建襄王子元年年丁酉赧王五十一秦攻趙長平此五年齊楚救之秦計曰齊楚救趙親其交親則將退兵不親則且遂攻之趙無以食請粟於齊而齊不聴蘇子元作秦謂齊王曰不如聴之以却秦兵不聴則秦兵不却是秦之計中而齊楚元作燕之計過矣且趙之於齊楚元作燕齊𨼆蔽也趙居二國西北秦攻二國必先徑趙趙存則二國得以自𨼆而有蔽障猶齒之有脣也脣亡則齒寒今日亡趙則明日及齊楚矣且夫救趙之務務趣也事也宜若奉漏甕沃燋釡喻救之急夫救趙髙義也却秦兵顯名也義救亡趙威却强秦兵不務為此而務愛粟則為國計者過矣齊記有云周子謂最是也此最是三十餘年矣或謂齊王曰周韓西有强秦東北有趙魏秦伐周韓之西趙魏不伐不從秦伐周韓周韓為割割地與趙魏韓却周害也言趙魏徒不伐而不救韓則韓兵必却而周有秦害及韓却周害元作割之後補趙魏亦不免與秦為患矣秦以其不應已又無周韓之捍秦伐必及今齊應補秦伐趙魏則亦不果於趙魏之應秦而伐周韓趙魏近秦其應秦不得不果齊則逺矣應秦必不果也令齊人於秦而伐趙魏令就令也入言應之果趙魏亡之後秦東面而伐齊齊安得救補於天下乎此言趙魏近秦畏之不得不應齊不可以其應而伐之也國子齊大夫曰秦破馬服君之師圍邯鄲齊魏亦佐秦伐邯鄲齊取淄鼠魏取伊氏皆趙地缺公子無忌魏信陵君為天下循便計循行順也殺晉鄙魏將率魏兵以救邯鄲之圍魏安釐二十年使鄙將以救趙畏秦不敢進趙急平原君使責無忌無忌盜鄙兵符伐之將進兵秦軍解去使秦弗有而失天下是齊入於魏而救邯鄲之功也齊與魏親初雖佐奏今魏救趙亦同救也安邑者魏之柱國也言其於國如室有柱晉陽者趙之柱國也鄢郢者楚之柱國也故三國衍欲字與秦瓖界壤土界境也言其地相接秦伐魏取安邑伐趙取晉陽伐楚取鄢郢矣覆元作福三國之軍元作君兼二周之地舉韓氏取其地且天下之半且猶㡬今又刦趙魏疏中國疏言離其友封衛之東野封割也東野猶東地兼魏之河内絶趙之東陽則趙魏亦危矣趙魏危則非齊之利也韓魏趙楚之志恐秦兼天下而臣其君故専兵一志以逆秦逆謂拒之三國之與秦瓖界而患急齊不與秦壤界而患緩是以天下之勢不得不事齊也故秦得齊則權重於中國趙魏楚得齊則足以敵秦故秦楚補趙魏得齊者重失齊者輕齊有此勢不能以重於天下者何也其用者過也齊王使使者問趙威后惠文后孝威太后書未發威后問使者曰嵗亦無恙耶恙憂也民亦無恙耶王亦無恙耶使者不說曰臣奉使使威后今不問王而先問嵗與民豈先賤而後尊貴者乎威后曰不然茍無嵗何有民茍無民何有君故有問舎本而問末者耶乃進而問之曰齊有處士曰鍾離子鍾離屬九江無恙耶是其為人也有糧者亦食無糧者亦食有衣者亦衣無衣者亦衣是助王養其民者補也何以至今不業也言不得在位成其職業業陽子諸書業陽皆不地范睢𫝊注華一作葉無恙乎是其為人哀鰥寡䘏孤獨振困窮補不足是助王息其民者也息生也何以至今不業也北宫之女嬰兒子無恙耶徹其環瑱集韻撤去也通作徹至老不嫁以養父母是皆率民而出於孝情者也情猶誠胡為至今不朝也命婦則朝此二士弗業一女不朝何以王齊國子萬民乎於陵子仲於陵屬濟南皆以所居為號此自一人若孟子所稱已是七八十年矣尚存乎是其為人也上不臣於王下不治其家中不索交諸侯此率民而出於無用者何為至今不殺乎彪謂威后賢矣其是非乃不詭於聖齊有此數士不能察至使鄰國老女子愧之王建不足道也時君王后故無恙胡為亦無察乎齊閔王之遇殺其子法章變姓名為莒太史家庸夫庸傭同均直也太史敫女敫音躍竒法章之狀貌以為非常人憐而常竊衣食之與私焉莒中及齊亡臣臣之出亡者相聚求閔王子欲立之法章乃自言於莒共立法章為襄王襄王立以太史氏女為王后生子建太史敫曰女無媒而嫁者非吾種也汙吾世矣終身不覩君王后賢不以不覩之故失人子之禮也襄王卒子建立為齊王君王后事秦謹與諸侯信以故建立衍一四字四十有餘年不受兵秦昭王元作始皇按后卒於莊襄之時不逮始皇也嘗遣使者遺君王后玉連環兩環相貫曰齊多智而解此環不君王后以示羣臣羣臣不知解君王后引錐椎破之謝秦使曰謹以解矣及君王后病且卒誡建曰羣臣之可用者某建曰請書之君王后曰善取筆牘受言牘書版也君王后曰老婦已忘矣詳其指葢怒建之不心受託以病昏耳君王后死後后勝疑即后之族相齊多受秦間金玉使賓客入秦皆為變辭變詐之辭葢使者還以恐動王也勸王朝秦不修攻戰之備彪謂君王后賢智婦人也惜其不能正始乃其父正烈男子也義不能疚利不能回其斯人乎齊王建入朝於秦雍門司馬前曰所為立王者為社稷耶為王立王耶王曰為社稷司馬曰為社稷立王王何以去社稷而入秦齊王還車而反即墨大夫聞元作與雍門司馬諫而聴之則以為可衍可字為謀又疑可為謀本注字即入見齊王曰齊地方數千里帯甲數十元作百下同萬夫三晉大夫皆不便秦而在阿鄄之間者百數王收而與之十萬之衆使收三晉之故地即臨晉之關可以入矣臨晉屬左馮翊鄢郢大夫不欲為秦不屬之也而在城南下者百數齊城王收而與之十萬之師使收楚故地即武關可以入矣始王紀注武關秦南關在折西𢎞農東如此則齊威可立秦國可亡矣舎南面之稱制此亦秦人之辭時未有此乃西面而事秦為大王不取也齊王不聴秦使陳馳齊客之入秦者誘齊王内之約與五百里之地葢偽許之齊王不聴即墨大夫而聴陳馳遂入秦處之共松栢之間共屬河内餓而死先是齊為之歌曰松耶栢耶住建共者客耶客謂陳馳自秦稱之曰客彪謂建之聴雍門似矣而不卒於即墨唯不明故也不明以亡國有國家者可不以正心誠意為先乎戰國策卷四
