body:
  text: 李文叔書戰國䇿戰國策所載大抵皆縱横捭闔譎誑相輕傾奪之説也其事淺陋不足道然而人讀之則必向其説之工而忘其事之陋者文辭之勝移之而已且夀考安樂富貴尊榮顯名愛好便利得意者天下之所欲也然激而射之或將以致人之憂死亡憂患貧賤苦辱棄損亡利失意者天下之所惡也然動而竭之或將以導人之樂至于以下求小以髙求大縱之以陽閉之以隂無非㣲妙難知之情雖辯士抵掌而論之猶恐不白今寓之文字不過一二言語未必及而意已隠然見乎其中矣由是言之則為是説者非難而載是説為不易得也嗚呼使秦漢而後復有為是説者必無能載之者矣雖然此豈獨人力哉葢自夏商積制作以至於周而文物大備當其盛時朝廷宗廟之上蠻貃窮服之外其禮樂制度條施目設而威儀文章可著之簡冊者至三千數此聖人文章之實也及周道衰寖淫陵遲幽厲承之於是大壞然其文章所從來既逺故根本雖伐而氣燄未易遽熄也於是浮而散之鍾於談舌而著於言語此莊周屈原孫武韓非商鞅與夫儀秦之徒所以雖不深祖吾聖人之道而所著書文辭駸駸乎上薄六經而下絶來世者豈數人之力也哉今戰國䇿宜有善本𫝊於世而舛錯不可疾讀意天之於至寳常不欲使人易得故余不復竄定而其完篇皆以丹圜其上云王覺題戰國䇿戰國䇿三十三篇劉向為之序世久不𫝊治平初始得錢塘顔氏印本讀之愛其文辭之辯博而字句脱語尤失其真丁未嵗予在京師因借館閣諸公家藏數本參校之葢十正其六七凡諸本之不載者雖雜見於史記他書然不敢輒為改易仍從其舊葢慎之也當戰國之時强者務并吞弱者患不能守天下方争於戰勝攻取馳説之士因得以其説取合時君其要皆主於利言之合從連衡變詐百出然自春秋之後以迄于秦二百餘年興亡成敗之迹粗見於是矣雖非義理之所存而辯麗横肆亦文辭之最學者所不宜廢也㑹有求予本以開板者因以授之使廣其𫝊庶㡬證前本之失云清源王覺題
