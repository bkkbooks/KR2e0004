body:
  text: 戰國策卷三宋鮑彪註秦蘇張説外自𢎞農故關以西京兆扶風馮翊北地上郡西河安定天水隴西皆秦地南有巴蜀廣漢犍為武都西有金城武威張掖酒泉燉煌又西南有牂柯越嶲益州皆屬焉孝公獻公子顯王八年庚申立衛鞅衛之庻孽公子姓公孫氏亡魏入秦鞅事公相公叔痤為庻子見魏策孝公以為相封之於商屬𢎞農號曰商君商君治秦法令至行至猶極公平無私罰不諱强大諱猶避也强宗大族賞不私親近法及太子是為惠王黥劓其傅墨湼其顙曰黥截鼻曰劓太子犯法鞅曰法之不行自上犯之太子君嗣也不可刑刑其傅公子䖍黥其師公孫賈朞年之後道不拾遺民不妄取兵革大强革甲也以革為札諸侯畏懼然刻深寡恩刻猶深也刻金木者有深而已特以强服之耳孝公行之八年疾且不起欲傳商君傳位與之辭不受孝公已死惠王代後莅政有頃莅臨也集韻頃少選商君告歸懼誅歸商人説惠王曰大臣太重者國危左右太親者身危君之身今秦婦人嬰兒集韻女曰嬰男曰兒皆言商君之法莫言大王之法是商君反為主大王更為臣也且夫商君固大王之仇讐也願大王圖之商君歸還時自商欲歸魏不得故還秦惠王車裂之而秦人不憐無念之者惠文君孝公子元年顯王三十二年甲申也十三年始稱王前此稱王後人追書耳蘇秦始將連横文穎曰關東為從西為横孟康曰南北為從東西為横瓉曰以利合曰從以威勢相脅曰横説秦惠王曰大王之國西有巴蜀漢中之利三郡並屬益州北有胡貉胡樓煩林胡之𩔖集韻貉似狐代馬之用代幽州郡南有巫山在南郡巫黔中之限黔故楚地秦北距此二郡耳故言限秦昭三十年始定為黔中郡後為武陵郡見後志東有殽函之固始皇紀注殽二殽函函關也在𢎞農田肥美民殷富殷盛也戰車萬乗奮撃百萬士之能奮撃者沃野千里沃言其肥潤蓄積饒多地勢形便地勢與形便於攻守此所謂天府言蓄聚之富非人力也天下之雄國也物之雄者强以大王之賢士民之衆車騎之用騎士之便馬者兵法之教教猶習可以并諸侯吞天下稱帝而治願大王少留意臣請奏其効奏進効功也秦王曰寡人聞之毛羽不豐滿者不可以髙飛文章不成者文章法令也不可以誅罰道徳不厚者不可以使民政教不順者逆人之心不可以煩大臣逆人心則行之難故大臣勞今先生儼然矜荘貌不逺千里而庭教之教之於廣庭願以異日異猶它也俟成順然後承教以此知為惠王初蘇秦曰臣固疑大王之不能用也昔者神農伐補遂國名未詳黄帝伐涿鹿屬上谷而禽蚩尤九黎氏之後見事史堯伐驩兠書止言憂之豈嘗伐之而不服耶舜伐三苗國名縉雲氏之後禹伐共工伐乃流之湯伐有夏文王伐崇崇侯虎紂卿士道之為惡武王伐紂齊桓任戰任猶用也作内政寄軍令是也而霸天下由此觀之惡有不戰者乎古者使車轂撃馳轂輻所湊也相撃而馳言其衆言語相結結親也天下為一約從連横兵革不藏文士並飭文猶辯也飭飾同諸侯亂惑萬端俱起不可勝理科條既備科程也集韻條件也民多偽態書策稠濁策簡也大事書之稠多也言冇司文書多閲者昏亂百姓不足上下相愁民無所聊集韻聊頼也明言章理文章法理兵甲愈起辯言偉服偉竒也戰攻不息繁稱文辭㳺説也天下不治舌敝耳聾不見成功行義約信天下不親於是乃廢文任武厚養死士敢死之士綴甲厲兵集韻厲嚴也効勝於戰場効致其功也夫徒處而致利徒猶空也言無所為安坐而廣地雖古五帝三王五霸明主賢君常欲坐而致之其勢不能故以戰續之寛則兩軍相攻廹則杖㦸相撞廹近也杖如杖劍㦸謂持㦸㦸有支矛撞手擣也然後可建大功是故兵勝於外義强於内論戰故獨言義威立於上民服於下今欲并天下凌萬乗集韻凌侵尚也當從人詘敵國詘服之制海内子元元元善也民之𩔖善故稱元臣諸侯言敵國又言諸侯則侯非其敵者非兵不可今之嗣主時君皆繼世者也忽於至道皆惛於教惛不明也亂於治迷於言惑於語沉於辯沉猶溺溺於辭溺謂為所冐没以此論之王固不能行也説秦王書十上而説不行黑貂之裘敝貂䑕屬大而黄黑出丁零國黄金百斤盡資用乏絶資貨也去秦而歸贏縢方言儋齊楚陳宋曰攍通作贏縢緘也履蹻負書擔囊髙注槖囊也然則此字元作槖從兩説則上縢字當從巾囊也槖無底囊有底形容枯槁靣目黧元作犁黑集韻黧黑黄色狀有愧色愧元作歸今從髙注歸至家妻不下絍機縷也不下言自若嫂不為炊父母不與言蘇秦喟然歎曰喟大息也妻不以我為夫嫂不以我為叔父母不以我為子是皆秦之罪也乃夜發書陳箧數十篋藏也得太公隂符之謀漢志有隂符經伏而誦之簡練以為揣摩簡猶擇練洓帛也取其熟揣量摩研也遊説之術或量其情或研切之讀書欲睡引錐自刺其股錐鋭也鍼之𩔖血流至足曰安有説人主不能出其金玉錦繡取卿相之尊者乎朞年揣摩成曰此真可以説當世之君矣於是乃摩燕烏集闕摩言切近過之闕名未詳見説趙王肅侯於華屋之下見説見而説也華髙麗也抵掌而談集韻抵側撃也趙王大説封為武安君受相印革車百乗兵車也錦繡千純集韻匹端曰純白璧百雙黄金萬鎰一鎰二十四兩以隨其後約從散横以抑强秦故蘇秦相於趙而關不通六國之關不通秦也當此之時天下之大萬民之衆王侯之威謀臣之權皆欲决於蘇秦之策决言用之不疑䇿謀也不費斗糧未煩一兵未戰一士未絶一絃未折一矢諸侯相親賢於兄弟賢猶勝夫賢人在而天下服一人用而天下從故曰式於政不式於勇式猶用式於廊廟之内廊東西序廟以尊先祖人君之居謂之巖廊廟堂尊嚴之稱不式於四境之外當秦之隆蘇秦隆盛之時黄金萬鎰元從水為用轉轂連騎後車之盛炫熿於道光耀也山東之國從風而服以草偃為喻也使趙大重為從主諸侯尊之且夫蘇秦特窮巷掘門鑿垣為門桑户棬樞之士耳樞門牝也揉木為之如棬棬屈木盂也伏軾車前横木撙銜集韻撙挫也蓋猶頓銜勒也横歴天下歴過也猶横行庭説諸侯之主猶庭教云杜左右之口杜猶塞天下莫之伉集韻匹也将説楚王威路過洛陽漢為河南郡父母聞之清宫除道清洒掃也張樂設飲張施也郊迎三十里迎於郊妻側目而視不敢正視傾耳而聽嫂虵行匍伏虵不直行伏音匐匍匐伏地也四拜自跪而謝集韻跪小拜也既拜復膝地蘇秦曰嫂何前倨而後卑也倨不遜也嫂曰以季子位尊而多金譙周曰秦字季子蘇秦曰嗟乎貧窮則父母不子富貴則親戚畏懼人生世上勢位富厚蓋可以忽乎哉忽輕也此策史畧同合從在趙肅侯十六年此四年彪謂秦之自刺可謂有志矣而志止於金玉卿相故其所成就適足誇嫂婦耳而此史極口稱頌之是亦利祿徒耳惡覩所謂大丈夫之事哉秦惠王謂寒泉子秦處士之號曰蘇秦欺寡人欺詐也言以虚聲恐之欲以一人之智反覆山東元作東山之君從以欺秦趙固負其衆負猶恃故先使蘇秦以其幣帛約乎諸侯諸侯不可一猶連雞之不能俱止於棲亦明矣連謂繩繋之棲雞所宿也寡人忿然含怒日久吾欲使武安子起往喻意焉喻諭同告也告諸侯以不可一之意寒泉子曰不可夫攻城墮邑敗城邑曰墮請使武安子善我國家稱國家之美使諸侯請使客卿張儀魏人仕秦惠五年為客卿秦惠王曰敬受命按起以昭二十九年為武安君自合從至是五十七年矣所稱武安子起謬也楚魏戰於陘山魏記蘇秦𫝊注在密縣密屬河南楚記威王卒魏因喪取我陘山魏㐮六年伐楚敗之陘山在此前九年魏許秦以上洛屬𢎞農以絶秦於楚使不助楚魏戰勝楚敗於南陽荆州郡非修武所謂秦責賂於魏責求也魏不與管淺秦人謂秦王曰王何不謂楚王懐曰魏許寡人以地今戰勝魏王㐮背寡人也王何不與寡人遇遇猶會魏畏秦楚之合必與秦地矣是魏勝楚而亡地於秦也是王以地徳寡人秦因楚會得地楚之惠也秦之楚者多資矣之往也言將以厚幣往結楚好魏弱若不出地則王攻其南寡人攻其西魏必危秦王曰善以是告楚楚王揚言揚顯言之與秦遇魏王聞之恐効上洛於秦楚使者景鯉在秦從秦王與魏王㐮遇於境此下脱簡有秦使周最觧説與魏所以遇之意見髙注而楚䇿有其事是以鯉與之遇也敝邑之於與遇善之加好於魏故齊不合也楚王因不罪景鯉而徳周秦齊魏讐也好魏故齊不合齊楚敵也齊不合故楚説楚王懐使景鯉如秦客謂秦王曰景鯉楚王下衍使景二字所甚愛王不如留之以市地市買賣所之也言使楚以地贖鯉如之楚王聽則不用兵而得地楚不聽則殺景鯉更衍下不字與不如景鯉者元作留是便計也便猶利安秦王乃留景鯉景鯉使人説秦王曰臣見王之權輕天下權猶勢也天下所輕而地不可得也臣之来使也聞齊魏皆且割地以事秦所以然者以秦與楚為昆弟國今大王留臣是示天下無楚也齊魏有何重於孤國也有猶又楚知秦之孤不與地而外結交以圖圖秦則社稷必危不如出臣秦王乃出之楚攻魏張儀謂秦王曰不如與魏以勁之與猶助魏戰勝復聽於秦必入西河之外禹貢西河屬雍州此時屬魏子夏老於西河之上是也不勝魏不能守王必取之自取河外王用儀言取皮氏卒萬人車百乗皮氏屬河東魏地也今秦於此取卒與車豈喪地七百里時入秦耶以與魏犀首公孫衍也隂晉人司馬彪曰犀首魏官若今虎牙將軍戰勝威王楚魏兵罷敝罷疲同恐畏秦果獻西河之外魏㐮五年入秦河西地此前八年也儀時為客卿魏七年納上郡此前十年也儀時為相田華之為陳軫二皆齊姓説秦惠王曰臣恐王之如郭君郭號同屬扶風夫晉獻公欲伐郭而憚舟之僑存憚難之也僑郭大夫荀息晉大夫曰周書有言美女破舌破壊其事舌指諌臣乃遺之女樂以亂其政舟之僑諫而不聽遂去閔二年奔晉因而伐郭遂破之又欲伐虞屬河東大陽而憚宫之竒存之竒虞臣荀息曰周書有言美男破老老成人乃遺之美男教之惡宫之奇宫之奇以諫而不聽遂亡左氏不言其亡因而伐虞遂取之今秦自以為王時亦未王謂其欲之能害王者之國者楚也因其有自王之志故稱之曰王者楚知横門君元作横君注有門字知為脱文蓋秦將也之善用兵下衍用兵二字與陳軫之智故驕張儀以五國驕寵之也言楚使韓魏趙燕齊以事屬之以重其權按儀初㳺楚楚相笞之後相楚乃為秦間耳楚無驕之之事今云然因其自楚来間之耳来必惡是二人惡言其惡也願王勿聽也張儀果来辭因言軫也王怒而不聽張儀又惡陳軫於秦王曰軫馳秦楚之間今遂不加善秦而善軫言楚善之然則是軫自為而不為國也且軫欲去秦而之楚王何不聽乎聽猶許王謂陳軫曰吾聞子欲去秦而之楚信乎陳軫曰然王曰儀之言果信也曰非獨儀知之也行道之人皆知之曰孝己愛其親世紀殷髙宗有賢子孝己母早死髙宗惑後妻之言放之而死天下欲以為子子胥忠乎其君伍子胥楚人平王殺其父奢胥奔吳呉王夫差敗越於夫椒越王勾踐求委國為臣妾夫差將許之胥諌不聽後吳伐齊胥諌請釋齊先越太宰嚭讒之賜劒以死天下欲以為臣賣僕妾售乎閭巷售賣去手也者良僕妾也良善也出婦嫁鄉曲者曲里之一曲如韋曲杜曲良婦也吾不忠於君楚亦何以軫為忠乎忠且見棄吾不之楚何適乎秦王曰善乃止之軫傳有陳軫去楚之秦言去楚者本其始仕秦之時自楚来也且為輸楚張本張儀謂秦王曰陳軫為王臣常以國情輸楚情謂國事之隐者儀不能與從事願王逐之即復之楚願王殺之王曰軫安敢之楚也王召陳軫告之曰吾能聽子子欲何之請為子約車約纒束之對曰臣願之楚王曰儀以子為之楚吾又自知子之楚子非楚且安之也軫曰臣出必故之楚以順王與儀之策策謂其所籌度而明臣之楚與否也此之即所謂以國情輸楚楚人有兩妻者人誂其長者誂相呼誘也長者詈之詈罵也誂其少者少者許之居無幾何時不久也有兩妻者死客謂誂者曰汝取長者乎少者乎取長者誂者對也客曰長者詈汝少者和汝和猶應汝何為取長者曰居彼人之所則欲其許我也今為我妻則欲其為我詈人也以國情輸楚猶許者也軫誠有此則今之楚楚必不欲也今楚王懐明主也而昭陽賢相也軫為人臣而常以國情補輸楚楚元作王王必不留臣昭陽將不與臣從事矣以此明臣之楚與否之亦猶於軫出張儀入問王曰陳軫果安之王曰夫軫天下之辯士也熟元作孰視寡人曰軫必之楚寡人遂無奈何也寡人因問曰子必之楚也則儀之言果信也軫曰非獨儀之言也行道之人皆知之昔者子胥忠其君天下皆欲以為臣孝己愛其親天下皆欲以為子故賣僕妾不出里巷而取者良僕妾也出婦嫁於鄉里者善婦也臣不忠於王楚何以軫為忠忠𥙷且見棄軫不之楚而何之乎王以為然遂善待之此一事再出著書者以所聞駮異也彪謂軫之辯𩔖捷給而其所稱譬皆當於人心不詭於正論周衰辯士未有若軫之絶倫離羣者也義渠君西戎也北地郡有義渠道之魏公孫衍謂義渠君曰道逺臣不得復過矣不復相過請謁事情謁白也情猶實義渠君曰願聞之對曰中國無事於秦則秦且燒焫獲君之國焫亦燒也言火其國以得其地中國為有事於秦事皆謂戰則秦且輕使重幣輕言其行疾而事君之國也此事君之事義渠君曰謹聞令令猶命居無幾何五國伐秦後七年韓趙魏燕齊共攻秦陳軫謂秦王曰義渠君蠻夷之賢君王不如賂之以撫其心撫安也秦王曰善因以文繡千匹好女百人遺義渠君遺贈也義渠君致羣臣而謀致之使至曰此乃公孫衍之所謂也因起兵襲秦大敗秦人於李帛之下史張儀𫝊末有此䇿帛作伯地缺平原𫝊注河内成臯有李城豈秦出兵與諸國遇於此地而見敗耶司馬錯秦人與張儀爭論於秦惠王前司馬錯欲伐蜀張儀曰不如伐韓王曰請聞其説對曰親魏善楚下兵三川塞轘轅緱氏之口髙紀注轘轅緱氏險道屬河南當屯留之道屬上黨魏絶南陽秦使之絶楚臨南鄭亦河南鄭秦攻新城宜陽新城屬河南以臨二周之郊誅周主之罪誅討也侵楚魏之地周自知不救九鼎寳器必出據九鼎按圖籍土地之圖人民金榖之籍挟天子挟持也以令天下號令指麾之天下莫敢不聽此王業也今夫蜀西僻之國而戎狄之長也敝兵勞衆不足以成名伯王之名得其地不足以為利臣聞爭名者於朝爭利者於市今三川周室天下之市朝也而王不爭焉顧爭於戎狄顧還視也故為反去王業逺矣司馬錯曰不然臣聞之欲富國者務廣其地務趣也欲强兵者務富其民欲王者務博其徳三資者備三者於國如人之有資貨而王隨之矣今王之地小民貧故臣願從事於易夫蜀西僻之國也而戎狄之長也而有桀紂之亂以秦攻之譬如使豺狼逐羣羊也取其地足以廣國也得其財足以富民繕兵繕補也不傷衆而彼已服矣故㧞一國而天下不以為暴利盡四海言四方之物蜀兼有之故蘇秦於巴蜀漢中獨曰利諸侯不以為貪是我一舉而名實兩附不貪暴名也得國實也而又有禁暴正亂之名今攻韓刼天子劫脅止也劫天子惡名也而未必利也又有不義之名韓無罪而伐之不義也而攻天下之所不欲危天下皆有尊周之志臣請謁其故周天下之宗室也宗尊也齊韓周之與國也周自知失九鼎韓自知亡三川則必將二國并力合謀并並也以因于齊趙而求解乎楚魏觧免秦兵以鼎與楚以地與魏王不能禁此臣所謂危不如伐蜀之完也不虞傷敗惠王曰善寡人聽子卒起兵伐蜀十月取之遂定蜀蜀主更號為侯而使陳荘相蜀蜀既屬屬猶附秦益强富厚輕諸侯儀𫝊有在前十年前而表在後九年謂前年議伐後年取之而取之書十月知為一年事也今從表齊助楚攻秦取曲沃晉桓叔所封漢屬河東為聞喜此時屬秦與上取皮氏卒同義其後秦欲伐齊齊楚之交善惠王患之謂張儀曰吾欲伐齊齊楚方懽子為寡人慮之奈何張儀曰王其為臣約車并幣言并則幣非一物臣請試之不自必之辭張儀南見楚王懐曰敝邑之王所説甚者無大大王大猶過唯儀之所甚願為臣者唯辭也𫝊稱往相楚是也亦無大大王敝邑之王所甚憎者衍亦字無大齊王閔唯儀之所𥙷甚憎者亦無大齊王今齊王之罪其於敝邑之王甚厚言得罪於秦重也敝邑欲伐之而大國與之懽是以敝邑之王不得事令事猶聽從而儀不得為臣也大王茍能閉關絶齊臣請使秦王獻商於之地楚記注在今順陽郡南鄉丹水三縣有商城在於中故名𢎞農商縣是也方六百里若此齊必弱失楚援故齊弱則必為王役元作没矣役言為楚役使則是北弱齊西徳於秦秦因楚絶齊得報曲沃之役楚之惠也而私商於之地以為利也則此一計而三利俱至楚王大説宣言之於朝廷曰不榖得商於之地方六百里羣臣聞見者畢賀畢猶盡陳軫後見時去秦在楚獨不賀楚王曰不榖不煩一兵不傷一人而得商於之地六百里寡人自以為智矣諸士大夫皆賀子獨不賀何也陳軫對曰臣見商於之地不可得而患必至也故不敢妄賀王曰何也對曰夫秦所以重王者以王有齊也今地未可得而齊先絶是楚孤也無援故秦又何重孤國且先出地絶齊秦計必弗為也先絶齊後責地且必受欺於張儀言儀必背約受欺於張儀王必惋之惋猶恨是西生秦患北絶齊交則兩國兵必至矣楚王不聽曰吾事善矣子其弭口無言集韻彌止也通作弭以待吾事軫之䇿此可謂明矣而懐王不聽愚而好自用者也其死秦宜哉楚王使人絶齊使者未来来還也又重絶之張儀反絶句秦使人使齊齊秦之交隂合楚因使一將軍受地於秦張儀至前反而今至也稱病不朝楚王曰張子以寡人不絶齊乎乃使勇士往詈齊王張儀知楚絶齊也乃出見使者曰從某至某廣從六里横度為廣直為從使者曰臣聞六百里不聞六里儀曰儀固以小人小人貧寠之稱言不能多與安得六百里使者反報楚王楚王大怒欲興師伐秦陳軫曰臣可以言乎王曰可矣軫曰伐秦非計也王不如賂之一名都都邑有聞於時者與之伐齊是我亡於秦而取償於齊也償還也言勝齊則得地雖亡所賂足以相償楚國不尚全事不尚尚也言無所喪王今已絶齊而責欺於秦是吾合齊秦之交也國元作固必大傷楚王不聽是亦明計也而不聽是以知楚王之悍也彼安能用屈原哉遂舉兵伐秦秦與齊合韓氏從之楚兵大敗於杜陵屬京兆故楚之土壌士民非削弱僅以救亡者集韻僅劣也計失於陳軫過聽於張儀過猶誤年記懐十六有此十二年也楚絶齊齊舉兵伐楚陳軫謂楚王懐曰王不如以地東解於齊西講於秦王使陳軫之秦秦王謂軫曰子秦人也寡人與子故也故言有舊寡人不佞佞髙材也不能親國事也躬親治國故子棄寡人事楚王今齊楚相伐軫𫝊言韓魏或謂救之便或謂救之不便子獨不可以忠為子主計主懐王以其餘為寡人乎陳軫曰王獨不聞吳人之逰楚者乎楚王甚愛之楚先王病吳人故使人問之楚王使問曰使者還王問之誠病乎意亦思乎思吳左右曰臣又知其思與不思注家説有為又則又亦有也此言有以知之誠思則將吳吟作吳人呻吟今軫將為王吳吟言不忘秦王不聞夫管與之説乎軫𫝊作館竪子有兩虎爭元作諍下同人而鬭管荘子将刺之𫝊管作卞刺直傷也管與止之曰虎者戾蟲戾猶暴人者甘餌也以餅餌喻之今兩虎爭人而鬭小者必死大者必傷子待傷虎而刺之則是一舉而兼兩虎也無刺一虎之勞而有刺兩虎之名齊楚今戰戰必敗必有一敗敗王起兵救之有救齊之利而無伐楚之害今詳秦王言為子主計則以齊楚正相伐故也今軫言無伐楚亦所以忠為主也計聽知覆逆者能計善聽知二國之覆逆覆逆言不順於理唯王可也計者事之本也聽者存亡之機機主𤼵矢喻事之要也先也計失而聽過能有國者寡也故曰計有一二者難悖一二言反覆計之集韻悖亂也聽無失本末者難惑軫傳有無計聽下秦惠王死公孫衍欲窮張儀李讐秦人謂公孫衍曰不如召甘茂於魏召公孫顯秦人於韓起樗里子於國起猶舉三人者皆張儀之讐也公用之則諸侯必見張子之無秦矣武王恵文子元年赧王五年辛亥張儀欲假秦兵以救魏時將相魏左成謂甘茂曰不如予之魏不反秦兵謂敗而死傷多張子不反秦懼秦以喪兵誅之魏若反秦兵張子得志於魏不敢反於秦矣懼秦疑其厚魏張子不去秦去猶捨也儀雖為魏猶有得秦之心張子必髙子髙貴重也髙之者欲茂以秦資之張儀之殘樗里疾也殘猶害重而使之楚重猶貴貴之者欲使楚亦貴重之因令楚王懐為之請相於秦請於秦使相之張子謂秦王曰重樗里疾而使之者將以為國交也結兩國之交今身在楚疾之身楚王因為請相於秦臣聞其言聞疾之言蓋誣之也曰王楚王欲窮儀於秦乎臣請助王楚王以為然故為請相也今王誠聽之彼必以國事楚王秦王大怒樗里疾出走張儀欲以漢中與楚惠十三年取楚漢中請秦王曰有漢中蠧蠧木中蟲也言為國害種樹不處者言非其所人必害之家有不宜之財則傷非所宜得得之必有禍今元作本漢中南邊為楚利此國累也甘茂謂王曰地大者固多憂乎言不然天下有變謂害於秦王割漢中以楚和楚必畔天下而與王畔猶背王今以漢中與楚即天下有變王何以市楚也為補魏謂魏冉楚人宣太后弟後封穣侯傳言其用事武王時此時冉欲如楚魏恐其合也曰公聞東方之語乎東山東曰弗聞也曰辛張陽母澤辛疑韓人張張儀母澤疑齊人説魏王哀薛公田嬰公叔也曰臣戰與楚戰載主契國主木主軍行載之禱且告焉契言以國為給以與王約王魏王必無患矣若有敗之者臣請挈領領項也言欲請誅持其項以受鈇鉞然而臣有患也患楚與秦合下衍十六字夫楚王懐之以其國依冉也而事臣之主事征伐也臣辛張陽主韓魏齊也此三人之辭非説冉者故名冉此臣之所甚患也此下乃説者之辭今公東而因言於楚公謂冉東東之楚也因與楚好言是令張儀之言為禹儀以武二年死故此章必次之是禹善謨今儀言楚依冉而冉果與楚合是儀之謀侔於禹也而務敗公之事也三國是儀之説必欲敗冉合從之為公不如反公國謂秦徳楚但施恩惠而不之楚而觀薛公之為公也觀其於冉如何觀三國之所求於秦而不能得者請以號三國以自信也為韓魏齊請其所欲於秦因宣言之所以信於三國觀張儀與澤之所不能得於薛公者衍也字而公請之以自重也薛公所不與儀者冉為之請而得則儀重冉儀時相魏為儀請而得亦所以為魏魏亦重冉也醫扁鵲盧人字越人見秦武王武王示之病扁鵲請除欲去其病左右曰君之病在耳之前目之下除之未必已也將使耳不聦目不眀君以告扁鵲扁鵲怒而投其石砭也所以砭彈臃腫曰𥙷君與知之者謀之而與不知者敗之使此知秦國之政也此如此則君一舉而亡國矣按扁鵲與趙簡子同時至是百三十年矣秦武王謂甘茂曰寡人欲車通三川以闚周室闚窺同小視也周室洛邑蓋欲取之不正言耳言三川知其志不止鎬京也而寡人死不朽乎甘茂對曰請之魏約伐韓王令向夀宣太后外族輔行輔猶副甘茂至魏謂向夀子歸告王曰魏徳臣矣然願王勿攻也事成盡以為子功向壽歸以告王王迎甘茂於息壌山海經鯀竊息壌以陻洪水府則訓於中央言息壌湮洪水之州而栁子厚言永州有之則息壌非一處此秦地也甘茂至王問其故勿攻之故對曰宜陽大縣也上黨南陽此屬修武積之久矣二縣財賦歸之名為縣其實郡也此時韓都平陽春秋傳上大夫受郡下大夫受縣則郡縣之稱久矣今王倍數險倍背同行數千里而攻之難矣臣聞張儀西并巴蜀之地并猶兼北取西河之外南取上庸屬漢中天下不以衍為字多張儀而賢先王惠文魏文侯令樂羊將攻中山兾州國後志一名中人亭三年而拔之樂羊反而語功文侯示之謗書一箧樂羊再拜稽首曰此非臣之功主君之力也今臣羇旅之臣也樗里疾公孫衍二人者挟韓而議媒孽之也王必聽之是王欺魏而臣受公仲朋元作侈之怨也朋公仲名此書後或名朋或名侈朋侈字近故誤史並作侈然韓䇿言公仲侈又言韓侈為兩人今定公仲名朋别韓侈也昔者曾子處費魯邑屬東海費人有與曾子同名族者族姓也而殺人人告曾子母曰曾參殺人曾子之母曰吾子不殺人織自若若如故也有頃焉人又曰曾參殺人其母尚織自若也頃之一人又告之曰曾參殺人其母懼投杼機之持緯者踰牆而走夫以曾參之賢與母之信也而三人疑之使其母疑則慈母不能信也今臣之賢不及曾子而王之信臣又未若曾子之母也疑臣者疑之於王不適三人適啻同臣恐王為臣之投杼也王曰寡人不聽也請與子盟於是與之盟於息壌果攻宜陽五月而不能㧞也樗里疾公孫衍二人在言在中也爭之王王將聽之召甘茂而告之甘茂對曰息壤在彼王曰有之因悉起兵復使甘茂攻之遂拔宜陽在三年茂傳有宜陽之役役猶戍役馮章秦人謂秦王曰不㧞宜陽韓楚乗吾敝國必危矣不如許楚漢中以懽之使楚説也楚懽而不進韓必孤無奈秦何矣王曰善果使馮章許楚漢中而拔宜陽楚王懐以其言責漢中於馮章馮章謂秦王曰王遂亡臣詐為逐之因謂楚王曰寡人固無地而許楚王彪謂此策可以無出地矣如後不可為約何甘茂攻宜陽三鼓之鼔以進軍而卒不上卒士也上猶前秦之右將有尉軍尉對曰公不論兵言不以兵法治士必大困甘茂曰我羇旅而得相秦者我以宜陽餌王以釣喻也今攻宜陽而不㧞公孫衍樗里疾挫我於内挫摧也而公仲元作中以韓窮我於外是無伐之日已戰功曰伐言後不復立功請明日鼓之而不可下因以宜陽之郭為墓示必死也於是出私金以益公賞明日鼓之而宜陽㧞宜陽未得秦死傷者衆甘茂欲息兵左成謂甘茂曰公内攻於樗里疾公孫衍二人毁之如攻國然而外與韓朋元作侈為怨今公用兵無功公必窮矣公不如進兵攻宜陽冝陽㧞則公之功多矣是樗里疾公孫衍無事也不得事權秦衆盡謂死傷多怨之深矣使茂久攻二人持之故也冝陽之役楚畔秦而合於韓秦王懼甘茂曰楚雖合韓不為韓氏先戰韓亦恐戰而楚有變其後變背約也楚時助韓兵在韓後韓楚必相御也御猶制也二國雖合猶相疑故自相制楚言與韓而不餘怨於秦楚之與韓有言而已而其於秦不見多怨臣是以知其御也宜陽之役楊達秦人謂公孫顯曰請為公以五萬攻西周得之是以九鼎抑元作卬甘茂也顯與茂爭國者見惠王策抑桉也不然秦攻西周天下惡之其救韓必疾則茂事敗矣言攻而不勝亦足以敗茂元在韓策秦王謂甘茂曰楚客来使者多健言其强辯與寡人爭辭寡人數窮焉辭屈也為之奈何甘茂對曰王勿患也其健者来使者則王勿聽其事其需弱者来使集韻需音儒韋柔滑貌則王必聽之然則需弱者用而健者不用矣王因而制之弱者易制因可制甘茂相秦秦王愛公孫衍與之間有所立請間之間暇隙也因暇與語将置相也因目謂之曰寡人且相子甘茂之吏道而聞之聞之於道以告甘茂甘茂因入見王曰王得賢相敢再拜賀王曰寡人託國於子焉更得賢相對曰王且相犀首王曰子焉聞之對曰犀首告臣王怒於犀首之泄也乃逐之補逐逐衍也曰告人足矣不必告已甘茂約秦魏而攻楚楚之相秦者屈蓋凡屈皆楚人楚任之於秦使為秦相為楚和於秦秦啓關而聽楚使甘茂謂秦王曰訹元作怵於楚訹誘也若怵則恐耳而不使魏制和制謂主之楚必曰以鬻魏之言告魏秦鬻魏鬻賣也如賣友云言始約而終背之魏𥙷不説而合於楚楚魏為一國恐傷矣王不如使魏制和魏制和必説絶句王不惡於魏則寄地必多矣言魏且割地與秦時地未入故言寄謂秦王曰臣竊惑王之輕齊易楚而卑畜韓也臣聞王兵勝而不驕霸主約而不忿主天下之要約勝而不驕故能服世約而不忿故能從鄰使鄰國服從今王廣徳魏趙大施恩惠而輕失齊驕也戰勝楚交不恤楚交忿也言不以交楚為意驕忿非霸王之業也臣切為大王慮之而不取也詩云靡不有初鮮克有終大雅蕩詩故先王之所重者唯終與始何以知其然也昔智伯瑶殘范中行范吉射中行寅晉兩卿圍晉陽屬太原故詩唐國卒為三家笑趙魏韓也事見韓䇿晉出公十七年吳王夫差棲越於會稽故越國揚州郡亦山名事見哀元年勝齊於艾陵杜注齊地哀十一年為黄池之遇陳留外黄注縣有黄溝又魏内黄注吳會諸侯於黄池今黄溝是哀十三年無禮於宋並哀十三年吳欲伐宋殺其大夫囚其婦人遂為元作與勾踐禽死二十二年梁君惠王伐楚勝齊制韓趙之兵驅十二諸侯以朝天子於孟津在河内河陽縣南魏記惠王二年敗韓於馬陵敗趙於懐十五年魯衛宋鄭君来朝二十八年中山君為相不見齊楚及朝天子事後子死太子申也三十年齊敗我馬陵虜申身布冠以喪禮自居也而拘於秦拘猶制三者非無功也能始而不能終也今王破宜陽殘三川而使天下之士不敢言雍天下之國雍擁同言據有之徙兩周之疆侵逼之而世主不敢窺陽侯之塞河東陽注陽侯國取黄棘秦紀楚記懐王與昭王盟於黄棘皆此地而韓楚之兵不敢進王若能為此尾言善其後則三王不足四五霸不足六王若不能為此尾而有後患則臣恐諸侯之君河濟之士濟水在温西北此言中國耳以王為吳智之事也詩云行百里者半於九十逸詩言行九十里適足為五十里耳此言末路之難今大王皆有驕色以臣之心觀之天下之事依世主之心依猶據非楚受兵必秦也皆驕强故何以知其然也秦人援魏以拒楚楚人援韓以拒秦衍王字四國之兵敵秦楚韓魏也韓魏雖弱以得援故與之敵而未能復戰也敵故不敢輕戰齊宋在繩墨之外以為權外言四國不以為意權言能輕重四國故曰先得齊宋者伐秦此言魏韓得之秦先得齊宋則韓氏鑠以銷金喻韓氏鑠則楚孤而受兵也楚先得之則魏氏鑠魏氏鑠則秦孤而受兵矣若隨此計而行之則兩國者秦楚必為天下笑矣彪謂此䇿孟軻之徒也惜其不名秦王與中期秦人爭論不勝秦王大怒中期徐行而去或為中期説秦王曰悍人也悍勇也勇者多迕中期適遇明君故也向者遇桀紂必殺之矣秦王因不罪昭㐮王武王母弟元年赧王九年乙夘甘茂亡秦茂𫝊昭元年撃魏皮氏未拔去且之齊出關遇蘇子代也代𫝊侍燕太子質於齊將適秦曰君聞夫江上之處女乎女在室者蘇子曰不聞曰夫江上之處女有家貧而無燭者處女相與語欲去之遣之使去家貧無燭者將去矣謂處女曰妾以無燭故常先至掃室布席何愛於餘明之照四壁者幸以賜妾何妨於處女妾自以為有益於處女何為去我處女相語以為然而留之今臣不肖弃逐於秦而出闗願為足下掃室布席幸無我逐也蘇子曰善請重公於齊乃西説秦王曰甘茂賢人非恒士也恒常也其居秦累世重矣茂事惠武昭三王自殽塞谿谷地形險易盡知之彼若以齊約韓魏反以謀秦是非秦之利也秦王曰然則奈何蘇代曰不如重其贄集韻贄與摯同握持也言多持物往遺之厚其祿以迎之彼来則置之槐谷扶風有槐史云鬼谷注在陽城終身勿出代知茂必留齊故言此爾不為茂㳺説也天下何從圖秦秦王曰善與之上卿以相迎之齊迎之於齊甘茂辭不往蘇子元作秦偽為齊𥙷王閔曰甘茂賢人也今秦與之上卿以相迎之茂徳王之賜故不往願為王臣今王何以禮之王若不留必不徳王彼以甘茂之賢得擅用强秦之衆則難圖也齊王曰善賜之上卿命而處之命猶八命之命茂傳有獻則楚人為芊戎㳺説者謂公孫消秦人曰公大臣之尊者也數伐有功伐戰伐所以不為相者太后宣太后不善公也芊元作辛下同戎者太后之所親也穣侯𫝊后同父弟芊戎為華陽君凡芊皆楚人今亡於楚在東周戎時未入秦知為昭王初也公何不以秦楚之重資而相之於周乎使為周相楚必便之矣戎雖以罪去楚楚既與秦共資之必為楚用故楚利之是芊戎有秦楚之重太后必説公公相必矣三國攻秦入函谷魏記哀二十一年與齊韓共攻秦此九年也秦王謂樓緩趙人見穣侯𫝊此九年相秦而免曰三國之兵深矣寡人欲割河東而講大河之東非郡名對曰割河東大費也免元作勉於國患大利也此父兄之任也謂公族王何不召公子他元作池下同此書多作他而問焉王召公子他而問之對曰講亦悔不講亦悔王曰何也對曰王割河東而講三國雖去王必曰惜矣悔其失地三國且去吾特以三城從之此講之悔也王不講三國入函谷咸陽必危咸陽秦都扶風渭城也王又曰惜矣吾愛三城而不講此又不講之悔也王曰鈞吾悔也鈞均同平也寜亡三城而悔無危咸陽而悔也寡人决講矣决斷也猶必卒使公子他以三城講於三國三國𥙷此二字之兵乃退緩時相秦對以他之言豈為侵官哉而曰此父兄之任焉用彼相矣薛公田文為魏謂魏冉曰文聞秦王欲以吕禮収齊収猶取也禮時相齊親禮所以取齊昭十三年禮奔魏其相齊見周䇿及孟嘗𫝊後至十九年歸秦明年齊伐宋伐宋後文乃相魏此事合在禮歸秦之前此時文未相魏其言為魏意親之矣以濟天下君必輕矣齊秦相聚以臨三晉禮必并相之相齊及秦是君収齊以重吕禮也齊免於天下之兵其讐君必深齊讐冉也欲得陶故故下章曰攻齊不成陶為鄰恤然齊未免於兵亦不敢爾君不如勸秦王令敝邑薛也文以此十三年奔薛卒攻齊之事齊破文請以所得封君齊破晉强晉謂魏秦王畏晉之强也必重君以取晉文親魏而重冉故欲取晉必重冉齊予晉敝邑薛雖文舊封而屬齊齊破畏魏且取薛予魏而不能支秦魏得薛秦必害之而魏實弱不能當秦晉必重君以事秦是君破齊以為功採晉以為重也破齊定封而秦晉皆重君若齊不破吕禮復用禮雖亡秦之齊秦方以禮収齊則復親之今齊不破是秦収齊之功遂也禮為有功於秦秦必用之并相齊秦也子必大窮矣泠向髙注秦人今詳為齊人蓋齊攻宋恐秦害之故使向説秦謂秦王曰向欲以齊事王使攻宋也宋破晉國危安邑王之有也晉國大梁也宋在其東宋破則梁危安邑屬河東近秦梁危則秦可取安邑燕趙惡齊秦之合必割地以交於王矣齊必重於王秦多得地齊畏其强故重之則向之攻宋也且以恐齊而重王燕趙交於秦故齊必恐王何惡向之攻宋乎惡皆去音向以王之明為先知之言秦自知攻宋之利故不言謂穣侯曰為君慮封謀所以定其封苦元作若於除宋罪重齊怒宋齊所惡也故除宋罪則齊怒齊怒則冉之封不定故以為苦除觧免也須殘伐亂宋徳强齊定身封此亦百世之一時已謂魏冉曰楚破秦秦𥙷不能與齊懸衡矣懸衡輕重等也此言秦輕於齊秦三世積節於韓魏節猶事也言累有戰伐之事而齊之徳新加加徳韓魏與衍齊字秦交爭韓魏韓𥙷魏東聽謂聽齊則秦伐矣齊有東國之地方千里楚包九夷又方千里南有符離之塞屬沛北有甘魚之口未詳疑為濟隂髙魚權懸宋衛言較其輕重宋衛乃當阿甄耳荘十三年注阿今濟北東阿齊之阿邑甄屬濟隂荘十四年會于鄄史作甄此言二國如齊邑耳利有千里者二謂齊楚富擅越𨽻越勾踐國𨽻猶禮之秋官四𨽻征伐所獲之民也擅專有之事秦烏能與齊懸衡韓支分方城膏腴之地支言細散取之腴腹肥也言肥沃如之以薄鄭薄猶廹也鄭屬長安在秦韓之間兵休復起足以傷秦不必待齊五國罷成臯屬河南詳見趙策惠文十三年此二十一年也史不書秦王欲為成陽君以趙魏策知為韓人此十七年入朝時在其國求相韓魏韓魏弗聽秦太后宣為魏冉冉后弟時主五國之成后恐成陽害其事故為之言謂秦王曰成陽君以王之故窮而居於齊今王見其達而収之亦能翕其心乎翕猶收也言収之晚王曰未也太后曰窮而不収達而報之恐不為王用且収成陽君失韓魏之道也其窮在齊亦必韓魏所惡藍田屬京兆豈難得哉此䇿上有脱簡蓋三國攻楚楚求秦救薛公時在魏説者欲使薛公遣使之楚告以舍楚攻秦以疑秦使不救楚此言三國既舍楚攻秦藍田可得也況於楚之故地藍田秦近邑也尚可得而況楚地謂秦且以漢中予楚楚疑於秦之未必救已也而今三國之辭云元作去三國攻楚史不書辭云上所言者也則楚之應之也必勸勸樂之也言樂從從三國攻秦此一説也是楚與三國謀出秦兵矣出兵敵三國也其謀自楚秦為知之必不救也三國疾攻楚楚必走秦以急趨秦吿急秦愈不敢出畏三國也此又一説則是我離秦而攻楚也我三國也離言絶其交兵必有功薛公曰善遂發重使之楚楚之應之果勸於是三國并力攻楚楚果告急於秦秦遂不敢出兵大衍臣字有功此章應屬齊若魏然附之齊則薛公時在魏附之魏則無薛公事以其事不完不明而齊魏無所適屬也故次之此薛公入魏而出齊女魏公子負芻之母薛公惡齊故逐之韓春謂秦王曰王何不取為妻以齊秦刦魏刦劫同則上黨秦之有也此上黨屬魏齊秦合而立負芻負芻立其母在秦則魏秦之縣也言負芻以母故必事秦已珉元作呡下同字書無之而韓呡韓策作珉今並從之此魏人也欲以齊秦而困薛公爭魏權故佐欲定其弟佐負芻庻兄也定定其立臣請為王因珉與佐也因二人可以刦魏困薛魏懼而復之反齊女負芻必以魏殁世事秦齊女入魏而怨薛公終以齊奉事王矣齊女徳秦而齊其父母國也齊又與薛公隙故女能得之以事秦謂魏冉曰和不成與趙和秦也此二十七年白起撃趙因伐狼光兵必出白起者復将戰勝必窮公不勝必事趙從公公又輕不能窮冉故從冉而和然先和則冉重今不勝而和故輕公不若毋多謂專志於和毋他務也則疾到趙歸我也此蓋冉欲和而起欲戰也起冉所薦其言窮公起似不爾陘山之事穣侯傳魏背秦與齊從親秦使穣侯攻趙韓魏於華陽下且益趙以兵伐齊則此役也陘山在密後志注云史記秦破魏華陽地亦在縣則此䇿書陘山史書華陽一役也事在三十四年趙且與秦伐齊齊懼令田章以陽武屬河南此時屬齊合於趙而以順子為質齊公子趙王惠文喜乃案兵告於秦曰齊以陽武賜敝邑而納順子欲以解伐敢告下吏不斥王故言告吏秦王使公子他之趙謂趙王曰齊與大國救魏而倍約齊背二國不可信恃大國不義趙以齊背之為不義以告敝邑告以伐齊而賜之二社之地邑皆有社二社二邑也以奉祭祀今又案兵且欲合齊而受其地非使臣之所知也請益甲四萬大國裁之蘇代為齊獻書穣侯曰臣聞往来者之元作之者言曰秦且益趙甲四萬人以伐齊臣竊必之敝邑之王必者意其然王㐮王曰秦王明而熟於計穣侯智而習於事必不益趙甲四萬人以伐齊是何也夫三晉相結秦之深讐也三晉百背秦百欺秦不為不信不為無行今破齊以肥趙趙秦之深讐此二十七年敗趙取伐光狼不利於秦一也秦之謀者必曰破齊敝晉此晉趙也以趙破齊齊破趙亦敝而後制晉楚之勝二國破敝秦無後慮可以南制楚夫齊罷國也罷疲同以天下撃之譬猶以千鈞之弩潰癰也秦王安能制晉楚哉夫能制人必其威武足以屈人今攻罷國勝之非武也安能制人二也秦少出兵則晉楚不信不信其伐齊多出兵則晉楚為制於秦齊恐則必不走於秦且走晉楚兵多則非獨齊見制懼晉楚亦見制齊畏秦故不趨秦而與晉楚同患故趨晉楚三也齊割地以實晉楚則晉楚安齊舉兵而為之頓劍二國惡秦而齊先伐故既合則齊為二國出兵頓下也此以小言之則秦反受兵四也是晉楚以秦伐齊晉亦趙也初與秦伐齊以齊破秦為之頓劍是也何晉楚之智而齊秦之愚五也秦得安邑此攻華陽時得之安邑魏也亦屬韓猶上黨兩屬也白起𫝊取韓安邑善齊以安之亦必無患矣秦有安邑則韓魏必無上黨哉言可取夫取三晉之腸胃安邑上黨如之與出兵而懼其不反也孰利故臣竊必之敝邑之王曰秦王明而熟於計穣侯智而習於事必不益趙甲四萬人以伐齊矣穣侯傳有秦客卿造造其名謂穣侯曰秦封君以陶冉别封也越記注陶今濟隂定陶藉君天下借以制天下之權數年矣攻齊之事成陶為萬乗國大也長小國以朝天子天下必聽五霸之事也攻齊不成陶為鄰恤言近於憂而莫之據也無援國可恃故攻齊之於陶也存亡之機也君欲成之何不使人謂燕相國曰聖人不能為時時天時非人所能為時至弗失舜雖賢不遇堯也不得為天子湯武雖賢不當桀紂不王故以舜湯武之賢不遭時不得帝王今攻齊此君之大時也已得時之利無大於此因天下之力伐讐國之齊報惠王之恥田單破燕燕惠王之初成昭王之功燕昭二十八年樂毅伐齊入臨淄三十二年下齊七十餘城明年田單復之除萬世之害此燕之長利而君之大名也君謂燕相詩云樹徳莫如滋滋益也除害莫如盡逸詩吳不亡越越故亡吳齊不亡燕燕故亡齊齊閔八年蘇代為齊説燕噲譲子之燕幾亡矣而不卒功故有樂毅臨淄之役齊亡於燕吳亡於越此除疾不盡也非以元作以非此時也成君之功除君之害秦卒有他事卒猝同忽也而從齊齊秦元作趙合其讐君必深矣挟君之讎讎謂齊以誅於燕使燕誅相後雖悔之不可得也已君悉燕兵而疾攻元作僣之天下之從君也若報父子之仇誠能亡齊封君於河南亦河之南非郡此蓋寓封為萬乗達途於中國南與陶為鄰世世無患願君之專志於攻齊而無它慮也説秦王按史此春申君未封時書在撃芒卯後此三十四年也曰物至而反至猶極冬夏是也致至而危致言取物置之物上累棊是也今大國之地半天下有二垂邉陲此從生民以来萬乗之地未嘗有也先帝尊稱之耳時未為帝文王惠文王非孝文武王元作荘王按史秦輕楚頃㐮王歇乃上書説秦昭王則史與此䇿書此為莊王謬也王之身三世而不接地於齊不與通也以絶從親之要要約也今王使成橋秦人守事於韓守猶待成橋已元作以北入燕使燕入朝於秦是王不用甲不伸威而出百里之地出言割地燕入秦必割地予秦秦使之出也王可謂能矣王又舉甲兵而攻魏社大梁之門舉河内屬司𨽻㧞燕酸棗虚桃人燕南燕屬東郡酸棗屬陳留徐注始皇五年取酸棗燕虚又蘇代曰决胥須之口魏無虛頓丘按此則虚魏地也桃人史作桃注燕縣有桃城今按任城有桃聚楚燕之兵雲翔而不敢校雲翔散也語注包曰校報也王之功亦多矣王休甲元作申無休字今從史息衆二年然後復之又取蒲衍首垣河東蒲坂注故蒲蘇代曰北有河外卷衍注不地今按屬魏故魏記書㧞我卷垣蒲陽衍而張儀説魏曰秦據卷衍又南陽有杜衍元作恒河東有首山有垣以臨仁兵臨之仁地缺平丘元作兵小黄濟陽嬰城地並屬陳留嬰猶縈也蓋二邑環兵自守而魏氏服矣王又割濮周紀注在江漢之南楚紀注建寜郡南有濮夷磨之北後志當陽縣注荆州記沮水西有磨城子胥所造屬之燕斷齊秦之要絶楚魏之脊天下五合六聚而不敢救也王之威亦憚矣憚言可畏王若能持功守威省攻伐之心而肥仁義之誡髙注肥猶厚地猶道則此誡字元作地也使無復後患三王不足四五霸不足六也王若負人徒之衆恃元作材史作仗甲兵之强一元作壹毁魏氏之威前勝魏有威矣今自挫毁不持守也而欲以力臣天下之主臣恐有後患詩云靡不有初鮮克有終易曰狐濡其尾未濟注小狐不能涉大川雖濟而無餘力將濡其尾不能終也此言始之易終之難也何以知其然也智氏見伐趙之利而不知榆次之禍也榆次屬太原智伯𦵏處吳見伐齊之便而不知干隧之敗也干隧吳地蘇秦春申𫝊並不注道應注干遂在臨淮豈此耶蓋或越王逐北至是此二國者非無大功也没元作設利於前没猶溺而易患於後也吳之信越也從而伐齊遂攻齊人於艾陵還為越王禽於三江之浦禮揚州其川三江浦水濵也髙注即干隧智氏信韓魏從而伐趙攻晉陽之城勝有日矣其日可期韓魏反之殺智伯瑶於鑿臺之上史注在榆次今王妬楚之不毁也謂無傷而忘毁楚之强魏也楚毁不能侵之故强攷下文宜有韓字臣為大王慮而不取詩云大武逺宅不涉逸詩武足迹宅猶居也言地之居逺者雖有大足不涉之也從此觀之楚國援也鄰國敵也詩云他人有心予忖度之躍躍遇犬獲之大雅巧言詩忖亦度也躍躍走也狡也言雖善走或時遇犬犬能得之喻人心難知或可忖度今王中道而信韓魏之善王也中道在前後間此正吳信越也臣聞敵不可易時不可失臣恐韓魏之卑辭慮患以慮患故辭卑而實欺大國也王既無重世之徳於韓魏重猶累而有累世之怨焉夫韓魏父子兄弟接踵而死於秦者百世矣本國殘社稷壊宗廟隳刳腹折頥顄也首身分離暴骨草澤暴日乾也頭顱僵仆顱首骨僵僨仆僵也相望於境父子老弱係虜相隨於路係纍為虜虜獲也鬼神狐祥狐之為妖者無所食無人為之依也百姓不聊生族𩔖離散流亡為臣妾男為人臣女為妾滿海内矣韓魏之不亡秦社稷之憂也今王之攻楚不亦失乎且王攻楚之日則惡出兵惡安也王將藉路於仇讐之韓魏乎兵出之日而王憂其不反也是王以兵資於仇讐之韓魏資猶與王若不藉路於仇讐之韓魏必攻隨陽右壌此皆廣川大水山林谿谷不食之地王雖有之不為得地是王有毁楚之名無得地之實也且王攻楚之日四國必衍應字悉起應王齊趙魏韓也方言南攻故不及燕應言以兵從之蓋躡秦也秦楚之兵𥙷構而不離魏氏將出兵而攻留屬楚國方與方與胡陵屬山陽銍胡陵碭蕭相碭屬梁國餘屬沛故宋必盡七邑故皆宋地齊人南靣泗北必舉濟隂乗氏注泗水入淮魯國十縣注入沛此皆平原四達膏腴之地也而王使之獨攻秦與楚戰不暇救七邑及泗北故二國攻之兵勢無所分也王破楚於以肥韓魏於中國而勁齊韓魏之强足以校於秦矣校較同直也言與之敵而齊南以泗為境東負海負與抱反背也北倚河而無後患天下之國莫强於齊齊魏得地葆利葆保同而詳事下吏事猶治一年之後為帝若未能於以禁王之為帝有餘禁制也夫以王壌土之博人徒之衆兵革之强而注地於楚注猶屬言地廣詘令韓魏詘猶反歸帝重於齊是王失計也臣為王慮莫若善楚秦楚合而為一以臨元作臨以韓韓必授首言其服而請誅王襟以山東之險蔽障如襟帶以河曲之利圍遶如帶韓必為關中之候比之候吏若是王以十萬𥙷戍元作成鄭梁氏寒心戰懼則然許鄢陵並屬潁川嬰城上蔡召陵並屬汝南不往来也韓魏不通如此而魏亦關内候矣王一善楚而關内二萬乗之主注地於秦元作齊齊之右壌可拱手而取也拱歛手是王之地一注元作任兩海東南要絶天下也要謂中是燕趙無齊楚齊楚𥙷此二字無燕趙也然後危動燕趙以危亡之事恐動之持齊楚持劫之也此四國者不待痛而服矣痛言攻伐之酷春申𫝊有叚産秦人謂新城君韓㐮十二年注芊戎也曰夫宵行者能無為姧而不能令狗無吠已今臣處郎中郎廊同漢官表注主郎内諸官能無議君於王而不能使人毋議臣於君願君察之也元在韓䇿魏昭䇿白圭語同段干越人凡段干皆魏人今在秦謂新城君曰王良之弟子駕良趙簡子御駕馬在車下負軛云取千里其言然馬遇造父之弟子造父周穆王之御不得與王良同時然學出於造父者得稱為其弟子非必與之同時也造父之弟子曰馬不千里不能然王良弟子曰馬千里之馬也服千里之服也駕車馬四兩服在中央夹轅兩驂在旁見大叔于田言馬言服馬豈驂耶而不能取千里何也曰子纆牽長纆索也以牽馬故纆牽於事萬分之一也而難千里之行今臣雖不肖於秦亦萬分之一也而相國見臣戎未嘗相以其得國事稱之不釋塞者言障之於王不解是纆牽長也亦在韓䇿詳二臣之言則戎之寵少衰矣故范雎得而間之范子名雎字叔後封應侯凡范皆晉舊姓故史云魏人因王稽秦謁者令時使魏還入秦獻書昭王曰臣聞明主莅正史作政字通有功者不得不賞有能者不得不官勞大者其祿厚功多者其爵尊能治衆者其官大故不能者不敢當其職焉能者亦不得蔽隠使以臣之言為可則行而益利其道利猶達若將弗行則久留臣無謂元作為也語曰人主賞所愛而罰所惡明主則不然賞必加於有功刑必斷於有罪今臣之胷不足以當椹質集韻椹斫木鑕鑕鐵椹質鑕同要不足以待斧鉞鉞亦斧也豈敢以疑事嘗試於王乎嘗亦試也雖以臣為賤而輕辱臣獨不重任臣者後無反覆於王前耶保任人必保其後後不如言則為反覆此任人者所重也王豈得輕之臣聞周有砥厄宋有結緑梁有懸黎楚有和璞卞和之璞皆美玉名此四寳者工之所失也失謂不能别之故卞和三刖也而為天下名器然則聖主之所棄者獨不足以厚國家乎厚言使之重臣聞善厚家者取之於國善厚國者取之於諸侯皆取其人天下有明主則諸侯不得擅厚矣是何也為其凋榮也凋傷也榮艸華也此喻厚重彼有擅之則此無有良醫知病人之死生聖王明於成敗之事利則行之害則舍之疑則少嘗之雖堯舜禹湯復生弗能改已語之至者臣不敢載之於書其淺者又不足聽也意者臣愚而不闔於王心耶闔合同亡元作已其言臣者亡其猶得無將賤而不足聽耶非若是也則臣之志絶句願少賜㳺觀之閒閒暇隙也望見足下不斥王故指其足下之人猶陛下也而入之書上秦王説之因謝王稽説且謝且説説其未用之故使人持車召之雎傳有范雎至秦王庭迎范雎曰寡人宜以身受令乆矣今者義渠之事急蓋脩李帛之怨寡人日自請太后今義渠之事已寡人乃得以身受命躬竊閔然不敏閔猶傷敏疾也自傷其見雎之緩敬執賔主之禮范雎辭譲是日見范雎見者下見賢遍切無不變色易容者秦王屏左右博雅屏除也此謂去之宫中虚無人秦王跪而請曰先生何以幸教寡人以教之為寵范雎曰唯唯有間亦隙也秦王復請范雎曰唯唯若是者三秦王跽曰長跪也先生不幸教寡人乎范雎謝曰非敢然也臣聞始時吕尚之遇文王也身為漁父而釣於渭陽之濵耳渭水出隴西首陽此渭水之陽詩匡咸陽之地若是者交疏也絶句已一説而立為太師載與俱南歸者其言深也故文王果収功於吕尚卒擅天下而身立為帝王即使文王疏吕望而弗與深言是周無天子之徳而文武無與成其王也今臣羇旅之臣也交疏於王而所願陳者皆匡君臣之事處人骨肉之間處猶在也謂欲言太后及穣侯等願以陳臣之陋忠而未知王心也所以王三問而不對者是也臣非有所畏而不敢言也知今日言之於前而明日伏誅於後然臣弗敢畏也大王信行臣之言死不足以為臣患亡不足以為臣憂漆身而為厲音頼惡疾也被髮而為狂不足以為臣恥五帝之聖而死三王之仁而死五霸之賢而死烏獲之力而死秦紀烏獲武王力士然自孟子時稱之則其以力聞久矣奔育之勇而死史注孟奔夏育皆勇士育之力能舉千鈞死者人之所必不免處必然之勢可以少有補於秦此臣之所大願也臣何患乎伍子胥槖載而出昭關楚關名夜行而晝伏至於菱夫地缺無以餌其口坐行蒲服匍匐同乞飢困故食於吳市胥𫝊在丹陽溧陽卒興吳國闔閭為霸使臣得進謀如伍子胥加之以幽囚終身不復見是臣説之行也臣何憂乎箕子接輿髙士𫝊楚人陸通字接輿漆身而為厲被髮而為狂無益於殷楚使臣得同行於箕子接輿漆身可以補所賢之主是臣之大榮也二子無補於時猶為之今為而有補故特以為榮臣又何恥乎臣之所恐者獨恐臣死之後天下見臣盡忠而身蹷也蹷僵也是以杜口褁足莫肯即秦耳即就也足下上畏太后之嚴下惑姧臣之態居深宮之中不離保傅之手女保女傅非大臣也終身闇惑無與照姧大者宗廟滅覆小者身以孤危此臣之所恐耳若夫窮辱之事死亡之患臣弗敢畏也臣死而秦治賢於生也秦王跪曰先生是何言也夫秦國僻逺寡人愚不肖先生乃幸至此此天以寡人慁先生慁溷同亂也濁貌而存先王之廟也寡人得受命於先生此天所以幸先王而不棄其孤也先生奈何而言若此事無大小上及太后下至大臣願先生悉以教寡人無疑寡人也范雎再拜秦王亦再拜范雎曰大王之國北有甘泉谷口文紀注在雲陽雲陽屬馮翊南帶涇渭涇水出安定涇陽右隴蜀隴西有隴坻即隴坂左關坂函谷關隴坂戰車千乗奮撃百萬以秦卒之勇車騎之多以當諸侯譬若施韓盧俊犬名博物志韓有黒犬名盧而逐駑也駑言其不俊霸王之業可致今反閉關𥙷而不敢窺兵於山東者是穣侯為國謀不忠而大王之計有所失也王曰願聞所失計雎曰大王越韓魏而攻强齊非計也少出師則不足以傷齊多之則害於秦臣意王之計以意測之欲少出師而悉韓魏之兵則不義矣義宜也已少出師而使人悉出非宜也今見與國之不可親與謂韓魏越人之國而攻可乎疏於計矣昔者齊人伐楚閔二十三年敗楚重丘大有功戰勝破軍殺將再辟千里辟拓地也膚寸之地無得者集韻側手曰扶通作膚春秋𫝊膚寸而合豈齊不欲地哉形弗能有也諸侯見齊之罷露罷疲同在野曰露君臣之不親舉兵而伐之魏昭十二年與秦趙韓燕伐齊敗之主辱軍破為天下笑所以然者以其伐楚而肥韓魏也此所謂藉賊兵而齎盗食者也王不如逺交而近攻得寸則王之寸得尺亦王之尺也今舍此而逺攻不亦繆乎且昔者中山元作山中之地方五百里趙獨擅之武靈二十七年亡中山功成名立利附焉元作則今從史天下莫能害此言近攻之利今韓魏中國之處而天下之樞也言出入来往所由王若欲霸必親中國而以為天下樞以威楚趙趙强則楚附楚强則趙附言雖不能兼制必有一附楚趙附則齊必懼懼必卑辭重幣以事秦齊附而韓魏可虚也可使為丘墟王曰寡人欲親魏魏多變之國也寡人不能親請問親魏奈何范雎曰卑辭重幣以事之不可削地而賂之不可舉兵而伐之彪謂逺交近攻雎之策當矣語未卒而復欲親之既親之又欲伐之立談之間矯亂如此使人主何適從乎若曰某䇿為上某次之其可也於是舉兵而攻邢丘在河南平臯邢丘㧞四十一年夏取邢丘而魏請附曰雎復説也秦韓之地形相錯如繡秦之有韓若木之有蠹人之病心腹天下有變為秦害者莫大於韓王曰寡人欲収韓韓𥙷不聽為之奈何范雎曰舉兵而攻滎陽屬河南則成臯之路不通北斬太行之道河内山陽皆有此山晉隘也則上黨之兵不下一舉而攻宜陽則其國斷而為三衍魏字韓見必亡焉得不聽韓聽而霸事可成也王曰善雎傳有按史拔邢丘在親魏説後二年此三十八年也攻宜陽説亦在拔邢丘前則此邢丘拔要終言之也范雎曰臣居山東聞齊之内有田單齊之疏屬後為相封安平君史云田文非也文去齊至是已二十餘年不得近舍單逺論文也不聞其有王聞秦之有太后穣侯涇陽昭王母弟華陽不聞其有王夫擅國之謂王擅專也能專利害之謂王制殺生之威之謂王今太后擅行不顧不顧王也穣侯出使不報報猶白也言不白王而擅遣使於外涇陽華陽撃斷無諱撃斷謂刑人無諱言不避王四貴備而國不危者未之有也為此四貴下乃所謂無王已然則權焉得不傾而令焉得從王出乎臣聞善為國者内固其威而外重其權穣侯使者操王之重决裂諸侯謂分剖其地剖符於天下剖猶分符信也謂軍符漢制以竹長六寸分而相合征敵伐國莫敢不聽戰勝攻取則利歸於陶國敝御於諸侯國謂秦御言為諸侯所制戰敗則怨結於百姓而禍歸社稷詩曰木實繁者實木子披其枝披謂禠之披其枝者傷其心逸詩大其都者危其國此因詩申之也尊其臣者卑其主淖齒楚将楚使救齊因相之管齊之權管猶管㩁之管專之也縮閔王之筋縣之廟梁宿昔而死集韻宿夜也通作昔事在閔四十年李兑用趙減食主父減主父食百日而餓死趙惠文四年今秦太后穣侯用事髙陵亦昭王母弟涇陽佐之卒無秦王此亦淖齒李兑之𩔖已臣今見王獨立於朝廟矣且臣將恐後世之有秦國者非王之子孫也秦王懼於是乃廢太后逐穣侯出髙陵走涇陽於關外此四十二年昭王謂范雎曰昔者齊公得管仲時以為仲父今吾得子亦以為父雎𫝊有應侯謂昭王曰亦聞恒思地缺有神叢與灌木中有神靈託之恒思有悍少年請與叢博局戲也六著十二棊曰吾勝叢叢藉吾神三日以神靈借我不勝叢叢困我乃左手為叢投班固奕指曰博懸於投不必慧巧駰曰投投瓊右手自為投右强而便欲自取勝勝叢叢藉其神三日叢往求之遂弗歸五日而叢枯七日而叢亡今國者王之叢勢者王之神藉人以此得無危乎臣未嘗聞指大於臂臂大於股若有此則病必甚矣百人輿瓢而趨負之如輿載物不如一人持而走疾百人誠輿瓢瓢必裂以爭持者衆今秦國華陽用之穣侯用之太后用之王亦用之不稱瓢為器則已稱猶等也謂比國於瓢稱瓢為器國必裂矣臣聞之木實繁者枝必披枝之披者傷其心都大者危其國臣强者危其主其令邑中自斗食以上漢官表注嵗俸不滿百斛計日而食一斗二升至尉内史秦有郡尉有内史郡國官也及王左右有非相國之人者乎相國穣侯國無事則已國有事臣必見王獨立於庭也臣竊為王恐恐萬世之後有國者非王子孫也臣聞古之善為政者其威内扶扶猶持也言不顛仆其輔外布輔謂股肱之臣而元作四治政不亂不逆使者直道而行不敢為非今太后使者分裂諸侯而符布天下操大國之勢强徴兵伐諸侯戰勝攻取利盡歸於陶國之幣帛竭入太后之家境内之利分移華陽古之所謂危主滅國之道必從此起三貴竭國以自安據上文不及涇陽髙陵然則令何得從王出權何得毋分是衍我字王果處三分之一也彪謂人君生事之所嚴有母而巳范雎説昭王乃以太后為稱首忍哉君子所以進其身豈捨此獨無説乎秦昭王謂左右曰今日韓魏孰與始强對曰弗如也王曰今之如耳魏人魏齊魏相孰與孟嘗先時相魏芒卯之賢不信韓人魏主兵也對曰弗如也王曰以孟嘗芒卯之賢帥强韓魏之兵以伐秦猶無奈寡人何也今以無能之如耳魏齊帥弱韓魏以攻秦其無奈寡人何亦明矣中期武王時已出此人至是四十四五年矣推琴對曰王之料天下過矣料量也昔者六晉之時智范中行韓魏趙晉卿也實分晉國智氏最强滅破范中行又帥韓魏以圍趙㐮子於晉陽决晉水出晉陽以灌晉陽城不沈者三板耳板髙二尺智伯出行水行去音按視也韓康子御魏桓子驂乗徐無鬼疏在左為驂在右為御智伯曰始吾不知水之可亡人之國也乃今知之汾水利以灌安邑汾水出汾陽屬河東絳水利以灌平陽絳水平陽並屬河東魏桓子肘韓康子不敢正語以肘築之康子履魏桓子躡其踵躡蹈踵跟也肘足接於車上而智氏分矣身死國亡為天下笑今秦之强不能過智伯韓魏雖弱尚賢其在晉陽之下也此乃方其用肘足時也願王之勿易也彪謂此賢人君子之言也人君閒暇宜數聞之魏釐十一年有此四十一年也以在取邢丘下故不可先范雎事秦宣太后愛魏醜夫魏人仕秦太后病將死出令曰為我葬必以魏子為殉以人從𦵏曰殉魏子患之庸芮秦人為魏子説太后曰以死者為有知乎太后曰無知也曰若太后之神靈明知死者之無知矣何為空以生所愛葬於無知之死人哉若死者有知先王積怒之日久矣太后救過不贍何暇乃私魏醜夫乎太后曰善乃止后死在四十二年秦攻韓圍陘僖四年次于陘注楚地穎川邵陵南有䣆亭此時屬韓韓桓惠九年秦㧞我陘此四十三年也范雎謂秦昭王曰有攻人者有攻地者穣侯十攻魏而不得傷者非秦弱而魏强也其所攻者地也地者人主所甚愛也人主者人臣之所樂為死也攻人主之所愛與樂死者鬭故十攻而弗勝也今王將攻韓圍陘臣願王之毋獨攻其地而攻其人也王攻韓圍陘以張儀為言儀死至雎之相四十四年矣儀亦未嘗在韓此必誤張儀之力多且割元作削地而以自贖於王幾割地而韓不盡張儀之力少則王逐張儀而更與不如儀者市智不如耳非力也則王之所求於韓者盡可得也應侯曰鄭人謂玉未理者璞周人謂䑕未腊者朴周人懐朴元作璞過鄭賈曰欲買朴乎鄭賈曰欲之出其朴乃䑕也因謝不取謝辭去也今平原君趙公子勝惠文王弟後相孝成見魏無忌傳自以賢顯名於天下然降其主父沙丘而臣之降貶損之也鉅鹿有沙丘亭趙記不書此未詳天下之王尚猶尊之是天下之王不如鄭賈之智眩於名眩目無常主也故為惑不知其實也天下之士合從相聚於趙而欲攻秦秦相應侯曰王勿憂也請令廢之秦於天下之士非有怨也相聚而攻秦者以已有富貴耳王見大王之狗卧者卧起者起行者行止者止毋相與鬭者投之一骨輕起相牙者輕猶忽也牙言以牙相噬何則有爭意也於是使𥙷唐雎載音樂予之五千金居武安屬魏郡趙奢傳注在邯鄲西髙會髙紀注大會也相與飲謂邯鄲人邯鄲趙國都誰来取者於是其謀者固未可得予也用金少故未能動謀者其可得予者與之昆弟矣謀人之昆弟公與秦計功者應侯教唐雎云不問金之所之金盡者功多矣今令人復載五千金隨公唐雎行至武安散不能三千金天下之士大相與鬭矣士得金復為秦故其謀不協謂應侯曰君禽馬服君乎趙括也襲其父稱曰然又即圍邯鄲乎四十八年十月曰然曰𥙷趙亡秦王王矣武安君為三公武安君所以為秦戰勝攻取者七十餘城南亡鄢郢漢中南郡宜城注故鄢江陵注郢都又郢故郢禽馬服之軍不亡一甲雖周吕望之功亦不過此矣趙亡秦王王武安君為三公君能為之下乎雖欲無為之下固不得之矣秦嘗攻韓邢趙國襄國注故邢國此字當作䣆困於上黨上黨之民皆返為趙馮亭事天下之民不樂為秦民之日固久矣今攻趙北地入燕東地入齊南地入楚魏則秦所得不能元作一幾何故不如因而割之許趙割地來和因以為武安功如是則起無大功雎不為之下應侯失韓之汝南豫州郡近應國應侯嘗取得之秦昭王謂應侯曰君亡國其憂乎應侯曰臣不憂王曰何也曰梁人有東門吳者其子死而不憂其相室室家之相此女也男曰家老曰公之愛子衍也字天下無有今子死而不憂何也東門吳曰吾嘗無子無子之時不憂今子死乃即與無子時同也臣奚憂焉臣亦嘗為子此臣應侯子餘子也此時無地為子時不憂今亡汝南乃即與元作與即為梁餘子同也大司徒可任之餘為餘子臣何為憂秦王以為不然以告䝉傲秦人曰今也寡人一城圍食不甘味卧不便席今應侯亡地而言不憂此其情也問其心誠然否蒙傲曰臣請得其情䝉傲乃往見應侯曰傲欲死應侯曰何謂也曰秦王師君天下莫不聞而況於秦國乎今傲勢得為秦王為將元作為王將將兵臣以韓之細也顯逆言其國小而逆節著誅奪君地傲尚奚生不若死應侯拜䝉傲曰願委之卿䝉傲以報於昭王自是之後應侯每言韓事者秦王弗聽也以其為汝南虜也汝南民為韓虜獲者昭王既息民繕兵復欲伐趙圍邯鄲也武安君曰不可王曰前年國虚民飢君不量百姓之力求益軍糧以滅趙今寡人息民以養士蓄積糧食三軍之俸集韻俸秩祿也有倍於前而曰不可其説何也武安君曰長平之事後志泫氏有長平亭在上黨郡南山中百二十里事在此四十七年秦軍大克元從寸下同徐鉉曰勝此物謂之克若尅則殺也趙軍大破秦人歡喜趙人畏懼秦民之死者厚葬傷者厚養勞者相饗鄉人飲酒也飲食餔餽餔申時食吳謂祭鬼曰餽以靡其財集韻靡㸏通壊也趙人之死者不得收傷者不得療治也涕泣相哀勠力同憂勠并力耕田疾作以生其財今王發軍雖倍其前臣料趙國守備亦以十倍矣趙自長平已来君臣憂懼早朝晏罷卑辭重幣四靣出嫁結親燕魏連好齊楚積慮并心備秦為務其國内實其交外成當今之時趙未可伐也王曰寡人既以興師矣乃使衍五字校大夫王陵將而伐趙陵戰失利亡五校集韻校木為欄格也軍部及養馬用之故軍尉馬官以為號王欲使武安君武安君稱疾不行王乃使應侯往見武安君責之曰楚地方五千里持㦸百萬君前率數萬之衆入楚拔鄢郢焚其廟東至竟陵後志屬江夏起此二十八年取鄢二十九年取郢楚人震恐震劈靂震物也故為恐東徙而不敢西向徙陳韓魏相率興兵甚衆君所將之卒𥙷不能半之而與戰之於伊闕十四年大破二國之軍流血漂鹵鹵櫓同大楯也斬首二十四萬韓魏以故至今稱東藩此君之功天下莫不聞今趙卒之死於長平者已十七八其國虚弱是以寡人睢稱王命故云大發軍人數倍元作君於趙國之衆願使君將必欲滅之矣君常以寡撃衆取勝如神況以强撃弱以衆撃寡乎武安君曰是時楚王頃㐮恃其國大不恤其政而羣臣相妬以功諛謟用事良臣斥踈集韻斥亦踈百姓心離城池不脩既無良臣又無守備故起所以得引兵深入多倍城邑兵深入城邑在後故言倍倍背同𤼵梁焚舟以專民梁橋也此皆示以不還使民專於戰也下衍以字掠於郊野掠奪取以足軍食當此之時秦中士卒以軍中為家將帥為父母不約而親不謀而信一心同力死不旋踵不反走也楚人自戰其地咸顧其家各有散心莫有鬭志是以能有功也伊闕之戰韓孤顧魏時韓僖侯立三年耳故稱曰孤不欲先用其衆魏恃韓之鋭時韓主兵故韓記言率周魏攻秦魏記言佐韓也欲推以為鋒鋒軍之先二軍爭便之力不同是以臣得設疑兵以持元作待韓陣持不决戰也專軍并鋭觸魏之不意魏軍既敗韓軍自潰乗勝逐北戰敗曰北以是之故能立功皆計利形勢謂人謀地利軍之形勢自然之理何神之有哉今秦破趙軍於長平不遂以時乗其振懼而滅之振震同以趙畏服遂釋攻畏而釋之使得耕稼以益蓄積養孤長㓜以益其衆繕治兵甲以益其强増城浚池以益其固主折節以下其臣屈折肢節臣推體以下死士推體猶委質至於平原之屬皆令妻妾補縫於行伍之間臣人一心上下同力猶勾踐困於會稽之時也以今伐之趙必固守挑其軍戰挑摧撓也撓敵求戰必不肯出圍其國都必不可克攻其列城必未可拔掠其郊野必無所得兵出無功諸侯生心外救必至臣見其害未覩其利又病未能行應侯慙而退以言於王王曰微白起吾不能滅趙乎復益發軍更使王齕代王陵伐趙圍邯鄲八九月死傷者衆而弗下趙王孝成出輕銳以冦其後秦數不利武安君曰不聽臣計今果如何王聞之怒因見武安君强起之曰君雖病强為寡人卧而将之有功寡人之願将加重於君如君不行寡人恨君武安君頓首曰臣知行雖無功得免於罪雖不行無罪不免於誅然惟願大王覽臣愚計釋趙養民以諸侯之變撫其恐懼伐其憍慢誅滅無道以令諸侯天下可定何必以趙為先乎此所謂為一臣屈而勝天下也大王若不察臣愚計必欲快心於趙以致臣罪此亦所謂勝一臣而為天下屈者也夫勝一臣之嚴焉嚴猶威孰若勝天下之威大耶臣聞明主愛其國忠臣愛其名破國不可復完死卒不可復生臣寜伏受重誅而死不忍為辱軍之將軍敗則辱此所謂愛名願大王察之王不答而去事在四十八年及五十年元在中山策之末彪謂起之策秦楚三晉可謂明切然人臣無以有已故孔子不俟駕行矣長平之敗屬耳趙何遽能益强以起之材智知己知彼而得筭多不幸至於無功極矣何破國辱軍之有三請不行此自抽杜郵之劒也秦攻邯鄲十七月不下荘人名也謂王稽曰君何不賜軍吏乎王稽曰吾與王也不用人言荘曰不然父之於子也令有必行者必不行者曰去貴妻賣愛妾此令必行者也因曰毋敢思也此令必不行者也守閭嫗曰嫗母也曰某夕某孺子孺乳子也婦之嘗乳者亦婦人之美稱齊䇿王有七孺子内某士内私之也言嫗之言亦有必行者貴妻已去愛妾已賣而心不有有猶欲也言父雖令之而非其所欲故令之勿思則必不行欲教之者人心固有教猶告也孺子内士人心固欲其告雖非至親令必行也今君雖幸於王不過父子之親言王之令亦能奪其所貴愛有不必行者軍吏雖賤不卑於守閭嫗言且告稽且君擅主輕下之日久矣聞三人成虎即魏策龎葱所稱者十夫揉椎揉屈申木也衆口所移毋翼而飛故曰不如賜軍吏而禮之王稽不聴軍吏窮果惡王稽杜摯以反摯稽之副也雎傳言稽與諸侯通則此所惡亦其實也秦王大怒而欲兼誅范雎稽始薦雎雎後任稽守河東范雎曰臣東鄙之賤人也魏在秦東開罪於衍楚字魏開言始得罪遁逃来奔臣無諸侯之援親習之故習猶狎故舊也言非王近習之舊王舉臣於羇旅之中使職事職猶主天下皆聞臣之身與王之舉也今愚元作遇惑衍或字與罪人同心罪人謂王稽而王明誅之是王過舉過猶誤也昔舉而今誅之是舉之誤顯於天下而為諸侯所議也臣願請藥賜死而恩以相葬臣既殺之而加恩以國相禮葬之王必不失臣之罪已殺之而無過舉之名王曰有之然其過舉之言遂弗殺而善遇之秦攻趙蘇子謂秦王曰臣聞明王之於其民也博論而技藝之試之以事是故官無乏事而力不困於其言也多聽而時用之是故事無敗業而惡不章臣願王察臣之所謁而効之於一時之用也臣聞懐重寳者不以夜行任大功者不以輕敵是以賢者任重而行恭智者功大而辭順皆不伐也故民不惡其尊而世不妬元從女從后其業臣聞之百倍之國者謂地廣也民不樂後也爭先附之功業髙世者人主不再行也一舉成之不待後力盡之民仁者不用也求得而反静復於無事聖王之制也功大而息民用兵之道也今用兵終身不休力盡不罷怒趙元作趙怒必於其已邑必欲戰服使為已邑趙僅存哉言所存無幾然而四輪之國也輪猶通言其民於適四方無所不通故下言從而不止今雖得邯鄲非國之長利也時攻邯鄲不破故曰今雖意者地廣而不耕民羸而不休又嚴之以刑罰新民未服故則雖從而不止矣言且去之語曰戰勝而國危者物不斷也物事也斷猶止言戰事不止功大而權輕者地不入也故過任之事父不得於子雖父責之其子使必為不可得也無已之求君不得於臣故㣲之為著者强察乎息民之為用者霸明乎輕之為重者王不伐人人所輕也重莫大焉秦王曰寡人案兵息民則天下必為從将以逆秦蘇子曰臣有以知天下之不能為從以逆秦也臣以田單如耳為大過也豈獨田單如耳為大過哉天下之主亦盡過矣夫慮收亡齊言世主志慮欲爾罷楚並音疲敝魏與不可知之趙未亡而有亡形欲以窮秦折韓臣以為至愚也夫齊威宣者世之賢王也徳博而地廣國富而民用民為之用元作用民將武而兵强宣王用之後破元作富韓威魏以南伐楚西攻秦秦補為齊兵困於殽函之上十年攘地攘推也猶拓秦人逺迹不服逺迹畏而避之也然終不服而齊為虚戰敗其地為墟其民為疾也按齊記及表不書秦敗齊惟秦紀惠十二年東攻齊昭二十二年伐齊河東為九縣三十六年攻齊取壽剛不至是也此樂毅入臨淄之役也秦與五國共敗之夫齊兵之所以破韓魏之所以僅存者何也破韓魏宜能强而適足自存者何是則伐楚攻秦而後受其殃也今富非有齊威宣之餘也今謂世主精兵非有冨韓勁魏之庫也而將非有田單司馬之慮也司馬穣苴以齊言之耳非威宣将収破齊罷楚敝魏不可知之趙欲以窮秦折韓臣以為至誤臣以從一合從為一不可成也客有難者今臣有患於世難者如刑名家蘇子所患也夫刑名之家申韓之徒皆曰白馬非馬也已如白馬實馬乃使有白馬之為也如使白馬實馬必冇白馬之為而天下之馬不皆為白馬故曰非馬此臣之所患也言難者皆無端若此故可患而今非若此也昔者秦人下兵攻懐屬河内服其人三國從之趙趙奢齊鮑佞并楚為三趙奢鮑佞將絶句楚有四人不名告之起而從之臨懐而不救秦人去而不從趙鮑楚四人本起救懐而不救又聽秦之自去不隨撃也不識三國之憎秦而愛懐耶亡其憎懐而愛秦耶亡其猶無亦云夫攻而不救去而不從是以知𥙷三國之兵困而趙奢鮑佞之能也以不救不從為能知秦之不可當也故裂地以敗於齊此下申言上殽函之敗田單将齊之良以兵横行於中十四年終身不敢設兵以攻秦折韓也而馳於封内言不出戰所謂横行於中不識從之一成惡存也於是秦王解兵不出於境諸侯休天下安二十九年不相攻以此策為蘇秦合從時則所稱趙奢惠文孝成将也蘇秦不當稱之自昭迄始皇定天下無年不戰則天下不相攻之説不可曉也今定為孝成九年邯鄲圍後説是後秦獨攻取兩周猶息兵五六年前此後此皆無觧兵之事說秦王此上元有張儀字而所説皆儀死後事故刪去說云者猶西周謂齊王之比曰臣聞之弗知而言為不智知而不言為不忠為人臣不忠當死言不審亦當死審悉也雖然言己未能如言臣願悉言所聞悉詳盡也大王裁其罪裁制也臣聞天下隂燕陽魏隂北陽南連荆楚也始皇諱其父名故稱曰荆知此書始皇時人作固齊時山東國齊楚為大故從人連結之恃以為固收餘韓韓時弱多喪地今存者其餘也成從將西南以與秦為難赧五十九年與諸侯從此五十一年臣竊笑之世有三亡而天下得之其此之謂乎此謂從臣聞之曰以亂攻治者亡以邪攻正者亡以逆攻順者亡今天下之府庫不盈府文書藏庫兵車藏今詳凡冇藏者皆得稱也囷倉空虚囷圍廪悉其士民張軍數千百萬張去音白刃在前斧質在後誅不進戰者故在後而皆去之不能死不戰也非元作罪其百姓不能死也其上不殺也言亦殺之言賞則不與言罰則不行賞罰不行故民不死也今秦出號令而行賞罰不攻耳𥙷無相攻元作攻相事也言秦有不攻耳無敢與相攻者出其父母懐衽之中衽衣衿生未嘗見冦也聞戰頓足徒禓此頓下也集韻徒空手禓袒也犯白刃蹈煨炭煨盆中火斷死於前者以死自斷比比元只一字是也比次也言如是者相次不一夫斷死與斷生也不同言死難而民為之者是貴奮也奮言勇不顧死一可以合十與敵合鬬十可以合百百可以合千千可以合萬萬可以勝天下矣今秦地形斷長續短方數千里名師數百萬名言有勇決之稱秦之號令賞罰地形利害天下莫如也秦有斷死之利諸侯有不死之害故不如秦以此與天下與言與之爭天下不足兼而有也是知秦戰未嘗不勝攻未嘗不取所當未嘗不破也當相值也開地數千里此甚大功也然而甲兵頓此頓言其勞弊士民病蓄積索集韻索盡也田疇荒疇耕治之田囷倉虚四鄰諸侯不服霸王之名不成此無異故猶言無它事謀臣皆不盡其忠也臣敢言往昔昔者齊南破荆中破宋閔二十八年西服秦荆秦事未詳北破燕十五年中使韓魏之君兩國從其役地廣而兵强戰勝攻取詔令天下以詔令令天下時未稱詔此秦史之言耳濟清河濁足以為限東郡夀張注洓上有朐城又平原有鬲津般河皆近齊長城鉅防足以為塞蘇秦𫝊注濟北盧有防門又有長城東至海後志注防門即鉅防齊五戰之國也上所謂南破中破之𩔖一戰不勝而無齊燕昭入臨淄事故由此觀之夫戰者萬乗之存亡也且臣聞之曰削株掘根無與禍鄰禍乃不存秦與荆人戰大破荆襲郢取洞庭五都江南揚州記太湖一名湖亭一名震澤一名洞庭熊繹按楚熊繹都丹陽文王徙江陵是為郢都昭王徙郢所謂故郢又自郢徙都與鄢為五史多言鄢郢齊䇿鄢郢者楚之柱國知鄢亦為都江南即漢志楚地所謂江南地逺者也荆王頃㐮亡走東伏於陳見白起𫝊當是之時隨荆以兵則荆可舉㧞其國如舉物然言易也舉荆則其民足貪也地足利也東以强齊燕强於二國中陵三晉然則是一舉而霸王之名可成也舉猶行四鄰諸侯可朝也使之朝秦而謀臣不為引軍而退與荆人和令荆人収亡國聚散民立社主為木主社置宗廟今帥天下西面以與秦為難此固已無霸王之道一矣天下有比志比密也言其志親而軍華下即華陽之所大王以詐破之兵至梁都元作郭圍梁數旬則梁可拔拔梁則魏可舉梁以都言魏全國也舉魏則荆趙之志絶魏居二國之中而為與國故舉魏則二國不通荆趙之志絶則趙危趙尤近秦趙危而荆孤東以强齊燕中陵三晉然則是一舉而霸王之名可成也四鄰諸侯可朝也而謀臣不為引軍而退與魏氏和令魏氏収亡國聚散民立社主置宗廟此固已無霸王之道二矣前者穰侯之治秦也用一國之兵而欲以成兩國之功秦及穰侯所封也如封壽剛以廣陶之𩔖是故兵終身暴露於外士民潞病於内潞即露耳故髙注為嬴霸王之名不成此固已無霸王之道三矣趙氏中央之國也雜民之所居也其民輕而難用也輕則其志不堅號令不治賞罰不信地形不便無險隘故上非能盡其民力彼固亡國之形也而不憂民氓在野曰氓悉其士民軍於長平之下以爭韓之上黨馮亭事大王以詐破之㧞武安此殺趙括事在四十七年當是時趙氏上下不相親也貴賤不相信也然則是邯鄲不守拔邯鄲完河間冀州國完之者欲急取修武上黨諸郡置之去也引軍而去西攻修武屬河内踰羊腸降代上黨代三十六縣上黨十七縣不用一領甲不苦一民皆秦之有也代上黨不戰而已為秦矣東陽屬清河河外滹沱河之外不戰而已反為齊矣此本趙所得齊地今趙弱故齊復取之取之則益弱矣中呼沱元作池以北中言中分之呼沱在代鹵城不戰而已為燕矣燕乗敗取之然則是舉趙則韓必亡韓亡則荆魏不能獨立荆魏不能獨立則是一舉而壊韓蠧魏蠧者病其中也挟荆以東弱齊燕决白馬之口張儀𫝊守白馬之津津在東郡以流魏氏流猶灌一舉而三晉亡從者敗合從者大王拱手以須須胥同待也天下徧隨而伏霸王之名可成也而謀臣不為引軍而退與趙氏為和以大王之明秦兵之强霸王之業謂先世所創地尊不可得地與相王之尊乃取欺於亡國亡國以長平之敗言趙是謀臣之拙也且夫趙當亡不亡秦當霸不霸天下固量秦之謀臣一矣乃復悉卒以攻邯鄲不能㧞也棄甲兵怒戰慄而却且怒且懼而退天下固量秦力二矣軍乃引退并於李下後志河内有李城趙封李同之父於此大王又并軍而致與戰致言極力非能厚勝之也厚猶大又交罷却交言秦與趙俱罷兵而退天下固量秦力三矣内者量吾謀臣外者極吾兵力極言度其力之所至由是觀之臣以天下之從合從也豈其難矣内者吾甲兵頓士民病蓄積索田疇荒囷倉虛外者天下比志甚固願大王有以慮之也且臣聞之戰戰慄慄日慎一日茍慎其道天下可有也何以知其然也昔者紂為天子元作下帥天下将百萬左飲於淇谷河内共淇水所出右飲於洹水蘇秦𫝊注出林慮項紀注在安陽縣北前後志在良鄉東南淇水竭而洹水不流亦竭也以與周武為難武王将素甲三千領絹素為之非金革也戰一日破紂之國以甲子日戰遂克之禽其身據其地而有其民天下莫不傷傷殷之亡耳智伯帥三國之衆以攻趙㐮主於晉陽禮大夫稱主决水灌之三年城且㧞矣㐮主錯龜錯措同置也數策以蓍筮也占兆灼龜拆處曰兆以視利害何國可降三國中孰為可降而使張孟談趙之謀臣於是潜行而出反智伯之約使韓魏背之得兩國之衆以攻智伯之國禽其身以成㐮子之功今秦地斷長續短方數千里名師數百萬秦國號令賞罰地形利害天下莫如也以此與天下天下可兼而有也臣昧死自言不知死所望見大王言所以舉破天下之從舉謂一舉舉趙亡韓舉亦㧞也臣荆魏親齊燕二國去秦逺未可加兵故親之以寛兵力其後秦滅諸國二國獨後亡以此故也以成霸王之名朝四隣諸侯之道大王試聽其説一舉而天下之從不破趙不舉韓不亡荆魏不臣齊燕不親霸王之名不成四鄰諸侯不朝大王斬臣以徇於國徇行以示人也以主不忠於國者主言以為首惡彪謂此士論事深切著明孫卿不如秦所以取天下蓋行其說也而史失其人猥以張儀名之惜哉所稱謀臣范雎也蔡澤燕人見逐於趙而入韓魏遇奪釡鬲於涂人奪之也爾雅鬲鼎也聞應侯任鄭安平魏齊困范雎安平匿之時安平撃趙以二萬人降趙王稽通諸侯也皆負重罪應侯内慙乃西入秦将見昭王使人宣言以感怒應侯曰燕客蔡澤天下駿雄𢎞辯之士也彼一見秦王秦王必相之而奪君位應侯聞之使人召蔡澤蔡澤入則揖應侯應侯固不快及見之又倨應侯因譲之曰子嘗宣言代我相秦豈有此乎對曰然應侯曰請聞其説蔡澤曰吁君何見之晚也夫四時之序成功者去夫人生手足堅强耳目聰明聖智豈非士之所願與應侯曰然蔡澤曰質仁秉義質猶體行道施徳於天下天下懐樂敬愛願以為君王豈不辯智之期與期猶志也辯智者志期得此應侯曰然蔡澤復曰富貴顯榮成理萬物理治也萬物各得其所生命夀長終其年而不夭傷天下繼其統統紀也守其業𫝊之無窮名實純粹言其兩全美澤流千世稱之而毋絶豈非道之符言行道之効而聖人所謂吉祥善事與應侯曰然澤曰若秦之商君楚之吳起衛人仕魏後相楚而死越之大夫種姓文越王勾踐之相其卒亦可願與元作矣應侯知蔡澤之欲困己以説復曰何為不可夫公孫鞅事孝公極身毋二極身猶竭已盡公不還私還反顧也信賞罰以致治竭智能示情素素其所蓄積䝉怨咎集韻冡覆也䝉冡同鞅嘗刑太子之傅知必見怨咎猶冐為之欺舊交虜魏公子卬卬則鞅之舊也卒為秦禽将破敵軍攘地千里吳起事悼王使私不害公讒不蔽忠言不取茍合行不取茍容行義不顧元作固毁譽必欲元作有霸主强國不辭禍凶大夫種事越王王離困辱離罹同集韻遭也悉忠而不解解懈同主雖亡絶盡能而不離離猶去多功而不矜貴冨不驕怠若此三子者義之至忠之節也故君子殺身以成名義之所在身雖死無憾悔何為而不可哉蔡澤曰主聖臣賢天下之福也君明臣忠國之福也父慈子孝夫信婦貞家之福也故比干忠不能存殷子胥智不能存吳申生孝而晉惑亂僖五年是有忠臣孝子國家滅亂何也無明君賢父以聽之故天下以其君父為戮辱戮殺也賤之如刑戮詬辱之人憐其臣子夫待死而後可以立忠成名是微子不足仁孔子不足聖管仲不足大也於是應侯稱善蔡澤得少間間言有隙可乘因曰商君吳起大夫種其為人臣盡忠致功則可願矣閎夭事文王周公輔成王也豈不亦忠乎以聖論之商君吳起大夫種其可願孰與閎夭周公哉應侯曰商君吳起大夫種不若也蔡澤曰然則君之主慈仁任忠任猶信不欺舊故孰與秦孝楚悼越王乎應侯曰未知何如也蔡澤曰主固親忠臣不過秦孝越王楚悼君之為主正亂批患折難批同匹齊切撃也集韻􅔊或作批又蒲結切廣地殖榖植種也富國足家强主威蓋海内功彰萬里之外不過商君吳起大夫種而君之祿位貴盛私家之富過於三子而身不退竊為君危之語曰日中則移月滿則虧物盛則衰天之常數也進退盈縮變化聖人之常道也昔者齊桓公一匡天下至葵丘之㑹杜注陳留外黄東有葵丘有驕矜之色畔者九國僖九年吳王夫差無敵元作適於天下輕諸侯陵元作凌齊晉遂以殺身亡國夏育太史啓太史周官其人未詳史作史噭豈君王后之父耶叱呼駭三軍叱訶也而身死於庸夫此皆乗至盛不近道理也夫商君為孝公平權衡正度量調輕重决裂阡陌教民耕戰是以兵動而地廣兵休而國富故秦無敵於天下立威諸侯功已成矣補遂以車裂楚地持㦸百萬白起率數萬之師以與楚戰一戰舉鄢郢再戰燒夷陵屬南郡南并蜀漢又越韓魏攻强趙北坑馬服誅屠四十餘萬之衆屠言殺之酷流血成川沸聲若雷使秦業帝有帝之業自是之後趙楚懾服懾失氣也不敢攻秦者白起之勢也身所服者七十餘城功已成矣賜死於杜郵起𫝊注在咸陽西門十里吳起為楚悼罷無能廢無用損不急之官塞私門之請壹楚國之俗南攻楊越越屬揚州北并陳蔡破横散從使馳說之士無所開其口功已成矣卒支解㫁其四支按起𫝊宗室大臣射刺起死大夫種為越王墾草剏邑墾耕剏造也辟地殖榖殖植同率四方之補士專𥙷上下之力以禽勁吳成霸功勾踐終拮而殺之拮戞同轢也蓋逼之楚記言賜劒死此四子者功成而不去禍至於此此所謂信而不能屈往而不能反者也范蠡知之超然避世長為陶朱居陶易姓朱君獨不觀博者乎或欲衍分字大投大言全勝也或欲分功分勝者所獲此皆君之所明知也今君相秦計不下席謀不出廊廟坐制諸侯利補施三川以實宜陽以决羊腸之險塞太行之口又斬范中行之途斬謂絶之此言斷三晉之路棧道千里棧棚也施於險絶以濟不通通補於蜀漢使天下皆畏秦秦之欲得矣君之功極矣此亦秦之分功之時也秦秦人如時不退時是也則商君白公吳起大夫種是也君何不以此時歸相印譲賢者授之必有伯夷之廉長為應侯世世稱孤而有喬松之壽喬王子晉松赤松子皆仙不死孰與以禍終哉此則君何居焉應侯曰善乃延入坐為上客後數日入朝言於秦昭王曰客新有從山東来者蔡澤其人辯士臣之見人甚衆莫有及者臣不如也秦昭王召見與語大說之拜為客卿應侯因謝病以病辭去請歸相印昭王强起應侯應侯遂稱篤篤猶甚因免相昭王新說蔡澤計畫遂拜為秦相在五十二年東収周室蔡澤相秦王數月人或惡之懼誅乃謝病歸相印號為剛成君居𥙷秦十餘年事補昭王孝文王荘㐮王卒事始皇帝為秦使於燕三年居燕三年而燕使太子丹入質於秦澤𫝊有彪謂周衰辯士皆矜材角智趣於利而已惟澤為近道徳明哲保身之䇿故其得位不數月引去優㳺於秦以封君令終美矣非茍知之亦允蹈之澤之謂乎孝文王昭王子元年辛亥周亡於是六年矣濮陽人屬東郡吕不韋賈於邯鄲見秦質子異人子楚初名孝文王子歸而謂父曰耕田之利幾倍曰十倍珠玉之贏幾倍曰百倍立國家之主贏幾倍曰無數曰今力田疾作不得煖衣餘食今建國立君澤可以遺世遺猶詒世後世願往事之事猶為秦子異人質於趙處於􅡍城趙地缺故往説之曰子傒異人異母兄有承國之業又有母在中今子無母於中異人母曰夏姬無寵如無母然外託於不可知之國史言趙不禮之故禍福未可知也一日倍約身為糞土弃死且賤也今子聽吾計事求歸以求歸為事可以有秦國吾為子使秦必来請子乃說秦王后孝文后華陽夫人弟陽泉君曰君之罪至死君知之乎君之門下無不居髙尊位太子門下無貴者太子子傒君之府藏珍珠寳玉君之駿馬盈外厩美女充後庭王之春秋髙春秋舉成嵗此言其年髙一日山陵崩山陵喻髙且固崩喻死太子用事君危於累卵而不壽於朝生木槿也朝榮夕死今又不如說有可以一切權宜也而使君富貴千萬嵗衍其字寜於太山四維四方之隅不可移也必無危亡之患矣陽泉君避席離席前請請聞其説不韋曰王年髙矣王后無子子傒有承國之業士倉又輔之王一日山陵崩子傒立士倉用事王后之門必生蓬蒿子異人賢材也棄在於趙無母於内引領西望而願一得歸王后誠請而立之是子異人無國而有國王后無子而有子也陽泉君曰然入說王后王后乃請趙而歸之趙未之遣不韋説趙曰子異人秦之寵子也無母於中王后欲取而子之使秦而欲屠趙不顧一子以留計留不决也是抱空質也出質本以交好今不能然故曰空若使子異人歸而得立趙厚送遣之是不敢倍徳畔施是自為徳講必以恩紀講好於趙秦王老矣一日晏駕天文志注天子當早作而方崩隕臣子之心猶謂宫車晚出雖有子異人不足以結秦趙乃遣之不韋𫝊秦圍邯鄲趙欲殺子楚子楚脱亡歸與此駮異人至不韋使楚服而見以王后楚人故服楚製以説之王后説其狀髙其智曰吾楚人也而自子之乃變其名曰楚王使子誦誦所習書子曰少棄捐在外嘗無師𫝊所教學不習於誦王罷之乃留止止宮中間曰間政事之隙陛下嘗軔車於趙矣髙紀五年注陛者云云軔礙車木趙之豪傑得知名者不少以名見知於王今大王反國皆西面而望大王無一介之使以存之昭二十八年注一箇單使也存問也問其存亡臣恐其皆有怨心使邊境早閉晩開冇警則然王以為然奇其計王后勸立之王乃召相令之曰寡人子莫若楚立以為太子子楚立是為荘㐮王以不韋為相號曰文信侯食藍田十二縣王后為華陽太后諸侯皆致秦邑致邑為太后養地也按此是子楚以孝文王立後不韋説使歸之不韋𫝊則言孝文為安國君時歸與此駮庻彪謂不韋賈人也彼安能知義欲圖贏而奪嫡立秦國之不亂敗者幸也以此得贏而飲酖於蜀於是知有天道矣凡不韋所立於時皆喪身滅國之事周衰士之憸險傾邪無輩於不韋者不足算也不足算也子楚之計平平耳孝文稱為竒而立之非老悖乎荘㐮王文王子元年壬子始皇帝荘㐮王子元年乙卯文信侯欲攻趙以廣河間使剛成君蔡澤事燕三年而燕太子質於秦文信侯因請張唐秦人相燕張唐辭曰燕者必徑於趙徑者道所出也趙人得唐者受百里之地文信侯去而不快少庶子甘羅禮庶子掌諸侯卿大夫之庶子羅茂之孫曰君侯何不快甚也文信侯曰吾令剛成君蔡澤事燕三年而燕太子已入質矣今吾自請張卿相燕而不肯行甘羅曰臣行之文信侯元作君叱去曰我自行之而不肯汝安能行之也甘羅曰夫項橐列子有問日出者豈其人乎生七嵗而為孔子師今臣生十二嵗於兹矣君其試臣奚以遽言叱也甘羅見張唐曰卿之功孰與武安君唐曰武安君戰勝攻取不知其數攻城墮邑不知其數臣之功不如武安君也甘羅曰卿明知功之不如武安君與曰知之應侯之用秦也見用於秦孰與文信侯專曰應侯不如文信侯專曰卿明知為不如文信侯專與曰知之甘羅曰應侯欲伐趙武安君難之去咸陽七里絞而殺之起傳言賜劒今文信侯自請卿相燕而卿不肯行臣不知卿所死之處矣唐曰請因孺子而行因之請於文信離婁注孺子童子令庫具車廐具馬府具幣行有日矣甘羅謂文信侯曰借臣車五乗請為張唐先報趙見趙王悼㐮趙王郊迎謂趙王曰聞燕太子丹之入秦與曰聞之聞張唐之相燕與曰聞之燕太子入秦者燕不欺秦也張唐相燕者秦不欺燕也秦燕不相欺則伐趙危矣燕秦所以不相欺者無異故欲攻趙而廣河間也今王齎臣五城以廣河間請歸燕太子與强趙攻弱燕趙王立割五城以廣河間歸燕太子與補趙攻燕得上谷幽州郡三十六縣與秦什一以十之一與秦也羅傳有秦王欲見頓弱秦人頓弱曰臣之義不叅拜王能使臣無拜則可矣不即不見也秦王許之於是頓子曰天下有有補其實而無其名者有無其實而有其名者有無其名又無其實者王知之乎王曰弗知頓子曰有其實而無其名者商人是也無把銚挂耨之勢銚芸苗器耨耨器而有積粟之實此有其實而無其名者也無其實而有其名者農夫是也解凍而耕暴背而耨無積粟之實此無其實而有其名者也無其名又無其實者王乃是也已立為萬乗無孝之名以千里養無孝之實秦王悖然而怒悖艴同語色艴如也頓弱曰山東戰國六威不掩於山東而掩於母始皇母帝太后也本吕不韋姬通不韋又通嫪毐人告之王怒九年遷雍臣竊為大王不取也秦王曰山東之戰國可兼與頓子曰韓天下之咽喉魏天下之胷腹王資臣萬金而逰資齎同聽之韓魏時不通諸國故請王聽其往也入其社稷之臣於秦說之使歸秦即韓魏從而天下可圖也秦王曰寡人之國貧恐不能給也頓子曰天下未嘗無事也非從即横也横成則秦帝從成則楚王秦帝即以天下恭養且敬且養楚王即王雖有萬金弗得私也秦王曰善乃資萬金使東逰韓魏入其將相北逰衍於字燕趙而殺李牧趙良將幽王七年殺之此十八年齊入朝四國畢元作必從齊魏燕趙也殺牧時已虜韓頓子之説也說始皇在十年還太后前此要終言之不彪謂頓子之義髙於范雎而其説過之逺矣惜其知擇木焉有仁人君子而為始皇用哉魯連視之蔑矣或為六國説秦王曰土廣不足以為安人衆不足以為强若土廣者安人衆者强則桀紂之後將存昔者趙氏亦嘗强矣曰趙强何若曰猶言舉左案齊言舉兵於左則齊下案下也舉右案魏厭案萬乗之國厭言案之不一二國千乗之宋也宋於七國時為千乗今使齊魏如之築剛平趙地缺趙敬侯四年築剛平以侵衛五年齊魏為衛取我剛平皆不注衛無東野詳此則剛平趙取之衛也芻牧薪採芻草也以食馬牧養牛人也大者薪小者採莫敢闚東門當是時衛危於累卵天下之士相從謀曰吾將還其委質還反言改事也僖二十二年注委質屈膝也而朝於邯鄲之君乎於是天下有稱伐邯鄲者莫不夕𥙷令朝行魏伐邯鄲魏惠三十年伐趙趙告急齊是以有馬陵之敗因退為逢澤之遇開封東北有逢池或曰宋之逢澤乗夏車夏取其文禮有夏稱夏王夏中國也一𥙷朝為天子天下皆從齊宣王元作太公太公和時無此事聞之舉兵伐魏梁王身抱質執璧質贄同羔鴈之屬請為陳侯臣齊陳敬仲之後故稱陳侯趙成侯二十一年魏㧞邯鄲齊亦敗魏於桂陵不至如此所稱故定為宣王馬陵之役天下乃釋梁郢威王聞之郢楚都也亦避始皇父諱楚威七年伐齊敗之徐州寝不寐食不飽帥天下百姓以與申縛遇於泗水之上縛齊將揚之水注中諸姜而大敗申縛趙人聞之至枝桑地缺趙記注根桑一曰平桑疑即此此魏地也蓋赴魏之難燕人聞之至格道格道不通平際絶二地缺齊戰敗不勝謀則不得使陳毛釋劒掫掫夜戒有所擊引也釋二者不自衛示平也委南聽罪委去南面之尊西說趙説使人觧之北説燕内喻其百姓而天下乃齊釋不攻齊也於是天下𥙷積薄而為厚聚少而為多以同言郢威王於側紂之間髙注紂當為牖臣豈以郢威王為政衰謀亂以至於此哉郢為强絶句臨天下諸侯故天下樂伐之也四國為一荆齊燕代見下文将以攻秦秦王召羣臣賔客六十人而問焉曰四國為一將以圖秦寡人屈於内財力困也而百姓靡於外為之奈何羣臣莫對姚賈魏人對曰賈願出使四國必絶其謀而案元作安其兵乃資車百乗金千斤衣以其衣以王衣衣之寵之也舞以其劒古者飲則以劒舞今以王劒賜之使為舞時用姚賈辭行絶其謀止其兵與之為交以報秦秦王大説賈封千户以為上卿韓非韓之諸公子秦王見其書恨不及見之攻韓韓遣之使秦秦王說之賈與李斯毁之死知之曰賈以珍珠重寳南使荆齊元作吳此章無吳事此四國後亡者也三晉滅久矣北使燕代之間三年四國之交未必合也而珍珠重寳盡於内是賈以王之權外自交於諸侯願王察之且梁監門子監門卒也賈其子嘗盗於梁臣於趙而逐取世監門子父死子繼曰世梁之大盗趙之逐臣與同知社稷之計非所以厲羣臣也厲礪同䃺也王召姚賈而問曰吾聞子以寡人財交於諸侯有諸對曰有王曰有何靣目復見寡人對曰曾參孝其親天下願以為子子胥忠於君天下願以為臣貞女工巧有婦功也天下願以為妃妃匹也今賈忠王而王不知也賈不歸四國尚焉之使賈不忠於君四國之王尚焉用賈之身桀聽讒而誅其良將紂聽元作聞讒而殺其忠臣至身死國亡今王聽讒則無忠臣矣王曰子監門子梁之大盗趙之逐臣姚賈曰太公望齊之逐夫婦逐之也不經見朝歌之廢屠朝歌屬河内賈肉不售故曰廢子良之逐臣未聞棘津之讎不庸後志琅邪西海太公所出又釣於棘津今存讎售同蓋嘗求售與人為庸不見用也文王用之而王管仲其鄙人之賈人也五鄼為鄙蓋鄼鄙之人為賈者仲嘗與鮑叔賈南陽之敝幽修武南陽也仲頴上人嘗以貧困隠此敝困幽隠也魯之免囚見荘二十九年桓公用之而霸百里奚虞之乞人傳賣以五羊之皮奚虞臣也不見用自鬻於秦養牲者以五羖羊皮鬻之穆公相之而朝西戎文公用中山盗而勝於城濮僖二十八年晉文公用咎犯之謀破楚成王於城濮與此不同杜注城濮及史注止云衛地此四士者皆有詬醜大誹詬辱醜恥也天下明主用之知其可與立功也補使若卞隨務光並湯時人辭湯之聘申屠狄紂時人自沈于淵並見荘子人主豈得其用哉故明主不取其汙不聽其非察其為已用汙者非者雖不取不聽知其為用則或聽取察言聽取之故可以存社稷雖有外誹者不聽雖有髙世之名無咫尺之功者八寸曰咫不賞是以羣臣莫敢以虚願望於上無功而願賞虚願也秦王曰然乃衍可字復使姚賈而誅韓非髙誘妄人也注此書謬妄非一處如此䇿以姚賈為陳賈齊䇿以伐燕為齊宣王初不考其嵗月賈乃與李斯同時安得見於孟子之書宣閔皆嘗伐燕而之噲之役實閔王也誘之率意如此愚天下後世甚矣彪之挍注蓋為此𤼵憤故其所稱皆必有依據懼獲罪於後人也戰國策卷三
