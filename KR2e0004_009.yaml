body:
  text: 戰國策卷九宋鮑彪注燕東有漁陽右北平遼西遼東西有上谷代郡鴈門南得涿郡之易容城范陽北有新城故安涿縣良鄉新昌及渤海之西而樂浪𤣥莬亦屬焉文公桓公子元年申顯王八年庚奉陽君衍李兊二字甚不取於蘇秦傳亦云蘇秦在燕李兊因為蘇秦謂奉陽君曰齊燕離則趙重齊燕合則趙輕今君之齊謂以燕合齊非趙之利也臣竊為君不取也奉陽君曰何吾合燕於齊問何以言然對曰夫制於燕者蘇子也言其制燕而燕弱國也東不如齊西不如趙豈能東無齊西無趙哉而君甚不善蘇秦蘇秦能抱弱燕而孤於天下哉是驅燕而使合於齊也且燕亡國之餘也惠公六年大夫誅其姬而惠公奔齊齊晉入之至而卒其以權立權謂外與貴也以重外以事貴並謂齊晉故為君計善蘇秦則取之取言與之交不善亦取之以疑燕齊齊不善蘇子蘇子在燕而趙人取之則齊疑燕合趙而外已齊疑燕燕亦不能信齊矣燕齊疑則趙重矣齊王宣疑蘇秦則君多資疑其合燕於趙奉陽君曰善乃使使與蘇秦結交蘇秦將為從此二十八年北説燕文侯曰燕東有朝鮮屬樂浪遼東并州郡北有林胡樓煩西有雲中九原屬五原南有呼沲易水出涿故安地方二千里帶甲數十萬車七百乗騎六千匹粟支十年南有碣石鴈門之饒并州郡北有棗栗之利民雖不田作棗栗之實足食於民矣此所謂天府也夫安樂無事不見覆軍殺將之憂無過燕矣大王知其所以然乎夫燕之所以不犯寇被兵者以趙之為蔽於其南也秦趙五戰秦再勝而趙三勝秦趙相敝而王以全燕制其後此燕之所以不犯難也且夫秦之攻燕也踰雲中九原過代上谷彌地踵道彌猶亘踵猶係數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之衆軍於東垣矣垣謂城度呼沲涉易水不至四五日而距國都矣故曰秦之攻燕也戰於千里之外趙之攻燕也戰於百里之内夫不憂百里之患而重千里之外計無過於此者是故願大王與趙從親天下為一則國必無患矣燕王曰寡人國小西迫强秦促近齊趙齊趙强國令主君幸教詔之合從以安燕敬以國從於是齎蘇秦車馬金帛以至趙𫝊在説諸國之初權之難與齊戰也燕再戰不勝趙弗救噲子文公孫子噲謂文公曰不如以地請合於齊趙必救我若不吾救不得不事燕齊合則趙輕雖不救我後必事我文公曰善令郭任以地謂講於齊趙聞之遂出兵救燕齊䇿此役言及魏冉知為文公末年易王文公子元年己顯王王三十七年丑燕文公時秦惠王以其女為燕太子婦文二十年文公卒易王立齊宣王因燕喪攻之取十城武安君蘇秦為燕説齊王再拜而賀因仰而弔齊王按戈而却曰却秦使退此一何慶弔相隨之速也對曰人之飢所以不食烏喙者本草烏頭一名云以為雖偷充腹而與死同患也今燕雖弱小强秦之少婿也王利其十城而深與强秦為仇今使弱燕為鴈行而强秦制其後以招天下之精兵此言秦兵為天下精此食烏喙之類也齊王曰然則奈何乎對曰聖人之制事也轉禍而為福因敗而為功故桓公負婦人而名益尊齊桓也好内而霸韓獻開罪而交愈固宣十二年楚伐鄭許之平晉救之荀桓子欲還彘子不可韓獻子謂桓子彘子以偏師䧟子罪大矣不如進也戰于邲晉敗績成十三年獻子將下軍孟獻子曰晉帥乗和必有大功十六年戰于鄢陵楚敗績此皆轉禍而為福因敗而為功者也王能聴臣莫如歸燕之十城卑辭以謝秦秦知王以己之故歸燕城也秦必得王燕無故而得十城燕亦徳王是棄强仇而立厚交也且夫燕秦之俱事齊則大王號令天下皆從是王以虚辭附秦而以十城取天下也此霸王之業衍矣字所謂轉禍為福因敗成功者也齊王大説乃歸燕城以金千斤謝其後頓首塗中塗泥也自卑之甚願為兄弟而請罪於秦𫝊有人有惡蘇秦於燕王者曰武安君天下不信人也王以萬乗下之尊之於廷示天下與小人羣也武安君從齊來而燕王不館也謂燕王曰臣東周之鄙人也見足下初見時身無咫尺之功而足下迎臣於郊顯臣於廷今臣為足下使利得十城功存危燕足下不聴臣者人必有言臣不信傷臣於王者且臣之不信是足下之福也使臣信如尾生廉如伯夷孝如曾參三者天下之髙行也而以事足下可乎燕王曰可曰有此臣亦不事足下矣衍蘇秦曰三字且夫孝如曾參義不離親一夕宿於外足下安得使之之齊廉如伯夷不取素餐詩注素空也汙武王之義而不臣辭孤竹之君爾雅孤竹四荒中北國漢屬遼西令支餓而死於首陽之山伯夷𫝊注在蒲坂華山之北河曲之中廉如此者何肯步行數千里而事弱燕之危主乎信如尾生期而不來傳言與女子期抱梁柱而死信至如此何肯揚燕秦之威於齊而取大功乎哉且夫信行者所以自為也非所以為人也皆自覆之術覆猶芘䕶也自䕶其名非進取之道也且夫三王代興五霸迭盛皆不自覆也君以自覆為可乎則齊不益於營丘即北海營陵太公所封足下不踰衍楚字境不窺於邊城之外且臣有老母於周離老母而事足下去自覆之術而謀進取之道臣之趣固不與足下合者足下皆自覆之君也僕者進取之臣也所謂以忠信得罪於君者也燕王曰夫忠信又何罪之有也對曰足下不知也臣鄰家有逺為吏者其妻私人其夫且歸其私之者憂之其妻曰公勿憂也吾已為藥酒以待之矣後二日夫至妻使妾奉巵酒進之妾知其為藥酒也進之則殺主父言之則逐主母乃陽僵棄酒主父大怒而笞之笞擊也妾之棄酒上以活主父下以存主母也忠至如此然不免於笞此以忠信得罪者也臣之事適不幸而有𩔖妾之棄酒也且臣之事足下亢義益國亢髙極也言髙其義今乃得罪臣恐天下後事足下者莫敢自必也且臣之説齊曾不欺之也使衍之字説齊者莫如臣之言也雖堯舜之智不敢取也言無成功者雖聖智不足取也按秦𫝊而畧王噲易王子元年丑慎靚王元年辛蘇秦死其弟蘇代欲繼之乃北見燕王噲曰臣東周之鄙人也竊聞王義甚髙甚順鄙人不敏竊釋耡耨而干大王至於邯鄲所聞於邯鄲者又髙於所聞東周臣竊負其志乃至燕廷觀王之羣臣下吏大王天下之明主也觀其臣知其主王曰子之所謂天下之明主者何如者也對曰臣聞之明主者務聞其過不欲聞其善臣請謁王之過夫齊趙者王之仇讎也楚魏者王之援國也今王奉仇讎以伐援國非所以利燕也王自慮此則計過無以諫者非忠臣也王曰寡人之於齊趙也非所敢欲伐也言雖知其讎以其强故奉之不敢伐曰夫無謀人之心而令人疑之殆有謀人之心而令人知之拙謀未發而聞於外則危今臣聞王居處不安食飲不甘思念報齊因喪見伐之怨身自削甲札札牒也甲之革縁如之妻自組甲絣絣綿也治之為組以穿札曰有大數矣有之乎王曰子聞之寡人不敢隠也我有深怨積怒於齊而欲報之二年矣自即位至是齊者我讎國也故寡人之所欲報也直患國敝力不足矣子能以燕報齊寡人奉國而委之於子矣對曰凡天下之戰國七而燕處弱焉獨戰則不能有所附則無不重南附楚則楚重西附秦則秦重中附韓魏則韓魏重且茍所附之國重此必使王重矣今夫齊王閔長主也而自用也不如燕之附人南攻楚五年稸積散稸亦積西困秦三年為秦所困民憔悴士罷敝罷音疲北與燕戰覆三軍獲二將史並不書而又以其餘兵南面西舉五千乗之勁宋舉宋在齊閔二十八年燕昭二十六年此時未舉也而下十一章亦言齊以宋地封涇陽蓋宋䇿齊宣也所拔五城而包十二諸侯此其君之欲得也得其欲其民力竭也安猶取哉言齊不可復攻取且臣聞之數戰則民勞久師則兵敝師兼不戰言之王曰吾聞齊有清濟濁河可以為固有長城鉅防足以為塞誠有之乎對曰天時不與雖有清濟濁河何足以為固民力窮敝雖有長城鉅防何足以為塞且異日也濟西不役不役者養兵以備敵所以備趙也河北不師所以備燕也今濟西河北盡以役矣封内敝矣夫驕主必不好計而亡國之臣貪於財王誠能母愛寵子母弟以為質寶珠玉帛以事其左右彼且徳燕而輕亡宋輕者易為之然則前言舉未亡也則齊可亡已王曰吾終以子補受命於天矣曰内寇不與寇猶亂與猶和外敵不可拒言不能制内則不可以拒外王自治其外謂謀敵齊臣自報其内謂亂於内此乃亡之之勢勢也彪謂燕昭之舉實自代發之蘇代為燕説齊未見齊王閔先説淳于髠曰人有賣駿馬者比三旦比猶連立市人莫之知往見伯樂曰臣有駿馬欲賣之比三旦立於市人莫與言子還而視之去而顧之顧反視臣請獻一朝之費元作賈伯樂乃還而視之去而顧之一旦而馬價十倍今臣衍之字欲以駿馬見於王馬自諭也莫為臣先後者為之助也足下有意為臣伯樂乎臣請獻白璧一雙黄金千鎰以為馬食自喻為馬則此所獻馬之食也淳于髠曰謹聞命矣入言之王而見之齊王大説蘇子陳翠合齊燕將令燕王之弟為質於齊代𫝊説王噲已乃使一子質齊燕王許諾太后聞之大怒曰陳公不能為人之國亦則已矣焉有離人子母者老婦欲得志焉以殺辱之為快陳翠欲見太后王曰太后方怒子子其待之陳翠曰無害也遂入見太后曰何臞也臞少肉太后曰賴得先王鴈鶩之餘食不宜臞者臞者憂公子之且為質於齊也陳翠曰人主之愛子也不如布衣之甚也非徒不愛子也又不愛丈夫子獨甚太后曰何也對曰太后嫁女諸侯奉以千金齎地百里以為人之終也嫁則女之事畢矣封亦公子之終也今王願封公子百官持職持猶守也封無功者爭之職也羣臣効忠曰公子無功不當封今王之以公子為質也且以為公子功也而太后弗聴臣是以知人主之不愛丈夫子獨甚也且太后與王幸而在故公子貴太后千秋之後王棄國家而太子即位公子賤於布衣故非及太后與王封公子則公子終身不封矣太后曰老婦不知長者之計乃命公子束車制衣為行具或獻書燕王燕王而不能自恃弱國必得援不惡卑名以事强事强可以令國安長久萬世之善計也補以事强而不可以為萬世則不如合弱將奈何合弱而不能如一以不一為無如之何此臣之所以為山東苦也比目之魚爾雅東方有比目魚不比不行謂之鰈不相得則不能行故古人稱之以其合两而如一也今山東合弱而不能如一是山東之智不如魚也又譬如車士之引車也三人不能行索二人五人而車因行矣今山東三國弱葢魏韓趙也而不能敵秦索二國因能勝秦矣然而山東不知相索者智故不如車士矣胡與越人言語不相知志意不相通同舟而凌波至其相救助如一也今山東之相與也如同舟而濟秦之兵至不能相救助如一智又不如胡越之人矣三物者物猶事人之所能為也山東主遂不悟此臣之所為山東苦也願大王之熟慮之也山東相合之主者不惡補卑名之國者可長存言山東欲存唯不羞自卑者可也之卒者之猶其也卒猝同出士以戍韓梁之西邊此燕之上計也不急為此國必危矣王必大憂今韓梁趙三國已合矣秦見三晉之堅也必南伐楚趙見秦之伐楚也必攻燕物固有勢異而患同者秦之伐韓故中山亡秦不暇救故趙亡之今秦之伐楚燕必亡趙亡之臣竊為王計不如以兵南合三晉約戍韓梁之西邊山東不能堅為此此必皆亡燕果以兵南三晉也此三年與楚三晉攻秦彪謂此三物喻從之精者也故雖子噲庸主亦能感動惜乎言猶在耳而諸侯之心已變矣此豈非天亡之哉燕王噲既立蘇秦死於齊蘇秦之在燕也與其相子之為婚而蘇代與子之交及蘇秦死而齊閔元作宣下同王復用蘇代燕噲三年與楚三晉攻秦不勝而還子之相燕貴重主斷蘇代為齊使於燕燕王問之曰齊衍宣字王何如對曰必不霸燕王曰何也對曰不信其臣蘇代欲以激燕王以厚任子之也於是燕王大信子之子之因遺蘇代百金聴其所使鹿毛夀鹿蓋鉅鹿夀之所居謂燕王曰不如以國讓子之人謂堯賢者以其讓天下於許由由必不受有讓天下之名實不失天下今王以國讓相子之子之必不敢受是王與堯同行也燕王因舉國屬子之屬猶付與子之大重或曰禹授益而以啓人為吏以啓臣為益吏及老而以啓為不足任天下𫝊之益也啓與友黨攻益而奪之天下是禹名𫝊天下於益也其實令啓自取之今王言屬國子之而吏無非太子人者是名屬子之而太子用事王因收印自三百石吏而効之子之子之南面行王事而噲老以老自休不聴政顧為臣國事皆決子之子之三年燕國大亂百姓恫怨將軍市被太子平謀將攻子之儲子見離婁下謂齊閔王因而仆之破燕必矣王因令人謂太子平曰寡人聞太子之義將廢私而立公飭君臣之義飭戒也猶正正父子之位寡人之國小不足先後雖然則唯太子所以令之太子因數黨聚衆將軍市被圍公宫攻子之不克將軍市被及百姓乃反攻太子平將軍市被死以殉國構難數月死者數萬衆燕人恫怨元作恐百姓離意孟軻謂齊閔王曰今伐燕此文武之時不可失也王因令章子將五都之兵都大邑以因北地之衆齊之北近燕以伐燕士卒不戰城門不閉燕王噲死齊大勝燕子之亡二年而燕人立太元作公子平是為燕昭王記三年有彪謂王噲七國之愚主也惑蘇代之淺説貪堯之名惡禹之實自令身死國破蓋無足算齊閔所以請太子者近於興滅繼絶矣而天下不以其言信其心蓋名實者天下之公器也豈可以虚稱矯舉而得哉故齊閔之勝適足以動天下之兵而速臨菑之敗也初蘇秦弟厲因燕質子而求見齊王閔齊王怨蘇秦秦為燕謀齊故欲囚厲燕質子為謝乃已遂委質為臣燕相子之與蘇代婚而欲得燕權乃使蘇代侍元作持質子於齊齊使代報燕燕王噲問曰齊王其霸乎曰不能曰何也曰不信其臣於是燕王專任子之已而讓位燕大亂齊伐燕殺王噲子之燕立昭王而蘇代厲遂不敢入燕皆終歸齊齊善待之蘇代過魏魏為燕執代齊使人謂魏王哀曰齊請以宋封涇陽君秦不受秦非不利有齊而得宋地也不信齊王與蘇子也今齊魏不和如此其甚則齊不欺秦秦所以不信齊疑其合魏也秦信齊齊秦合涇陽有宋地非魏之利也故王不如東蘇子使歸齊秦必疑而不信蘇子矣疑其合齊魏齊秦不合天下無變五國無秦之兵伐齊之形成矣時齊魏相惡故云於是出蘇代代補之宋宋善待之昭王噲子元年戌赧王四年庚張儀為秦破從連横謂燕王曰大王之所親莫如趙昔趙主元作王襄子也以其姊為代王妻欲并代約與代王遇於勾注之塞乃令工人作為金斗長其尾令之可以擊人與代王飲而陰告厨人曰即酒酣樂進熱歠飲也即因反斗擊之於是酒酣樂進取熱歠厨人進斟羮斟注也因反斗而擊代王殺之王腦塗地塗猶汚其姊聞之摩笄以自刺也笄簪也故至今有摩笄之山天下莫不聞夫趙王武靈之狼戾無親暴戾如狼大王之所明見知也且以趙王為可親邪趙興兵而攻燕再圍燕都而刼大王趙燕記皆不書大王割十城乃却以謝趙王已入朝黽池効河間以事秦今大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城濟北盧注云東至海蓋亦距燕云非王之有也且今時趙之於秦猶郡縣也不敢妄興師以征伐今大王事秦秦王昭必喜而趙不敢妄動矣是西有强秦之援而南燕齊趙之患是故願大王之熟計之也燕王曰寡人蠻夷僻處雖大男子裁如嬰兒言不足以求正謀不足以決事今上客幸而教之請奉社稷西面而事秦獻常山之尾五城𫝊有在楚韓齊趙後彪謂燕昭賢智主也非儀此説能震動且人之性禀有父子不相肖者自襄至武靈七八𫝊矣而欲以其狼戾無親例之人豈信之哉然而燕之聴之也卑卑甚蓋拊摩新附之民勢未可以有事又諸國從之者衆故為卑辭以紓其國是儀之横有天幸也加之數年收集繕治有其緒則若云者固昭王之所唾而棄者史言蘇代復重燕燕使約從如初此昭王之素所蓄積也宫他為燕使魏魏不聴留之數月客謂魏王哀曰不聴燕使何也曰以其亂也對曰湯之伐桀欲其亂也故大亂者可得其地小亂者可得其寶今燕客之言曰客即他事茍可聴雖盡寶地猶為之也王何為不見魏王説因見燕客而遣之彪謂是客也以鄰國為壑者也彼惡知所謂天下為度者乎燕昭王收破燕後即位卑身厚幣以招賢者欲將報讎故往見郭隗先生曰齊因孤國之亂而襲破燕孤極知燕小力不足以報然賢士與共國以雪先王之恥孤之願也記有此文敢問以國報讎者奈何郭隗先生對曰帝者以師處王者與友處霸者與臣處亡國與役處役僕役詘指而事之屈指也北面而受學則百已者至先趨而後息先彼而趨後之而息先問而後嘿則什已者至人趨則若已者至馮几據杖馮據也眄視指使則厮役之人至若恣睢奮擊睢仰目呴籍叱咄呴呵籍踐也當從足隼韻咄呵也則徒𨽻之人至矣此古服道致士之法也服猶事事有道者王誠博選國中之賢者而朝其門下天下聞王朝其賢臣天下之士必趨於燕矣昭王曰寡人將誰朝而可郭隗先生曰臣聞古之君人有以千金求千里馬者三年不能得涓人謁者也言於君曰請求之君遣之三月得千里馬馬已死買其首五百金反以報君君大怒曰所求者生馬安事死馬而捐五百金涓人對曰死者且買之五百金況生馬乎天下必以王為能市馬馬今至矣於是不能期年千里之馬至者三記無之今王誠欲致士先從隗始隗且見事況賢於隗者乎豈逺千里哉於是昭王為隗築宫而師之樂毅自魏往鄒衍自齊往劇辛自趙往士爭湊燕燕王弔死問生與百姓同其甘苦二十八年國殷富士卒樂佚輕戰於是遂以樂毅為上將軍與秦楚三晉合謀以伐齊齊兵敗閔王出走於外燕兵獨追北入至臨淄盡取齊寶燒其宫室宗廟齊城之不下者唯獨莒即墨記同彪謂燕昭郭隗皆三代人也欲為國雪恥君臣問對無他言専欲得賢士而事之此無競唯人之誼也欲無興得乎哉臣役之對天下之格言市馬之喻萬世之美談太史公獨何為削之亦異於孔氏刪修之法矣客謂燕王曰齊南破楚西屈秦用韓魏之兵燕趙之衆猶鞭莢也御諸國如馬使齊北面伐燕即雖五燕弗能當王何不陰出使密遣使者散游士頓齊兵頓勞敝之也敝其衆使世世無患燕王曰假寡人五年寡人得其志矣蘇子曰請假王十年燕王説奉蘇子車十五乗南使於齊謂齊王閔曰齊南破楚西屈秦用韓魏之兵燕趙之衆猶鞭筴也臣聞當世之舉王興起之王必誅暴正亂舉無道五旬舉之之舉攻不義今宋王君偃射天笞地鑄諸侯之象使侍屏匽屏厠也當作屏匽露厠展其臂彈其鼻此天下之無道不義而王不伐王名終不成且夫宋中國膏腴之地鄰民之所處也齊民鄰宋者處之與其得百里於燕不如得十里於宋伐之名則義實則利王何為弗為齊王曰善遂興兵伐宋三覆宋宋遂舉燕王聞之絶交於齊率天下之兵以伐齊大戰一小戰再頓齊國成其名故曰因其强而强之乃可折也因其廣而廣之乃可缺也彪謂聴言亦難矣蘇子所以告齊王天下之正誼也齊用之不旋踵而招天下之兵故有事於天下者不可以人之言求諸己而已已無罪而後可以誅人之罪已無釁而後可以乗人之釁齊伐宋此二十七年宋急蘇代乃遺燕昭王書曰夫列在萬乗而寄質於齊寄猶委也一説如質子寄寓名卑而權輕奉元作秦齊助之伐宋民勞而實費破宋殘楚淮北楚之淮北宋鄰也宋破則此地殘肥大齊肥亦大也讎强而國弱也此三者皆國之大敗也而足下行之將欲以除害取信於齊也宋者齊之害而齊未加信於足下而忌燕也愈甚矣然則足下之事齊也失所為矣夫民勞而實費又無尺寸之功破宋肥讎而世負其禍矣負猶荷足下以宋加淮北强萬乗之國也宋五千乗見王又加之淮北則萬乗而强而齊并之是益一齊也北夷齊之北國方七百里加之以魯衛言齊因舉宋且并此數國此所謂强萬乗之國也而齊并之是益二齊也夫一齊之强而燕猶不能支也今乃以三齊臨燕其禍必大矣雖然臣聞智者之舉事也轉禍而為福因敗而成功者也齊人紫敗素也敗猶惡也素白繒染為紫而賈十倍越王勾踐棲於㑹稽而後殘吳霸天下此皆轉禍而為福因敗而為功者也今王若欲轉禍而為福因敗而為功乎則莫如遥霸齊而厚尊之使之盟於周室背秦而受使齊主盟盡焚天下之秦符約曰夫上計破秦其次長賔客秦秦挾賔客以待破挾如挾長之挾秦挾賔客本欲并天下而反見破故必患秦王昭必患之秦五世以結諸侯今為齊下秦王之志茍得窮齊不憚以一國都為功將割以賂與國然而王何不使布衣之人以窮齊之説説秦謂秦王曰燕趙破宋肥齊尊齊而為之下者燕趙非利之也弗利而勢為之者何也以不信秦王也今王何不使可以信者接收燕趙令涇陽君若髙陵君二君秦所重天下信之先於燕趙秦有變謂背二國因以為質則燕趙信秦矣秦為西帝趙為中帝燕為北帝立為三帝而令諸侯韓魏不聴則秦伐之齊不聴則燕趙伐之天下孰敢不聴天下服聴因驅韓魏以攻齊曰必反宋地而歸楚之淮北夫反宋地而歸楚之淮北燕趙之所同利也並立三帝燕趙之所同願也夫實得所利名得所願則燕趙之棄齊也猶釋敝躧革履也當作蹤今王之不收燕趙則齊霸必成矣諸侯戴齊而王獨弗從也是國伐也秦受齊伐諸侯戴齊而王從之是名卑也王不收燕趙名卑而國危王收燕趙名尊而國寧夫去尊寧而就卑危智者不為也秦王聞若説也必如刺心言其切已然則王何不務使智士以若此言説秦秦伐齊必矣夫取秦上交也伐齊正利也尊上交務正利聖王之事也燕昭王善其書曰先人嘗有徳蘇氏資秦合從子之之亂而蘇氏去燕燕欲報讎仇於齊非蘇氏莫可乃召蘇氏王噲䇿言魏出之之宋宋善待之今在宋也復善待之與謀伐齊竟破齊閔王出走代傳有蘇代謂燕昭王曰今有人於此孝如曾參孝已信如尾生髙廉如鮑焦史鰌衛卿子魚兼此三行以事王奚如王曰如是足矣對曰足下以為足則臣不事足下矣臣且處無為之事歸耕乎周之上地耕而食之織而衣之王曰何故也對曰孝如曾參孝已則不過養其親耳信如尾生髙則不過不欺人耳亷如鮑焦史鰌則不過不竊人之財耳今臣為進取者也臣以為廉不與身俱達不茍取故多窮義不與生俱立仁義者自完之道也非進取之術也王曰自憂不足乎憂亦完也不完則憂故曰完又曰憂對曰以自憂為足則秦不出殽塞齊不出營丘楚不出疏章地缺三王代位五霸改政皆以不自憂故也若自憂而足則臣亦周之負籠耳籠竹器何為煩大王之廷耶煩凂也昔者楚取章武屬渤海諸侯北面而朝秦取西山諸侯西面而朝曩者使燕毋去周室之上去猶失也上上地燕蓋嘗攻得而不取也則諸侯不為别馬而朝矣言同軌而朝燕與朝秦楚同臣聞之善為事者先量其國之大小而揆其兵之强弱揆度也故功可成而名可立也不能為事者不先量其國之大小不揆其兵之强弱故功不可成而名不可立也今主有東嚮伐齊之心而愚臣知之王曰子何以知之對曰矜㦸砥劍矜矛柄㦸盖為矜施㦸砥柔石所以礪也登丘東嚮而歎是以愚臣知之今夫烏獲舉千鈞之重行年八十而求扶持故齊雖强國也西勞於宋南罷於楚則齊軍可敗而河間可取燕王曰善吾請拜子為上卿奉子車百乗子以此為寡人東游於齊為燕間齊何如對曰足下以愛之故與何不與愛子與諸舅叔父負床之孫負言背倚床立未能行也不得此屬皆不得不處與車而乃以與無能之臣何也王之論臣何如人哉今臣之所以事足下者忠信也恐以忠信之故見罪於左右王曰安有為人臣盡其力竭其能而得罪者乎對曰臣請為王譬昔周之上地嘗有之其丈夫宦三年不歸其妻愛人其所愛者曰子之丈夫來則且奈何乎其妻曰勿憂也吾已為藥酒而待其來矣已而其丈夫果來於是因令其妾酌藥酒而進之其妾知之半道而立慮曰吾以此飲吾主父則殺吾主父以此事告吾主父則逐吾主母與殺吾主補父逐吾主母者寜佯躓而覆之躓跲也於是因佯僵而仆之其妻曰為子之逺行來之故為美酒今妾奉而仆之其丈夫不知縳其妾而笞之故妾所以笞者忠信也今臣為足下使於齊恐忠信不諭於左右也臣聞之曰萬乗之主不制於人臣十乗之家不制於衆人匹夫徒步之士不制於妻妾而又況於當時之賢主乎臣請行矣願足下之無制於羣臣也燕王謂蘇代曰寡人甚不喜訑者言也欺州謂曰訑蘇代對曰周地賤媒為其兩譽也之男家曰女美之女家曰男然而周之俗不自為取妻且夫處女無媒老且不嫁舍媒而自衒敝而不售敝猶敗無成事也順而無敗售而不敝者唯媒而已矣且事非權不立非勢不成夫使人坐受成事者唯訑者耳王曰善矣彪謂訑亦吾所惡而實不可廢古者使功使過使智使愚蓋用人可也處已則否蘇代謂元作為奉陽君此亦其後襲稱説燕於趙以伐齊奉陽君不聴乃入齊代入惡趙令齊絶於趙齊已絶於趙因之燕謂昭王曰韓為謂臣曰人告奉陽君曰使齊不信趙者蘇子也令齊王閔召蜀子齊將使不伐宋者補蘇子也與齊王謀遁取秦以謀趙者遁逃去也言避秦兵取言與之合蘇子也令齊守趙之質子以甲者又蘇子也請告子以請齊告子名不害代請之使為己請齊果以守趙之質子以甲果者必欲告子如是吾必守子以甲言告子不聴則然其言惡矣雖然王勿患也人所告奉陽之言於代為惡燕王善代必患之故代告王以無患為其亂齊趙所以利燕臣故知入齊之有趙累也言趙惡代出為之以成所欲出者奮不顧也言知其有累而奮為之欲謂利燕臣死而齊大惡於趙臣猶生也今齊趙絶可大紛已紛亂也持臣非張孟談也持猶使使臣也如張孟談也齊趙必有為智伯者矣奉陽君告朱讙與趙足曰代稱奉陽之言然二皆趙人齊王使公玉曰齊人姓名命説奉陽名曰必不反韓珉今召之矣言故反前下𩔖此必不任蘇子以事今封而相之必元作令不合燕今以燕為上交吾所恃者順也公玉父名今其言變有甚於其父順始與蘇子為讎見之如元作知無厲今賢之兩之兩謂封與相已矣吾無齊矣並述奉陽之言奉陽君之怒甚矣此代自言如齊王衍王字之不信趙而小人奉陽君也待之為小人因是而倍之音背言燕宜然不以今時大紛之解而復合則後不可奈何也故齊趙之合茍可循也循言順燕死不足以為臣患代本以二國之合必不順燕今乃合而順之故有死逃之罪逃不足以為恥為諸侯不足以為臣辱被髪自漆為厲不足以為臣辱然而臣有患也臣死而齊趙不循惡交分於臣也燕以二國可因而代不欲則三國皆惡代矣然二國卒不可因則代之惡皆有所分交猶皆而後相効交後人見其不可因而効已是臣之患也患其後待若臣死而必相攻也齊趙相攻臣必勉之而求死焉堯舜之賢而死禹湯之智而死孟賁之勇而死烏獲之力而死生之物固有不死者乎在必然之物死者人之必然以成所欲王何疑焉臣以不若逃而去之詐以罪逃去臣以韓魏循自齊言逃燕則自韓魏順行至齊而為之取秦言勁齊以怒趙深結趙以勤之此勁趙以怒齊也結亦以韓魏趙自燕結之勤猶厚如是則近於相攻也臣雖為之不補累燕奉陽君告朱讙曰亦代稱之蘇子怒於燕王之不以吾故以用也吾指奉陽弗子相子謂讙又不子卿也殆無燕矣其疑至於此燕王善代而奉陽謂其怒燕者疑也故臣雖為之不累燕疑代怒燕故代雖為燕紛二國二國不怨燕也又不欲王欲猶須也言其自相攻不須燕伊尹再逃桀而之湯果與鳴條之戰而以湯為天子伍子胥逃楚而之吳果與栢元作伯舉之戰而報其父之讎今臣逃而紛齊趙始可著於春秋且舉大事孰不逃桓公之難管仲逃於魯陽貨之難孔子逃於衛定八年陽貨作難十二年孔子乃適衛不如此所云張儀逃於楚𫝊不書白圭逃於秦未詳望諸相中山也此與樂毅同號使趙趙刼之求地望諸攻闗而出外孫之難未詳薛公釋載不乗車也逃出於關齊緡二十五年田文入秦秦囚欲殺之因秦幸姬得出馳去變姓名出關三晉稱以為好補士太史公曰好客自喜故舉大事逃不足以為辱矣卒絶齊於趙趙合於燕以攻齊敗之燕昭王且與天下伐齊而有齊人仕於燕者昭王召而謂之曰寡人且與天下伐齊旦暮出令矣子必爭之爭之而不聴子因去而之齊寡人有時復合預言不勝與齊合且以因子而事齊當此之時也燕齊不兩立然而常獨欲有復收之之志若此也收猶合不兩立則不可復合而不能無合之之志彪謂此少年狡獪之行小人患失之𩔖而燕聊為之此其所以不王也齊魏爭燕齊謂燕王曰吾得趙矣魏亦謂燕王曰吾得趙矣燕無以決之而未有適予也蘇代謂燕相曰臣聞辭卑而幣重者失天下者也辭倨而幣薄者得天下者也今魏之辭倨而幣薄燕因合於魏魏補得燕元作趙齊遂北矣魏昭十二年與秦趙韓燕伐齊敗之燕獨入臨菑此二十八年蘇代自齊使人謂燕昭王曰臣間元作聞間猶頎也離齊趙齊趙已孤矣王何不出兵以攻齊臣請為王弱之燕乃伐齊攻晉疑兵也實合魏而陽攻以疑齊令人代令之謂閔王曰燕之攻齊也欲以復振故地也振舉也蓋復王噲所失欲燕兵在晉而不進則是兵弱而計疑也王何不令蘇子將而應燕乎夫以蘇子之賢將而應弱燕燕破必矣燕破則趙不敢不聴是王破燕而服趙也閔王曰善乃謂蘇子曰燕兵在晉今寡人發兵應之願子為寡人為之將對曰臣之於兵何足以當之王其改舉别用它將王使臣也是敗王之兵而以臣遺燕也戰不勝不可振也振救也王曰行寡人知子矣蘇子遂將而與燕人戰於晉下晉之下地齊軍敗燕得甲首二萬人蘇子以其餘兵以守陽城而報於閔王曰王過舉令臣應燕今軍敗亡二萬人臣有斧質之罪請自歸於吏以戮閔王曰此寡人之過也子無以為罪明日又使燕攻陽城及狸燕地也趙悼襄九年攻燕取狸陽城又使人謂閔王曰日者齊不勝於晉下此非兵之過齊不幸而燕有天幸也今燕又攻陽城及狸是以天幸自為功也王復使蘇子應之蘇子先敗王之兵其後必務以勝報王矣王曰善乃復使蘇子蘇子固辭王不聴遂將與燕戰於陽城燕人大勝得首三萬齊君臣不親百姓離心燕因使樂毅大起兵伐齊破之彪謂蘇代之於燕齊皆嘗隙而復善其情禮均也而獨為燕圖齊之深何哉昭王賢也雖然糜爛人之民人以行其説而奉其所賢仁者不為也獨不念嘗委質於齊乎蘇代自齊獻書於燕王曰臣之行也固知將有口事言人譖之故獻御書而行獻侍御者以書曰臣貴於齊燕大夫將不信臣臣賤將輕臣臣用將多望於臣望猶責齊有不善謂惡燕將歸罪於臣天下不攻齊將曰善為齊謀天下攻齊將與齊兼貿元作鄮臣貿猶賣臣之所重處重留元作夘也重猶難也留謂處於齊為難王謂臣曰吾必不聴衆口與讒言吾信汝也猶列眉也言無可疑上可以得用於齊次可以得信於下茍無死女無不為也以女自信可也以猶由與之言曰王與之去燕之齊可也期元作其於成事而已臣受令以任齊得任於齊及五年齊數出兵未嘗謀燕齊趙之交一合一離燕衍王字與齊謀趙則與趙謀齊燕與齊謀趙實欲離齊於趙代因與趙謀齊以成燕之謀齊之信燕也至於虛北地虛言不設備齊北近燕行其兵以北兵代它國今王信田伐與參去疾之言三人讒代者且攻齊使齊犬馬而不言燕且辭也犬馬言已賤齊如之又不泄燕之謀今王又使慶燕臣名令臣曰吾欲用所善王茍欲用所善王欲用之則臣請為王事之王欲醳臣醳釋同見鄒忌説琴專元作剸任所善則臣請歸醳事臣茍得見則盈願彪謂為人間者均有此六患非燕昭之明代其危哉功成矣猶不能為此尾況它人乎代之謀齊亦異乎豫讓之於趙矣彼哉彼哉秦召燕王燕王欲往蘇代約燕王約猶止曰楚得枳屬巴郡而國亡皆謂失地秦昭廿七八九年連拔楚郡齊得宋而國亡即此二十八年入臨菑三十二年下七十城齊宋不得以有枳宋事秦者何也是則有功者秦之深讎也言此以見克齊者秦之所惡也秦取天下非行義也暴也秦之行暴正告天下告楚曰蜀地之甲輕舟浮於汶汶江水出岷山乗夏水江夏注沔水自江别至南郡華容為夏水而下江五日而至郢漢中之甲輕舟出於巴乗夏水下漢四日而至五渚史注在洞庭寡人積甲宛東下隨屬南陽智者不及謀勇者不及怒寡人如射隼矣隼祝鳩喻易也王乃待天下之攻函谷不亦逺乎楚王為是之故十七年事秦秦正告韓曰我起乎少曲韓地范雎傳伐韓少曲一日而斷太行我起乎宜陽而觸平陽二日而莫不盡繇我繇由同離兩周而觸鄭五日而國舉韓氏以為然故事秦秦正告魏曰我舉安邑塞女㦸韓氏太原卷不通此四處下軹元作枳道道南陽封冀道道所由也後志河東皮氏有冀亭注引此兼包兩周乗夏水浮輕舟强弩在前銛㦸在後決滎口滎澤之口魏無大梁決白馬之口魏無濟陽決宿胥之口徐注紀年曰敖山塞集胥口魏無虛頓丘陸攻則擊河内水攻則滅大梁魏以為然故事秦秦欲攻安邑恐齊據之則以宋委於齊曰宋王無道為木人以象寡人射其面寡人地絶兵逺不能攻也王茍能破宋有之寡人如自得之已得安邑塞女㦸因以破宋為齊罪秦欲攻韓元作齊恐天下救之則以齊委於天下曰齊人四與寡人約四欺寡人必率天下以攻寡人者三必言攻之決有齊無秦無齊有秦必伐之必亡之已得宜陽少曲致藺離補石因以破齊為天下罪秦欲攻魏重楚恐楚擊其後則以南陽委於楚曰寡人固與韓且絶矣殘均陵地缺塞黽隘茍利於楚寡人如自有之魏棄與國而合於秦因以塞黽隘為楚罪兵困於林中重燕趙以膠東委於燕膠東國故齊國項紀注即墨也以濟西委於趙已得講於魏質元作至公子延秦子因犀首攻趙兵傷於離石遇敗於馬陵而重魏則以葉蔡委於魏已得講於趙則刼魏魏不為割困則使太后穰侯為和贏則兼欺舅與母贏謂勝舅謂穰侯適燕者曰以膠東適謫同適趙者曰以濟西適魏者曰以葉蔡適楚者曰以塞鄳阨適齊者曰以宋必令其言如循環用兵如刺蜚集韻蟲名喻易也母不能知舅不能約龍賈之戰魏相五年秦拔我龍賈軍岸門之戰封陵之戰魏哀十六年秦敗我封陵忠岸亭在穎韓注記岸門封陵亭名然則封陵亦屬穎川髙商之戰史不書趙莊之戰趙肅二十三年趙莊與秦戰死河西秦之所殺三晉之民數百萬今其生者皆死秦之孤也西河之外上雒之地三川晉國之禍三晉之半言上三地被禍居晉國之半秦禍如此其大而燕趙之秦者皆以爭事秦説其主此臣之所大患燕昭王不行蘇代復重於燕燕反約諸侯從親如蘇秦時或從或否而天下由此宗蘇氏之從約代厲皆以夀死名顯諸侯代𫝊有在伐齊事後彪謂秦之所以正告諸侯及其用詐皆愚弄之也而諸侯莫省獨一燕昭知之然亦不久死矣彪故曰秦横之成天幸也燕饑趙將伐之楚使將軍之燕過魏見趙恢趙恢曰使除患無至除之使不至易於救患伍子胥宫之奇不用此除患者燭之武僖三十年晉秦國鄭佚之孤言於鄭伯曰國危矣若使燭之武見秦君師必退之武見秦伯曰鄭知亡矣而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以倍鄰鄰之厚君之薄也秦伯説乃還張孟談皆救患者受大賞是故謀者皆從事於除患之遺者謂救患者而無元作先使除患無至者今與以百金送公也公謂楚使不如以言聴吾言而説趙王惠文曰昔者吳伐齊為其饑也伐齊未必勝也而弱越乗其敝以霸今王之伐燕也亦為其饑也伐之未必勝而强秦將以兵乗元作承王之西是使弱趙居强吳之處而使强秦處弱越之所以霸也願王之熟計之也使者乃以説趙王趙王大説乃止燕昭王聞之乃封之以地封恢也恢蓋趙之仕魏而為燕者為燕亦所以為魏也趙且伐燕蘇代為燕謂惠王趙惠文曰今者臣來過易水蚌方出曝蚌也而鷸啄其肉鷸知天將雨鳥蚌合而箝其啄箝籋也鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸兩者不肯相舍漁者得而并擒之今趙且伐燕燕趙久相支以敝大衆臣恐强秦之為漁父也願王熟計之也惠王曰善乃止惠王昭王子元年癸赧王三十七年未昌國君樂毅為燕昭王合五國之兵傳云并䕶趙楚韓魏燕之兵而攻齊下七十餘城盡郡縣之以屬燕三城未下聊莒即墨而燕昭王死惠王即位用齊人反間疑樂毅而使騎劫代之將樂毅奔趙趙封以為望諸君齊田單詐騎劫卒敗燕軍復收七十餘城以復齊燕王悔懼趙用樂毅乗元作承燕之敝以伐燕燕王乃使人讓樂毅且謝之曰先王舉國而委將軍將軍為燕破齊報先王之讎天下莫不振動寡人豈敢一日而忘將軍之功哉㑹先王棄羣臣寡人新即位左右誤寡人寡人之使騎劫代將軍為將軍久暴露於外暴曝同故召將軍且休計事將軍過聴以與寡人有隙元作㕁隙不合也遂捐燕而歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎望諸君乃使人獻書報燕王曰臣不佞不能奉承先王之敎以順左右之心恐抵斧質之罪以傷先王之明而又害於足下之義無罪而殺毅非義也故逃遁奔趙自負以不肖之罪負言荷罪在身故不敢為辭説今王使使者數之罪臣恐侍御者之不察先王之所以畜幸臣之理畜養也幸親愛之而又不白於臣之所以事先王之心白猶明故敢以書對臣聞賢聖之君不以禄私其親功多者授之不以官隨其愛能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣以所學者觀之先王之舉錯有髙世之心故假節於魏王時諸侯不通出闗則以節𫝊之故上言毅自魏往見王而以身得察於燕先王過舉擢之乎賔客之中而立之乎羣臣之上不謀於父兄而使臣為亞卿亞次也臣自以為奉令承敎可以幸無罪矣故受命而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣對曰夫齊霸國之餘敎而驟勝之遺事也閑於兵甲習於戰攻王若欲攻之則必舉天下而圖之舉天下而圖之莫徑元作勁於結趙矣且又淮北宋地楚魏之所同願也楚欲得淮北魏欲得宋時皆屬齊趙若許許燕約楚趙宋盡力宋雖已舉其遺民怨之四國攻之齊可大破也先王曰善臣乃口受令具符節南使臣於趙顧反命回顧而反言其速起兵隨而攻齊以天之道先王之靈河北之地隨先王舉而有之於濟上濟上之軍奉令擊齊大勝之輕卒鋭兵長驅至國齊王閔逃遁走莒僅以身免珠玉財寶車甲珍器盡收入燕大吕陳於元英大吕律均元英燕樂名故鼎反乎厯室故鼎齊所得鼎凡鼎以以占休咎故歸之律厯之室齊器設於寜臺燕臺薊丘之植薊幽州國植旗幟之屬植於汶篁汶水出太山來燕原竹田曰篁言燕以齊為塞自五霸以來功未有及先王者也先王以為順于其志以臣為不頓命頓猶墜故裂地而封之使之得比乎小國諸侯臣不佞自以為奉令承敎可以幸無罪矣故受命而弗辭臣聞賢明之君功立而不廢故著於春秋蚤知之士蚤知先見也名成而不毁故稱於後世若先王之報怨雪恥夷萬乗之强國收八百嵗之蓄積通太公數之及至棄羣臣之日餘令詔後嗣之遺義執政任事之臣所以能循法令順庶孽者新立之君皆患庶孽之亂昭王然豫順之施及萌𨽻萌􅡦同皆可以教於後世臣聞善作者不必善成善始者不必善終昔者伍子胥説聴乎闔閭故吳王逺迹至於郢夫差弗是也不然子胥之説賜之鴟夷而浮之江鴟夷榼名馬革為其形以歛骸骨故吳王夫差不悟先論之可以立功故沉子胥而弗悔子胥不早見主之不同量故入江而不改夫免身全功以明先王之迹者臣之上計也離毁辱之非離麗也猶遭墮先王之名者臣之所大恐也臨不測之罪以幸為利者義之所不敢出也臣聞古之君子交絶不出惡聲忠臣之去也不潔其名毁其君而自潔臣雖不佞乎數奉教於君子矣恐侍御者之親左右之説而不察疏逺之行也故敢以書報惟君之留意焉𫝊有張丑為質於燕燕王欲殺之夫且出境境吏得丑丑曰燕王所為將殺我者人有言我有寶珠也王欲得之今我已亡之矣而燕王不我信今子且致我我且言子之奪我珠而吞之燕王必當殺子刳子腹刳判也及子之腸矣夫欲得之君不可説以利吾要且死子腸亦且寸絶境吏恐而赦之王喜惠王曾孫元年未赧王五十三年丁燕王喜使栗腹以百金為趙孝成王壽酒三日反報曰趙民其壯者皆死於長平其孤未壯可伐也王乃召昌國君樂間毅子而問曰何如對曰趙四達之國也其民皆習於兵不可與戰王曰吾以倍攻之可乎曰不可曰以三可乎曰不可王大怒左右皆以為趙可伐遽起六十萬以攻趙令栗腹以四十萬攻鄗使慶秦以二十萬攻代趙使廉破以八萬遇栗腹於鄗使樂乗毅之族以五萬遇慶秦於代燕人大敗樂間入趙燕記元年有燕王以書且謝焉曰寡人不佞不能奉順君意故君捐國而去則寡人之不肖明矣敢端其願端猶専也願欲復用之而君不肯聴故使使者陳愚意君試論之語曰仁不輕絶智不輕怨君之於先王也世之所明知也寡人望有非則君掩葢之有非而蔽覆之王喜所望也不虞君之明罪之也虞猶圖望有過則君教誨之不虞君之明棄之也且寡人之罪國人莫不知天下莫不聞君㣲出明怨言間雖無出之趙以明有怨於我人亦知之以棄寡人寡人必有罪矣雖然恐君之未盡厚也諺曰厚者不毁人以自益也仁者不危人以要名故掩人之邪者厚人之行也救人之過者仁者之道也世有掩寡人之邪救寡人之過非君孰元作恐望之今君厚受位於先王以成尊輕棄寡人以快心則掩邪救過難得於君矣且世有薄而故厚施世雖薄我我反厚施之行有失而故惠用行與我不合反惠愛任用之今使寡人任不肖之罪任猶負而君有失厚之累於為君擇之也擇其所處無所取之國之有封疆家之有垣牆所以合好掩惡也室不能相和出語鄰家未為通計也怨惡未見而明棄之未為盡厚也寡人雖不肖乎未如殷紂之亂也君雖不得意乎未如商容箕子之累也然則不内蓋寡人蓋一作盡而明怨於外恐其適足以傷於髙而薄於行也非然也茍可以明君之義成君之髙雖任惡名所謂任不肖之罪不難受也本欲以為明寡人之薄而君不得厚揚寡人之辱而君不得榮此一舉而两失也義者不虧人以自益況傷人以自損乎君無以寡人不肖累往事之美昔者栁下惠吏於魯三黜而不去或謂之曰可以去栁下惠曰茍與人之異惡往而不黜乎猶且黜乎寧於故國爾栁下惠不以三黜自累故前業不忘不以去為心故逺近無議今寡人之罪國人未知而議寡人者遍天下語曰論不脩心凡有脩者先先有失而善論者不然議不累物仁不輕絶智不簡功簡與附反猶棄也簡棄大功者輟也輟止也輕絶厚利者怨也輟而棄之怨而累之宜在逺者疎逺之臣可耳不望之乎君也今以寡人無罪君豈怨之乎願君捐怨追惟先王復以教寡人意君曰意度其然余且慝心待之以不善之心以成而過不顧先王以明而惡使寡人進不得脩功退不得改過君之所揣也言間量我此唯君圖之此寡人之愚意也敬以書謁之樂間乗怨不用其計二人卒留趙不報彪謂過而不改然後為過燕王喜過在於愎諌伐趙其於間未見其有可絶之處而能悔如此禮不云乎其嗟也可去其謝也可食何間絶之深也抑其書辭條達明麗婉乎孰復天下之韙文也秦并趙北向迎燕并合也迎以兵逆之燕王聞之使人賀秦王始皇使者過趙趙王悼襄擊之使者曰秦趙為一而天下服矣燕元作兹之所以受命於趙者秦也言燕先時服趙者以秦與趙合今臣使秦而趙繫之是秦趙有隙秦趙有隙天下必不服而燕不受命矣且臣之使秦無妨於趙之伐燕也趙王以為然而遣之使者見秦王曰燕王竊聞秦并趙燕王使使者賀千金秦王曰夫燕無道吾使趙有之子何賀使者曰臣聞全趙之時南鄰為秦北下曲陽為燕下曲陽屬鉅鹿趙廣三百里而與秦相距五十餘年矣所以不能反勝秦者反猶報也言數為秦敗不能報而勝之國小而地無所取今王使趙北并燕此并謂兼有之燕趙同力必不受受命補於秦矣臣竊為王患之秦王以為然起兵而救燕趙悼㐮九年攻燕取貍陽城兵未罷秦攻鄴拔之此十九年燕太子丹質於秦亡歸見秦且滅六國兵已臨易水恐其禍至太子丹患之謂其太傅鞠武曰燕秦不兩立願太傅幸而圖之武對曰秦地遍天下威脅韓魏趙氏則易水以北未有所定也奈何以見陵之怨𫝊言丹質秦秦遇之不善欲批其逆鱗哉批白結切擊也説難龍可擾而騎也然喉下有逆鱗徑尺人有嬰之則必殺人人主亦有太子曰然則何由太傅曰請入圖之請太子入息已乃圖之居之有間樊將軍亡秦之燕太子客之太傅鞠武諌曰不可夫秦王始皇之暴而積怨於燕怨其亡歸足為寒心又況聞樊將軍之在乎是謂元作以委肉當餓虎之蹊蹊徑也禍必不振矣振救也雖有管晏不能為之謀也願太子急遣樊將軍入匈奴以滅口請西約三晉南連齊楚北講於單于然後乃可圖也太子丹曰太傅之計曠日彌久心惛然恐不能須臾言已憂思昏瞀且死須臾不可待且非獨於此也夫樊將軍困窮於天下歸身於丹丹終不迫於强秦而棄所愛憐之交置之匈奴是丹命固卒之時也知禍且至而猶為之自疑命止於此願太傅更慮之鞠武曰燕有田光先生者其智深而慮沈沈猶深可與之謀也太子曰願因太傅交於田先生可乎鞠武曰敬諾出見田光道太子衍曰字願圖國事於先生田光曰敬奉敎乃造焉太子跪而逢迎却行為道不敢背之跪而拂席田先生坐定左右無人太子避席而請曰燕秦不兩立願先生留意也田光曰臣聞騏驥盛壯之時一日而馳千里至其衰也駑馬先之今太子聞光壯盛之時不知吾精已消亡矣雖然光不敢以乏國事也不令太子所圖有闕所善荆軻衛人可使也太子曰願因先生得衍願字交荆軻可乎田光曰敬諾則起趨出太子送之至門戒曰丹所報先生所言者國大事也願先生勿泄也田光俛而笑曰諾僂行見荆軻僂致敬貌禮一命而僂曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意也光竊不自外言不自疏於軻言足下與太子願足下過太子於宫荆軻曰謹奉教田光曰光聞長者為行不使人疑之今太子約光曰所言者國大事也願先生勿泄也是太子疑光也夫為行而使人疑之非節俠士也荀悦曰立氣勢作威福結私交以立强於世者謂之俠欲自殺以激荆軻言其死非為泄欲厲勉軻使死之耳曰願足下急過太太子言光已死明不言也遂自剄而死軻見太子言田光已死致光之言太子再拜而跪膝下行以膝行不立行故言下流涕有頃而後言曰丹所請田先生不言者欲以成大事之謀今田先生以死明不泄言豈丹之心哉荆軻坐定太子避席頓首曰田先生不知丹不肖使得至前願有所道此天所以哀燕而不棄其孤也今秦有貪利之心而欲不可足也非盡天下之地臣海内之王者其意不饜今秦已虜韓王秦十七年虜王安盡納其地又舉兵南伐楚北臨趙王翦數十萬之衆距漳鄴而李信出太原雲中趙不支秦必入臣入臣則禍至燕燕小弱數困於兵今計舉國不足以當秦諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦闚以重利闚言示之以利使之見而欲也秦王貪其贄必得所願矣誠得劫秦王使悉反諸侯之侵地若曹沫之與齊桓公則大善矣則不可如有不可因而刺殺之彼大將擅兵於外而内有大亂則君臣相疑以其間諸侯得合從其償秦必矣此丹之上願不知所以委命委棄性命猶言不知死所唯荆卿留意焉久之荆軻曰此國之大事也臣駑下恐不足任使太子前頓首固請無讓然後許諾於是尊荆軻為上卿舍上舍太子日造門下供太牢具異物間進車騎美女恣荆軻所欲以順適其意久之荆卿未有行意秦將至翦破趙虜趙王遷十九年盡收其地進兵北略地至燕南界略經略之太子丹恐懼乃請荆卿曰秦兵旦暮渡易水則雖欲長侍足下豈可得哉荆卿曰㣲太子言臣願得謁之今行而無信則秦未可親也夫衍今字樊將軍秦王購之金千斤邑萬家誠得樊將軍首與燕督亢之地圖後志涿郡方城縣有督亭注引此獻秦王秦王必説見臣臣乃得有以報太子太子曰樊將軍以窮困來歸丹丹不忍以己之私而傷長者之意願足下更慮之荆軻知太子不忍乃遂私見樊於期將軍名曰秦之遇將軍可謂深矣父母宗族皆為戮沒今聞購將軍之首金千斤邑萬家將奈何樊將軍仰天太息流涕曰吾每念常痛於骨髓顧計不知所出耳軻曰今有一言可以解燕國之患而報將軍之仇者何如樊於期乃前曰奈何軻曰願得將軍之首以獻秦王秦王必喜而善見臣臣左手把其袖而右手揕其胷揕刺也知鴆反然則將軍之仇報而燕國見陵之恥除矣將軍豈有意乎樊於期偏袒扼腕而進曰此臣之日夜切齒腐心腐者痛之極乃今得聞教遂自刎刎斷也太子聞之馳往伏屍而哭極哀既已無可奈何乃遂盛樊於期之首函封之於是太子預求天下之利匕首得趙人徐夫人匕首取之百金使工以藥淬之淬當從火堅刀刃也若淬則滅火器爾以試人血濡縷沾濡衣之一縷人無不立死者乃為裝行具也遣荆軻燕國有勇士秦武陽年十三殺人人不敢牾元作悟視牾逆也乃令秦武陽為副荆軻有所待欲與俱其人居逺未來而為留待頃之未發太子遲之疑其改悔乃復請之曰日已盡矣荆卿豈無意哉丹請先遣秦武陽荆軻怒叱太子曰今日往而不反者竪子也今提一匕首入不測之强秦僕所以留者待吾客與俱今太子遲之請辭決矣遂發太子及賔客知其事者皆白衣冠以送之至易水上既祖祖行祭取道髙漸離擊筑荆軻和而歌為變徴之聲地形訓云變徴為商蓋悲音士皆垂淚涕泣又前而為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲其音怒忼慷壯士不得志也士皆瞋目髪盡上衝冠於是荆軻遂就車而去終已不顧既至秦持千金之資幣物厚遺秦王寵臣中庶子䝉嘉嘉為先言於秦王曰燕王誠振怖大王之威振震同下同不敢興兵以逆軍吏願舉國為内臣比諸侯之列給貢職如郡縣而得奉守先王之宗廟恐懼不敢自陳謹斬樊於期頭及獻燕督亢之地圖函封燕王拜送于庭使使以聞大王唯大王命之秦王聞之大喜乃朝服設九賔禮大小行人以九儀掌賔客之禮見燕使者咸陽宫荆軻奉樊於期之頭函而秦武陽奉地圖匣以次進至陛升髙階也秦武陽色變振恐羣臣怪之荆軻顧笑武陽顧武陽而笑前為謝曰北蠻夷之鄙人未嘗見天子胡振慴慴懼也願大王少假借之使得畢使於前秦王謂軻起取武陽所持圖軻既取圖奉之秦王發圖圖窮而匕首見因左手把秦王之袖而右手持匕首揕之未至身秦王驚自引而起袖絶拔劒劒長撡其室撡把持也與操同晉人多用扣室劒鞘時惶急惶恐也堅在室牢也劒堅故不可立拔荆軻逐秦王秦王環柱而走羣臣驚愕愕相遇驚也卒起不意卒猝同下同盡失其度而秦法羣臣侍殿上者不得持尺寸之兵諸郎中執兵皆陳於殿下非有詔不得上方急時不及召下兵以故荆軻逐秦王而卒惶急無以擊軻而乃以手共摶之摶擊也是時侍醫夏無且以其所奉藥囊提荆軻提也擿秦王方環柱走卒惶急不知所為左右乃曰王負劒王負劒遂拔以擊荆軻斷其左股荆軻廢乃引其匕首以提衍擿字本注字也秦王不中中柱秦王復擊軻軻被八創軻自知事不就倚柱而笑箕踞以罵踞坐展兩足如箕曰事所以不成者乃欲以生劫之必得約契復地之契以報太子也左右既前斬荆軻秦王目眩良久已而論功賞羣臣及當坐者罪所當坐各有差而賜夏無且黄金二百鎰曰無且愛我乃以藥囊提荆軻也於是秦大怒燕益發兵詣趙詔王翦軍以伐燕十月而拔燕薊城並此二十九年燕王喜太子丹等皆率其精兵東保於遼東秦將李信追擊燕王王急用代王嘉計殺太子丹欲獻之秦秦復進兵攻之五嵗而卒滅燕國秦二十五年此三十三年而虜燕王喜秦兼天下其後荆軻客髙漸離以擊筑見秦皇帝而以筑擊秦皇帝為燕報仇不中而死刺客𫝊有彪謂太子丹不忍一朝之憤輕亡其國其謀悖矣夫以一夫行劫刺於大國出於倉卒不意或幸以中而欲從容質責使悉反侵地取契以歸此豈持匕首之所可待鞠武初謀似矣太子不用不能力爭妾婦之明也數士之死燕國之亡皆武實為之荆軻之事甚似曹劌其所不可者劌發憤於一朝而軻謀蓄於積嵗且白衣祖送者係路其不漏露而先敗抑亦幸矣軻不足道也厥後留侯亦袖椎竊發此其人豈愚哉蓋積志仇秦不知所不可使其不逢漢帝則亦死以為期不能一日而忘秦也豫子髙漸離張留侯三人者皆孝子忠臣至一之行也唯軻於此則無處焉戰國䇿卷九
