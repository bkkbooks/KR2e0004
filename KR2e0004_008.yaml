body:
  text: 戰國䇿卷八宋鮑彪注韓分晉得南陽及潁交城定襄襄城潁陽潁陰社陽東接汝南西接𢎞農得新安宜陽康子三晉已破智氏將分其地段規謂韓王曰分地必取成臯韓王曰成臯石溜之地也溜言其無積潤寡人無所用之段規曰不然臣聞一里之厚而動千里之權者地利也萬人之衆而破三軍者不意也言地薄鄭人不備王用臣言則韓必取鄭矣王曰善諸稱王皆非當時語果取成臯至韓之取鄭也果從成臯始大烈侯景侯元年壬午安王三年韓傀相韓嚴遂重於君二人相害也嚴遂政議直指政正同舉韓傀之過韓傀以之猶以此叱之於朝嚴遂拔劒趍之以救解以救至得解於是嚴遂懼誅亡去遊求人可以報韓傀者至齊人或言軹深井里軹之里名深井聶政勇敢士也避仇隱於屠者之間嚴遂陰交於聶政以意厚之聶政問之曰子欲安用我乎嚴遂曰吾得為役之曰淺事今薄薄猶迫奚敢有請於是嚴遂乃具酒自觴聶政母前仲子奉黃金百鎰仲子遂字前為聶政母壽聶政驚愈怪其厚固謝嚴仲子仲子固進而聶政謝曰臣有老母家貧客遊以為狗屠可旦夕得甘脆肉之肥美者以養親親供養備義不敢當仲子之賜嚴仲子辟人辟猶屏闢去之因為聶政語曰臣有仇而行遊諸侯衆矣然至齊聞足下義甚高故直進百金者特以為丈人粗糲之費丈人亦尊稱政也粟十六斗太半斗舂未一斛曰糲以反足下之歡豈敢以有求邪聶政曰臣所以降志辱身居市井屠者幸以養老母以有養為幸老母在前在未死前政身未敢以許人也嚴仲子固讓聶政竟不肯受然仲子卒備賔主之禮而去久之聶政母死既葬除服聶政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣臣之所以待之者至淺矣未有大功可以稱者而嚴仲子舉百金為親夀我義不受然是深知政也夫賢者以感忿睚眥之意感言動心睚眥怒視也而親信窮僻之人而政獨安可默然而止乎且前日要政政徒以老母老母今以天年終政將為知己者用遂西至濮陽見嚴仲子曰前日所以不許仲子者徒以親在今親不幸而死仲子所欲報仇者請得從事焉嚴仲子具告曰臣之仇韓相韓傀傀又韓君之季父也宗族盛多居處兵衛甚設設陳也臣使人刺之終莫能就今足下幸而不棄請益具車騎壯士以為羽翼政曰韓與衛相去中間不逺事泄易聞今殺人之相相又國君之親此其勢不可以多人多人不能無生得失謂相可否生得失則語泄語泄則韓舉國而與仲子為讎也豈不殆哉遂謝車騎人徒辭獨行仗劒至韓仗兵器也蓋以劍為兵韓適有東孟之會東孟地缺韓王及相皆在焉持兵戟而衛侍者甚衆聶政直入上階刺殺韓傀韓傀走而抱列元作哀下同侯按釐侯䇿及傳皆言哀侯而記及其表皆書列侯䇿傳可為誤年不可移也聶政刺之兼中列侯左右大亂聶政大呼所繫殺者數十人因自皮面去面之皮抉眼屠腸抉挑也遂以死韓取聶政尸暴於市縣購之千金縣金募知者久之莫知誰政姊嫈聞之曰吾弟至賢不可愛妾之軀滅吾弟之名非弟意也言往哭自吾意耳乃之韓視之曰勇哉氣矜之隆矜自持也是其軼賁育軼車相出也高成荆矣説文成荆古之勇士今對賁育復似兩人今死而無名不顯其人父母既歿矣兄弟無有此為我故也不顯其名恐纍及姊夫愛身不揚弟之名吾不忍也乃抱尸而哭之曰此吾弟軹深井里聶政也亦自殺於尸下晉楚齊衛聞之曰非獨聶政之能乃其姊者列女也列義烈可陳聶政之所以名施於後世者其姊不避𦵔醢之誅葅酢菜也言銼斫之如此以揚其名也此三年書政殺韓相俠纍刺客傳有彪謂政之始終於其親孝矣其臨財也義矣嘗欲評其死感其義烈不忍下筆獨以謂人之居此不可不知人亦不可妄為人知也遂唯知政故得行其志惜乎遂福𥚹狷細人耳政不幸謬為所知故死於是使其受知明主賢將相則其所成就豈不有萬萬於此者乎哀哉昭侯莊侯子元年亥顯王十一年癸成午從趙來謂申不害於韓曰子以韓重我於趙請以趙重子於韓是子有兩韓而我有兩趙也魏之圍邯鄲也申不害始合於韓王然末知王之所欲也恐言而未必中於王也王問申子曰吾誰與而可與魏邪趙邪對曰此安危之要國家之大事也臣請深惟而苦思之惟亦思乃微謂趙卓韓􅏯曰子皆國之辨士也夫為人臣者言可必用可豈可盡忠而已矣二人各各進議於王以事申子微視王之所説以言於王王大説之申子請仕其從兄官仕其從父兄以官昭侯不許也申子有怨色昭侯曰非所謂學於子者也聽子之謁而廢子之道乎又亡其行子之術而廢子之請乎子嘗教寡人循功勞視次第今有所求此我將奚聽乎此如此申子乃避舍請罪曰君真其人也蘇秦為趙元作楚下同合從説韓王曰韓北有鞏洛並屬河南成臯之固西有宜陽常阪之塞常史作商殷紀注商今上洛是也東有宛穰洧水穰屬南陽洧水出潁川陽城南有陘山地方千里帶甲數十萬天下之強弓徑弩皆自韓出溪子少府下皆弩名俶真訓注溪子國名夷名又溪子陽匠名徐注少府所造時力距來徐注作之得時力倍於常其徑足以距來敵皆射六百步之外韓卒超足而射舉跖踏弩百發不暇止逺者達胸近者掩心箭中心上如掩韓卒之劒戟皆出於冥山棠溪墨陽合伯鄧師宛馮馬彪注冥山在相州北汝南吳旁有棠溪亭修務訓注墨陽美劒名合伯地缺鄧師豈南陽鄧耶猶云洛師榮陽有馮池龍淵太阿吳越春秋楚王召風胡子曰吳有干將越有歐冶寡人欲因子請因二人作劒風胡見二人作劒二其名云以上類言以地名皆陸斷馬牛水擊鵠鴈當敵即斬堅甲盾鞮鍪盾櫓鞮革履鍪兜鍪説文鍪鍑屬鍑大口釡蓋鍪如之鐵幕革抉吠音筏芮史並不注無不畢具以韓卒之勇被堅甲跖徑弩帶利劒一人當百不足言也夫以韓之徑與大王之賢乃欲西面事秦稱東藩築帝宫受冠帶祠春秋交臂而服焉夫羞社稷而為天下笑無過此者矣是故願大王之熟計之也大王事秦秦必求宜陽成臯今兹效之明年又益求割地與之即無地以給之不與則棄前功而後更受其禍且夫大王之地有盡而秦之求無已夫以有盡之地而逆無已之求此所謂市怨而買禍者也不戰而地已削矣臣聞鄙語曰寧為雞口無為牛後今大王西面交臂而臣事秦何以異於牛後乎夫以大王之賢挾強韓之兵而有牛後之名臣竊為大王羞之韓王忿然作色攘臂按劒仰天太息曰寡人雖死必不能事秦今主君以趙王之教詔之敬奉社稷以從傳在燕趙後云宣惠王令按合從在燕文公二十八年趙肅侯十六年此二十五年又蘇秦傳説六國後去趙而從約解是嵗燕易王立徐注云自初説燕至此三年宣惠之元年也比時從已解則説從時非宣惠明矣沈括辨以為雞尸牛從今按秦稱牛後蓋以惡語侵韓昭侯怒而從之雞尸牛後謬誤也宣惠王昭侯子元年己顯王子十七年丑宣王謂摎留韓人曰吾欲兩用公仲公叔其可乎對曰不可晉用六卿而國分簡公用田成監止而簡公弒齊事見哀十四年魏兩用犀首張儀而西河之外亡秦惠八年魏納河西儀時為秦客卿未相魏也後至魏襄十三年相儀儀留四年去而衍相未嘗兩用未嘗亡也此豈衍為秦良造儀為客卿時魏以事聽之耶今王兩用之其多力者內樹其黨其寡力者藉外權羣臣或內樹其黨以擅其主或外為交以裂其地則王之國必危矣彪謂此非天下之正議也顧所用如何耳使得人如周召兩用之庸何傷若公仲公叔也一之謂甚何必兩楚昭獻相韓秦且攻韓韓廢昭獻昭獻令人謂公叔曰不如貴昭獻以固楚秦必曰楚韓合矣秦攻陘此時史不書後至桓惠九年秦拔我陘然陳軫張儀同時儀死至桓惠九年四十六年矣軫必不存故因舊韓使人馳南陽之地馳反走示服也秦已馳馳進也韓避之而秦進也又攻陘韓因割南陽之地秦受地又攻陘陳軫謂秦王惠曰國形不便故馳交不親故割今割矣而交不親馳矣而兵不止臣恐山東之無以馳割事王者矣且王求百金於三川而不可得求千金於韓一旦而具今王攻韓是絶上交而固私府也言利移於下竊為王不取也秦韓戰於濁澤長社濁澤韓氏急公仲朋元作明謂韓王曰與國不可恃與謂山東今秦之心欲伐楚王不如因張儀為和於秦賂之以一名都與之伐楚此以一易二之計也韓王曰善乃警公仲之行警猶戒將西講於秦楚王懷聞之大恐召陳軫而告之陳軫曰秦之欲伐我久矣今又得韓之名都一而具甲以一都之賦為兵備秦韓并兵南鄉此秦所以廟祠而求也今已得之矣楚國必伐王聽臣為之警四境之內選師言救韓令戰車滿道路發信臣多其車重其幣使信王之救已韓為不能聽我使其或不能從我以與秦戰韓之德王也恩救我必不為鴈行以來是秦韓不和兵雖至楚國不大病矣為能聽我絶和於秦秦必大怒以厚怨於韓韓得楚救必輕秦輕秦其應秦必不敬是我因秦韓之兵而免楚國之患也楚王大説乃警四境之內選師言救韓發信臣多車幣謂韓王曰敝邑雖小已悉起之矣願大國遂肆意於秦敝邑將以楚殉韓殉言以死從之韓王大説乃止公仲公仲曰不可夫以實告我者秦也以虛名救我者楚也恃楚之虛名輕絶強秦之敵必為天下笑矣且楚韓非兄弟之國也又非素約而謀伐秦矣秦欲伐楚楚因以起師言救韓此必陳軫之謀也且王已使人報於秦矣今弗行是欺秦也夫輕強秦之禍而信楚之謀臣王必悔之矣韓王弗聽遂絶和於秦秦果大怒興師與韓氏戰於岸門後志潁陰有岸亭事在十九年此要終言之也楚救不至韓氏大敗韓氏之兵非削弱也民非蒙愚也兵為秦禽知為楚笑過聽於陳軫失計於韓朋也記十六年有彪謂二子皆億中之材也宣惠訹於甘言惑於重幣雖有公仲之謀固難以入至於非兄弟非素約而以虛名救我此言豈不明著矣乎如之何弗聽也顔率見公仲公仲不見顔率謂公仲之謁者曰公仲必以率為陽也陽佯同不實也故不見率也公仲好內齊世家注內婦官也率曰好士公仲嗇於財率曰散施公仲無行率曰好義所謂不實自今以來率且正言之而已矣公仲之謁者以告公仲公仲遽起而見之彪謂顔率此言可行公仲而已誠有是也雖陽言何益於德茍無是也正言之吾何懼以是知公仲非躬行者也襄王宣王子元年戌赧王四年庚張儀為秦連橫説韓王曰韓地險惡山居五榖所生非麥而豆民之所食大抵豆飯藿羮藿菽之少者一嵗不收民不饜糟粳地方不滿九百里無二嵗之所食料大王之卒悉之不過三十萬而厮徒負養負荷養收之人在其中矣為除守徼亭障塞徼巡也亦關境上見卒不過二十萬而已秦帶甲百餘萬車千乘騎萬匹虎鷙元作摯之士鷙擊鳥跿音徒跔音俱説文天寒足跔與此不合史注跳躍也科頭不著兜鍪貫頥貫人之頥奮戟者至不可勝計也秦馬之良戎兵之衆探前蹶元作趹後字書無趹字蹶跳也蹄間三尋者不可勝數也山東之卒被甲冒胄以會戰胄兜鍪秦人捐甲徒裎以趨敵裎祼也左挈人頭右挾生虜夫秦卒之與山東之卒也猶孟賁之與怯夫也以重力相壓猶烏獲之與嬰兒也夫戰孟賁烏獲之士以攻不服之弱國無以異於墮千鈞之重集於鳥卵之上必無幸矣幸其不破碎無是理也諸侯不料兵之弱食之寡而聽從人之甘言好辭比周以相飾也皆言曰聽吾計則可以強霸天下夫不顧社稷之長利而聽須臾之説詿誤人主者詿亦誤也無過於此者矣大王不事秦秦下甲據宜陽斷絶韓之上地東取成臯宜陽則鴻臺之宫桑林之苑桑林宜在亳修務訓言湯禱于桑山之林則似指言多桑之山非地名也非王之有已夫塞成臯絶上地則王之國分矣先事秦則安矣不事秦則危矣夫造禍而求福計淺而怨深逆秦而順趙元作楚雖欲無亡不可得也故為大王計莫如事秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能強於楚也其地勢然也今王西面而事秦以攻楚衍為字敝邑秦王必喜惠文夫攻楚而私其地轉禍而説秦計無便於此者也是故秦王使使臣獻書大王御史須以決事韓王曰客幸而教之請比郡縣築帝宫祠春秋稱東藩效宜陽彪謂橫人之辭真所謂虛喝者韓之兵信弱食信寡矣獨不曰從合則能以弱為強以寡為多乎惜乎世主不少察於此也鄭強鄭公族韓滅鄭故為韓人之走張儀於秦譛之於秦使逐之曰儀之使者必之楚矣故謂太宰楚官強謂之曰公留儀之使者留之者欲詐為儀使之致地強請西圖儀於秦故因西請秦王武曰張儀使人致上庸之地秦惠十三年取上庸今言儀致之楚欲以怒秦故使使臣再拜謁強偽為楚使白此於秦下衍秦王字秦王怒張儀走武元年此二年宜陽之役秦三年此四年楊侹棗人謂公孫顯曰請為公以五萬攻西周得之是以九鼎市甘茂也茂與顯爭國顯得九鼎其功大秦必棄茂用顯不然秦攻西周天下惡之其救韓必疾則茂事敗矣秦圍宜陽秦三年此四年遊騰謂公仲曰公何不與趙藺離石祁趙地韓嘗取之今使歸之以質許地韓地趙嘗取之質易地也則樓緩必敗矣緩害韓者趙韓合故緩敗收韓趙之地以臨魏樓元作鼻必敗矣亦以魏害韓者韓趙補為一魏必倍秦倍音背甘茂必敗矣茂攻宜陽韓得趙魏則不易拔故茂敗以成陽資翟強於齊楚必敗矣元作之齊楚敵也齊得地則益強可以敗楚時楚助秦故必敗須秦必敗須言少待以趙魏救至而楚不助故敗秦失魏宜陽必不拔矣秦魏鄰也失魏之害重於趙故獨言魏為公仲謂向夀曰禽困覆車禽所獲獸也能覆獵者之車不可忽公破韓辱公仲公仲收國復事秦自以為必可以封今公與楚解解言復好中封小令尹以桂陽中言使楚自封之國中桂陽荆州部秦楚合復攻韓韓必亡公仲躬率其私徒以鬬於秦謂且賊夀於秦願公之熟計之也向夀曰吾合秦楚非以當韓也子為我謁之公仲曰秦韓之交可合也對曰願有復於公復重言之諺曰貴其所以貴者貴所以貴人所同貴今王之愛習公也不如公孫郝元作郝下同其智能公也不如甘茂今二人者皆不得親於事矣而公獨與王主斷於國者彼有以失之也公孫郝黨於韓而甘茂黨於魏故王不信也今秦楚爭強而公黨於楚是與公孫郝甘茂同道也公何以異之人皆言楚之多變也而公必之是自為貴也非貴所同貴公不如與王謀其變也善韓以備之若此則無禍矣韓氏先以國從公孫郝而後委於甘茂是韓公之讎也言以韓為讎今公言善韓以待楚是外舉不避讎也向夀曰吾甚欲韓合對曰甘茂許公仲以武遂反宜陽之民今公徒收之甚難徒言無地與之向子曰然則奈何武遂終不可得已與韓地宜以其所得於韓若武遂者可也茂已許之已無以易之也對曰公何不以秦為韓求潁川於楚此乃韓之寄地也此本韓地楚取之故云公求而得之是令行於楚而以其地德韓也公求而弗得是韓楚之怨不解而交走秦也秦楚爭強而公過楚以攻韓過謂以攻韓為楚罪此利於秦向子曰奈何對曰此善事也甘茂欲以魏取齊公孫郝欲以韓取齊今公取宜陽以為攻宜陽蓋夀議攻而甘茂攻之收楚韓以安之使楚歸潁川則楚韓講故曰安而誅齊魏之罪誅猶求也求其過失以為郝茂之罪是衍以字公孫郝甘茂衍之字無事也言其失權客卿韓為韓謂秦王武曰韓珉之議知其君不知異君知其國不知異國彼公仲者秦勢能詘之詘貶下也以補秦之強首之者首言以兵向之珉為疾矣珉者公仲所善公仲受兵則珉病進齊宋之兵至首垣韓進之逺薄梁郭所以不反魏者反不合也兵薄梁郭疑於不合而合以為成成平也猶和而過南陽之道欲以四國西首也韓宋齊魏所以不者言欲攻秦而不果者皆曰衍以字燕亡於齊亡謂喪地魏亡於秦孟子曰西喪地陳蔡亡於楚此亡國也此皆絶地形言其大小相絶而四國輕以小敵大故亡羣臣此周以蔽其上大臣為諸侯輕國也今王位正言武王能正貴賤之位張儀之貴不得議公孫郝元作赫下同是從臣不事大臣也從臣謂儀大臣郝也事言不得干其事公孫郝之貴不得議甘茂則大臣不得事近臣矣近臣謂茂貴賤不相事各得其位輻湊以事其上則羣臣之賢不肖可得而知也王之明一也公孫郝嘗疾齊韓言急於得二國而不加貴貴言不厚二國則為大臣不敢為諸侯輕國矣齊韓嘗因公孫郝而不受則諸侯不敢因羣臣以為能矣外內不相為則諸侯之情偽可得而知也王之明二也公孫郝樗里疾請無攻韓陳四辟去陳軍陳以不攻故解散王猶攻之也宜陽之役甘茂約楚趙欲攻魏而反敬魏違其初約是且搆我初約攻而反敬之是欲與三國難我也茂且攻宜陽王猶校之也茂攻宜陽可以贖前若它人則置不檢校羣臣之智無幾於王之明者幾猶近臣故願公仲之以國元作國以待於王待待其命而無自左右也自猶由也欲秦王聽已勿用左右之説或謂公仲曰聽者聽國謂聽於衆非必聽實也實謂見事故先王聽諺言於市願公之聽臣言也公求中立於秦立謂立於齊魏之間此章實君魏而弗能得也善公孫郝以難甘茂歡齊兵以勸止魏郝善齊故善郝則喜於齊之攻魏茂善魏故難茂則可以止魏之攻齊勸言茂欲為之楚趙皆公之讎也詳此則公仲與齊者也二國不善齊故讎公仲臣恐國之以此為患也願公之復求中立於秦也公仲曰奈何對曰秦王以公孫郝元作郝下同為黨於公而弗之聽甘茂不善於公而弗為公言公何不因行願以與秦王語行願人姓名行願之為秦王臣也公無私秦信之故可因臣請為公謂秦王曰齊魏合與離於秦孰利齊魏别與合離以交言别以兵言於秦孰強秦王必曰齊魏離則秦重合則秦輕齊魏别則秦強合則秦弱臣即曰今王聽公孫郝以韓秦之兵應齊而攻魏魏不敢戰歸地而合於齊是秦輕也臣以公孫郝為不忠今王聽甘茂以韓秦之兵據魏而攻齊齊不敢戰亦元作不求割地而合於魏是秦輕也臣以甘茂為不忠故不如令韓中立以攻齊衍齊字王言救魏以徑之齊時先已伐魏攻令秦王聲言救魏以徑韓之攻齊齊魏不能相聽必離秦敕魏則魏不憚齊亦不合於齊兵交元作史王欲則信公孫郝於齊欲言或欲此或欲彼為韓取南陽易榖川以歸榖水出澠池此惠王之願也王欲則信甘茂於魏以韓秦之兵據魏以却齊此武王之願也臣以為令韓以中立以攻元作徑齊最秦之大急也公孫郝黨於齊而不肯言甘茂薄而不敢謁也茂羇旅之臣故言薄此欲攻齊故其辭與茂此二人王之大患也願王之熟計之也公仲數不信於諸侯諸侯補兩字錮之不行其説南委國於楚以國事聽之楚王懷弗聽蘇代為謂楚王曰不若聽而備於其反也反亦謂不信朋之反也常杖元作仗下同趙而畔楚杖齊而畔秦今四國錮之而無所入矣亦甚患之公仲甚患此方其為尾生之時也言公仲自患其反之不利故欲為信尾生再見燕䇿蘇代言名高蓋論語徴生泛論訓亦云謂公叔曰公欲得武遂於秦而不患楚之能揚河外也揚猶動公不如令人恐楚王懷而令人為公求武遂於秦謂楚王曰發重使為韓求武遂於秦秦王昭聽是令得行於萬乘之王也韓得武遂以限元作恨秦無元作毋秦患而德元作得楚韓楚之縣而已言役屬於楚秦不聽是秦韓之怨深而交事補楚也謂公叔曰乘舟舟漏而弗塞則舟沉矣塞漏舟而輕陽侯之波説陽侯多矣今按四八目伏羲六佐一曰陽侯為江海蓋因此為波神與則舟覆矣今公自以為辨於薛公辨猶治也猶言治於高傒薛公田嬰而輕秦是塞漏舟而輕陽侯之波也願公之察也齊令周最使鄭韓滅鄭有其地故多稱鄭立韓擾韓公子蓋立為相而廢公叔周最患之曰公叔之與周君交也交言其相善已不可以廢之今我使鄭立韓擾而廢公叔語曰怒於室者色於市色作色今公叔怨齊無奈何也必絶周君而深怨我矣史舍曰公行矣請令公叔必重公周最行至鄭公叔大怒史舍齊韓史與最同使入見見公叔曰周最固不欲來使臣竊強之周最不欲來以為公也使臣之強之也亦以為公也公叔曰請聞其説對曰齊大夫諸子有犬犬猛不可叱叱之必噬人客有請叱之者疾視而徐叱之犬不動復叱之犬遂無噬人之心今周最固得事足下而以不得已之故來使彼將禮陳其辭以禮陳説不急也而緩其言鄭王必以齊王閔為不急必不許也今周最不來他人必來來使者無交於公而欲德於韓擾其使之必疾言之必急則鄭王必許之矣公叔曰善遂重周最王果不許韓擾公仲使韓珉之秦求武遂而恐楚之怒也唐客楚人謂公仲曰韓之事秦也且以求武遂也非敝邑之所增也韓已得武遂其形乃可以善楚臣願有言而不敢為楚計今韓之父兄得衆者母相韓不能獨立勢必衍不字善楚絶句王曰唐客以楚懷言告公仲吾欲以國輔韓珉而相之可乎父兄惡珉珉必以國保楚公仲説初恐楚怒已使珉今欲相珉則不怒也仕元作士唐客於諸公蓋薦之於韓之大臣乃得仕而使之主韓楚之事公仲以宜陽之故仇甘茂其後秦歸武遂於韓此六年已而秦王昭固疑甘茂之以武遂解於公仲也杜聊韓人為公仲謂秦王曰朋元作明也願因茂以事王若公仲與茂善以實秦王之疑秦王大怒於甘茂故樗里疾大説杜聊鄭強以金八百入秦以伐韓強以韓滅故冷向謂鄭強曰公以八百金請伐人之與國韓秦之與秦必不聽公公不如令秦王昭疑公叔鄭強曰何如曰公叔之攻楚也以幾瑟之存焉幾瑟太子嬰弟時質楚公叔所不善故言伐元作先楚也今已令楚王懷奉幾瑟以車百乘居陽翟令昭獻轉而與之處獻本不善幾瑟令之回心相善旬有餘彼已角角言二人均禮而幾瑟公叔之讎也而昭獻公叔之人也秦王聞之必疑公叔為楚也幾瑟韓愛子而在楚秦固疑其合楚公叔與幾瑟讎故秦不疑今叔所善與之處而禮均然則秦安得不疑其為楚楚秦所惡也其伐韓不待請矣公仲為韓魏易地公叔爭之而不聽且亡史惕韓史謂公叔曰公亡則易必可成矣公無辭以復反且示天下輕公公不若順之夫韓地易於上上上流魏之上則害於趙趙魏鄰也魏地廣趙之害也魏易於下下謂韓則害於楚公不如告楚趙楚趙惡之趙聞之起兵臨羊腸楚聞之發兵臨方城而易必敗矣錡宣韓人之教韓王取秦取言與之合曰為公叔具車百乘言之楚易三川因令公仲謂秦王昭曰三川之言曰秦王必取我我三川也韓王之心不可解矣言其聞三川之言恐空失地故來與楚易王何不試以襄子王秦王襄子秦諸公子不善太子者為質於韓令韓王知衍之字王之不取三川也韓之易地畏秦取之也今秦入質則不取可知因以出襄子而德太子襄陵之役史不書畢長謂公叔曰請毋用兵而楚魏皆德公之國矣夫楚欲置公子咎元作高從史後並同此書亦或作咎置不立也事見十二年必以兵臨魏魏欲立咎故公何不令人説昭子陽也曰戰未必勝請為子起兵以之魏韓起兵子有辭以毋戰楚臨魏欲置咎也韓今順之故可以無戰於是衍以字太子幾瑟也與元作扁昭陽元作揚梁王皆德公矣陽得毋戰梁得免兵公叔使馮君於秦恐留教陽向並韓人説秦王昭曰留馮君以善韓臣韓之嫉馮者以留之為善非上智也主君不如善馮君而資之以秦馮君廣王恃秦以自大而不聽公叔以與太子爭太子爭也時未定所立故幾瑟咎嬰更稱之則王澤布而害於韓矣國不和故韓公叔與幾瑟爭國爭立為相見後鄭強為楚王懷使於韓矯以新城陽人命世子幾瑟也以與公叔爭國楚怒將罪之鄭強曰臣之矯與之以為國也臣曰言其言然世子得新城陽人以與公叔爭國而得全魏必急韓氏魏欲立咎故急攻之韓氏急必懸命於楚又何新城陽人敢索若戰而不勝幸元作走而不死今且以至言歸楚又安敢言地楚王曰善乃弗罪楚䇿有大同鄭作申韓公叔與幾瑟爭國中庶子強庶子本周官秦置中庶子為太子官謂太子曰不若及齊師未入齊助公叔急擊公叔太子曰不可戰之於國中國必分對曰事不成身必危尚何足以圖國之全為太子弗聽齊師果入太子出走彪謂幾瑟之及此言也義嗣也而卒不得立小人勝故也齊明謂公叔曰齊逐幾瑟楚善之令楚欲善齊甚公何不令齊王閔謂楚王懷王為我逐幾瑟以窮之楚聽是齊楚合而幾瑟走也楚王弗聽是有陰於韓也陰言私厚之然則公叔不可不備公叔將殺幾瑟也謂公叔曰太子之重公也太子咎畏幾瑟也今幾瑟死太子無患必輕公韓大夫見王老冀太子之用事也固欲事之太子外無幾瑟之患時在楚故言外而內收諸大夫以自輔也公必輕矣不如無殺幾瑟以恐太子太子必終身重公矣公叔且殺幾瑟也宋赫為謂公叔曰幾瑟之能為亂也內得父兄而外得秦楚也今公殺之太子無患必輕公韓大夫知王之老而太子定必陰事之秦楚若無韓言小國不之有必陰事伯嬰秦楚有韓則事太子太子韓嗣故也無韓乃事嬰伯嬰亦幾瑟也公不如勿殺絶句伯嬰恐必陰保於公嬰與太子在韓皆幾瑟之仇幾瑟在故嬰恐韓大夫不能必其不入也幾瑟入必不敢輔伯嬰以為亂秦楚挾幾瑟以塞伯嬰塞障也不使與事伯嬰外無秦楚之權內無父兄之衆必不能為亂矣此便於公十二年書太子嬰死因言公仲伯嬰六事六事豈與太子同名與謂新城君曰公叔伯嬰恐秦楚之內幾瑟也公何不為韓求質子於楚楚不主幾瑟則必入質以此卜之楚王懷聽而入質子於韓則公叔伯嬰必知秦楚之不以幾瑟為事也必以韓合於秦楚矣秦楚挾韓以窘魏魏氏不敢東不合齊是齊孤也公又令秦求質子於楚卜其與秦同否也楚不聽則怨結於韓此韓皆主公叔伯嬰為言韓挾齊魏以盻楚盻睥睨也楚王必重公矣新城貴於秦楚欲秦援之故重新城公挾秦楚之重以積德於韓則公叔伯嬰必以國事公矣記十二年有在楚圍雍氏下胡衍韓人之出幾瑟於楚也出而歸韓教公仲衍教之謂魏王哀曰太子在楚韓不敢離楚也懼其為幾瑟伐韓王元作公何不試奉公子咎此後並因舊字而為之請太子子韓立之因令人謂楚王懷幾瑟聞魏欲立咎故曰韓立公子咎而棄幾瑟是王抱虛質也王不如亟歸幾瑟幾瑟入必以韓權報讎於魏而德王矣幾瑟亡之楚楚將收秦而復之謂芋戎曰廢公叔而相幾瑟者楚也相謂昔日今幾瑟亡之楚楚又收秦而復之幾瑟入鄭之日韓楚之縣已元作邑公不如令秦王賀伯嬰之立也韓絶於楚楚主幾瑟而今立嬰故絶韓其事秦必疾秦挾韓親魏齊楚後至者先亡此王業也冷向謂韓咎史有公子咎有韓咎曰幾瑟亡在楚楚王懷欲復之甚今楚兵十餘萬在方城之外臣請令楚築萬家之都於雍氏之旁韓必起兵以禁之公必將矣公因以楚韓之兵奉幾瑟而內之幾瑟得入而德公必以韓楚奉公矣記十二年有楚令景鯉入韓韓且內伯嬰於秦景鯉患之楚欲立幾瑟恐秦立嬰故冷向謂伯嬰曰太子謂伯嬰入秦秦必留太子而合楚以復幾瑟也是太子反棄之言危得立而棄之向蓋為鯉者彪謂太子國之本也而紛紛不定若此韓有相其皆何事邪楚圍雍氏此十二年五月韓令使者求救於秦冠蓋相望也秦師不下殽韓又令尚靳使秦謂秦王昭曰韓之於秦也居為隱蔽出為鴈行今韓已病矣秦師不下殽臣聞之脣揭者揭猶反其齒寒願大王之熟計之宣太后曰使者來者衆矣獨尚子之言是召尚子入宣太后謂尚子曰妾事先王日先王以其髀股也加妾之身妾困不支也盡置其身妾之上而妾弗重也何也以其少有利焉今佐韓兵不衆糧不多則不足以救韓夫救韓之危日費千金獨不可使妾少有利焉尚靳歸書以書歸報韓王韓王遣張翠張翠稱病日行一縣張翠至甘茂曰韓急矣先王病而來張翠曰韓未急也且急矣甘茂曰秦重國智王也韓之緩急莫不知今先生言不急可乎張翠曰韓急則折而入於楚矣臣安敢來甘茂曰先生毋復言也甘茂入言秦王曰公仲柄得秦師柄猶持故敢捍楚今雍氏圍而秦師不下殽是無韓也公仲且抑首而不朝抑首不意貌公叔且以國南合於楚楚韓為一魏氏不敢不聽是楚以三國謀秦也如此則伐秦之形成矣不識坐而待伐孰與伐人之利秦王曰善果下師於殽以救韓甘茂傳有茂入言下楚圍雍氏韓令冷向借救於秦秦為發使公孫昧入韓公仲曰子以秦為將救韓乎其不乎對曰秦王昭之言曰請道於南鄭屬漢中藍田以入攻楚出兵於三川以待公殆不合軍於南鄭矣不與楚戰公仲曰奈何對曰秦王必祖張儀之故謀昔日所謀楚威王攻梁張儀謂秦王惠曰與楚攻梁魏折而入楚韓固其與也韓魏之與是秦孤也故不如出兵以徑魏陽為助魏實欲其與楚戰於是攻皮氏楚攻之魏氏徑威王怒楚與魏大戰秦取西河之外以歸惠八年今也其將陽言救韓而陰善楚公恃秦而徑必輕與楚戰楚陰得秦之不用也不為韓用必易與公相支也公戰勝楚遂與公乘楚易三川而歸乘因取之也公戰不勝楚楚塞三川而守之公不能救也臣甚惡其事司馬康秦人三反之郢矣甘茂與昭獻遇於境其言收璽璽軍符收之者言欲止楚之攻韓其實猶有約也疑秦楚約攻韓公仲恐曰然則奈何對曰公必先韓而後秦先身而後張儀先已所見後儀之故智言欲秦之救已而不欲其徑韓也徐注欲以為儀在之日而云非也臣補以公不如亟以國合於齊楚秦必委國於公以解伐是公之所以外者儀而已外猶後也此言不恃秦耳承上故言儀其實猶之不失秦也雖合齊楚圖國事耳秦無辭怨之記十二年有或謂韓公仲曰夫孿子之相似者孿一乳兩子唯其母知之而已夫利害之相似者唯智者知之而已今公國其利害之相似正如孿子之相似也得其道為之則主尊而身安不得其道則主卑而身危今秦魏之和成轉與二國和而非公適兩束之束猶約則韓必謀矣謀謂和不堅而復議之若韓隨魏以善秦是為魏從也從人而已非自約之則韓輕主卑矣秦已善韓必將置其所愛信者令用事於韓以完之全秦之事是公危矣今公與安成君韓人為秦魏之和成因為福不成亦為福秦魏之和成而公適兩束之是韓為秦魏之門户也喻兩國由之是韓重而主尊矣安成君東重於魏而西重於秦操右契左契待合而已右契可以責取而為公責德於秦魏之王公仲制和為德於秦今責其報裂地而為諸侯公之事也言當務此若夫安韓魏而終身相公之下服服猶事以侯國為上則相猶為下也此主尊而身安矣秦魏不終相聽者也後必相違齊怒於不得魏必欲善韓以塞魏魏不聽秦必務善韓以備秦是公擇布而割也布喻濟魏割喻制之秦魏和則兩國德公不和則兩國爭事公所謂成為福不成亦為福者也願公之無疑也或謂公仲曰今有一舉而可以忠於主便於國利於身願公之行之也今天下散而事秦則韓最輕矣今天下合而離秦則韓最弱矣合離之相續則韓最先危矣此君國長民之大患也今公以韓先合於秦天下隨之是韓以天下事秦秦之德韓也厚矣韓與天下朝秦而獨厚取德焉公行之計之猶此是其於主也至忠矣天下不合秦秦令而不聽秦必起兵以誅不服秦久與天下結怨御名難而兵不決韓息士民以待其舋舋罅也公行之計是其於國也大便也昔者周佼以西周善於秦而封於梗陽太原榆次有梗陽鄉周啓以東周善於秦而封於平原今公以韓善秦韓之重於兩周也無先計而秦之爭機也在已之計無先於此在秦則為爭言欲之急機言不可失萬於周之時今公以韓為天下先合於秦秦必以公為諸侯以明示天下公行之計是其於身大利也願公之加務也釐王襄王子元年寅赧王二十年丙韓咎太子咎即釐王立為君而未定也幾瑟伯嬰難之其弟在周周欲立車百乘而送之恐韓咎入韓之不立也綦母恢曰不如以百金從之韓咎立因以為戒所謂兵餽不立則曰來效賊也得立者以咎弟為賊五國約而攻秦趙惠文十三年此十年楚王頃襄為從長不能傷秦兵罷而留於成臯魏順謂沛元作市下同丘君太公世家君其長也曰五國罷必攻沛丘注沛丘為貝曰貝丘屬清河以償兵費君元作若資臣臣請為君止天下之攻沛丘沛丘君曰善因遣之魏順南見楚王曰王約五國而西伐秦不能傷秦天下且以是輕王而重秦故王何不卜交乎楚王曰奈何魏順曰天下罷必攻沛丘以償兵費王令之勿攻沛丘五國重王五當作四且聽王之言而不攻沛丘不重王且反王之言而攻沛丘然則王之輕重必明矣故楚王卜交而沛丘存韓人攻宋齊記閔三十八年書韓為齊攻今從史定為此十年秦王昭大怒曰吾愛宋與新城陽晉同也韓珉與我交而攻我所甚愛何也蘇代元作秦今從史為韓説秦王曰韓珉之攻宋所以為王也以韓之強輔之以宋楚魏必恐恐必西面事秦王不折一兵不殺一人無事而割安邑此韓珉之所以禱於秦也禱言以此求事秦秦王曰吾固患韓之難知一從一橫此其説何也韓難知而代説如此何也對曰天下固令韓可知矣言非獨代知之韓固已攻宋矣其西事秦以萬乘自輔萬乘秦也不西事秦則宋地不安矣難得宋地不能自安中國白頭遊敖之士敖出遊也皆積智欲離秦韓之交伏軾結靷靷駕牛具在胸者西馳者未有一人言善韓者也伏軾結靷東馳者未有一人言善秦者也皆不欲韓秦之合者何也則晉楚智而韓秦愚也晉楚合必伺韓秦伺亦圖也小言之韓秦合必圖晉楚請以決事秦王曰善齊記有韓字並作齊或謂韓王曰秦王昭欲出事於梁而欲攻綘安邑韓計將安出矣謂有齒寒之憂秦之欲伐韓以東窺周室甚唯寐忘之今韓不察因欲與秦必為山東大禍矣秦之欲攻梁也欲得梁以臨韓恐梁之不聽也故欲痛之以固交也攻之深使之懲創不敢離秦王不察因欲中立不助秦亦不救魏梁必怒於韓之不與已必折為秦用韓必舉矣願王熟慮之也不如急發重使之趙梁約復為兄弟使山東皆以鋭師戍韓梁之西邊非為此也山東無以救亡此萬世之計也秦之欲并天下而王之也不與古同事之雖如子之事父猶將亡之也行雖如伯夷猶將亡之也行雖如桀紂猶將亡之也言志於亡之而已無擇也雖善事之無益也不可以為存適足以自令亟亡也然則山東非能從親合而相堅如一者必皆亡矣彪謂秦之大情此士陳之無餘藴矣非蘇氏兄弟不能也説之著明如此而聽之者藐藐豈天亡之邪蓋漢運將興而秦為之鸇獺也謂鄭王曰昭釐侯一世之明君也申不害一世之賢士也韓與魏敵侔之國也申不害與昭釐侯執圭而見梁君非好卑而惡尊也非慮過而議失也申不害之計事曰我執圭於魏魏君必得志於韓必外靡於天下矣靡蔑視之是魏敝矣諸侯惡魏必事韓是我俯元作免於一人之下而信平於萬人之上也夫弱魏之兵而重韓之權莫如朝魏昭釐侯聽而行之明君也申不害慮事而言之忠臣也今之韓弱於始之韓而今之秦強於始之秦今秦有梁君之心矣而王與諸臣不事為尊秦不以尊秦為事以定韓者臣竊以為王之明為不如昭釐侯而王之諸臣莫如申不害也昔者秦補穆公一勝於韓原晉記斃於原注晉韓原後志在馮翊夏陽而霸西州猶言西方晉文公一勝於城濮而定天子僖二十八年此皆以一勝立尊尊謂霸令成功名於天下令猶使今秦數世強矣大勝以十數小勝以百數大之不王小之不霸名尊無所立制令無所行諸侯不從其令然而春秋用兵者非以求主尊成王於天下也言志於尊王而已昔先王之攻有為名者有為實者為名者攻其心使之心服而已為實者攻其形形在外者謂地與民昔者吳與越戰越人大敗保於會稽之上吳人入越而户撫之遍至其家撫安之越王使大夫種行成於吳請男為臣女為妾身執禽禽鳥小贄也而隨諸御吳之執事者吳人果聽其辭與成而不盟此攻其心者也其後越與吳戰吳人大敗亦請男為臣女為妾反以越事吳之禮也越越人不聽也遂殘吳國而禽夫差此攻其形者也今將攻其心乎宜使如吳攻其形乎宜使如越夫攻形不如越而攻心不如吳而君臣上下少長貴賤畢呼霸王臣竊以為猶之井中而謂曰我將為爾求火也東孟之會聶政陽堅堅政之副猶秦武陽刺相兼君許異韓人蹙列元作哀下同侯而殪之蹙猶留侯躡漢王足蓋使之佯死立以為鄭君韓氏之衆無不聽令者則許異為之先也是故列侯為君而許異終身相焉而韓氏之尊許異也猶其尊列侯也今日鄭君不可得而為也為去音謂蹙之雖終身相之焉然而吾弗為云者豈不為過謀哉言無前日之難而可以久相而曰不為者過也昔齊桓公九合諸侯未嘗不以周襄王之命然則雖尊襄王桓公亦定霸矣九合諸侯之尊桓公也侯之與於合者猶其尊襄王也今日天子不可得而為也雖為桓公然而補此兩字吾弗為云者豈不為過謀而不知尊哉此欲其尊秦韓氏之士數十萬皆戴列侯以為君而許異獨取相焉者無它也諸侯之君無不任事於周室也而桓公獨取霸者亦無它也知所尊而已今強國將有帝王之舋謂秦而以國先者此桓公許異之類也豈可不謂善謀哉夫先與強國之利強國能王則我必為之霸強國不能王則可以避其兵使之無伐我然則強國事成則我立帝而霸立言彼為帝由我尊之強國之事不成猶之厚德我也今與強國今謂韓強國之事成則有福不成則無患然則先與強國者聖人之計也韓陽役於三川征伐之役而欲歸足強韓人為之説韓王曰三川服矣王亦知之乎役且共貴公子役役人公子謂陽等輩貴言立之為君王於是召諸公子役於三川者而歸之秦大國也韓小國也韓甚疏秦而見親秦為秦所親韓補計之非金無以也金以事秦故賣美人美人之賈貴諸侯不能買故秦買之三千金韓因以其金事秦秦反得其金與韓之美人韓之美人因言於秦曰韓甚疏秦美人怨韓賣之又知韓之情從是觀之韓之美人與金此兩者其疏秦乃始衍於字益明故客有説韓者曰不如止淫用淫侈也以是為金而事秦是金必行而韓之疏秦不明美人知內行者也謂國中隱事故善為計者不見內行見顯示之張丑之合齊楚講於魏也謂韓公仲曰今公疾攻魏之鄆元作運下同後志琅邪東管有鄆亭魏急則必以地和於齊楚故公不如勿攻也魏緩則必戰與齊楚戰戰勝攻鄆而取之易矣勝則兵敝又無齊楚之助韓可取鄆戰不勝則魏且內之內鄆於韓公仲曰諾張丑因謂齊楚曰韓已與魏矣與之講以為不然則盍觀公仲之攻也公仲不攻從丑之言齊楚恐恐韓魏合因講於魏而不告韓謂韓相國公仲也曰人之所以善扁鵲者為有臃腫也使善扁鵲而無臃腫也則人莫之為之也無為善之今君以所事謂王善平原君者為惡於秦也以見惡於秦故善之以支秦而善平原君乃所以惡於秦也秦以平原難之故惡之而韓與之善故亦惡韓願君之熟計之也韓相公仲衍珉字下同使韓侈之秦請攻魏秦王昭説之韓侈在唐晉陽注詩唐國公仲死韓侈謂秦王曰魏之使者謂後相韓辰曰公必為魏罪韓侈韓辰曰不可秦王仕之又與約事言約攻魏使者曰秦之仕韓侈也以重公仲也今公仲死韓侈之秦秦必弗入又奚為挾之以恨魏王昭乎韓辰患之將聽之矣今王不召韓侈韓侈且伏於山中矣懼罪秦王曰何意寡人如是之權也權猶變也始説侈而今不入是變也今安伏秦人召韓侈而仕之韓珉相齊令吏逐公疇豎齊人又元作大怒於周之留成陽君君本在齊為秦善之珉欲使之之秦過周周人留之故怒謂韓珉曰公以二人者為賢人也所入之國因用之乎則不如其處小國謂周何也成陽君為秦去韓公疇豎楚王頃襄善之今公因逐之二人者必入秦楚必為公患且明公之不善於天下明顯猶示二大國惡之天下不能善也天下之不善公者與欲有求於齊者且收之以臨齊而市公謂山陽君韓人曰秦封君以山陽兖州郡齊封君以莒齊秦非重韓則賢君之行也今楚攻齊取莒上不交齊次弗納於君弗使入莒是棘齊秦之威而輕韓也棘猶難也楚攻齊而不內秦之所封山陽又韓人故云山陽君因使之楚解齊攻也趙魏攻華陽韓謁急於秦以急告也冠蓋相望秦不救韓相國辰也謂田苓曰事急願公雖疾為一宿之行田苓見穰侯穰侯曰韓急乎何故使公來田苓對曰未急也穰侯怒曰是何以為公之主使乎公猶國也言其不任冠蓋相望告敝邑甚急公言未急何也田苓曰使韓急則將變矣穰侯曰公無見王矣臣請令發兵救韓八日中大敗趙魏於革陽之下記二十三年有韓氏逐向晉於周晉周人使周逐之周使成恢為之謂魏王安釐曰周必寬而反之反謂還王何不為之先言是王有向晉於周也有言得其用魏王曰諾成恢因為謂韓王曰逐向晉者韓也而還之者魏也豈如道韓反之哉道猶由是魏有向晉於周而韓王失之也不反之則然韓王曰善亦因請復之張登中山人見其䇿謂費緤韓人曰請令公子牟謂韓王曰費緤西周讎之東周寶之此其家萬金王何不召之以為三川之守是緤以三川與西周戒也三川近西西讎之故緤有戒心必盡其家以事王西周惡之必效先王之器以止王止韓勿使為守韓王必為之此下登言其效也西周聞之必解子之罪以止子之事守三川非緤之欲登云云解其罪耳魏王安釐為九重之盟九重謂王城欲城之先盟其衆且復天子赧四十二年馬犯請梁城周有復之之語正此二十三年復復其尊房喜韓人謂韓王曰勿聽之也大國惡有天子而小國利之王與大國弗聽此言韓亦大國魏安能與小國立之桓惠王釐王子元年丑赧王十三年己建信君趙人輕韓熙趙敖為謂建信君元作侯曰國形有之而存無之而亡者魏也趙魏為鄰故其勢如此不可無而從者韓也欲為從必得韓今君之輕韓熙者交善楚魏也此為從者説也從宜善韓而善此二國者非也秦見君之交反善於楚魏也其收韓必重矣秦之志常反諸國從則韓輕從必得韓而反輕者國小不得主從橫則韓重最近秦故則無從輕矣韓以為輕秦出兵於三川則南圍鄢蔡邵之道不通矣謂潁川鄢陵汝南二蔡邵陵魏急上三邑皆近魏其救趙必緩矣秦舉兵破邯鄲趙必亡矣故君收韓可以無舋凡六十章戰國䇿卷八
