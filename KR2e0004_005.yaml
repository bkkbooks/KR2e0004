body:
  text: 戰國策卷五宋鮑彪注楚今之南郡江夏零陵桂陽武陵長沙漠中汝南皆其分也江陵故郢都西逋巫巴東有雲夢之饒宣王肅王子元年烈王七年壬子齊楚搆難宋請中立齊急宋告急於宋宋許之子象楚人為楚謂宋補王公剔成曰楚以緩失宋將法齊之急也齊以急得宋後將常急矣是從齊而攻楚之未必利也齊戰勝楚勢必危宋不勝是以弱宋干强楚也言以助齊犯楚之怒而今兩萬乘之國常以急求所欲國必危矣邯鄲之難趙成侯二十一年魏拔邯鄲此十六年昭奚恤謂楚王曰王元作里不如無救趙而以强魏使魏為强魏强其割趙必深矣趙不能聽則必堅守是兩敝也兩國相持必俱敝景舍曰不然昭奚恤不知也夫魏之攻趙也恐楚之攻其後也今不救趙趙有亡形而魏無楚憂是楚魏共趙也如與魏共攻之害必深矣趙之害何以兩敝也且魏令兵以割趙趙見亡形而有楚之不救已也言雖有楚而不見救必與魏合而以謀楚故王不如少出兵以為趙援趙恃楚徑必與魏戰魏怒於趙之徑而見楚救之不足畏也必不釋趙趙魏相敝而齊秦應楚應言乘此起兵耳非與楚合也則魏可破也楚因使景舍起兵救趙邯鄲拔楚兵少故楚取睢濊之間後志梁國睢陽注征北記南淮有睢陵梁國有睢陽南臨濊水江乙為魏使於楚乙魏人時居魏後乃仕楚故其譖昭奚恤曰臣居魏知之謂楚王曰臣入境聞楚之俗不蔽人之善不言人之惡誠有之乎王曰誠有之江乙曰然則白公之亂得無遂乎遂猶成白公太子建子勝哀十六年建以讒奔鄭鄭殺之勝請伐鄭子西不從勝怒殺子西劫惠王誠如是臣等之罪免矣楚王曰何也江乙曰州侯相楚貴甚矣而主斷謂其專决左右俱曰無有言世無如之如出一口矣荆宣王問羣臣曰吾聞北方之畏昭奚恤也果誠何如羣臣莫對江乙對曰虎求百獸而食之得狐狐曰子無敢食我也天帝使我長百獸今子食我是逆天帝命也子以我為不信吾為子先行子隨我後觀百獸之見我而敢不走乎虎以為然故遂與之行獸見之皆走虎不知獸畏已而走也以為畏狐也今王之地方五千里帶甲百萬而専屬之昭奚恤故比方之畏奚恤也其實畏王之甲兵也猶百獸之畏虎也昭奚恤與彭城君彭城屬楚知為楚人議於王前王召江乙而問焉江乙曰二人之言皆善也臣不敢言其後此謂慮賢也慮猶疑也賢者言善已復言之將使王疑彼思慮之也江尹乙也欲惡昭奚恤於楚王而力不能故為梁山陽君山陽屬魏知為魏人請封於楚知其無功奚恤必諫而山陽怨可以為黨楚王曰諾昭奚恤曰山陽君無功於楚國不當封江尹因得山陽君與之共惡昭奚恤魏氏惡昭奚恤於楚王以山陽君故楚王告昭子昭子曰臣朝夕以事聽命言其親近而魏入吾君臣之間以惡奚恤之言入臣大懼臣非畏魏也夫泄吾君臣之交而天下信之是其為人也近苦矣苦猶惡也此指江乙夫苟不難為之外為謂泄外謂魏也豈忘為之內乎臣之得罪無日矣無幾日也王曰寡人知之大夫何患江乙惡昭奚恤謂楚王曰人有以其狗為有執而愛之執言善守其狗嘗溺井溺去音其鄰人見狗之溺井也欲入言之狗惡之當門而噬之鄰人憚之遂不得入言邯鄲之難楚進兵大梁取矣昭奚恤取魏之寶器臣居魏知之故昭奚常惡臣之見王此言邯鄲事在乙居魏時故升邯鄲之難於前江乙欲惡昭奚恤於楚謂楚王曰下比周則上危下分爭則上安分則不比爭則不周為揚惡張本王亦知之乎願王勿忘也且人有好揚人之善者於王何如王曰此君子也近之江乙曰有人好揚人之惡者於王何如王曰此小人也逺之江乙曰然則且有子殺其父臣弒其主者而王終已不知者何也以王好聞人之美惡聞人之惡也王曰善寡人願兩聞之彪謂兩聞之是也然必以明夫茍不明則適為江乙讒口之資耳江乙說於安陵君名壇失其姓楚之幸臣按魏記注召陵有安陵應屬楚而魏策亦有同號者别一人也曰君無咫尺之功元作地骨肉之親處尊位受厚祿一國之衆見君莫不斂袵而拜撫委而服撫物委物必下其手皆卑下意何以也曰王過舉以元作而色言謬以色見舉不然無以至此江乙曰以財交者財盡而交絶以色交者華落而愛渝華菁華渝變也是以嬖色不敝席嬖賤而幸者席不及敝而愛弛寵臣不避軒避猶退軒曲輈藩車也車敝則退去今不及然今君擅楚國之勢而無以自結於王竊為君危之安陵君曰然則奈何願君必請從死以身為殉此乙辭如是必長得重於楚國曰謹受今三年而弗言江乙復見曰臣所為君道至今未效君不用臣之計臣請不敢復見矣安陵君曰不敢忘先生之言未得間也於是楚王游於雲夢澤名在南郡華容結駟千乘旌旗蔽天野火之起也若雲霓霓虹也兕虎嘷之聲若雷霆兕若牛而青有狂兕􅟸元作牂車集韻􅟸音詳趨行也若牂則羊耳依輪而至王親引弓而射一發而殪王抽旃旄旃曲柄旗旄幢也而抑兒首仰天而笑曰樂矣今日之游也寡人萬嵗千秋之後誰與樂此矣問安陵與誰安陵君泣數行下而進曰臣入則編席編次簡也言與王相次如之出則陪乘陪重上也此言二人同車大王萬嵗千秋之後願得以身試黃泉蓐螻蟻願為蓐以辟二物蓐陳草也又何如得此樂而樂之王大說乃封壇為安陵君君子聞之曰江乙可謂善謀安陵君可謂知時矣彪謂此非君子之言也安陵妾婦也江乙為之謀又其卑者安有君子而美此流哉郢人有獄三年不決者故令人謀其宅以卜其罪有罪則宅入官故可請卜測知之也客因請元作謂下同之昭奚恤曰郢人某氏之宅臣願之昭奚恤曰郢人某氏不當服罪故其宅不得客辭而去昭奚恤已而悔之因謂客曰奚恤得事公公何為以故與奚恤故謂䛤事以探己意客曰非用故也曰請而不得有說色非故如何也威王宣王子元年顯王三十年壬午蘇秦之楚三日乃得見乎王談卒辭而行王曰寡人聞先生若聞古人今先生乃不逺千里而臨寡人曽不肯留願聞其說對曰楚國之食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝今令臣食玉炊桂因鬼見帝王曰先生就舍寡人聞命矣蘇秦為趙合從此在連激儀入秦後當為七或八年說楚威王曰楚天下之强國也大王天下之賢王也楚地西有黔中巫郡屬南郡東有夏州車􅏷云夏口城上有州曰夏州海陽海之南耳非遼西郡也南有洞庭蒼梧交州郡北有汾陘之塞陘召陵陘亭郇陽徐注今順陽屬汝南地方五千里帶甲百萬車千乘騎萬匹粟支十年此霸王之資也夫以楚之强大王之賢天下莫能當也今乃欲西面而事秦則諸侯莫不西元作南面而朝於章臺之下矣秦臺在咸陽見楚記秦之所害於天下莫如楚楚强則秦弱楚弱則秦强此其勢不兩立故為大王計莫如從親以孤秦大王不從親秦必起兩軍一軍出武關一軍下黔中若此則鄢郢動矣臣聞之治之其未亂為之其未有也患至而後憂之則無及已故願大王之早計之大王誠能聽臣臣請令山東之國奉四時之獻以承大王之明制委社稷宗廟言諸侯輕去其國以從楚練士厲兵在大王之所用之大王誠能聽臣之愚計則韓魏齊燕趙衛之妙音美人必充後宫矣趙代良馬橐它胸奴竒畜必實於外廄故從合則楚王橫成則秦帝今釋霸王之業而有事人之名竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讎也橫人皆欲割諸侯之地以事秦此所謂養仇而奉讎者也夫為人臣而割其主之地以外交强虎狼之秦以侵天下卒有秦患不顧其禍夫外挾强秦之威以內劫其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚橫合則楚割地以事秦此兩策者相去逺矣有億兆之數兩者大王何居焉故敝邑趙王肅侯使臣效愚計奉明約在大王命之楚王曰寡人之國西與秦接境秦有舉巴蜀并漢中之心秦虎狼之國不可親也而韓魏迫於秦患不可與深謀與深謀恐反人以入於秦故謀未發而國已危矣寡人自料以楚當秦未見勝焉內與羣臣謀不足恃也寡人卧不安席食不甘味心搖搖如懸旌旌析羽注旄首以精進士卒而無所終薄薄泊同今君欲一天下安諸侯存危國寡人謹奉社稷以從𫝊有在說五國後彪謂五國之聽蘇子也革面而已非能深究橫從之利害也唯威王雅有難秦之心念之熟矣異夫患諸國之不可合徒稱從命者也威王問於莫敖楚官子華曰自從先君文王以至不榖之身亦有不為爵勸不為祿勉以憂社稷者乎莫敖子華對曰如華不足以知之矣王曰不於大夫無所聞之莫敖子華對曰君王將何問者也彼有亷其爵貧其身以憂社稷者有崇其爵豐其祿以憂社稷者有斷脰決腹脰項也一暝而萬世不視暝不視也謂死不知所益志於死耳不求利也以憂社稷者有勞其身愁其志以憂社稷者亦有𥙷不為爵勸不為祿勉以憂社稷者王曰大夫此言將何謂也言謂誰莫敖子華對曰昔令尹子文鬭榖於莬緇帛之衣以朝緇黑色鹿裘以處未明而立於朝日晦而歸食朝不謀夕無一日元作月之積故彼亷其爵貧其身以憂社稷者令尹子文是也昔者葉公子髙名諸梁身獲於表薄表野外薄林也言其初賤而財於柱國財材同柱國以子髙為材定白公之禍見哀十六年寧楚國之事恢先君以掩方城之外恢大也集韻掩覆取也言取地以大先君之封四封不亷封封域亷猶禮六亷言無事故不察治名不挫於諸侯當此之時也天下莫敢以兵南鄉葉公子髙食田六百畛畛井田間陌故彼崇其爵豐其祿以憂社稷者葉公子髙是也昔者吳與楚戰於柏舉定四年注楚地兩軍補之間夫卒交千夫百夫之夫莫敖大心撫其御之手顧而太息曰嗟乎子乎楚國亡之日元作月至矣吾將深入吳軍若撲一人若猶撲擊也若捽一人捽持髮也以與大心者也社禝其庶幾乎以是為可以厲衆也故斷脰決腹一瞑而萬世不視不知所益以憂社稷者莫敖大心是也𫝊不書昔吳與楚戰於柏舉三戰入郢寡君身出昭王大夫悉屬屬連俱亡百姓離散棼冒勃蘇定四年以為申包胥曰吾被堅執鋭堅甲鋭兵也赴强敵而死此猶一卒也不若奔諸侯於是贏糧潛行上崢山崢嶸之山踰深溪跖穿勝暴跖足下暴傷也七日而薄秦王襄公之朝雀立不轉雀立踊也晝吟宵哭七日不得告水漿無入口癲而殫悶癲狂殫氣絶也旄不知人旄眊同無目也秦王聞而走之走去音疾趨也冠帶不相及左奉其首右濡其口勃蘇乃蘇蘇死更生也秦王身問之子孰誰也棼冒勃蘇對曰臣非異言非它人楚使去音新造盩楚官棼冒勃蘇吳與楚人戰於柏舉三戰入郢寡君身出大夫悉屬百姓離散使下臣來告亡且求救秦王顧令之元作不起寡人聞之萬乘之君得罪一士社稷其危今此之謂也遂出革車千乘卒萬人屬之子滿與子虎下塞以東與吳人戰於濁水出齊郡廣之媯山東蓋齊楚地界而大敗之亦聞於遂浦楚地缺或吳夫遂也蓋聞一說在彼一在此故勞其身愁其思以憂社稷者棼冒勃蘇是也吳與楚戰於柏舉三戰入郢君王身出大夫悉屬百姓離散䝉榖楚將結鬬於宫唐之上結猶交宫唐豈髙唐耶舍鬬奔郢曰若有孤時未知昭王存亡故意其子楚國社稷其庶幾乎遂入大宫負雞次之典楚國法也雞一作離是所以治離局者以浮於江逃於雲夢之中昭王反郢五官失法百姓昏亂䝉榖獻典五官得法而百姓大治此蒙榖之功多與存國相若封之藝圭田六百畛䝉榖怒曰榖非人臣社稷之臣茍社稷血食血謂牲牢餘豈患無君乎遂自棄於磨山之中後志磨城子胥所造蓋以此山名城也至今無冒冒謂犯法故不為爵勸不為祿勉以憂社稷者䝉榖是也王乃太息曰此古之人也今之人焉能有之耶莫敖子華對曰昔者先君靈王好小腰楚士約食約猶節馮而能立馮依也式而能起式小低貌食之可欲忍而不入死之可惡然而不避華元作章聞之其君好發者發發矢其臣決拾車攻注決鈎弦拾遂也遂發也君王直不好若君王誠好賢此五臣者皆可得而致也蘇子謂楚王曰仁人之於民也愛之以心事之以善言孝子之於親也愛之以心事之以財忠臣之於君也必進賢人以輔之今大王之大臣父兄好傷賢以為資為己資藉厚賦斂諸臣百姓使王見疾於民非忠臣也大臣播王之過於百姓多賂諸侯以王之地是故退王之所愛王所愛者必不播割與大臣異趣故大臣退之亦非忠臣也是以國危臣願無聽羣臣之相惡也慎大臣父兄言不輕用也用民之所善節身之嗜欲以與補百姓人臣莫難於無妬而進賢為主死易垂沙之事未詳兵略訓楚兵殆於垂沙亦不注死者以千數為主辱易自令尹以下事王者以千數至於無妬而進賢未見一人也故明主之察其臣也必知其無妬而進賢也賢臣之事其主也亦必無妬而進賢夫進賢之難者賢者用且使已廢貴且使已賤故人難之此策本次蘇秦之楚之上知蘇子秦也然不可先於之楚故次之此彪謂此策人主所當先務人臣之上節也蘇氏弟兄言之若此者二三策而已懷王威王子元年顯王四十一年癸巳衍韓公仲相四字章內初不涉韓也齊楚之交善秦與魏遇且以善齊而絶齊乎楚楚補王使景鯉之秦鯉與於秦魏之遇於其遇時與焉秦策有其事在惠九年後懷王初也楚王怒景鯉恐齊以楚遇楚謂鯉為有隂於秦魏也恐齊以此謂楚有私於二國且罪景鯉為謂楚王曰臣賀鯉之與於遇也秦魏之遇也將以合齊秦而絶齊於楚也今鯉與於遇齊無以信魏之合已於秦而攻於楚也將絶齊於楚而楚使與焉故齊疑之齊又畏楚之有隂於秦魏也必重楚故鯉之與於遇王之大資也今鯉不與於遇魏之絶齊於楚信明矣齊衍楚字信之必輕王故王不如無罪景鯉以視齊於有秦魏視示同示齊以楚有二國齊必重楚而且疑秦魏於齊疑楚使之疑王曰諾因不罪而益其列列位次也下衍王曰向也止孰便也凡九十字元在韓策楚王逐張儀於魏使魏逐之儀初相魏時此七年陳軫曰王何逐張子曰為臣不忠不信曰不忠王無以為臣不信王勿與為約且魏臣不忠不信於王何傷忠且信於王何益逐而聽則可若不聽是王今困也且使萬乘之國免其相是城下之事也此言魏恥之桓十三年主城下之盟諸侯所恥五國約以伐衍齊字秦秦惠後七年韓趙魏燕齊共攻秦此十一年昭陽謂楚王曰五國已破秦必南圖圖楚楚王曰然則奈何對曰韓氏輔國也言可為楚之助好利而惡難好利可營也營猶求可使求我惡難可懼也我厚賂之以利其心必營我悉兵以臨之其心必懼彼懼吾兵而營我利五國之事必可敗也約絶之後雖勿與地可楚王曰善乃命大公事楚人之韓見公仲曰夫牛闌之事未詳馬陵之難魏三十年齊破魏馬陵親主之所見也主謂公仲此言齊强不可使益强王茍無以五國用兵請效列城五請悉楚國之衆衍也字以圖元作嗇於齊此下著書者云齊人反趙魏之後而楚果弗與地則五國之事困也五國伐秦魏欲和使惠施魏相之楚楚將入之秦納施於秦而使行和杜赫謂昭陽曰凡為伐秦者楚也據此則楚時與伐非燕也今施以魏來而公入之秦是明楚之伐而信魏之和也公不如無聽惠施而隂使人以請聽秦以和請於秦而聽其命昭子曰善因謂惠施曰凡為攻秦者魏也今子從楚為和楚得元作將其利魏受其怨子歸吾將使人因魏而和惠子反魏王哀不說杜赫謂昭陽曰魏為子先戰折兵之半謁病不聽請和不得魏折而入齊秦此折猶屈子何以救之救其折東有越纍元作纍此言越有傷楚之心越近楚故此無晉而交未定於齊秦是楚孤也不如速和赫此言蓋兩忠楚魏昭子曰善因令人謁和於魏秦招楚而伐齊冷向謂陳軫時在楚曰秦王惠必外向言合他國不一於楚楚之齊者與齊善者知西不合於秦必且務以楚合於齊齊楚合燕趙不敢不聽齊以四國敵秦是齊不窮也兵力不屈向曰秦王誠必欲伐齊乎不如先收於楚之齊者楚之齊者先務以楚合於齊則楚必即秦矣秦能收楚之善齊者則其初雖欲合齊楚今必背齊合秦以强秦而有衍晉字楚則燕趙不敢不聽是齊孤矣向請為公說秦王元在韓策張儀之楚貧初至王未之重舍人怒而欲歸張儀曰子必以衣冠之敝故欲歸待我為子見楚王當是之時南后懷王后鄭褎美人貴於楚張子見楚王楚王不說前嘗欲逐之於魏張子曰王無所用臣臣請北見晉君楚王曰諾張子曰王無求於晉國乎王曰黃金珠璣犀象璣珠不圓者出於楚寡人無求於晉國張子曰王徒不好色耳王曰何也張子曰彼鄭周之女粉白墨黑黑言其髮立於衢閭非知而見之者以為神楚王曰楚僻陋之國也未嘗見中國之女如此其美也寡人見補之獨何為不好色也乃資之以珠玉南后鄭褎聞之大恐令人謂張子曰妾聞將軍之晉國偶有金千斤進之左右以供芻秣秣飼馬鄭褎亦以金五百斤張子辭楚王曰天下關閉不通未知見日也願王賜之觴王曰諾乃觴之張子中飲再拜而請曰非有它人於此也願王召所便習而觴之便所安者習所昵者王曰諾乃召南后鄭褎而觴之張子再拜而請曰儀有死罪於大王王曰何也曰儀行天下遍矣未嘗見人如此其美而儀言得美人是欺王也王曰子釋之釋猶置吾固以為天下莫若是兩人也儀自辱於楚相未嘗至楚其至楚在復相秦之四嵗此十六年楚懷王拘張儀以其欺楚以商於故將欲殺之靳尚楚人為儀謂楚王曰拘張儀秦王必怒天下見楚之無秦也楚必輕矣又謂王之幸夫人鄭褎曰子亦自知且賤於王乎鄭褎曰何也尚曰張儀者秦王惠之忠信有功臣也今楚拘之秦王欲出之秦王有愛女而美又簡擇宫中佳衍玩字麗好玩人之可好可玩者書曰玩人喪德習音者以歡從之習音所謂歡也以從愛女資之金玉寶器奉以上庸六縣為湯沐邑以邑為女湯沐之具欲因張儀內之楚王楚王必愛絶句秦女資强秦以為重挾寶地以為資勢必補為王妻以臨于楚王惑於虞樂必厚尊敬親愛之而忘子子益賤而日疏矣鄭褎曰願委之於公為之奈何曰子何不急言王出張子張子得出德子無已時秦女必不來而秦必重子子內擅楚之貴外結秦之交畜張子以為用子之子孫必為楚太子矣此非布衣之利也利在為王鄭褎遽說楚王出張子此十八年楚王將出張子恐其敗已也靳尚謂楚王曰臣請隨之儀事王不善臣請殺之楚小臣靳尚之仇也謂張旄魏之用事者曰以張儀之智而有秦楚之用君必窮矣君不如使人微要靳尚而殺之微不顯也使若儀殺之楚王必大怒儀也彼儀窮則子重矣楚秦相難則魏無患矣張旄果令人要靳尚刺之楚王大怒秦楚補搆兵而戰秦楚爭事魏張旄果大重彪謂張旄欲窮儀則如殺儀斯已矣今不殺儀顧從說者殺尚以儀之智為足以免於死也張儀為秦破從連橫說楚王在鄭褎出儀後曰秦地半天下兵敵四國四方之國被山帶河以為固被寢衣也喻其亘延虎賁之士百餘萬漢官儀虎賁戴鶡冠屬中郎將車千乘騎萬匹粟如丘山法令既明士卒安難樂死死難兵革之事主嚴以明將智以武雖無出兵甲席卷常山之險收取之如卷席之易無遺也恆山屬趙之元氏此作常劉向避文帝諱也折天下之脊天下後服者先亡且夫為從者無以異於驅羣羊而攻猛虎也夫虎之與羊不格明矣格猶敵今大王不與猛虎而與羣羊竊以為大王之計過矣凡天下强國非秦而楚非楚而秦兩國敵侔交爭侔齊等也其勢不兩立而大王不與秦秦下甲兵據宜陽韓之上地不通上流之地下河東取成臯韓必入臣於秦韓入臣魏則從風而動秦攻楚之西韓魏攻其北社稷豈得無危哉且夫約從者聚羣弱而攻至强也夫以弱攻强不料敵而輕戰國貧而驟舉兵此危亡之術也臣聞之兵不如者勿與挑戰粟不如者勿與持久持相持夫從人者飾辨虛辭飾緣飾非實也髙主之節行言其利而不言其害卒有楚禍秦伐楚之禍史作秦禍意同無及為己是故願大王之熟計之也秦西有巴蜀方船積粟起於汶山居貧切屬蜀郡湔氏道即岷山故唐志茂州汶山注有岷山循江而下至郢三千餘里舫船載卒舫平音併舟也一舫載五千人與三月之糧下水而浮一日行三百餘里里數雖多不費汗馬之勞不至十日而距扞關距本雞足故訓至楚記晉伐楚楚為扞關以距之儀𫝊注巴郡魚復有扞水關扞關驚則從竟陵以東盡城守矣黔中巫郡非王之有已秦舉甲出之武關南面而攻則北地絶北境之地非幽州郡秦兵之攻楚也危難在三月之內而楚恃諸侯之救在半嵗之外此其勢不相及也夫恃弱國之救而忘强秦之禍此臣所以為大王之患也且大王嘗與吳人五戰史不書三勝而亡之陳卒盡矣陳猶故有偏守新城一偏之戌繕築之城而居民苦矣臣聞之攻大者易危而民敝者怨於上夫守易危之功而逆强秦之心臣竊為大王危之且夫秦之所以不出甲於函谷關十五年以攻諸侯者隂謀有吞天下之心也楚嘗與秦構難戰於漢中楚人不勝通侯執圭徹侯漢諱武帝作通此亦劉向所易也死者七十餘人遂亡漢中楚王大怒與秦戰於藍田又却秦惠十三年取漢中又敗之藍田此十七年此處與上章所稱楚王皆後人追書耳此所謂兩虎相搏者也夫秦楚相敝而韓魏以全制其後計無過一作危於此者矣是故願大王熟計之也秦下兵攻衛陽晉必關元作開扁天下之胸上二邑天下之中也故喻之胸秦下兵二邑必拒之則閉不通故楚可以此時舉宋大王悉起兵以攻宋不至數月而宋可舉舉宋而東指則泗上十二諸侯盡王之有己凡天下所信約從親堅者蘇秦封為武安君而相燕即隂與燕王謀破齊共分其地乃佯有罪出走入齊齊王閔因受而相之居二年而覺齊王大怒車裂蘇秦於市按史秦事覺在其死後儀以此明其以詐死耳夫以一詐僞反覆之蘇秦而欲經營天下混一諸侯其不可成也亦明矣今秦之與楚也接境壤界固形親之國也其勢當親大王誠能聽臣臣請秦太子入質於楚楚太子入質於秦請以秦女為大王箕帚之妾帚帚也以灑掃之役自居效萬家之都以為湯沐之邑長為昆弟之國終身無相攻擊臣以謂計無便於此者故敝邑秦王惠使使臣獻書大王之從車下風書國書非此書將迎之際必有風焉不敢當立故言下風須以決事楚王曰楚國僻陋託東海之上寡人年幼言其為從時不習國家之長計今上客幸教以明制秦王之制詔寡人聞之敬以國從乃遣使車百乘獻雞駭之犀枹朴子通犀中有一白理如綿置米其上以飼雞雞見之驚却名駭雞犀夜光之璧鄒陽言魏文侯歸白圭夜光之璧於秦王𫝊在諸國之先張儀相秦復相時謂昭睢曰楚無鄢郢漢中有所更得乎此皆楚之要地無此則危亡安能有它曰無有曰無昭過陳軫有所更得乎曰無所更得二臣楚之良也無此二臣不能復得良臣此儀為秦謀去楚謀臣也張儀曰為儀謂楚王逐昭過陳軫請復鄢郢漢中秦惠十三年取漢中故至是許復之鄢郢此時不書此策儀知楚王重地輕人故使睢言之二人逐則楚無良臣雎必得其處也昭睢歸報楚王睢蓋畔楚善儀者楚王說之有人謂昭過曰甚矣楚王不察於爭名者也韓求相工陳藉周䇿陳作師求周使相之而周不聽魏求相綦母恢而周不聽何以也周曰補是列縣畜我也待我如縣吏今楚萬乘之强國也大王天下之賢王也今儀曰逐君與陳軫而王聽之是楚自待元作行不如周而儀重於韓魏之王也且儀之所行有功名者秦也欲立功名於秦所欲貴富者魏也取富貴於魏欲為攻於魏為魏伐人必南伐楚故攻有道外絶其交交謂與國內逐其謀臣陳軫夏人也夏中國也習於三晉之事故逐之則楚無謀臣矣今君能用楚之衆故亦逐之則楚衆不用矣此所謂內攻之者也而王不知察今君何不見臣於王請為王使齊交不絶儀聞之其效鄢郢漢中必緩矣齊楚大國也儀惡其合今合而與之地則楚益徑儀必不為也是昭睢之言不信也王必薄之楚王今昭雎之秦重張儀說秦使重之未至惠王死武王逐張儀楚王因收昭雎以取齊收捕繫之也雎善儀而齊惡儀秦既逐儀楚故捕繫睢以外儀而合於齊桓臧楚人為睢謂楚王曰從元作橫親之不合也儀貴惠王為王所貴而善睢也今惠王死武王立儀走公孫郝甘茂貴甘茂善魏公孫郝善韓二人固不善雎也必以秦合韓魏韓魏之重儀言昔重之儀有秦而雎以楚重之今儀困秦而睢收楚困謂見逐於秦韓魏欲得秦必善二人者郝與茂二人者補三字將收韓魏輕儀而伐楚以楚嘗重儀故方城必危王不如復睢復其位而重儀於韓魏儀據楚勢挾魏重以與秦爭魏不合秦絶句王亦不從不從秦則方城無患張儀逐惠施於魏儀時隙秦相魏此十九年惠子之楚楚王受之馮郝楚人謂楚王曰逐惠子者張儀也而王親與約與施相結是欺儀也臣為王弗取也惠子為儀來者元作者來而惡王之交於張儀惠子必弗行也此設辭也施以儀逐之而來必有惡儀之言使施善儀為儀而來豈行此惡儀之言且宋王君偃之賢惠子也天下莫不聞也今之不善張儀也今謂施天下莫不知也今為事之故今為楚國事棄所貴於讎人貴謂儀讎謂施不善儀也楚王嘗貴儀而今受施是為儀之讎而棄儀也臣以為大王輕矣且為事邪誠有意為國事者王不如舉惠子而納之於宋而謂張儀曰請為子勿納也今必德王今謂儀而惠子窮人而王奉之又必德王此不失為儀之實而可以德惠子楚王曰善乃奉惠子而納之宋陳軫去元作告楚之魏張儀惡之於魏王哀曰軫猶善楚為求地甚力左爽未詳謂陳軫曰儀善於魏王魏王甚信之公雖百說之猶不聽也公不如以儀之言為資儀言已為楚因以其言聞之楚而得復楚楚閲其為楚故復之陳軫曰善因使人以儀之言聞於楚楚王喜欲復之魏王哀遺楚王美人楚王說之夫人鄭褎知王之說新人也甚愛新人衣服玩好擇其所喜而為之宫室卧具擇其所善而為之愛之甚於王王曰婦人所以事夫者色也而妬者其情也今鄭褎知寡人之說新人也其愛之甚於寡人此孝子之所以事親忠臣之所以事君也鄭褎知王以已為不妬也因謂新人曰王愛子美矣雖然惡子之鼻子為見王為此惡鼻故則必掩子鼻新人見王因掩其鼻王謂鄭褎曰夫新人見寡人則掩其鼻何也鄭褎曰妾知也王曰雖惡必言之鄭褎曰其似惡聞君王之臭也王蓋有臭疾王曰悍哉令劓之無使逆命不通新人之言楚王后死自張儀拘時獨言鄭褎則后死久矣未立后也謂昭魚曰公何以不請立后也昭魚曰王不聽是智困而交絶立后也新所立后然者說者辭不買五雙珥令其一善而獻之王明日視善珥所在因請立之齊明說卓滑疑即淖滑以伐秦滑不聽也齊明謂卓滑曰明之來也蓋自秦來為樗里疾卜交也明說楚大夫以伐秦皆受明之說也唯公弗受也臣有辭以報樗里子矣卓滑因重之此明因敗為成之說也樗里滑之所欲交也滑不聽明明懼見輕為善於疾而言以此報疾故滑重之或謂黃齊曰人皆以謂公不善於富摰皆楚人公不聞老萊子楚有道之士之教孔子事君乎示之其齒之堅也六十而盡相靡也靡摩同研也今富摰能有材能而公重不相善也重猶甚是兩盡也諺曰𫝊言曰諺見君之乘下之乘馬也在車則下見杖起之在坐則起今也王愛富摰而公不善也是不臣也彪謂王之所愛誠善人也正人也尊之敬之禮也如不善不正方當為王力排而亟去之今曰王愛之亦愛何義也此正盍以富勢能為足愛也夫能之不善不正亦多矣不可不察也秦伐宜陽此二十一年楚王謂陳軫曰寡人聞韓朋元作侈下同巧士也習諸侯事殆能自免也免於危亡也公仲時守宜陽為其必免吾欲先據之以加德焉陳軫對曰舍之王勿據也以韓朋之智於此困矣今山澤之獸無黠於麋鹿屬麋知獵者張網前而驅已也因還走而冒人䝉犯即人不趨網至數獵者知其詐僞舉網而進之僞舉網使其進而即人乃以網網之麋因得矣今諸侯明知此多詐僞舉網而進者必衆矣舍之王勿據也韓朋之智於此困矣楚王聽之宜陽果拔陳軫先知之也此策亦可作韓侈以公仲實守宜陽故作朋四國伐楚楚記二十八年秦齊韓魏共攻楚楚令昭睢將以距拒同秦楚王欲擊秦昭睢不欲桓臧為昭睢謂楚王曰睢戰勝三國惡楚之强也恐秦之變而聽楚也必深攻楚以徑秦堅其伐楚之心秦王昭怒於戰不勝必悉起而擊楚是王與秦相罷音疲而以利三國也戰不勝秦秦進兵而攻不如益昭睢之兵今之示秦必戰秦王惡與楚相敝而令天下利補秦可以少割而收害也秦見楚將必戰必割地與楚和戰伐之害可息也收猶息秦楚之合而燕趙魏不敢不聽三國可定也城渾周人出周自周出二元作三人偶行偶耦同二人曰耦兩也此蓋一人先二人後南游於楚至於新城莊六年注新城鄭新密今榮陽密也漢北海河南皆有此屬楚蓋河南密也城渾說其令曰鄭魏者楚之耎國集韻耎弱也而秦楚之强敵也鄭魏之弱而楚以上梁應之此山陽濟隂故梁近楚故也宜陽之大也時秦已得之楚以弱新城圖元作圍之蒲坂平陽相去百里秦人一夜而襲之安邑不知此言百里之地不相知況下五百里邪新城上梁相去五百里秦人一夜而襲之上梁亦不知也今邉邑之所恃者非江南泗上也漢志楚分野言江南地廣云此皆逺哉故非所恃漢志言楚分野云江南平地廣故知其稽故衍楚字王何不以新城為主郡也主猶守也為郡則士馬盛可以備秦邉邑甚利之此渾言其欲說楚王大意新城公楚縣尹稱公大說乃為衍王字具駟馬乘車五百金之楚衍盡字城渾得之遂南交於楚楚王果以新城為主郡城書作成韓公叔有齊魏得二國之援而太子有楚秦太子幾瑟也韓襄十二年蘇代曰公叔伯嬰恐秦楚之納幾瑟是也此二十九年以爭國鄭申為楚使於韓矯以新城陽人秦紀注南陽縣有陽人聚豫太子楚王怒將罪之對曰臣矯豫之以為國也臣為太子得新城陽人以與公叔爭國而得之得其國事齊魏必伐韓韓氏急必懸命於楚又何新城陽人之敢求太子不勝不勝公叔幸元作然而不死今將倒冠而至言其歸楚之疾又安敢言地楚王曰善乃不罪也韓襄䇿語同楚杜赫說楚王以取趙王曰與之五大夫楚官而令私行陳軫謂楚王曰赫不能得趙五大夫不可收也是元作得賞無功也得趙而王無加焉是無善也不賞其善如不有之王不如以十乘行之事成豫之五大夫王曰善乃以十乘行之杜赫怒而不行陳軫謂王曰是不能得趙也楚王問於范環曰寡人欲置相於秦孰可對曰臣不足以知之王曰吾相甘茂可乎范環對曰不可王曰何也曰夫史舉上蔡之監門也大不知元作如下同事君小不知處室以苛亷聞於世苛小節甘茂事之順焉言大不失其意故惠王之明武王之察張儀之好譖甘茂事之取十官而無罪茂誠賢者也然而不可相秦秦之有賢相也非楚國之利也且王嘗用召補滑於越召滑見甘茂𫝊而納句章屬會稽昧之難昧唐昧楚將此二十八年秦齊韓魏共攻楚殺昧越亂故楚南察瀨湖察猶治也言楚有而治之南陽有厲音瀨而野江東以江之東為野此言楚雖有唐昧之難而能得越地以召滑亂之也計王之功所以能如此者越亂而楚治也今王已用之於越矣而忘之於秦臣以為王巨速忘矣巨大也王若欲置相於秦乎若公孫郝者可夫公孫郝之於秦王昭親也少與之同衣長與之同車被王衣以聽事言其素重真大王之相已秦相而曰王之相蓋楚使相之必右楚也王相之楚國之大利也甘茂𫝊有人地小異魏相翟强死為甘茂謂楚王曰魏之幾相者言危欲相之公子徑也秦人徑也相魏魏秦之交必善徑秦人而魏相之故秦魏之交完則楚輕矣故王不如與齊約相甘茂於魏齊王閔好髙人以名今為其行人楚為齊請如其使者禮行人使適四方請魏之相齊王必喜魏氏不聽交惡於齊齊魏之交惡必爭事楚魏氏聽甘茂與樗里疾貿首之讎也貿言欲易取其首而魏秦之交必惡疾相秦茂相魏故又交重楚也齊秦約攻楚楚令景翠以六城賂齊太子為質此二十九年太子橫死昭雎謂景翠曰秦恐且因景鯉蘇厲而效地於楚公出地以取齊取猶收猶說鯉與厲且以收地取秦收前所效者蓋二人之辭曰楚出地取齊楚既弱矣何足與地秦收所效必悅二人也公事必敗楚不得秦地由翠賂齊楚必怨翠公不如令王重賂景鯉蘇厲使入秦二人得楚賂不復為秦收地矣秦恐以齊楚合故必不求地不收所效而合於楚若於齊不求是公與約也兩國各不取地而止攻是約者復和也與如與國之與和好也言翠能和兩國之約術視秦人伐楚楚令昭鼠以十萬軍漢中昭雎勝秦於重丘屬平原蘇厲謂宛公昭鼠鼠為宛尹曰王欲昭睢之乘秦王楚王乘猶凌必分公之兵以益之秦知公兵之分也必出漢中出兵伐此請為公令芉元作辛戎謂王楚戎人貴於秦如以私告楚王者曰秦兵且出漢中則公之兵全矣欲其備秦故不分其兵秦敗楚漢中此三十年秦伐楚取八城宜得漢中楚王入秦秦王昭留之游騰為楚謂秦王曰王挾楚王而與天下攻楚則傷行矣不與天下共攻之則失利矣王不如與之盟而歸之楚王畏畏畏秦必不敢背盟背盟補二字王因與三國攻之義也彪謂此言亦可聽也而秦志在亂楚不為之動所以卒併天下後人守此頃襄王懷王子元年赧王十七年癸亥楚襄王為太子之時質於齊懷王薨太子辭於齊王閔而歸齊王隘之隘猶阻未即許求地也豫我東地五百里乃歸子子不豫我不得歸太子曰臣有傅請退元作追而問傅傅慎子曰獻之地所以為身也愛地不送死父不義臣故曰獻之便太子入致命齊王曰致命歸誠之言敬獻地五百里齊王歸楚太子太子歸即位為王齊使車五十乘來取東地於楚楚王告慎子曰齊使來求東地為之奈何慎子曰王明日朝羣臣皆令獻其計上柱國子良入見王曰寡人之得求反求反國而得主墳墓復羣臣復見之歸社稷也以東地五百里許齊齊令使來求地為之奈何子良曰王不可不與也王身出玉聲許强萬乘之齊而不與則不信後不可以約結諸侯請與而復攻之與之信攻之武臣故曰與之子良出昭常入見王曰齊使來求東地五百里為之奈何昭常曰不可與也萬乘者以地大為萬乘今去東地五百里是去戰國之半也有萬乘之號而無千乘之用也不可臣故曰勿與常請守之昭常出景鯉入見王曰齊使來求東地五百里為之奈何景鯉曰不可與也雖然楚不能獨守王身出玉聲許萬乘之强齊也而不與負不義於天下楚亦不能獨守臣請西索救於秦景鯉出慎子入王以三大夫計告慎子曰子良見寡人曰不可不與也與而復攻之常見寡人曰不可與也常請守之鯉見寡人曰不可與也雖然後不能獨守也臣請索救於秦寡人雖用於三子之計慎子對曰王皆用之王怫然作色曰怫鬱也何謂也慎子曰臣請效其說而王且見其誠然也王發上柱國子良車五十乘而北獻地五百里於齊發子良之明日遣昭常為大司馬令往守東地遣昭常之明日遣景鯉車五十乘西索救於秦王曰善乃遣子良北獻地於齊遣子良之明日立昭常為大司馬使守東地又遣景鯉西索救於秦子良至齊齊使人以甲受東地昭常應齊使曰我典主東地典猶職主猶守且與死生地存則生失地死之悉五尺至六十三十餘萬敝甲鈍兵願承下塵凡人相趨則有塵戰亦冇塵不敢與抗故言下齊王謂子良曰大夫來獻地今常守之何如子良曰臣身受命敝邑之王是常矯也王攻之齊王大興兵攻東地伐昭常未涉强秦以五十萬臨齊右壤曰夫隘楚太子弗出不仁又欲奪之東地五百里不義其縮甲則可縮蹙也蓋束之不然則願待戰齊王恐焉乃請子良南道楚西使秦解齊患士卒不用東地復全彪謂此四臣皆國士也襄王無若人豈能反國慎子能兼用之其最優乎方之晉五臣其舅犯與此書三書懷王薨而太子歸史記獨謂太子歸而王乃薨又謂王逃歸不逹薨夫秦能劫留之豈不能衛之孟嘗之逃先以計免猶危不脫楚王何以能逃可疑也楚王亡死太子在外郢中必立王以絶秦望太子以齊之重歸義嗣也其誰敢干之於是王乃定齊䇿乃云忠王而走太子是則太子卒不得立亦非也蓋郢中立王時蘇子以此䇿干田文而語人以九可文不之用世猶載其語也女阿未詳謂蘇子曰秦栖楚王懷王見劫客秦如栖危太子者公也今楚王歸以此書及史考之王皆不歸今此蓋其喪歸太子南自齊歸楚為南公必危公不如令人謂太子曰蘇子知太子之怨已也必且務不利太子太子不如善蘇子蘇子必且為太子入矣入言其歸之之深蘇子乃令人謂太子太子復請善於蘇子詳此亦無走太子之事長沙之難長沙荆州國懷二十九年秦大破楚楚王恐使太子質齊楚蓋破於此楚太子橫為質於齊楚王死薛公歸太子橫因與韓魏之兵隨而攻東國太子懼本其初言之亦明此非新立王也昭蓋曰不若令屈署以新東國為和於齊新字疑衍以動秦秦恐齊之敗東國上言齊興兵攻故地此恐其敗而令行於天下也必將救我太子曰善遽令屈署以東國為和於齊此即子良之策蓋與署偕秦王昭聞之懼令芉元作辛戎告楚曰毋與齊東國吾與子出兵矣有獻不死之藥於荆王者謁者操以入中射之士射人之在中者問曰可食乎曰可因奪而食之王怒使人殺中射之士中射之士使人說王曰臣問謁者謁者曰可食臣故食之是臣無罪而罪在謁者也且客獻不死之藥臣食之而王殺之是死藥也王殺無罪之臣而明人之欺王王乃不殺彪謂此謾士乃不可不殺荆王赦之以不能答之也於是答也何有謁者曰可食非謂汝可食也藥之能不死者平人耳非能使刑者不死且人以獻王何預汝而問之是安得無罪也齊以淖君之亂事補秦其後秦欲取齊與齊合故使蘇涓之楚涓固皆秦人令任固之齊齊明謂楚王曰秦王昭欲楚不若其欲齊之甚也其使涓來以示齊之有楚以有楚之親示齊以資固於齊為任固資齊見楚見其納涓必受固是楚補之聽涓也適為固驅以合齊秦也所謂資固齊秦合非楚之利也且夫涓來必非固之所以之齊之辭也涓之辭必厚楚而薄齊固之辭必厚齊而薄楚王不如令人以涓之辭謾固於齊謾欺也以涓薄齊之辭告齊則固言厚齊者非實齊必以固為欺已齊秦必不合齊秦不合則王重矣王欲收齊以攻秦漢中可得也王即欲以秦攻補齊淮泗之間亦可得也元在齊䇿莊辛楚人謂楚襄王曰君王左州侯右夏侯輦從鄢陵君與夀陵君皆楚之寵幸臣也輦從謂輦出則二人從之専淫逸侈靡不顧國政郢都必危矣襄王曰先生老悖乎悖背道也將以為楚國妖祥乎莊辛曰臣誠見其必然者也非敢以為國妖祥也君王卒幸四子者不衰楚國必亡矣臣請避於趙淹留以觀之淹亦留莊卒去之趙留五月秦果舉鄢郢巫上蔡陳之地此二十一年白起拔郢置南郡襄王流掩於成元作城陽流謂走掩覆也謂自匿成陽屬汝南若城陽乃齊也於是使人發騶騶廏御也徴莊辛於趙徴謂召索莊辛曰諾莊辛至襄王曰寡人不能用先生之言今事至於此為之奈何莊辛對曰臣聞鄙語曰見兔而顧犬未為晚也亡羊而補牢牢間養之圈未為遲也臣聞昔湯武以百里昌桀紂以天下亡今楚國雖小絶長續短猶以數千里豈特百里哉王獨不見夫蜻蛉乎蟲一名桑根六足四翼飛翔乎天地之間俯啄蚉虻而食之仰承甘露而飲之自以為無患與人無爭也不知夫五尺童子方將調飴元作鈶膠絲飴米蘖所煎調以餌之又施膠於絲以繫之加已乎四仞之上八尺曰仞而下為螻蟻食也黃雀因是以俯噣白粒噣啄也蓋以喙啄仰棲茂樹鼓翅奮翼翅强羽自以為無患與人無爭也不知夫公子王孫左挾彈右攝丸攝引持也將加已乎十仞之上以其類為招晝游乎茂樹夕調乎酸鹹以為饌也倐忽之間墜於公子之手夫雀其小者也黃鵠因是鵠鴻也以游乎江海淹乎大沼俯噣鱔元作䱧鯉字書無䱧字仰囓䔖衡衡香草奮其六翮翮羽本而凌清風飄搖乎髙翔自以為無患與人無爭也不知夫射者方將修其碆元作盧字書無字碆與聲近集韻碆可為鏃盧旅同黑弓也治其矰元作繒繳矰弋射矢繳生縜縷將加已乎百仞之上被㔋磻無礛字集韻㔋利也磻以石著惟繳也引微繳折清風而抎矣以繫矢從髙集韻抎下也如折然故晝游乎江河夕調乎鼎鼐鼐鼎絶大者夫黃鵠其小者也蔡靈元作聖下間侯之事春秋及史無聖侯因是以南游乎髙陂陂阪也北陵乎巫山飲茹溪流茹飲馬也故與吐反食湘波之魚湘水出零陵屬長沙左抱幼妾右擁嬖女與之馳騁乎髙蔡之中即上蔡而不以國家為事不知夫子發方受命乎靈元作宣王繫已以朱絲而見之也昭十一年楚子誘蔡靈侯殺之于申經𫝊不書子發蓋使子發召之楚子靈王若宣王蔡滅八十年矣道應訓子發伐蔡宣王郊迎人間訓又言獲罪威王皆失考也蔡靈侯之事其小者也君王之事因是以左州侯右夏侯輦從鄢陵君與夀陵君飯封祿之粟所封之祿而載方府之金方四方金其所貢與之馳騁乎雲夢之中而不以天下國家為事而不知夫穰侯方受命乎秦王昭填黽塞之內填兵滿也江夏有鄳即魏策鄳之塞而投已乎黽塞之外襄王聞之顔色變作身體戰栗於是乃以執圭而授之為陽陵君與淮北之地彪謂此䇿天下之善規也襄王雖失之東隅而收之桑榆故其季年保境善鄰差為無事此䇿為有力焉齊韓魏共攻燕燕惠七年書韓魏楚共伐燕它不書則楚當是齊此二十七年燕使太子請救於楚楚王使景陽將而救之陽後至考烈六年猶為將見史暮舍使左右司馬各營壁地壁軍疊已植表如華表以别所舍景陽怒曰女所營者水皆至滅表滅猶沒也此欲用其衆因以示神此焉可以舍乃令徙明日大雨山水大出所營者水皆滅表軍吏乃服於是遂不救燕而攻魏雍丘雍雍同屬陳留取之以與之宋宋時已為齊未曉三國懼乃罷兵魏軍其西齊軍其東楚軍欲還不可得也景陽乃開西和門晝以車騎暮以燭通使於魏齊師怪之以為燕楚與魏謀之乃引兵而去齊兵已去魏失其與國無與共擊之楚乃夜遁楚師乃還元在燕䇿考烈王襄王子元年赧王五十三年己亥唐睢元作且今從秦䇿見春申君黃歇楚相曰齊人飾身修行得為益益謂有祿位然臣羞而不學也不避絶江河言雖險不避行千餘里來竊慕大君之義大言髙其義而善君之業臣聞之賁諸懷錐刃孟賁専諸諸吳人刺王子慶忌者言二人不待盛兵而後稱勇而天下為勇西施衣褐禍粗衣而天下稱美今君相萬乘之楚禦中國之難所欲者不成所求者不得臣等少也夫梟棊之所以為能元作能為者招魂曰成梟而牟呼五白注梟勝也倍勝為牟以散棊佐之也散謂衆棊夫一梟之不如不勝五散獨善不如衆智亦明矣今君何不為天下梟而令臣等為散乎客說春申君曰湯以亳皇覽今梁穀熟武王以鎬元作鄗屬京兆皆不過百里以有天下今孫子荀卿天下賢人也君藉之以百里之補勢時為蘭陵令臣竊以為不便於君何如春申君曰善於是使人謝孫子孫子去之趙史言孫子春申死而貧困家蘭陵不言之趙趙以為上卿客說說春申君曰昔伊尹補去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊强夫賢者之所在其君未嘗不尊國未嘗不榮也今孫子天下賢人也君何辭之春申君又曰善於是使人請孫子於趙孫子為書謝曰癘人憐王癘雖惡疾猶愈於劫弒故反憐王此不恭之語也雖然不可不審察也此為劫弒死亡之主言也夫人主年少而矜材無法術以知姧則大臣主斷國専斷於國私以禁誅於己也察其私則恐人誅已故主斷以禁之故弒賢長而立幼弱廢正適而立不義春秋戒之曰楚王子圍聘於鄭未出竟聞王病反問疾遂以冠纓絞王殺之因自立也昭元年齊崔杼之妻美莊公通之崔杼帥其君黨而攻莊公莊公請與分國崔杼不許欲自刃於廟崔杼不許莊公走出踰於外牆射中其股遂殺之而立其弟景公襄二十五年近代所見李兊用趙餓主父於沙丘百日而殺之淖齒用齊擢閔王之筋擢引也懸於其廟梁宿夕而死夫癘雖㿈腫胞疾上比前世未至絞纓射股下比近代未至擢筋而餓死也夫劫弒死亡之主也心之憂勞形之困苦必甚於癘矣由此觀之癘雖憐王可也因為賦曰寶珍隋珠隋侯見大蛇傷療而愈之蛇銜明珠報之世之所寶所珍不知佩兮禕衣與絲禮后服禕衣謂畫袍不知異兮閭妹子奢妹好也奢即子都美人也莫知媒兮嫫母求之嫫母醜婦也又甚喜之兮以瞽為明以聾為聰以是為非以吉為凶嗚呼上天曷惟其同言舉世皆然詩曰上天甚神無自瘵也瘵病也言天理甚明如是者必有患禍彪謂春申君之愚昏甚矣人惟不知賢故不能用豈有知之以一人言去之又以一人言召之其特操安在也荀卿絶之宜哉卿書有與趙孝成王論兵而史不言之趙失之卿禮義人也使卿而在楚春申必無李園之禍此書蓋知之矣虞卿史不書何所人謂春申君曰臣聞之春秋於安思危危則慮安今楚王春秋髙矣而君之封地不可不早定也為主君慮封者莫如逺楚秦孝公封商君孝公死而後王補不免殺之秦惠王封冉子穰侯也猶田曰嬰子文子惠王死而後王奪之公孫鞅功臣也冉子親姻也然而不免奪死者封近故也太公望封於齊邵公奭封於燕為其逺王室矣今燕之罪大而趙怨深趙自燕王喜以栗腹之謀伐趙起燕四年至十二年無嵗不戰十二年此二十一年故君不如北兵以德趙踐亂燕踐奄之踐以定身封此百代之一時也君曰所道攻燕非齊則魏魏齊新怨楚昭陽救燕之役楚軍元作君雖欲攻燕將道何哉對曰請令魏王可景閔王可言聽其道魏君曰何如對曰臣請到魏而使所以信之為所可信者乃謂魏王曰夫楚亦强大矣天下無敵乃且攻燕魏王曰鄉也子云天下無敵今也子云乃且攻燕者何也對曰今謂馬多力則有矣若曰勝千鈞則不然者鈞三十斤何也夫千鈞非馬之任也今謂楚强大則有矣若越趙魏而鬬兵於燕則豈楚之任也哉元作我非楚之任而楚為之是攴楚也敝楚是强魏也其於王孰便也或謂楚王曰臣聞從者欲合天下以朝大王臣願大王聽之也燕昭末年用蘇代說復約從此二十二年春申遂為從長夫因詘為信詘謂懷王劫死奮患有成以於患兮能有成勇者義之攝禍為福裁少為多智者官之官尊榮之稱夫報報之反報猶反也言伸屈禍福相反不一墨墨之化墨默同化猶治也言治之其未著唯大君能之禍與福相貫貫猶通生與亡為鄰不偏於死偏猶専也死謂患難不偏於生専於衛生如兩臂重於天下者不足以載大名無所冦艾冦外兵艾已所懲創不足以橫世橫言莫之敵夫秦涓德絶命之日久矣而天下不知今夫橫人嚂口集韻嚂聲也言聲說所利之事利機上干生心下牟百姓牟取也公處而私取利舉謂舉措是以國權輕於鴻毛而積禍重於丘山天下合從趙使魏加趙人全晉舊姓見楚春申君曰君有將乎曰有矣僕欲將臨武君未詳魏加曰臣少之時好射臣願以射譬之可乎春申君曰可加曰異日者更羸人姓名與魏王處京臺之下京髙也仰見飛鳥更羸謂魏王曰臣為王引弓虛發而下鳥魏王曰然則射可至此乎更羸曰可有間鴈從東方來更羸以虛發而下之魏王曰然則射可至此乎更羸曰此孽也有隱痛於身猶孽子王曰先生何以知之對曰其飛徐而鳴悲飛徐者故瘡痛也鳴悲者久失羣也故瘡未息而驚心未去也聞弦者音烈而髙飛烈猛也髙飛欲避箭故瘡隕也以瘡痛而墜今臨武君嘗為秦孽嘗敗於秦未詳不可為拒秦之將也汗明未詳見春申君侯問三月而後得見談卒春申君大說之汗明欲復談春申君曰僕已知先生先生大息矣異於小休汗明蹙元作僦焉字書無僦字蹙踖驚貌曰明願有問君而恐固固陋也不審君之聖孰與堯也春申君曰先生過矣臣何足以當堯汗明曰然則君料臣孰與舜春申君曰先生即舜也汗明曰不然臣請為君終言之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善召門吏為汗先生著客籍五日一見著者書此語也汗明曰君亦聞驥乎夫驥之齒至矣至言可服乘之時服鹽元作檻車服在車前而上大行蹄申膝折申猶展皆用力故然尾湛胕潰湛沉同汗多故然胕當作膚與膚同亦汗出於膚如潰漉汗元作汁灑地滲之汗白汗交流白汗不緣暑而汗也外阪遷延阪陂也遷延不進貌負棘而不能上負所戴也棘言步蹇伯樂遭之下車攀而哭之解紵衣以羃之羃覆也驥於是俯而噴仰而鳴聲逹於天若出金石聲者何也問其聲何以然彼見伯樂之知己也今僕之不肖厄於州部集韻部統也界也堀穴窮巷堀窟也以窮巷為窟穴沉汙鄙俗之日久矣汙濁辱也君獨無意湔祓僕湔手浣也祓去惡也使得為君髙鳴屈於梁乎聲已之屈梁南梁彪謂世之懷材抱德之士陸沈於時若此驥者不少而伯樂之不世有長鳴之無其時可不為之大哀耶故招延不可不博試用不可不詳也楚考烈王無子春申君患之求婦人宜子者進之甚衆卒無子趙人李園持其女弟欲進之楚王聞其不宜子恐又無寵李園求事春申君為舍人已而謁歸故失期後於所期日還謁自趙還入謁春申君問狀狀事狀對曰齊王遣使詭言王建求臣女弟與其使者飲故失期春申君曰聘入乎對曰未也春申君曰可得見乎曰可於是園乃進其女弟即幸於春申君知其有身園乃與其女弟謀園女弟承間說春申君曰楚王之貴幸君雖兄弟不如今君相楚王二十餘年而王無子即百嵗後將更立兄弟即楚王更立王後王彼亦各貴其所親君又安得長有寵乎非徒然也君用事久多失禮於王兄弟兄弟誠立禍且及身奈何以保相印江東之封乎今妾自知有身矣而人莫知妾之幸君未久誠以君之重而進妾於楚王王必幸妾妾賴天而有男則是君之子為王也楚國封四封之內盡可得孰與其臨不測之罪乎春申君大然之乃出園女弟謹舍而言之楚王楚王召入幸之遂生子男立為太子以李園女弟立為王后楚王貴李園李園用事李園既入其女弟為王后子為太子恐春申君語泄而益驕隂養死士欲殺春申君以滅口而國人頗有知之者春申君相楚二十五年考烈王病朱英楚人謂春申君曰世有無妄之福無妄言可必又有無妄之禍今君處無妄之世事無妄之主安不有無妄之人乎春申君曰何謂無妄之福曰君相楚二十餘年矣雖名為相國實楚王也五子皆相諸侯今王疾甚旦暮且崩太子衰弱疾而不起而君相少主因而代立謂攝也當國如伊尹周公王長而反政不即遂南面稱孤不不反政因而有楚國此所謂無妄之福也春申君曰何謂無妄之禍曰李園不治國言非將相王之舅也不為兵將而隂養死士之日久矣楚王崩李園必先入據本議據言不移議欲殺春申也制斷君命制斷矯也君楚王也秉權而殺君以滅口此所謂無妄之禍也春申君曰何謂無妄之人曰君先仕臣為郎中君王崩此章唯楚王更立楚王可曰楚王餘皆後人稱之李園先入臣請為君􅩶其胸殺之此所謂無妄之人也春申君曰先生置之勿復言也李園軟弱人也僕又善之又何至此朱英恐乃亡去後十七日楚考烈王崩李園果先入置死士止於棘門之內宫門以棘衛之春申君後入止棘門園死士夾刺春申君斬其頭投之棘門外於是使吏盡滅春申君之家而李園女弟初幸春申君有身而入之王所生子者遂立為楚幽王也是嵗秦始皇立九年嫪毐吕不韋所進以說始皇母帝太后者也亦為亂於秦不韋傳毐與太后私亂生子二人與后謀曰王即薨以子為後覺夷三族而吕不韋廢彪謂春申君所以至於此錮寵而暗於事也使萬有一如李氏女所陳者歸相印而老江東之封不已優乎春申於楚非若商君之於惠文又如不可則杖䇿而去扁舟五湖為世陶朱抑可矣春申不為此而計出於滅宗蓋小人患失之禍勢必有此不可不戒也朱英之言深矣然未聞道也春申之納女前日事耳英不以時匡之以大臣之義而以一卒自任雖多言亦何救於亂哉史疾為韓使楚楚王問曰客何方所循方術也曰治列子禦冦之言曰何貴曰貴正王曰正亦可為國乎曰可王曰楚國多盜正可以禦盜乎曰可曰以正禦盜奈何頃間有鵲止於屋上者曰請問楚人謂之何王曰謂之鵲謂之烏可乎曰不可曰今王之國有柱國令尹司馬典令皆楚官其任官置吏必曰廉潔勝任今盜賊公行而弗能禁也此烏不為烏鵲不為鵲也戰國䇿卷五
