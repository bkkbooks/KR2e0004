body:
  text: 戰國䇿卷六宋鮑彪注趙初分晉得趙國北有信都真定常山中山又得涿郡之髙陽鄭鄉東有廣平鉅鹿清河河間渤海之東平舒中邑文安束州成平章安河以北南至浮水繁陽内黄斥丘西有太原定襄雲中五原上黨襄子簡子子滅定王十六年戊子三晉智伯分其地智伯帥趙韓魏而伐范中行氏滅之休數年使人請地於韓韓康子欲勿與叚規韓人晉舊姓故魏亦有諫曰不可夫智伯之為人也好利而鷙鷙殺鳥也喻其殘忍復來請地不與必加兵於韓矣君其與之彼狃狃犬性驕也又將請地於他國他國不聼必郷之以兵然則韓可以免於患難而待事之變康子曰善使使者致萬家之邑一於智伯智伯説又使人請地於魏魏桓元作宣下同子欲勿與趙葭魏人亦晉舊姓諫曰彼請地於韓韓與之請地於魏魏弗與則是魏内自强而外怒智伯也然則其錯兵於魏必矣不如與之桓子曰諾因使人致萬家之邑一於智伯智伯說又使人之趙請藺元作蔡臯狼之地蔡非趙地臯狼屬西河趙襄子弗與智伯因隂結韓魏將以伐趙趙襄子召張孟談而告之曰夫智伯之為人陽親而隂踈三使韓魏而寡人弗與焉他日隂踈今則顯矣其移兵寡人必矣今吾安居而可張孟談曰夫董閼安於簡子之才臣也世治晉陽而君澤循之君澤趙臣繼安于者其餘政教猶存君其定居晉陽君曰諾君謂襄子乃使延陵君元作王此襄子臣不得稱王將車騎先之晉陽君因從之至行城郭案府庫案按同行也視倉廪召張孟談曰吾城郭之完府庫足用倉廪實矣無矢奈何張孟談曰臣聞董子之治晉陽也公宫之垣垣墻也皆以荻蒿苫楚廧之荻萑葦屬爾雅蕭荻注即萬又繁醜狄為蒿苫盖也楚荆也以是為墻廧牆同其髙至丈餘君發而用之於是發而試之其堅則箘簬音窘簵之勁不能過也君曰矢足矣吾銅少若何張孟談曰臣聞董子之治晉陽也公宫之室皆以錬銅為柱質質礎也請發而用之則有餘銅矣君曰善號令已定備守已具三國之兵乘晉陽城遂戰三月不能㧞因舒軍而圍之决晉水而灌之圍晉陽三年城中巢居而處懸釡而炊財食將盡士卒病羸襄子謂張孟談曰糧食匱財元作城力盡士大夫病吾不能守矣欲以城下謂將降何如張孟談曰臣聞之亡不能存危不能安則無為貴知士也君釋此計勿復言也臣請見韓魏之君襄子曰諾張孟談於是隂見韓魏之君曰臣聞唇亡則齒寒今智伯帥二國之君伐趙趙將亡矣亡則二君為之次矣二君曰我知其然夫智伯之為人麤中而少親麤粗同䟽也我謀未遂而知則其禍必至為之奈何張孟談曰謀出二君之口入臣之耳人莫之知也二君即與張孟談隂約三軍與之期日夜日既夜遣入晉陽張孟談以報襄子襄子再拜之張孟談因朝智伯而出兵交使在其故得朝之遇智過過一作果智伯之族轅門之外以車為門而轅外向智過入見智伯曰二主殆將有變君曰何如君智伯對曰臣遇張孟談於轅門之外其志矜其行髙智伯曰不然吾與二主約謹矣破趙三分其地寡人所親之言親與二國約必不欺也子釋之勿出於口智過出見二主入說智伯曰二主色動而意變必背君不如令殺之智伯曰兵著晉陽著言附其城三年矣旦暮當㧞而饗其利乃有他心不可子慎勿復言智過曰不殺則遂親之智伯曰親之柰何智過曰魏桓子之謀臣曰趙葭韓補康子之謀臣曰叚規二謚皆非當時語是皆能移其君之計君其與二君約破趙則封二子者各萬家之縣一如是則二主之心可不變而君得其所欲矣智伯曰破趙而三分其地又封二子者各萬家之縣一則吾所得者少不可智過見君之不用也言之不聼出更其姓為輔氏遂去不見張孟談聞之入見襄子曰臣遇智過於轅門之外其視有疑臣之心入見智伯出更其姓今暮不擊必後之矣恐智伯以過之去之决有感動也襄子曰諾使張孟談見韓魏之君日夜期殺守堤之吏而决水灌智伯軍智伯軍補救水而亂韓魏翼而擊之左右夾擊襄子將卒犯其前大敗智伯軍而禽智伯智伯身死國亡地分為天下笑此貪欲無厭也夫不聼智過亦所以亡也智氏盡滅唯輔氏存焉彪謂叚規之䇿智伯智過之察孟談皆如在其目中可謂明也已矣此一時三晉智氏皆有士三晉之應之如響智氏獨不用之而亡則士豈非天下之重寳乎雖然水傳晉陽城之不沈者三版於此時使智伯殺韓魏之君亦難聼矣其次欲其分封二子是豈不可為與智伯唯没於利故昏於智故孟子之説曰何必曰利智伯從韓魏兵二國兵從之以攻趙圍晉陽而水之城之元作下不沈者三板郄疵晉人謂智伯曰韓魏之君必反矣智伯曰何以如之郄疵曰以其人事知之夫從韓魏之君而攻趙趙亡難必及韓魏矣今約勝趙而三分其地今地不没者三板臼竈生鼃人馬相食城降有日而韓魏之君無喜志而有憂色是非反如何也明日智伯以告韓魏之君曰郄疵言君之且反也韓魏之君曰夫勝趙而三分其地城今且將㧞矣夫二元作三家雖愚不棄美利於前背信盟之約而為危難不可成之事其勢可見也是疵為趙計矣使君疑二主之心二主自稱曰主亦非當時語而解於攻趙也解懈同今君聼讒臣之言而離二主之交為君惜之趍而出郄疵謂智伯曰君又何以疵言告韓魏之君為智伯曰子安知之對曰韓魏之君視疵端而趍疾視端畏之趍疾避之恐疵要之與見智伯而屈也郄疵知其言之不聼請使於齊智伯遣之韓魏之君果反矣彪謂智伯至是眩於得而不顧其禍殆天奪其魄者至以謀臣之言質人以反夫非狂昬癡瞢孰肯自承其反哉張孟談既固趙宗廟封疆發五霸元作百下同伯業不振今復發之乃稱簡之塗稱者舉其說也此士國地君之御以告襄子曰昔者前國地君之御國地猶武安之𩔖御則之塗有之曰五霸之所以致天下者約衍兩字主勢能制臣約者自斷之辭無令臣能制主故貴為列侯者不令在相位自將軍以上不為近大夫今臣之名顯而身尊權重而衆服臣願損功名去權勢以離衆襄子恨然曰何哉吾聞輔主者名顯功大者身尊任國者權重信忠在己而衆服焉此先聖之所以集國家安社稷乎子何為然張孟談對曰君之所言成功之美也臣之所謂持國之道也臣觀成事聞徃古天下之美同有美而同必相嫉臣生之權均之能美未之有也前事之不忘後事之師君若弗圖則臣力不足愴然有决色雖然决去而猶愴然明不得已也一説决猶别襄子去之卧三日使人謂之曰晉陽之政臣下不使者不為上用何如對曰死僇僇戮同張孟談曰左司馬失其名見使於國家安社稷不避其死以成其忠君其行之行猶用也疑當作任君曰子從事乃許之使談自從其所欲之事以其薦賢自代故許其去張孟談此下著書者美之也便厚以便名便安厚重也去權所以安其重損名所以安其名納地釋事以去權尊而耕於負親之丘趙地缺故曰賢人之行明主之政也此美襄子耕三年韓魏齊楚元作燕負親以謀趙言五國昔約親今背之襄子徃見張孟談而告之曰昔者智氏之地趙氏分則多十城復來言分地多自與韓魏嘗以為言矣今復來也而今諸侯衍孰字謀我為之柰何張孟談曰君其負劒而御臣以之國君自為御舍臣於廟授吏大夫授談之吏以為大夫示尊顯之也臣試計之君曰諾張孟談乃行其妻之楚使妻之楚長子之韓次子之魏少子之齊四國疑而謀敗談趙之謀臣而其妻子分適四國故四國更相疑以為厚趙也彪謂孟談有道之士也國有危難不顧萬死出入行陣以就其謀功成事遂則委而去之已去而復出以銷國家之難非有道孰能出處語黙若是其裕哉范蠡始終之際賢矣方之孟談猶一間也晉畢陽畢萬之後之孫豫讓始事范中行事而不說去而就智伯智伯寵之及三晉分智氏趙襄子最怨智伯而將其頭以為飲器豫讓遁逃山中曰嗟乎士為知己者死女為說己者容脩其容色吾其報智氏之讎矣乃變姓名為刑人入宫塗厠欲以刺襄子襄子如厠心動執問塗者則豫讓也刃其扞扞銲同集韻矛鐏謂之銲刃施刃其端曰欲為智伯報讎左右欲殺之趙襄子曰彼義士也吾謹避之耳且智伯已死無後而其臣至為報讎此天下之賢人也卒釋之豫讓又漆身為厲滅鬚去眉自刑以變其容為乞人而徃乞其妻不識曰狀貌不似吾夫其音何𩔖吾夫之甚也又呑炭為啞變其音其友謂之曰子之道甚難而無功謂子有志則然矣謂子智則否以子之才而善事襄子襄子必近幸子子之得近而行所欲此甚易而功必成豫讓乃笑而應之曰是為先知報後知為故君賊新君大亂君臣之義者無此矣吾所謂為此者以明君臣之義非從易也且夫委質而事人而求弑之是懷二心以事君也吾所為難亦將以愧天下後世人臣懐二心者居頃之襄子當出豫讓伏所過橋下襄子至橋而馬驚襄子曰此必豫讓也使人問之果豫讓於是趙襄子面數豫讓曰子不嘗事范中行氏乎智伯滅范中行氏而子不為報讎反委質事智伯智伯已死子獨何為報讎之深也豫讓曰臣事范中行氏范𥙷中行氏以衆人遇臣臣故衆人報之智伯以國士遇臣國士名盖一國者臣故國士報之為國士所為以報之襄子乃喟然嘆泣曰嗟乎豫子衍子字之為智伯名既成矣寡人舍子亦已足矣子自為計寡人不舍子使兵環之豫讓曰臣聞明主不掩人之義忠臣不愛死以成名君前已寛舍臣天下莫不稱君之賢今日之事臣故伏誅然願請君之衣而擊之雖死不恨非所望也言有此必望不及此敢布腹心於是襄子義之乃使使者持衣與豫讓豫讓抜劒三躍呼天擊之曰而可以報智伯矣而自呼也遂伏劒而死死之日趙國之士聞之皆為涕泣刺客傳有子彪謂㐮子豫皆千載人也豫子能報舊君能厲天下後世之為臣使它人為之必一失於此矣或以其無成事為空自苦夫壯士能行其志而已成不成則有命焉吾何以必之哉智伯有如此臣以國士遇之而不免於亡殆與郭君善善為軰者與烈侯襄子孫元年癸威烈王十八年酉魏文侯借道於趙攻中山魏十七年此元年趙侯將不許趙利曰過矣魏攻中山而不能取則魏必罷音疲罷則趙重魏抜中山必不能越趙而有中山矣是用兵者魏也而得地者趙也君不如許之許之大勸彼將知趙利之也必輟君不如借之道而示之不得已肅侯成侯子元年顯王二十年壬申蘇秦從燕之趙此十六年始合從說趙王曰天下之卿相人臣乃至布衣之士莫不髙賢大王之行義皆願奉敬陳忠於前之日乆矣雖然奉陽君妬秦傳言肅侯令其弟成為相號奉陽君妬嫉賢也大王不得任事是以外賔客外䟽之也游談之士無敢盡忠於前者今奉陽君捐館舍禮婦人死曰捐館舍盖亦通稱大王乃今然後得與士民相親臣故敢進其愚忠為大王計莫若安民無事請無庸有為也安民之本在於擇交與諸侯交擇交而得則民安擇交不得則民終身不得安終趙王身請言外患齊秦為兩敵為趙敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭苦言其力斷絶人之交横人盖然願大王慎無出於口也請屏左右曰言所以異隂陽而已矣隂陽言事止有兩端指謂從横大王誠能聼臣燕必致氊裘狗馬之地齊必致海隅魚鹽之地楚必致橘柚雲夢之地韓魏皆可使致封地封内之地湯沭之邑貴戚父兄皆可以受封侯夫割地効實實如氊裘之𩔖五霸之所以覆車禽將而求也封侯貴戚湯武之所以放殺而争也今大王垂拱而兩有之是臣之所以為大王願也大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外韓弱則効冝陽皆以地與秦冝陽効則上郡絶并州郡河外割則道不通楚弱則無援此三䇿者不可不熟計也夫秦下軹道秦紀注亭名在霸陵則南陽動修武者刼韓包周則趙自銷鑠據衛取淇則齊必入朝秦欲已得行於山東則必舉甲而向趙秦甲涉河踰漳據畨吾則兵必戰於邯鄲之下矣此臣之所以為大王患也當今之時山東之建國莫如趙强趙地方二千里帶甲數十萬車千乘騎萬匹粟支十年西有常山南有河漳東有清河北有燕國燕固弱國不足畏也且秦之所畏害於天下者莫如趙言秦於天下獨畏趙害己然而秦不敢舉兵甲而伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也則不然無有名山大川之限稍稍蠶食之𫝊之國都而止矣𫝊附同止兵止於此韓魏不能支秦必入臣於秦秦無韓魏之隔禍必中於趙矣猶射中的此臣之所以為大王患也臣聞堯無三夫之分一夫有田百畝此未為唐侯時舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之卒不過三千人車不過三百乘而為天子誠得其道也是故明主外料其敵國之强弱内度其士卒之衆寡賢與不肖不待兩軍相當而勝敗存亡之機節節節目固己見於胷中矣豈掩於衆人之言掩猶蔽而以冥冥决事哉臣竊以天下地圖案之諸侯之地五倍於秦料諸侯之卒十倍於秦六國并力為一西面而攻秦秦𥙷破必矣今𥙷西面而事之見臣於秦夫破人之與破於人也臣人之與臣於人也豈可同日而言之哉夫横人者皆欲割諸侯之地以與秦成與秦成則髙臺榭補臺有木曰榭美宫室聼竽笙琴瑟之音察五味之和前有軒轅天文志權軒轅象後宫此言美人之所處也後有長庭美人巧笑卒有秦患卒猝同而不與其憂是故横人日夜務以秦權恐喝元作猲諸侯以求割地願大王之熟計之也臣聞明王絶疑去讒屏流言之迹塞朋黨之門故尊主廣地强兵之計臣得陳忠於前矣故竊為大王計莫如一韓魏齊楚燕趙六國從親以儐畔秦令天下之將相相與會於洹水之上通質刑白馬以盟之約曰秦攻楚齊魏各出銳師以佐之韓絶食道趙渉河漳燕守常山之北秦攻韓魏則楚絶其後齊出銳師以佐之趙涉河漳燕守雲中并州郡秦攻齊則楚絶其後韓守成臯魏塞午道王莽傳注今京城直南山有谷通漢梁道者名子午谷又宜州西慶州東有山名子午嶺南北直相當此則北山是子南山是午共為子午道詳此則午道秦南道也塞之使不得通莽所通者因秦也趙渉河漳博關燕出銳師以佐之秦攻燕則趙守常山楚軍武關齊涉渤海韓魏出銳師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊涉渤海燕出銳師以佐之諸侯有先背約者五國共伐之六國從親以儐秦儐元作擯無異義今並從前作儐秦必不敢出兵於函谷關以害山東矣如是則霸業成矣趙王曰寡人年少莅國之日淺未嘗得聞社稷之長計今上客有意存天下安諸侯寡人敬以國從乃封蘇秦為武安君飾車百乘黄金千鎰白璧百雙錦繡千純以約諸侯秦傳有在說燕後彪謂從約者天下之心亦其勢也夫秦有呑天下之心不盡不止諸侯皆病之而欲儐之此其心也同舟遇風胡越之相救如手足於其頭目此其勢也以天下之心行天下之勢如水之就下孰能禦之故謂之從從者從也順也其所不可者諸侯之心不一夫其心不一者非明計智算也或見小利而相侵或修小怨而相伐或眩於名實而為横人之所恐喝此張儀所以投隙而起使諸侯之智少靈於連雞則秦人自保之不給安能圖併呑之舉耶儀謂秦地形勢便兵强士武足以横天下然則天特人和道徳之威仁義之澤舉無與於興亡之數乎雖然一縱一横皆一偏之論有王者作則從横皆廢而天下定而非所以論於此時也蘇秦為趙王使於秦本傳不書反三日不得見謂趙王曰秦乃者過柱山盖砥桂有兩木焉一盖呼侣柖其徒一盖哭問其故對曰吾已大矣年已長矣吾苦夫匠人且以繩墨案規矩刻鏤我一盖曰此非吾所苦也是故吾事也事猶分吾所苦夫鐡銛元作鉆下同然自入銛言鐡之利若鉆則鐡鋷也義不合此而出夫人者人謂木屑自鐡言之為人今臣使於秦而三日不見無有為元作謂臣為鐡銛者乎無有言得無有也武靈王肅侯子元年丙赧王四十四年申齊破燕之噲之亂燕七年此十二年趙欲存之樂毅謂趙王曰今無約而攻齊齊必讎趙不約與國而獨攻齊故齊怨若有與同攻則怨有所分矣不如請以河東易燕地於齊齊破燕所得地近趙趙以河東易之趙有河北齊有河東此二非郡燕趙必不争矣是二國親也以河東之地强齊言齊得河東則益强以燕以趙輔之與之昜地是助之也天下憎之害其强必皆事王以伐齊是因天下以破齊也王曰善乃以河東易齊楚魏憎之今淖滑施之趙請伐齊而存燕張儀為秦連横說趙王曰敝邑秦王惠使臣敢獻書於大王御史周宗伯屬官秦因之而趙亦有言此者不王也大王收率天下以儐秦秦兵不敢出元作去函谷關十五年矣大王之威行於天下山東敝邑恐懼懾伏繕甲厲兵飾車騎習馳射力田積粟守四封之内愁居懾處不敢動摇唯大王有意督過之也髙紀注督視責也今秦以大王之力因畏趙而飭兵故西舉巴蜀并漢中東收兩周而西遷九鼎史不書守白馬之津秦雖僻逺然而心忿悁悁亦忿含怒之日乆矣今寡元作宣君有敝元作微甲鈍兵軍於澠池願渡河踰漳據畨吾迎戰邯鄲之下願以甲子之日合戰以正殷紂之事敬使臣先以聞於左右凡大王之所信以為從者恃蘇秦之計秦補熒惑諸侯熒火光也猶眩以是為非以非為是欲反覆齊國而不能自令車裂於齊之市夫天下之不可一亦明矣今楚與秦為昆弟之國而韓魏稱為東藩齊獻魚鹽之地此斷趙之右臂也夫斷右臂而求於人闘失其黨而孤居求欲無危豈可得哉今秦發三將軍一軍塞午道告齊使興師渡清河軍於邯鄲之東一軍軍於成臯歐韓魏歐驅同而軍於河外一軍軍於澠池約曰四國為一以攻趙破趙而四分其地是故不敢匿意隠情先以聞於左右臣竊元作切為大王計莫如與秦遇於澠池面相見而身相結也臣請案兵無攻願大王之定計趙王曰先王之時奉陽君相專權擅勢蔽晦先王獨制官事寡人宫車屬於師傅不得與國謀先王棄羣臣寡人年少奉祠祭之日淺私心固竊疑焉以為一從不事秦非國之長利也乃且願變心易慮剖地謝前過以事秦方將約車趨行趨促同而適聞使者之明詔於是乃以車二百乘入朝澠池割河間以事秦傳在楚韓齊後盖此十五六年趙不彪謂約從以難秦者趙也使秦得諸侯力足以制告趙也告之者是力不足也此時諸侯惑於横人之說皆辭屈貌從心不與也使季子可作則三國横約可立解而坐破也武靈此時血氣未定而蘇氏兄弟適不在趙故儀得以讎其恐喝之說加之數年如儀服之時其必有以折儀矣燕昭末年蘇代重燕而從約復舉豈非天下之心之勢矣哉甘荗為秦約魏以攻韓冝陽秦武王三年此十八年又北之趙冷向謂强國趙人曰不如令趙拘甘荗勿出以與齊韓秦市齊王閔欲求救冝陽必効縣狐氏地缺韓欲存冝陽必以路渉地缺端氏屬河東賂趙秦王武欲得冝陽不愛名寶寶之名世者齊韓之賂欲拘荗敗其約也秦賂則欲出之且拘荗也且以置公孫赫樗里疾荗不還秦則二人用武靈王平晝無事之日猶平日間居肥義趙相也餘並公族侍坐曰王慮世事之變權甲兵之用權猶度念簡襄之迹計胡狄之利王曰嗣立不忘先徳君之道也錯質務明主之長錯猶委臣之論也是以賢君静而有道民便事之教動而補有明古先世之功先猶髙為人臣者窮有弟長辭讓之節弟順也通有補民益主之業此兩者君臣之分也今吾欲繼襄王之業啟胡翟之郷而卒世不見也卒世猶舉世言舉世無能察此敵弱者與弱為敵謂胡翟用力少而功多可以無盡百姓之勞而享徃古之勲夫有髙世之功者必負遺俗之累不與俗同俗所遺也有獨智之慮者必被庻人之恐所謂黎元懼焉今吾將胡服騎射以教百姓而世必議寡人矣肥義曰臣聞之疑事無功疑行無名今王即定負遺俗之慮定言自定於心不為俗移殆母顧天下之議矣夫論至徳者不和於俗成大功者不謀於衆昔舜舞有苖不用兵而舞干羽欲以服人亦異於俗而禹袒入祼國非中國之禮非以養欲而樂志也欲以論徳而要功也愚者暗於成事智者見於未萌王其遂行之王曰寡人非疑胡服也吾恐天下笑之狂夫之樂智者哀焉愚者之笑賢者戚焉以此異趣知俗必見遺世有順我者則胡服之功未可知也雖敺世以笑我胡地元作服中山我必有之王遂胡服使王孫緤告公子成曰寡人胡服且將以朝亦欲叔之服之也家聼於親國聼於君古今之公行也子不反親臣不逆主先王之通誼也今寡人作教易服而叔不服吾恐天下議之也夫制國有常而利民為本從政有經而令行為上故明徳在於論賤行政在於信貴信伸同所謂行法自近始今胡服之意非以養欲而樂志也事有所出功有所止止猶至事成功立然後徳可見也今寡人恐叔逆從政之經以輔公叔之議與之論此所以輔之且寡人聞之事利國者行無邪因貴戚者名不累故寡人願慕公叔之義以成胡服之功使緤謁之叔請服焉公子成再拜曰臣因聞王之胡服也不佞寢疾不能趨走是以不先進王今命之臣固敢竭其愚忠臣聞之中國者聦明叡智之所居也萬物財貨之所聚也聖賢之所教也仁義之所施也詩書禮樂之所用也異敏技藝之所試也異出𩔖敏疾於事也逺方之所觀赴也蠻夷之所義行也以中國為有義有行今王釋此而襲逺方之服變古之教易古之道逆人之心畔學者離中國臣願大王圖之使者報王王曰吾固聞叔之病也即之公叔成家自請之曰夫服者所以便用也禮者所以便事也是以聖人觀其鄉而順冝因其事而制禮所以利其民而厚其國也被髮文身錯臂左祍以兩臂交錯而立言無禮容甌越之民也即漢東甌閩粤黑齒雕題史注以革染齒為黑雕題者之刻其肌以音丹湼鯷冠秫縫鯷大鮎以其皮為冠􅐕綦鋮也言女工之拙大吳之國也禮服不同其便一也是以鄉異而用變事異而禮易是故聖人茍可以利其民不一其用果可以便其事不同其禮儒者一師而禮異中國同俗而教離又况山谷之便乎故去就之變智者不能一逺近之服賢聖不能同窮鄉多異異異俗曲學多辨不知而不疑言各不知其異而不疑之異於已而不非者公於求善也今卿之所言者俗也吾之所言者所以制俗也今吾國東有河薄洛之水史注安平涇縣西有漳水津名薄洛津後志安定烏枝谷名與齊中山同之而無舟檝之用自常山以至代上黨東有燕東胡之境西有樓煩秦韓之邊而無騎射之備故寡人且聚舟檝之用求水居之民以守河薄洛之水變服騎射以備燕元作其㕘胡樓煩秦韓之邊言㕘錯居其邊也且昔者簡主不塞晉陽以及上黨不塞者志在逺畧而襄主兼戎取代以攘諸胡此愚智之所明也先時中山負齊之强兵侵掠吾地係累吾民累纍同引水圍鄗屬常山非社稷之神靈即鄗㡬不守先王忿之其怨未能報也今騎射之服近可以備上黨之形逺可以報中山之怨而叔也順中國之俗以逆簡襄之意惡變服之名而忘國亊之耻非寡人所望於子公子成再拜稽首曰臣愚不達於王之議敢道世俗之聞今欲繼簡襄之意以順先王之志臣敢不聼令再拜乃賜胡服趙文進諫曰農夫勞力補而君子養焉政之經也愚者陳意而智者論焉教之道也臣無隠忠君無蔽言蔽猶伏國之禄也禄猶福臣雖愚願竭其忠王曰慮無變擾言能定慮則不亂於物忠無過罪過者罪之小者子其言乎趙文曰當世輔俗當猶順古之道也衣服有常禮之制也循元作修法無愆民之職也三者先聖之所以教今君釋此而襲逺方之俗變古之教易古之道故臣願王之圖之王曰卿言世俗之間言其所言不能出俗常民溺於習俗學者沈於所聞此兩者所以成官而順政也非所以觀逺而論始也若今胡服自我始也且夫三代不同服而王五霸不同教而政政言治行於下智者作教而愚者制焉賢者議俗不肖者拘焉夫制於服之民不足與論心拘於俗之衆不足與致意故勢與俗化而禮與變俱聖人之道也承教而動循法無私不敢同私意民之職也知學之人能與聞遷有所聞則改前之為達於禮之變能與時化故為已者不待人制今者不法故子其釋之趙造諫曰隠忠不竭姧之屬也以私誣國賤之𩔖也賤謂輕國犯姧者身死賤國者族宗族滅其宗有元作反此兩者先王之明刑臣下之大罪也臣雖愚願盡其忠無遁其死王曰竭意不讓忠也上無蔽言明也忠不辟危明不距人子其言乎趙造曰臣聞之聖人不易民而教智者不變俗而動因民而教者不勞而成功據俗而動者據猶依慮徑而易見也徑以步道喻其省便今王易初不循俗胡服不顧世非所以教民而成禮也且服竒者志淫俗僻者亂民是以莅國者不襲竒僻之服中國不近蠻夷之行非所以教民而成禮者也且循法無過脩禮無邪臣願王之圖之王曰古今不同俗何古之法帝王不相襲何禮之循虙羲神農教而不誅黄帝堯舜誅而不怒及至三王觀時而制法因事而制禮法度制令各順其冝衣服器械各便其用故禮世不一其道施禮於世便國不必法古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒而志淫是鄒魯無竒行也鄒屬魯國言二國雖無竒服不無竒行俗僻而民易是吳越無俊民也是以聖人利身之謂服便事之為教進退之謂節衣服之謂制所以齊常民非所以論賢者也此謂進退以下故聖與俗流言其順俗賢與變俱諺曰以書為御者不盡馬之情以古制今者不達事之變故循法之功不足以髙世法古之學不足以制今子其勿反也趙記十九年有無二趙諌詞彪謂拓地開邊非有國之所先也不得已而有攘却之事嚴兵而已兵嚴而士用命雖不胡服其無成功如其不然雖易服變古何救於敗哉孟子曰行一不義而得天下不為也武靈之志欲得中山胡地而已遂舉國而夷甚矣其不權於輕重大小之差也且其所稱反古之說皆鈎金一輿羽之𩔖古所謂以辯言亂舊政者也何足取哉而史無譏故備論之王立周紹為傅曰寡人始行縣過畨吾當子為子之時踐石以上者踐石謂能騎乘者禮洗王石注乘馬石皆道子之孝故寡人問子以璧問以禮遺之遺子以酒食而求見子子謁病而辭人有言子者曰父之孝子君之忠臣也故寡人以子之智慮為辯足以道人危足以持難危言有危苦之節忠可以寫意冩猶宣信可以逺期乆而不渝諺元作云服難以勇治亂以智事之計也立傅以行去音教少以學義之經也循計之事先計而順行之佚元作失而不補累訪議之行窮而不憂窮言盡事之情故寡人欲子之胡服以𫝊王子元作乎周紹曰王失論矣非賤臣所敢任也王曰選子莫若父論臣莫若君君寡人也周紹曰立𫝊之道六王曰六者何也周紹曰智慮不躁達於變身行寛惠達於禮威嚴不足以易於位傃位而行不為威嚴所移重利不足以變其心恭於教而不快快謂縱逸和於下而不危六者傅之才而臣無一焉隠中不謁隐自匿也中謂情實此疑與趙造諫本一說臣之罪也𫝊命僕官𫝊附同比也僕猶辱以煩有司吏之恥也王請更論王曰知此六者所以使子周紹曰乃國未通於王之補胡服雖然臣王之臣也而王重命之臣敢不聼令乎再拜賜胡服王曰寡人以王子為子任欲子之厚愛之無所見醜御道之以行義勿令溺苦於學溺苦皆勞也勞於學以無導之者故也事君者順其意不逆其志事先者先先君明其髙不倍其孤故有臣可命其國之椂也子能行是所補以事寡人者畢矣書云去邪勿疑任賢勿貳禹謨寡人與子不用人矣遂賜周紹胡服衣冠具帶帶飾之備也猶具劒黄金師比未詳盖衣章主術訓武靈王貝帶翿而朝注翿讀曰私頭三字與此小異以傅王子趙燕後胡服服後於衆王令讓之曰事主之行竭意盡力微諌而不譁讙也應對而不怨不逆上以自伐不立私以為名子道順而不拂臣行讓而不爭子用私道者家必亂臣用私義者國必危反親以為行慈父不子逆主以自成惠主不臣也惠猶慈寡人胡服子獨弗服逆主罪莫大焉以從政為累政胡服之政以逆主為髙行私莫大焉故寡人恐親犯刑戮之罪燕公族也故稱親以明有司之法趙燕再拜稽首曰前吏命胡服前前日施及賤臣臣以失令過期更不用侵辱教更猶反侵辱刑也言已宜服刑平反不刑而教之王之惠也臣敬循衣服以待令日令善也王破原陽屬雲中以為騎邑居騎士於此牛賛趙人進諌曰國有固籍固言不變籍猶令甲兵有常經變籍則亂失經則弱今王破原陽以為騎邑是變籍而棄經也且習其兵者輕其敵習於敵人之兵則玩而易之便其用者此言本國械用易其難今民便其用而王變之是損君而弱國也故利不百者不變俗功不什者不易器今王破卒散兵以奉騎射臣恐其攻獲之利不如所失之費也王曰古今異利逺近易用易入音隂陽不同道四時不一冝故賢人觀時而不觀於時時猶俗也視俗而變不為俗所窺制兵而不制於兵子知官府之籍不知器械之利知甲兵之用不知隂陽之冝趙居胡之南陽也欲攻胡而用趙兵非其冝也故兵不當於用何兵之不可易教不便於事何俗之不可變昔者先君襄王與代交地交猶接城境封之築城境上為之封域名曰無窮之門所以詔元作昭後而期逺也今重甲循兵趙甲重不若新甲之輕循言其因舊不可以踰險仁義道徳不可以來朝此言胡也吾聞信不棄功智不遺時今子以官府之籍亂寡人之事非子所知牛賛再拜稽首曰臣敢不聼令乎至遂胡服率騎入胡出於遺遺之門此門義取胡者古今所遺踰九限之固絶五徑之險至胡中辟地千里魏敗楚於陘山禽唐明楚威十一年魏敗我陘山時武靈未立懷二十八年秦齊韓魏攻楚殺唐昧此二十五年明豈昧之字耶楚王懼令昭應奉太子以委和於薛公懷二十九年使太子質於齊主父欲敗之乃結秦連楚宋之交令仇赫元作郝下章同相宋樓緩相秦楚王合元作禽趙宋楚與二团合齊元作魏之和卒敗楚得二國之援故不與齊和趙使仇元作机下同史作仇液赫之秦請相魏冉宋突齊人郝客謂仇赫曰秦不聼樓緩必怨公秦時已相緩公不若隂辭樓子辭告之也請無急秦王昭王言為緩故請之不力秦王見趙之相魏冉之不急且不聼公言也公謂郝是事而不成以徳樓子事成以史補此六字魏冉固徳公矣穰侯傳有六秦六年昭七年此二十謂趙王曰三晉合而秦弱三晉離而秦强此天下之所明也秦之有燕而伐趙有趙而伐燕有梁而伐趙有趙而伐梁有楚而伐韓有韓而伐楚此天下之所明見也然山東不能易其路言易横秦之路以合三晉兵弱也弱而不能相一是何秦元作楚之智山東之愚也是臣所為山東之憂也虎將即禽走獸㧾名禽不知虎之即已也而相鬬兩罷而歸其死於虎故使禽知虎之即已决不相鬭矣今山東之主不知秦之即已也而尚相鬬兩敝而歸其國於秦智不如禽逺矣願王熟慮之也今事有可急者秦之欲伐韓梁東闚於周室甚惟寐忘元作亡之今南攻楚者惡三晉之大合也合合楚也楚强晉弱先攻其强則弱者沮不敢合矣今攻楚休而復之休罷兵復復攻已五年矣先是秦取漢中取召陵又敗之重丘攘地千餘里今謂楚王懐茍來舉玉趾而見寡人必與楚為兄弟之國楚懐三十年秦昭云然此二十七年必為楚攻韓梁反楚之故地楚王美秦之語怒韓梁之不救已必入於秦秦補有謀故發元作殺使之趙以燕餌趙言欲與趙攻燕而離三晉韓魏時不合秦而趙合之必不善趙今王美秦之言而欲攻燕攻燕食未飽而禍已及矣楚王入秦秦楚為一東面而攻韓韓南無楚北無趙美秦反地餌燕之說故不敕韓亦離三晉之䇿也韓不待伐割挈馬兔而西走割地挈而走秦疾於馬兔秦與韓為上交秦禍安移於梁矣禍兵禍安言其不勞以秦之强有楚韓之用梁不待伐衍矣字割挈馬兔而西走秦與梁為上交秦禍案環中趙矣案安同故荀卿書多用案字此言秦視趙在其度内如物在環中環中一作移於字可也以强秦之有韓梁楚與燕之怒秦有三國趙之患也燕又怒之割必深矣秦割趙地國之舉此國謂趙舉猶行臣之所為來臣故曰事有可急為者及楚王之未入也三晉相親相堅堅其約出銳師以戍韓梁西邊楚王聞之必不入秦秦必怒而循攻楚循前而攻是秦禍不離楚也便於三晉若楚王入秦秦補見三晉之大合而堅也必不出楚王恐其合晉即多割楚求出故是秦禍不離楚也有利於三晉願王之熟計之也急重言急以促之趙王因起兵南伐山戎戎近秦伐之以偪秦戍元作翟韓梁之西元作惡邊秦見三晉之堅也果不出楚王衍卬字而多求地彪謂從横之說未有善於此者也趙少嘗之其効已見是以知張儀之可折也然其効不大見於後則是諸侯之不一也是其計之不明不智也吁惜哉冨丁趙人欲以趙合齊魏樓緩欲以趙合秦楚冨丁恐主父之聼樓緩而合秦楚也司馬淺趙人為冨丁謂主父曰不如以順齊齊本欲伐秦今順之今我不順齊伐秦秦楚必合而攻韓魏無齊之難因得取其鄰也韓魏告急於齊齊不欲伐秦上言順齊伐秦此又言齊不欲伐者前時秦楚末合今合故也必以趙為辭以趙不順齊伐秦告二國則不補伐秦者趙也韓魏必怨趙齊之兵不西不伐秦韓必聼秦違齊畏秦故違齊而親秦親韓兵必歸於趙矣今我順而齊不西韓魏必絶齊絶齊則皆事我且我順齊齊無不元作而西日者言昔日樓緩坐魏時欲離齊魏生言有所待三月不能散齊魏之交言二國本親冝與之伐秦今我順而齊魏果西是罷齊敝秦也罷疲同趙必為天下重國主父曰我與三國攻秦韓魏齊為三是俱敝也曰不然我約三國而告之衍秦字以未搆元作御名中山也此言可以少出兵也此二十七年趙破中山木滅也趙冝自備三國欲伐秦之果也必聼我欲和我使趙與中山講中山聼之是我以三國元作王因饒中山而取地也饒猶益也以三國欲和我故益得取地於中山中山不聼三國必絶之是中山孤也三國不能和我雖少出兵可也我分兵而孤衍樂字中山必之我之猶去已亡中山而以餘兵與三國攻秦是我一舉而兩取地於秦中山也魏因冨丁且合於秦丁本欲以趙合齊魏今魏欲因以合秦趙不聼故趙恐請効地於魏而聼薛公文時合齊魏教子欬或者教之欬趙人謂李兊曰趙畏横之合也合秦故言横故欲効地於魏而聼薛公公不如令主父以地資周最而請相之於魏周最以天下厚秦者也今相魏魏秦必虛矣厚秦而舍之相魏秦必惡之故二國不舍虗言其不合也齊魏雖勁無秦不能傷趙魏王哀聼是輕齊也齊亦惡最故秦魏雖勁無齊不能得趙此利於趙而便於周最也惠文王武靈王子元年亥赧王十七年癸三國攻秦魏哀二十一年與齊韓共攻秦此元年趙攻中山取扶柳屬信都五年以擅呼沱擅言固有之齊人戎郭宋突雖齊人而倍齊謂仇赫元作郝曰不如盡歸中山之新地元作埊武后時字耳今並從古此謂扶柳中山案此言於齊案猶據曰四國趙與上三將假道於衛以過章子之路地缺盖章子以齊軍守此齊聞此必効鼔莒鼔里是也齊南又有二鼓腹擊它國人仕趙為室而鉅荆敢楚人仕趙言之主謂腹子曰何故為室之鉅也腹擊曰臣羇旅也爵髙而禄輕宫室小而帑不衆帑金幣所藏主雖信臣百姓皆曰國有大事擊必不為用今擊之鉅宫將以取信於百姓也主君曰善此曰主曰主君主父故在也然則上章五當作三蘇子元作秦下同說李兊曰雒陽乘軒車蘇某元作秦家貧親老無罷車駑馬罷疲同猶敝也車勞則敝桑輪蓬篋贏元作贏幐負書擔囊觸塵埃䝉霜露越河漳元作漳河足重繭繭足胝也日百而舍日行百里乃就舍造外闕願見於前口道天下之事李兊曰先生以鬼之言見我則可若以人事兊盡知之矣蘇子對曰臣固以鬼之言見君非以人之言也李兊見之蘇子曰今日臣之來也暮後郭門門閉後至不及其開時藉席無所得藉謂借寄宿人田中傍有大叢夜半土梗與木梗土亦言梗因木為𩔖也鬭曰汝不知我我者乃土也使我逄疾風淋雨淋言其大能沃物壞沮乃復歸土今汝非木之根則木之枝耳汝逄疾風淋雨漂入漳河東流至海氾濫無所止臣竊以為土梗勝也此喻不切於兊之事盖以鬼事發其言耳今君殺主父而族之殺在四年言族則其宗多死者君之立於天下危於累卵君聼臣計則生不聼臣計則死李兊曰先生就舍明日復來見兊也蘇子出李兊舍人謂李兊曰臣竊觀君與蘇公談也其辯過君其博過君君能聼蘇公之計乎李兊曰不能舍人曰君即不能願君堅塞兩耳無聼其談也明日復見終日談而去舍人出送蘇君蘇子謂舍人曰昨日我談粗而君動今日精而君不動何也舍人曰先生之計大而規髙吾君不能用也乃我請君堅塞兩耳無聼談者雖然先生明日復來吾請資先生厚用言使兊厚而用之明日來抵掌而談李兊送蘇子明月之珠覽冝訓注隋侯珠云和氏之璧下和所獻楚文王者黑貂之裘黄金百鎰元從水蘇子得以為用西入於秦趙王封孟嘗君以武城屬清河即下東武城北當田文奔薛後孟嘗君擇舍人以為武城吏而遣之曰鄙語豈不曰借車者馳之借車與衣固將馳且被也今云然盖常常馳而弗愛也借衣者被之哉皆對曰有之孟嘗君曰文甚不取也夫所借衣車者非親友則兄弟也夫馳親反之車被兄弟之衣文以為不可今趙王不知文不肖而封之以武城願大夫之徃也毋伐樹木毋發屋室訾然使趙王悟而知文訾不思稱意也言其不期得知而見知知其善任人也謹使遣吏之辭可全而歸之齊欲攻宋閔三十八年此十三年秦令起賈人姓名禁之齊乃援元作抹趙以伐宋以趙自助秦王昭怒屬怨於趙李兊約五國以伐秦韓趙魏燕齊也史不書獨趙䇿見之無功留天下之兵於成臯而隂講元從才從冓於秦又欲與秦攻魏以解其怨解秦怨而取封焉自封之封非封也魏王昭不說之齊人𥙷謂齊王曰臣為足下謂魏王曰三晉皆有秦患今之攻秦也為趙也本以秦屬怨於趙故五國伐趙此設詞也言趙初約伐秦令乃與秦講若同伐趙趙可亡也趙必亡矣齊遂李兊講秦背齊不伐宋者兊也李兊必死今之伐秦也以救李子之死也今趙留天下之甲於成臯而隂鬻之於秦已講則令秦攻魏以成其私封王之事趙也何得矣且王嘗濟於漳而身朝於邯鄲抱隂城成屬涿郡又孔子世家注太山鉅平有武城負蒿地缺葛孽元作薜趙記注在馬丘又葛城在髙陽屬涿郡為趙蔽而趙無為王行也今又以河陽屬河内姑宻密蔑同魯卜縣有姑蔑城封其子兊子而乃令秦攻王以便取隂人比然而後知賢不言人必以𩔖相比乃可知如王言如王今者若用所以事趙之半收齊天下有敢謀王者乎王之事齊也無入朝之辱無割地之費齊為王之故虛國於燕趙之前虛國謂悉出兵用兵於二千里之外故攻城野戰未嘗不為王先被矢石也得二都割河東盡効之於王自是之後秦攻魏齊未嘗不歳至於王之境也請問王之所以報齊者可乎韓珉元作呡從韓䇿後並同處於趙珉下皆齊人之去齊者去齊三千里正以此疑齊珉處趙意别有謂魏以其在趙疑齊親趙曰有秦隂疑齊親趙因私於秦以趙嘗講秦也今王又挾故薛公以為相史稱文去齊如魏在閔王三十八年後按此則其如魏以齊王驕也伐宋前已去齊矣善韓齊以為上交尊虞商以為大客皆齊人之去齊者王顧元作固可以反疑於齊乎用齊之所不善失在魏也安可疑齊於魏王聼此言也甚詘此下此士自陳其說魏之効詘猶順其欲事王齊王也甚循其怨於趙言其事齊比於怨趙則又順也臣願王之亟元作日聞魏與魏相聞而無庸見惡也臣請為王推其怨於趙推猶移怨魏怨願王之隂重元作日趙而無使秦之見王之重趙也秦見之且亦重趙天下得趙則强使秦知齊重趙恐齊强亦必重之齊秦交重趙臣必見燕與韓魏亦且重趙也皆且無敢與趙治治猶校三國事趙趙從親以合於秦必為王髙矣言趙居齊上臣故欲王之徧刼天下而皆私甘之也私則所謂無使見也甘言說之王使臣以韓魏與燕刧趙使丹也甘之丹順皆人名以趙刧韓魏此下皆且甘且刧使臣也甘之以三晉劫秦使順也甘之以天下刧楚使珉也甘之則天下皆偪秦以事王自以見偪於秦也秦於天下有偪而已不如齊之有刧有攻也而不敢相私也交定而後王擇焉此章亦可為齊姑因舊齊將攻宋而秦楚禁之齊因欲與趙趙不聼齊乃令公孫衍說李兊以攻宋而定封焉李兊乃謂齊王閔曰臣之所以堅三晉以攻秦者非以為齊得利秦之毁也不以毁秦為齊之利欲以使攻宋也而宋置太子以為王下親其上而守堅臣是以欲足下之速歸休士民也今太子走諸善太子者皆有死心太子為王及走史不書太子為王矣而走必王之黨逐之故太子之人以死報之若復攻之其國必有亂而太子在外此亦舉宋之時也已臣為足下使公孫衍說奉陽君蘇秦從時已言奉陽死矣豈或襲稱如馬服者乎曰君之身老矣封不可不可早定也為君慮封莫若於宋他國莫可夫秦人貪韓魏危近秦故燕楚僻元作辟中山之地薄莫如於隂失今之時不可復得已宋之罪重齊之怒深殘亂宋徳元作得大齊定身封此百代一時也已奉陽君甚貪元作食之唯得大封齊無大異言奉陽欲得隂以大其封而齊待之未有異數不可臣願足下之大發攻宋之舉而無庸致兵以觀奉陽君之應足下也縣隂以甘之許之而未與故曰懸循有燕以臨之循言與燕順臨猶制也不徒甘之必或制之而臣待忠之封待猶將忠猶實也王許之封而已實之事必大成臣又願足下有地効於襄安君盖趙人以資臣也足下果殘宋此兩地之時也言有齊又得宋足下何愛焉若足下不得志於宋與國何敢望也與國趙也言奉陽襄安不敢望封足下以此資臣也臣循燕觀趙觀言其無所事則足下擊潰而决天下矣潰潰癰也盖喻其制天下之易也决猶制齊攻宋奉陽君不欲客謂奉陽君曰君之春秋髙矣而封地不定不可不熟圖也秦之貪韓魏危燕元作衛楚僻元作正盖僻四聲近匹又訛作正字中山之地薄宋罪重齊怒深殘伐亂宋定身封徳强齊此百代之一時也五國伐秦無功罷於成臯趙欲講元從才從冓下同於秦楚與韓魏將應之齊弗欲蘇代謂齊王閔曰臣已為足下見奉陽君矣臣謂奉陽君曰天下散而争秦爭一作事争先事之秦必據宋魏冉必妬君之有隂也秦王貪魏冉妬則隂不可得已矣君無講齊必攻宋齊攻宋則楚必攻宋魏必攻宋燕趙助之五國據宋不至一二月隂必得矣得隂而講秦雖有變君無患矣趙非不可以與秦講而不可獨講獨講則示秦弱秦必輕之今助四國攻宋而得隂是五國為一也不懼秦矣若不得已而必講據此時趙可以無講故云則願五國復堅約同伐秦也先伐後講則不示弱五國𥙷兩字願得趙時趙强故足下雄飛雄者衆雌所從與韓氏大吏東勉元作免齊王必無名禁𥙷珉也元作呡下同前齊嘗使韓珉處趙有秦私也今五國約講秦勉齊同之諸國必無辭止珉使無私秦使臣守約若與國秦本非與今講必使之如與也有倍約者倍並音背以四國攻之無倍約者而秦侵約五國復堅而儐元作賔之今韓魏與齊相疑也若復不堅約而講此因舊臣恐與國之大亂也齊秦非復合也必有觭元作踦下同重者矣角一俯一仰曰觭言有偏重後合與觭重者皆非趙之利也且天下散而事秦是秦制天下也秦制天下將何以天下為天下自為秦用趙無所用之也臣願君之蚤計也天下争秦有六舉皆不利趙矣天下争秦秦王昭受負海衍内字之國山東皆負海合負親之交天下嘗横而親秦矣已而負之今復合之以據中國而求利於三晉是秦之一舉也秦行是計不利於趙而君終不得隂一矣天下争秦秦王内韓珉於齊内成陽君於韓相魏懐於魏此皆其國之人與秦事者故秦納之復合衍公孫衍時相魏雅不善秦今相懐因使合之交兩王秦魏王賁韓佗之楚元作曹此皆秦人皆起而行事是秦之一舉也秦行是計也不利於趙而君不得隂二矣天下爭秦秦王受齊受趙三强三親此三皆强國自相親以據魏據猶臨之而求安邑秦求之是秦之一舉也秦行是計齊趙應之魏不待伐抱安邑而倍秦此倍益也秦得安邑之饒魏為上交韓必入朝秦過趙已安邑矣過猶勝也言秦行此䇿不論其它止得安邑已勝於趙矣秦行是計不利於趙而君必不得隂三矣天下爭秦秦堅燕趙之交以伐齊收楚與韓珉而攻魏代齊得之則珉為用是秦之一舉也秦行是計而燕趙應之燕趙伐齊兵始用交鋒之初秦因收楚而攻魏三國交鋒勢不得解故得以此時收攻二國不至一二月魏必破矣秦舉安邑而塞女㦸地缺韓之太原絶下軹元作咫道南陽而元祚高伐魏絶韓包二周即趙自消爍矣國燥於秦燥猶爍兵分於齊非趙之利也而君終身不得隂四矣天下爭秦秦堅三晋之交攻齊國破財元作曹屈三晉破屈也而兵東分於齊兵分謂魏秦按兵攻魏取安邑此與上始用兵而攻收同是秦之一舉也秦行是計也君按救魏按謂安然是以攻齊之已敝救之而𥙷兩字與秦爭戰也君不救也韓魏焉免西合合合秦國在謀之中在秦謀中而君有終身不得隂五矣有猶又天下爭秦秦按為義存亡繼絶固危扶弱定無罪之君必起中山與勝焉勝中山之後秦起中山與勝而趙宋同命此時宋小弱言趙失中山聽命於秦與宋同也何暇言隂六矣故曰君必無講則隂必得矣奉陽君曰善乃絶和於秦而收齊魏以成取隂趙收天下且以伐齊蘇厲元作秦為齊上書説趙王曰臣聞古之賢君徳行非施於海内也敎順慈愛非布於萬民也祭祀時享非當於鬼神也甘露降風雨時農夫登穀熟曰登年穀豐盈衆人善之而賢主惡之惡心不安也以其無以致之故今足下功力謂戰代非數痛加於秦國而怨毒積惡非曽深陵於韓也臣竊外聞大臣及下吏之議皆言王前專據言行之不疑以秦為愛趙而憎韓臣竊以事觀之秦豈得愛趙而憎韓哉欲亡韓吞兩周之地故以韓為餌趙時惡韓故秦以亡韓悦趙趙遂以為愛已也先出聲於天下欲鄰國聞而觀之也觀其愛趙恐其事不成故出兵以佯示趙魏虛以伐韓示之恐天下之驚覺故微伐𥙷韓以貳之貳猶疑恐天下疑已故出質以為信聲徳於與國而實伐空韓如上文則伐韓非秦所急也此言實伐者韓之在秦掌握中物耳故不急於伐恐趙不以為徳故終伐之其伐之亦欲以吞周而非爱趙也臣竊觀其圖之也議秦以謀計議猶意必出於是且夫説士之計皆曰韓亡三川魏滅晋國晋國謂安邑是元作恃韓未窮而禍及於趙三晋唇齒之國故韓亡則魏滅魏滅而禍及於趙不待韓滅盡且物固有勢異而患同者又有勢同而患異者昔者楚人久伐而中山亡此言楚受秦伐趙無秦患故破中山滅之故秦昭八年再敗楚遂言趙破中山今燕盡韓之河南盡言得其地距沙邱而至鉅鹿之界鉅鹿冀州郡三百里自此皆言近趙距於扞關至於榆中屬金城下衍千字五百里秦盡韓魏之上黨則地與國都國謂趙邦屬而壤挈者言為秦所取絜言取之易七百里秦以三軍强弩坐羊腸元作唐之上即地去邯鄲二十里且秦以三軍攻王之上黨而危其北則勾注之西屬鴈門非王之有也今踰元作魯勾注禁常山而守守猶閉三百里通於唐曲遇元作吾此代馬胡駒不東而崑山之玉後志金城臨羗有崑山不出也此三寶者又非王之有也今從於强秦與元作國之伐齊臣恐其禍出於是矣五國之主齊楚魏韓燕嘗合橫而謀伐趙三分趙國壤地著之盤盂取太公為武王作盤盂之銘屬之讐柞讐柞酬酢同言其相屬伐趙於酬酢之間五國之兵有日矣齊元作韓下並同乃西師以禁秦國禁閉拒之使秦發令素服而聼今令其國素服者兵敗以喪禮自居也史不書反溫軹元作枳並屬河内髙平於魏高平屬臨淮安定亦有反三公什清於趙公字疑誤安定有三水朔方有三封渤海有三户皆近趙張儀傳塞什谷之口當屯留之道則什近屯留後志中牟注有清口皆趙地也此王之明知也夫齊事趙宜為上交以其有志為趙閉秦今乃以邸罪取伐邸抵同至也臣恐其後事王不敢自必也今王收齊𥙷天下必以王為得齊齊𥙷危社稷以事王天下必重王然則齊義王以天下就之趙得天下之交而屈就齊故齊以為義下至齊慕王以天下收之就之上也故收言下是一世之命制於王已臣願大王深與左右羣臣卒計而重謀先事成慮而熟圖之也趙恵文十六年有秦攻趙藺離石祁拔趙以公子郚為質於秦而請内焦𢎞農陜有焦城黎東郡有黎即黎陽牛狐之城地缺以易藺離石祁於秦元作趙趙背秦不予焦黎牛狐秦王昭怒令公子繒請地趙王乃令鄭朱對曰夫藺離石祁之地曠遠於趙而近於大國有先王之明與先臣之力故能有之今寡人不逮不及先王其社稷之不能恤安能收恤藺離石祁乎寡人有不令之臣實為此事也非寡人之所敢知卒背秦秦王大怒令衛胡易史無易字伐趙攻閼與後志上黨湼有閼與趙奢將救之此二十九年破秦閼與下魏令公子咎以鋭師居安邑以挾秦挾牽制之秦敗於閼與反攻魏幾魏將廉頗趙將信平君救幾大敗秦師鄭同北見趙王趙王曰子南方之博士也同鄭人鄭在趙之南博士辯博之士何以教之鄭同曰臣南方草鄙之人也鄙猶野何足問雖然王致之於前安敢不對乎臣少之時親嘗教以兵趙王曰寡人不好兵鄭同因撫手仰天而笑之曰撫摩也兵固天下之狙喜也狙玃屬而狡黠言兵家如之而可喜臣故意大王不好也臣亦嘗以兵説魏昭王昔日昭王亦曰寡人不喜臣曰王之行能如許由乎許由無天下之累故不愛元作受也今王既受先王之傳欲宗廟之安壤地不削社稷之血食乎王曰然此下同對今有人操隋侯之珠持下脱一字丘之環未詳萬金之財時宿於野内無孟賁之威荆慶之斷荆成荆范睢傳注古勇士又慶卿古字通應訓荆有佽非斬蛟孔子聞之博物志以為荆軻非也又或是成虎荆慶忌二人説林訓曰王子慶忌足躡麋鹿手博兕外無弓弩之禦不出宿夕一宿二夕夕初夜人必危之矣今有强貪之國臨王之境索王之地告以理則不可説以義則不聽王非戰國守圄之具圄亦守其何以當之王若無兵鄰國得志矣趙王曰寡人請奉教彪謂鄭同陳喻甚髙然自春秋至是天下未嘗無兵故孔孟皆以兵為諱今捨俎豆之事仁義之説而專談兵此益多之論也樓緩將使伏事辭行㐲猶隠也將出使恐王疑之於辭日以隠伏之事要王使信已也謂趙王曰臣雖盡力竭智死不復見於王矣王曰是何言也固且為書而厚寄卿樓子曰王不聞公子牟夷宋公子之於宋乎非肉不食言其貴莊十年注肉食在位者文張它國人善宋宋王善之惡公子牟夷宋元作寅然之補之字言牟夷之親而文張以遊客能使宋聽其說况已乎今臣之於王非宋之於公子牟夷也而惡臣者過文張故臣死不復見於王矣王曰子勉行矣寡人與子有誓言矣樓子遂行後以中牟反入梁史不書候者來言而王弗聽曰吾已與樓子有言矣此言奸人不可盡信燕封宋人榮蚠高陽君使將而攻趙趙王因割濟東三城合元作令下同盧屬㤗山高唐屬平原平原陵地城市邑五十七平原青州郡命以與齊而以求安平君而將之馬服君謂平原君曰國奚無人甚哉君致安平君而將之乃割濟東三城補合城市邑五十七以與齊此夫夫辭也謂三城子與敵國戰覆軍殺將之所取割地於敵國者也此取之彼割之也今君以此與齊而求安平君而將之國奚無人甚哉且君奚不將奢也奢嘗抵罪居燕燕以奢為上谷守燕之通谷要塞奢習知之百日之内天下之兵未聚奢已舉燕矣然則君奚求安平君而為將乎平原君曰將軍釋之矣僕已言之僕主矣僕主幸已聽僕也將軍無言已馬服君曰君過矣君之所以求安平君者以齊之於燕也茹肝涉血之仇耶謂即墨之役其於奢也不然奢於燕非仇使安平君愚固不能當榮盆使安平君智又不肯與燕人戰此兩言者安平君必處一焉雖然兩者有一也使安平君智則奚以趙之强為趙强則齊不復覇矣今得强趙之兵以杜燕將杜猶拒曠日持久兵相持日久數歳令士大夫餘子之力盡於溝疊車甲羽毛敝羽毛謂箭即裂字府庫倉廩虛兩國交以習之習言玩其兵乃引其兵而歸夫盡兩國之兵無明此者矣是元作夏軍也懸釜而炊得三城衍也字城大無能過百雉者隠元年注方丈曰堵三堵為雉果如馬服之言也彪謂馬服之請將自知明也其䇿安平知彼明也夫安平齊宗也其不强趙以奪齊之覇人之情也此言若易聽而不見聽孰謂平原君智乎趙惠文王三十年相平都君田單元作都平按史單無都平之稱魏䇿三言平都今從之又按孝成元年單将趙師攻燕二年為相盖相平都而將之實自惠文至孝成乃攻燕復相也問趙奢曰吾非不説將軍之兵法也所以不服者獨將軍之用衆用衆者使民不得耕作糧食輓賃賃所税於民者不可給也此坐而自破之道也非單之所為也單聞之帝王之兵所用不過三萬而天下服矣今將軍必負十萬二十萬之衆乃用之此單之所不服也馬服君曰君非徒不達於兵也又不明其時勢兵則吳干之喻時勢則萬國七國之異夫吳干之劒吳王使干將鑄之故云肉試則斷牛馬金試則截盤􅓢􅓢盥器薄之柱上而擊之薄猶迫則折為三質之石上而擊之質以石為鑕則碎為百今以三萬之衆而應强國之兵是薄柱擊石之謂也且夫吳干之劒材難材謂脊脾之𩔖不易得也夫無元作母脊之厚而鋒不入無脾之薄脾近刃處而刃不斷兼有是兩者無鉤竿元作罕下同鐔䝉湏之便鉤劒頭鐶竿與同集韻柄也鐔珥鼻也䝉須疑為劒繩猶蒯緱也爾雅草有夫須蓋以草為繩操其刃而刺則未入而手斷君無十餘二十萬之衆而為此鉤竿鐔䝉須之便而徒以三萬行於天下君焉能乎且古者四海之内分為萬國城雖天無過三百丈者人雖衆無過三千家者而以集兵三萬集言平時團集非烏合也距此奚難哉今取古之為萬國者分以為戰國七不𥙷能具數十萬之兵曠日持久數嵗即君之齊已言以三萬拒數十萬必敗亡也齊嘗為燕昭所破故云齊以二十萬之衆攻荆五年乃罷趙以二十萬之衆攻中山五年乃歸此言雖衆猶不亟得志况三萬乎今者齊韓相方方猶比猶敵兩國圍攻焉兩國或圍或攻豈有敢曰我其以三萬救是者乎哉今千丈之城萬家之邑相望也而索以三萬之衆索猶求圍千丈之城不存其一角言城大兵少曽不處城之一角豈能合圍而野戰不足用也既不能圍亦不可戰君將以此何之平都君喟然太息曰喟即太息單不至也至猶及也言慮不及此彪謂兵不期少多商敵為數耳單也以少擊衆奇兵也奢也以衆敵衆正兵也論兵者當以正為常而用之則務出奇奇不可論也單也狃於即墨之勝欲以奇為常而廢正此其論所以屈也孝成王惠文王子元年申赧王五十年丙趙太后惠文王威后新用事秦急攻之趙氏求救於齊齊曰必以長安君為質長安孝成母弟兵乃出太后不肯大臣强諫太后明謂左右有復言令長安君為質者老婦必唾其靣左師官名觸讋願見太后盛氣而揖之入而徐趨至而自謝曰老臣病足曽不能疾走不得見久矣竊自恕久不見宜得罪今自寛而求見恐太后玉體之有所郄也郄郤同以已病足因恐后不能前亦自恕以及人也故願望見太后曰老婦恃輦而行曰日食飲得無衰乎曰恃鬻耳曰老臣今者殊不欲食乃自强步日三四里少益嗜食和於身曰老婦不能太后之色少解左師公曰老臣賤息舒祺息其子舒祺名也最少不肖而臣衰竊愛憐之願令補黒衣之數尸祝之服所謂袨服又蕭望之傳注朝時皆著皂衣以衛王宫沒死以聞沒者沉溺無見之辭太后曰敬諾年幾何矣對曰十五嵗矣雖少願及未填溝壑而託之死則填壑太后曰丈夫亦愛憐其少子乎對曰甚於婦人太后曰婦人異甚異於丈夫而有甚焉對曰老臣竊以為媼之愛燕后媼女老稱燕后太后語賢於長安君曰君過矣不若長安君之甚左師公曰父母之愛子則為之計深遠媼之送燕后也持其踵為之泣念悲其遠也念且悲亦哀之矣已行非勿思也祭祀必祝之祝曰必勿使反豈非計久長有子孫相繼為王也哉太后曰然左師公曰今三世以前至於趙之為趙趙王之子孫侯者其繼有在者乎曰無有曰微獨趙微猶非諸侯有在者乎曰老婦不聞也此下左師對此其近者禍及身逺者及其子孫豈人主之子侯則必不善哉位尊而無功奉厚而無勞而挾重器多也重器謂名位金玉今媼尊長安之位而封以膏腴之地多予之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媼為長安君計短也故以為其愛不若燕后太后曰諾恣君之所使之於是為長安君約車百乘質於齊齊兵乃出子義趙之賢士聞之曰人主之子也骨肉之親也猶不能恃無功之尊無勞之奉以守金玉之重也而况人臣乎趙記元年有以彪謂觸讋諒毅皆從容納説而取成功與夫强諫於庭怒罵於坐髪上衝冠自待必死者力少而功倍矣元帝謂張猛曰曉人不當如是耶二士有焉秦王昭謂公子他曰昔歲殽下之事即秦惠七年五國攻函谷事函殽地近故云韓為中軍以與諸侯攻秦韓與秦接境壤界其地不能千里展轉不可約展轉猶反覆日者秦楚戰於藍田秦惠文後十三年韓出鋭師以佐秦秦戰不利因轉與楚不固信盟唯便是從韓之在我心腹之疾吾將伐之何如公子他曰王出兵韓軍於其地韓必懼懼則可以不戰而深取割王曰善乃起兵一軍臨滎陽一軍臨太行韓𥙷恐使陽城君疑當作成陽秦昭十七入朝者也入謝於秦請効上黨之地以為和令韓陽告上黨之守靳黈元作字書無此字下同曰秦起二軍以臨韓韓不能支今王桓惠令韓興兵恐守不効地故以上黨入和於秦使陽言之太守太守其効之靳黈曰人有言挈瓶之智挈瓶之人之智不失守器所守之器謂瓶王則有令而臣太守雖王與子其亦元作亦其猜焉嫌其不能守臣請悉發發兵守以應秦若不能卒言戰敗不終事則死之韓陽趨以報王王曰吾始已諾於應侯矣今不與是欺之也乃使馮亭代靳黈馮亭守三十日隂使人請趙王曰韓不能守上黨且以與秦其民皆不欲為秦而願為趙今有城市之邑七十願拜納之於王惟王才之才財裁同趙王喜召平陽君元作平原史作平陽君趙豹是也若果平原下文不應復云召趙勝而告之曰韓不能守上黨且以與秦其吏民不欲為秦而皆願為趙今馮亭令使者以與寡人何如趙豹對曰臣聞聖人甚禍無故之利無故得利聖人以為禍王曰人懷吾義何謂無故乎對曰秦蠶食韓氏之地中絶不令相通故自以為坐受上黨也且夫韓所以内趙者欲嫁其禍也秦被其勞而趙受其利雖强大不能得之於小弱而小弱顧能得之强大乎今王取之可謂有故乎且秦以牛田水通糧牛田秦地缺因其水為漕其死士皆列之於上地韓之上流令嚴政行不可與戰王自圖之王大怒曰夫用百萬之衆攻戰踰年厯歲未見一城也今不用兵而得城七十何故不為趙豹出王召趙勝趙禹而告之曰韓不能守上黨今其守以與寡人有城市之邑七十二人對曰用兵踰年未見一城今坐而得城七十𥙷此二字此大利也乃使趙勝徃受地勝至曰敝邑之王使使者臣勝告𥙷太守有詔使臣勝有詔秦人語耳謂曰請以三萬户之都封太守千户封縣令諸吏皆益爵三級民能相集者賜家六金馮亭垂涕而免曰元作勉免辭也是吾處三不義也為主守地不能死而以與人不義一也主内之秦不順主命不義二也賣主之地而食之食食封户也不義三也辭封而入韓謂韓王曰趙聞韓不能守上黨今發兵已取之矣韓告秦曰趙起兵取上黨秦王怒令公孫起王齮以兵遇趙於長平趙記四年有馮亭下不彪謂平陽嫁禍之言豈易曉而孝成怒之昏於利也勝禹入而順㫖以濟其欲不幾於一言而喪邦與故為邦者以逺倿人為急秦趙戰於長平趙亡一都尉軍尉也趙王召樓昌與虞卿曰軍戰不勝尉係死係尉名寡人使卷甲而趨之襲之也何如樓昌曰無益也不如發重使而為講元從汝從冓求和也與講無異義而此書兩字互用今以御名並作講虞卿曰夫言講者以為不講者軍必破而制講者在秦制言聽否由之且王之論秦也欲破王之軍乎其不邪王曰秦不遺餘力矣必且破趙軍虞卿曰王聊聽臣發使出重寶以附楚魏楚魏欲得王之重寳必入吾使趙使入楚魏秦必疑天下合從也且必恐如此則講乃可為也趙王不聽與平陽君為講與從之也發鄭朱入秦秦内之趙王召虞卿曰寡人使平陽君講秦秦已内鄭朱矣子以為奚如虞卿曰王必不得講軍必破矣天下之賀戰勝者皆在秦矣鄭朱趙之貴人也而入於秦秦王昭與應侯必顯重以示天下楚魏以趙為講必不救王秦知天下不救王則講不可得成也趙卒不得講軍果大敗王入秦秦留趙王而後許之講虞卿傳有秦攻趙於長平大破之引兵而歸因使人索六城於趙而講元作御名史書此事在邯鄲圍解後按邯鄲之圍非秦徳趙而解也趙頼魏之力耳何事朝秦而講以六城此䇿以長平破懼而賂之是也趙計未定樓緩新從秦來趙王與樓緩計之曰與秦城何如不與何如樓緩辭讓曰此非衍人字臣之所能知也王曰雖然試言公之私樓緩曰王亦聞夫公甫文伯母乎公甫文伯官於魯病死婦人為之自殺於房中者二八其母聞之不肯哭也相室曰焉有子死而不哭者乎其母曰孔子賢人也逐於魯是人不隨稱是人不子之也今死而婦人為死者十六人若是者其於長者薄而於婦人厚故從母言之為賢母也從婦言之必不免為妬婦也故其言一也言者異則人心變矣今臣新從秦來而言勿與則非計也言與之則恐王以臣之為秦也故不敢對使臣得為王計之不如與之王曰諾虞卿聞之入見王王以樓緩言告之虞卿曰此飾説也猶飾辯此下衍秦既解邯鄲止六縣而講二十四字王曰何謂也虞卿曰秦之攻趙也倦而歸乎王以其力尚能進愛王而不攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能攻而資之是助秦自攻也來年秦復攻王王無以救矣王以虞卿之言告樓緩史云告趙郝樓緩曰虞卿能盡知秦力之所至乎至猶及也虞卿言秦力倦而歸謂秦力所及止是耳秦力豈止是而已乎誠不𥙷知秦力之所元作不至此彈丸之地猶不予也令秦來年復攻王得無割其内而講乎王曰誠聽子割矣子能必來年秦之不復攻我乎樓緩對曰此非臣之所敢任也昔者三晋之交於秦相善也今秦釋韓魏而獨攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻趙嘗親秦而復負之故秦攻之今為講所以解也啓關通幣元作敝齊交韓魏使其交秦與韓魏等至來年而王獨不取於秦不為秦所取王之所以事秦者必在韓魏之後也此非臣之所敢任也王以樓緩之言告虞卿虞卿𥙷兩字曰樓緩言不講來年秦復攻王得無更割其内而講今講樓緩又不能必秦之不復攻也雖割何益來年復攻又割其力之所不能取而講也此自盡之術也不如無講秦雖善攻不能取六城趙雖不能守亦元作而不至失六城秦倦而歸兵必罷並音疲我以六元作五下同城收天下以攻罷秦是我失之於天下而取償於秦也吾國尚利孰與坐而割地自弱以强秦今樓緩曰秦善韓魏而攻趙者必王之事秦不如韓魏也是使王歲以六城事秦也即坐而地盡矣來年秦復求割地王將予之乎不與則是棄前資元作貴而挑秦禍也史註挑戰為致師則此言禍自我致也與之則無地而給之語曰强者善攻而弱者不能自守今坐而聽秦秦兵不敝而多得地是强秦而弱趙也以益衍愈字强之秦而割愈弱之趙其計固不止矣言割不止且秦虎狼之國也無禮義之心其求無已而王之地有盡以有盡之地給無已之求其勢必無趙矣故曰此飾說也王必勿與王曰諾樓緩聞之入見於王王又以虞卿之言告之樓緩曰不然虞卿得其一未知其二也夫秦趙構難而天下皆說何也曰我將因强而乘弱乘猶陵今趙兵困於秦天下之賀戰勝𥙷者則必在於秦矣故不若亟割地求和以疑天下慰秦心不然天下將因秦之怒乗趙之敝而𤓰分之分其地如破𤓰然趙且亡何秦之圖王以此斷之勿復計也虞卿聞之又入見王曰危矣樓子之為秦也為秦計深而趙勢危夫趙兵困於秦又割地為和是愈疑天下而何慰秦心哉不亦大示天下弱乎且臣曰勿予者非固勿予而已也秦索六城於王王以六城賂齊齊秦之深讐也嘗爭為帝得王六城并力而西擊秦也齊之聽王不待辭之畢也是王失於齊而取償於秦一舉結三國之親韓魏本趙與國與齊為三而與秦易道也趙王曰善因發虞卿東見齊王王建與之謀秦虞卿未反秦之使者已在趙矣樓緩聞之逃去虞卿傳有次第不同先云秦既解邯鄲與今所衍二十四字同次虞卿謂趙王曰秦之攻王也倦而歸乎止勢必無趙矣次趙王計未定樓緩從秦來止此飾説也次王必勿與樓緩聞之止緩聞之逃去彪謂虞卿可謂見善明者矣當趙以四十萬覆於長平之下凡在趙庭之臣孰不魄奪氣喪願講秦以偷須臾之寧卿獨為之延慮却願折樓緩之口挫强秦之心反使秦人先趙而講於此亦足以見從者天下之勢七國辯士䇿必中計必得而不失其正唯卿與陳軫有焉賢矣哉秦圍趙之邯鄲此九年魏安釐王使將軍晋鄙救趙畏秦止於蕩隂屬河内不進魏王使客將軍辛垣衍稱客則衍他國人仕魏也間入邯鄲間謂微行因平原君為趙王曰秦所以急圍趙者前與齊閔王爭强為帝已而復歸帝以齊故由齊不稱秦亦去之今齊衍閔王字今乃襄王耳史亦誤益弱方今唯秦雄天下此非必貪邯鄲其意欲求為帝趙誠發使尊秦昭王為帝稱謚非當時語秦必喜罷兵去平原君猶豫未有所决此時魯仲連適遊趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何矣平原君曰勝也何敢言事百萬之衆折於外今又内圍邯鄲而不去魏王使客將軍辛垣衍令趙帝秦今其人在是勝也何敢言事魯連曰始吾以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客辛垣衍安在吾請為君責而歸之平原君曰勝請為召而見之於先生平原君遂見辛垣衍曰東國有魯連先生東國謂齊其人在此勝請為紹介郭璞曰紹介相佑助也而見之於將軍辛垣衍曰吾聞魯連先生齊國之髙士也衍人臣也使事有職吾不願見魯連先生也平原君曰勝已泄之矣泄言已白之辛垣衍許諾魯連見辛垣衍而無言辛垣衍曰吾視居此圍城之中者皆有求於平原者也今吾視先生之玉貎非有求於平原君者曷為乆居此元作若圍城之中而不去也魯連曰世以鮑焦周之介士見莊子無從容而死者皆非也其人介故人謂之然今衆人不知則為一身不知者以其抱木死為無以自養不知其非世也明已今亦然彼秦棄禮義而上首功之國也秦制爵二十戰獲首級者計功受爵時所尊上也權使其士虜使其民視民如所虜獲彼則肆然而為帝過而遂正於天下過猶不幸則連有赴東海而死耳元作矣吾不忍為之民也所為見將軍者欲以助趙也辛垣衍曰生助之柰何魯連曰吾將使梁及燕助之齊楚固助之矣辛垣衍曰燕則吾請以從矣若乃梁則吾乃梁人也先王烏能使梁助之邪魯連曰梁未睹秦稱帝之害故也使梁睹秦稱帝之害則必助趙矣辛垣衍曰秦稱帝之害將奈何魯仲連曰昔齊威王嘗為仁義矣率天下諸侯而朝周周貧且弱諸侯莫朝而齊獨朝之居嵗餘周烈王崩諸侯皆弔齊後徃周怒赴於齊曰天崩地坼天子下席東藩之臣田嬰齊後至則斮之威王勃然怒曰叱嗟嗟咨也而母婢也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固固猶必然其無足怪辛垣衍曰先生獨未見夫僕乎十人而從一人者寜力不勝智不若邪畏之也魯仲連曰然梁之比於秦若僕邪辛垣衍曰然魯仲連曰然則𥙷吾將使秦王烹醢梁王醢肉醤也辛垣衍快然不說曰嘻亦太甚矣先生之言也先生又惡能使秦王烹醢梁王魯仲連曰固也待吾言之昔者鬼侯徐曰鄴縣有九侯城九一作鬼鄂侯鄂屬江夏文王紂之三公也鬼侯有子而好故入之於紂紂以為惡醢鬼侯鄂侯爭之急辦之疾故脯鄂侯文王聞之喟然而歎故拘之於牖里之庫牖里在蒲隂百日而欲令之死曷為與人俱稱帝王卒就脯醢之地也齊閔王將之魯夷維子執䇿而從䇿馬箠也謂魯人曰子將何以待吾君魯人曰吾將以十太牢待子之君夷維子曰子安取禮而來待吾君彼吾君者天子也天子廵狩諸侯避舍納衍于字筦鍵筦鑰也鍵其牡避納者示不敢有其國攝衽抱几几所据也視膳於堂下天下已食而聽退朝也魯人投其籥籥鑰同闗下牡也投者下其牡不果納不得入於魯將之薛假涂於鄒當是時鄒君死閔王欲入弔夷維子謂鄒之孤曰天子弔主人必將倍殯柩倍言背之去設北面於南方然後天子南面弔也鄒之羣臣曰必若此吾將伏劍而死故不敢入於鄒鄒魯之臣生則不得事養齊時强二國不納必見代國人不得事老養幼死則不得飯含以珠玉實死者之口曰含此謂鄒含去音然且欲行天下之禮於鄒魯之臣不果納今秦萬乗之國梁亦萬乗之國交有稱王之名睹其一戰而勝欲從而帝之是使三晉之大臣不如鄒魯之僕妾也且秦無已而帝無已言無止之者則且變易諸侯之大臣彼將奪其所謂不肖而予其所謂賢奪其所憎而與其所愛彼又將使其子女讒妾為諸侯妃姬處梁之宫梁王安得晏然而已乎而將軍又何以得故寵乎於是辛垣衍起再拜謝曰始以先生為庸人吾乃今日而知先生為天下之士也吾請去不敢復言帝秦秦將聞之為却軍五十里適㑹公子無忌奪晉鄙軍以救趙擊秦秦軍引而去於是平原君欲封魯仲連魯仲連辭讓者三終不肯受平原君乃置酒酒酣起前以千金為魯連夀魯連笑曰所元作此貴於天下之士者為人排患釋難解紛亂而無所取也即有所取者是商賈之人也仲連不忍為也遂辭平原君而去終身不復見仲連𫝊有彪謂仲連孔子之所謂逸民非周衰辯者之比也太史公賛之貶矣夫說人者不可一概或委而順之若觸讋或折而服之若仲連然後能濟天下之務不然諛且愎矣秦攻趙平原君使人請救於魏信陵君發兵至邯鄲城下秦兵罷虞卿為平原君請益地謂趙王曰夫不鬭一卒不頓一㦸頓劒之頓而解二國患者平原君之力用人之力而忘人之功不可趙王曰善將益之地公孫龍趙人著守白論莊子稱之距是逺甚豈同姓名如公孫𢎞者乎聞補之見平原君曰君無覆軍殺將之功言初封時以公子耳而封以東武城趙國豪傑之士多在君之右右者人道所尊而君為相國者以親也補故夫君封以東武城不讓無功不以無功辭之佩趙國相印不辭無能一觧國患欲求益地是親戚受封而國人計功也國人受封必計其功與平原異為君計者不如勿受便平原君曰謹受令乃不受封彪為平原失計於馮亭以挑秦褐幾喪趙國之半馴致邯鄲之圍何功之足論哉然因人成事亦有桑榆之收不可忘也虞卿之請帝王慗賞之舉孫龍之辭明哲讓功之誼皆君子之善言也秦攻魏取寜邑秦昭五十年拔寜魏地也徐以為趙非也後志朝歌有寜卿盖秦圍邯鄲魏信陵救之秦怒故觧邯戰而取寜此九年諸侯皆賀趙王使賀三反不得通趙王憂之謂左右曰以秦之強得寜邑以制齊趙諸侯皆賀吾徃賀而獨不得通此必加兵我為之奈何左右曰使者三徃不得通者必所使者非其人也曰諒毅者曰猶有辨士也大王可試使之諒毅親受命而徃至秦獻書秦王昭曰大王廣地寜邑諸侯皆賀敝邑寡君亦竊嘉之不敢寜居使下臣奉其幣物三至王廷而使不得通使若無罪願大王無絶其歡若使者有罪願得請之秦王使使者報曰吾所使趙國者小大皆聽吾言則受書幣若不從吾言則使者歸矣諒毅對曰下臣之來固大承大國之意也豈敢難大王若有以令之請奉而衍西字行之無所敢疑於是秦王乃見使者曰趙豹平原君數欺㺯寡人趙能殺此二人則可若不能殺請令率諸侯受命邯鄲城下欲戰而言受命謙辭也諒毅曰趙豹平原君親寡君之母弟也猶大王之有葉陽涇陽君也史注葉陽一作華陽華陽芉戎也此言葉陽為王之母弟則非戎矣葉不可作華大王以孝治聞於天下衣服衍使字之便於體膳㗖之嗛於口㗖食也膳之可食者集韻慊惬也未嘗不分於葉陽涇陽君葉陽君涇陽君之車馬衣服無非大王之服御者臣聞之有覆巢毁卵而鳯凰不翔刳胎焚夭夭么同小也而麒麟不至今使臣受大王之令以還報敝邑之君畏懼不敢不行無乃傷葉陽君涇陽君之心乎秦王曰諾勿使從政諒毅曰敝邑之君有母弟不能教誨以惡大國請黜之勿使與政事以稱大國秦王乃喜受幣而厚遇之彪謂諒毅可謂有専對之材矣觀其辭令如見晉叔向鄭子産相與周旋於一堂之上而折論豹勝之事何甚似蕭同叔子也毅其深於春秋者乎是舉也不辱君命不失秦之心與觸讋同𫝊可也趙使姚賈約韓魏韓魏衍以字友之茅舉元作舉茅舉趙人為姚賈謂趙王曰賈也王之忠臣也韓魏欲得之故友之將使王逐之而已因受之今王逐之是韓魏之欲得而王之忠臣有罪也故王不如勿逐以明王之賢而折韓魏之招元作招之謂皮相國趙相曰以趙之弱而據之建信君據猶任建信趙幸臣涉孟蓋為横者與建信異趣故趙讎之之讎然者何也以從為有功也齊不從建信君此從如字知從之無功建信者安能以無功惡秦哉惡猶害也從有功乃能害秦耳不能以無功惡秦則且出兵助秦攻魏以楚趙分齊為從無功則反助秦不則分齊齊雖不為從然與秦爭衡故助秦則分齊之地分分其地則是强畢矣言建信圖强之計盡於此建信春申從春申悼襄四年主從約發議於此時也則無功而惡秦言楚趙合則雖未見功而有害秦之形秦合元作分齊秦見二國合亦與齊合齊亡魏則有功而善秦齊本不從建信今秦來合故助之攻魏以善之故兩君者奚擇有功之與𥙷無功為知哉兩齊趙也趙知據建信而不知其不合楚不能成功齊不從建信而不知其合楚足以成功不知所擇也謂皮相國曰魏殺吕遼魏臣秦所重也而衛兵亡其比陽屬南陽衛附秦者也故魏殺秦重衛為之亡魏之鄙以危之而梁危河間封不定而趙元作齊危時魏趙欲以封文信而不果文信不得志文信吕不韋也莊襄元年封此十七年也未得河間故不得志三晉倍之憂也文信欲得河間必伐趙韓魏趙之與國故其憂倍今魏恥未滅言嘗分衛之憂趙患又起患文信也文信之憂大矣文信為三晉之憂齊不從不與山東約從三晉之心疑矣疑從之不可合憂大者不計而講元作御名下同言趙必求和於秦不待計也心疑者事秦急秦魏之講不待割而成凡講必割地今急於成不待已割蓋先講也秦從楚魏攻齊獨吞趙趙近秦秦攻之不待楚魏齊趙必俱亡矣此說欲趙以河間廣文信封也下有一章合此魏使人因平原侯請從於趙三言之趙王不聽出遇虞卿曰為人必語從為為我虞卿入王曰今者平原君為魏請從寡人不聽其於子何如虞卿曰魏過矣王曰然故寡人不聽虞卿曰王亦過矣王曰何也曰凡强弱之舉事强受其利弱受其害今魏求從而王不聽是魏求害而王辭利也臣故曰魏過王亦過虞卿𫝊有彪謂虞卿之所言皆為不倍道非反覆揣摩為人緩𩔖人也從之利害正爾雖微平原之託卿亦必云爾終之趙利魏亦利矣唯不能必趙聽已從而先有輕發則是有受害之形也平原君謂馮忌後稱外臣知非趙人曰吾欲北伐上黨出兵攻燕何如馮忌對曰不可夫以秦將武安君公孫起乗七勝之威勝趙而與馬服之子戰於長平之下大敗趙師因以其餘兵圍邯鄲之城趙以亡敗之餘衆守破軍之敝守敝守守邯戰而秦罷於邯鄲之下趙守而不可㧞然者言所以然攻難而守者易也今趙非有七克之威也而燕非有長平之禍也今七敗之禍未復而欲以罷趙罷音疲攻强燕是使弱趙為强秦之所以攻而使强燕為弱趙之所以守而强秦以休兵休息之兵承趙之敝此乃强吳之所以亡而弱越之所以霸故臣未見燕之可攻也平原君曰善哉平原君謂平陽君曰公子牟魏公子即下魏牟若莊子所稱中山者不與應侯同時游於秦且東而辭應侯東歸魏應侯曰公子將行矣獨無以教之乎曰且微君之命命之也臣固且有効於君夫貴不與富期而富至富不與梁肉期而梁肉至粱肉不與驕奢期而驕奢至驕奢不與死亡期而死亡至累世以前坐此者多矣應侯曰公子之所以教之者厚矣僕得聞此僕平原自稱不忘於心願君之亦勿忘也平陽君曰敬諾彪謂此言者富貴之金石也有能書諸紳銘之凡杖勒之盤盂則何亡國敗家之有説張相國盖梁人相趙嘗懷梁而鄙趙者曰君安能少趙人而令趙人多君少多猶薄原君安能憎趙人而令趙人愛君乎夫膠漆至黏也而不能合逺鴻毛至輕也而不能自舉夫飄於清風舉鴻毛以見膠漆則横行四海故事有簡而功成者因也今趙萬乘之強國也前漳滏後志滏水在鄴右常山左河間北有代帶甲百萬嘗抑强秦元作齊此言蘇秦從時也四十餘年而秦不得所欲由是觀之趙之於天下也不輕今君易萬乗之强趙而慕思不可得之小梁不可復得歸也意者相國以罪亡梁與臣竊為君不取也君曰善君字誤自是之後衆人廣坐之中未嘗不言趙人之長者也未嘗不言趙俗之善者也建信君貴於趙公子魏牟過趙趙王迎之顧反至坐迎客面之有顧則反前有尺帛且令工人以為冠工見客來也困避趙王曰公子乃驅後車幸以臨寡人願聞所以為天下魏牟曰王能重王之國若此尺帛則王之國大治矣趙王不說形於顔色曰先王元作生不知寡人不肖使奉社稷豈敢輕國若此魏牟曰王無怒請為王説之曰王有此尺帛何不令前郎中以為冠王曰郎中不知為冠魏牟曰為冠而敗之奚虧於王之國虧猶捐而王必待工而後乃使之今為天下之工所與治國之人或非也社稷為虛戾先王不血食而王不以與工乃與幼艾趙歧曰艾羙好且王之先帝帝王皇人君之尊稱此與稱秦孝公為先王者同也駕犀首駕驂以御馬喻也陳軫傳言衍與燕趙之王有故蓋衍雖相魏實趙任之為外相也而驂馬服以與秦角逐角有鬬爭意秦當時避元作適其鋒今王憧憧徃來不絶貌乃輦建信以與强秦角逐臣恐秦王之輢元作掎也輢車旁也以輦喻故云或謂建信君君補之所以事王者色也葺之所以事王者智也葺趙人名色老而衰智老而多以日多之智而逐衰惡之色君必困矣建信君曰奈何曰並驥而走者五里而罷音疲乘驥而御之不倦而取道多君令葺乘獨斷之車不與之分治御獨斷之勢以居邯鄲令之内治國事外刺諸侯刺言探候其事則葺之事有不言者矣所治者多不暇悉言於上君因言王而重責之葺之軸令折矣不勝多事之任建信君再拜受命入言於王厚任葺以事而元作能重責之未期年而葺亡走矣彪謂奸人之不可知甚矣智知所無奈何彼厚任以事葺以為不世之遇矣殫力畢慮恐不給焉而不知建信之困之也故國有姧人賢智之得全者寡矣苦成常未詳謂建信君曰天下公從公猶同而獨以趙惡秦言從者皆惡秦也而世獨言趙何也魏殺吕遼元作遺從上文而天下交之天下惡秦秦重遼故殺遼而諸國交之然則秦惡魏深矣今收河間不封文信於是與殺吕遼何以異文言亦秦所重今不與地秦必惡趙君唯飾元作釋虛懼秦覺也偽文信侯虛與之河間猶且知之也如是秦猶知其不善已况收河間乎從而有功乎何患不得收河間從而無功收河間何益也希寫趙人見建信君建信君曰文信侯之於僕也甚無禮秦使人來仕僕官之丞相使為丞相官屬爵五大夫文信侯之於僕也甚矣其無禮也言已待之厚彼不宜無禮希寫曰臣以為今世用事者不知商賈建信君悖然曰足下卑用事者而高商賈乎曰不然夫良商不與人爭買賣之賈而謹司時司伺同時賤而買雖貴已賤矣時貴而賣雖賤已貴矣昔者文王衍之字拘於牖里而武王羇於玉門項羽紀成臯北門注玉門此事不經見卒斬紂之頭而懸於太白者旗名是武王之功也今君不能與文信侯相杭以權而責文信侯少禮臣竊為君不取也魏音介元作魀字者無之謂建信君曰人有置係蹄者用繩以罥獸蹄而得虎虎怒決蹯而去蹯獸足虎之情非不愛其蹯也然而不以環寸之蹯害七尺之軀者權也今有國非直七尺軀也而君之身於王非環寸之蹯也言王且以愛國故去之願公之熟圖之也秦攻趙鼔鐸之音聞於北堂希卑趙人曰夫秦之攻趙不宜急如此此召兵也兵趙兵内應者蓋以鼓鐸為信必有大臣欲衡者耳衡即横王欲知其人旦日贊羣臣而之賛者羙其事以開說者先言横者則其人也建信君果先言横齊人李伯見孝成王成王說之以為代郡守而居無幾何人告之反孝成王方饋不墮食饋餽同方食而祭不墮失七筯異矣無幾何告者復至孝成王不應已乃使使者伯之使言齊舉兵擊燕恐其以擊燕為名而以兵襲趙故發兵自備今燕齊已合臣請要其敝兩國戰必有一疲因以兵邀撃之而地可多割自是之後為孝成王從事於外者無自疑於中者為齊獻書趙王曰臣一見而能令王坐而天下致名實元作寳即下致也而臣切怪王之不試見臣而窮臣也窮猶困也困於不得見羣臣必多以臣為不能者故王重見臣也重猶難以臣為不能者非他欲用王之兵者也非若無也則交有所偏者也言賣趙與諸國為私非然則智不足者也非然則欲以天下之重恐王而取行者也王畏懼之必行其說臣以齊循事王王能亡燕能亡韓魏能敗秦能孤秦臣以衍為字齊致尊名於王天下熟敢不致尊名於王臣以齊致地於王天下熟敢不致地於王臣以齊為王求名於燕及韓魏熟敢辭之臣之能也其前可見已言可見於未効之前齊先重王故天下盡重王衍重也王無齊天下必盡輕王也秦之強以無齊衍之字故重王燕韓補魏自以無齊故重王趙得齊故四國無齊今王無齊獨安能無重天下猶四國重趙故勸王無齊者非智不足則不忠者也非然則欲用王之兵成其私者也非然則欲輕王以天下之重取行於王者也非然則位尊而能卑者也願王之熟慮無齊之利害也趙使趙莊合從欲代齊齊請効地趙因賤趙莊齊明為謂趙王曰齊畏從人之合也故効地今聞趙莊賤張懃貴懃蓋敗從者齊必不効地矣趙王曰善乃召趙莊而貴之翟章從梁來甚善趙王趙王三延之以相翟章辭不受田駟謂柱國韓向柱國楚官蓋趙亦有曰臣請為卿刺之客若死客謂章則王必怒而誅建信君疑其殺章欲以専事建信君死則卿必為相矣建信君不死以為交終身不敝以殺章故建信交之卿因以徳建信君矣馮忌為廬陵君孝成母弟見趙記謂趙王曰王之逐廬陵君為燕也王曰吾所以重者無燕秦也無如二國對曰秦王昭以虞卿為言而王不逐也前事耳非今今燕一以廬陵君為言而王逐之是王輕強秦而重弱燕也王曰吾非為燕也吾固將逐之然則王逐廬陵君又不為燕也行逐愛弟行所行又兼無燕秦臣竊為大王不取也馮忌請見趙王行人見之馮忌接手交兩手俛元作免首欲言而不敢王問其故對曰客有見人於服子者未詳已而請其罪服子曰公之客獨有三罪望我而笑是狎也談語而不稱師是倍也倍言背其師交淺而言深是亂也客曰不然夫望人而笑是和也言而不稱師是庸說也言之常者人所同稱非必師也交淺而言深是忠也昔者堯見舜於草茅之中席隴畆席設席而廕庇桑桑之能庇人者於之取廕隂移而受天下𫝊伊尹負鼎俎而千湯姓名未著而受三公使夫交淺者不可以深談則天下不𫝊而三公不得也衍趙王曰三字今外臣交淺而欲深談可乎王曰請奉教於是馮忌乃談此忌初見之談也應在平原謂馮忌之上然亦得為此史本其初言之故因舊客見趙王曰臣聞王之使人買馬也有之乎王曰有之何故至今不遣王曰未得買馬之工也對曰王何不遣建信君乎王曰建信君有國事又不知相馬曰王何不遣紀姬乎王曰紀姬婦人也不知相馬對曰買馬而善何補於國王曰無補於國買馬而惡何危於國王曰無危於國對曰然則買馬善而若惡皆無危補於國然而王之買馬也必將待工今治天下舉錯非也舉置也有舉有置國家為虛戾而社稷不血食然而王不待工而與建信君何也趙王未之應也客曰燕郭之法有所謂桑雍者雍癰同桑中有蠧則外碨磈如人之癰王知之乎王曰未之聞也所謂桑雍者便辟左右之人及夫人優愛孺子也優饒也言愛之甚一曰倡此皆能乗王之醉昏而求所欲於王者也是能得之於内則大臣為之枉法於外矣故日月暉於外其賊在於内說林訓月照天下食於詹諸謹備其所憎而禍在於所愛彪謂王斗魏牟及此三士其言若出一口所謂理義人心之所同然者與至於此章肆直而慈惠尤可喜可愛有國有家者宜寘之座右悼襄王孝成子元年巳始皇三年丁秦召春平侯及平都皆趙人因留之泄元作世鈞秦人為之謂文信侯曰春平侯者趙王之所甚愛也而郎中甚妬之故相與謀曰春平侯入秦秦必留之故謀而入之秦今君留之是空絶趙而郎中之計中也故君不如遣春平侯而留平都侯春平侯者言行於趙王必原割趙以事君而贖平都侯文信侯曰善因於接意而遣之趙記二年有幽王悼襄子元年寅始皇十二年丙文信侯出走始皇十年免相就國十二年徙蜀飲酖死與司空馬不韋吏也之趙趙以為守相守假官也馬為之秦下甲而攻趙司空馬説趙王曰文信侯相秦臣事之為尚書秦官屬少府習秦事今大王使守小官習趙事請為大王設秦趙之戰設者無其事施陳為之而親觀其熟勝趙熟與秦大曰不如民熟與之衆曰不如金錢粟熟與之富曰弗如國熟與之治曰不如相熟與之賢曰不如將熟與之武曰不如律今熟與之明曰不如司空馬曰然則大王之國百舉而無及秦者大王之國亡趙王曰卿不逺趙而惠教以國事願於因計因非正為之猶秦王謂陳軫以其餘為寡人計也司空馬曰大王裂趙之半以賂秦秦不接刃而得趙之半秦必說内惡趙之守秦雖說於得地趙猶有守之者秦所患也外恐諸侯之救秦必受之患於有守有救則其受之不得不急奏受地而郤元作郗兵趙守半國以自存秦銜賂以自強山東必恐亡趙自危趙亡則五國有唇亡之憂諸侯必懼懼而相救則從事可成臣請為大王約從從事成則是大王名亡趙之半實得山東以敵秦秦不足亡趙王曰前日秦下甲攻趙趙賂之以河間十二縣地削兵弱卒不免秦患今又割趙之半以強秦力不能自存因以亡矣願卿更計更猶易司空馬曰臣少為秦刀筆謂為尚書也筆以書札刀削其不當者以官長而守小史其官之長任之為吏未嘗為兵為猶治也馬謙言臣元作百請為大王悉趙兵以遇與秦接戰趙王不能將不用馬為將司空馬曰臣効愚計大王不用是臣無以事大王願自請猶乞骸骨司空馬去趙渡平原平原津令列女𫝊有趙津吏蓋此官也郭遺勞而問秦兵下趙上客從趙來趙事何如司空馬言其為趙王計而不元作勿用趙必亡平原令曰以上客料之趙何時亡司空馬曰趙將武安君李牧期年而亡若殺武安君不過半年趙王之臣有韓倉者以曲合於趙王曲不正也其交甚親其為人疾賢妬功臣今國危亡王必用其言武安君必死韓倉果惡之惡牧王令人代使趙葱顔聚代牧武安君至使韓倉數之數列其罪曰將軍戰勝王觴將軍將軍為夀於前上趙王夀而捍匕首刃名盖其首如七漢鹽鐵論荆軻懐數年之謀而事不就者尺八七不足恃也捍衛也誣其以七首自衛如欲刺王然當死武安君曰繓牧名病鉤短傴如鉤身大臂短不能及地起居不敬起居問王起居也拜不及地為不敬恐懼死罪於前不敬者其罪死故以此懼故使工人為木村以接手上若不信繓請以出示出之袖中以示韓倉狀如振梱梱就也蓋為木接手可以就地因以舉身也集韻梱門橛也又梱拊也與楎同音袞犂轅也疑此木𩔖此故名纒之以布願公入明之韓倉曰受命於王賜將軍死不赦臣不敢言武安君北面再拜賜死拜賜死之命縮劒將自誅縮當作摍集韻引也抽也乃曰人臣不得自殺宫中過元作遇司衍空字馬門宫門趨甚疾此言牧之知禮也而史言牧不受命捕得斬之不知遷捨此何所聞而云乎出誃元作許門也誃别也右舉劒將自誅臂短不能及銜劒徴之於柱以自刺徴猶驗也口銜劒不自知其可死即柱以為驗也武安君死五月趙亡此七年誅牧降秦八年邯鄲為秦平原令見諸公必為之言曰嗟嗞乎嗞亦嗟也司空馬又以謂元作為司空馬逐於秦非不智也去趙非不肖也趙去司空馬而亡國國亡者非無賢人不能用也元在秦䇿彪謂從横之説皆有所偏而從人欲合六弱以攻一强其勢若可為也患諸侯之不一耳使諸侯而明於事變不惑小利不脩小怨併力合慮而西雖不可以大有為其於蹵秦有餘惜乎當時不知此也自蘇秦死從約不堅秦兵四出諸侯挫於走北其氣奪矣司空馬欲以此時割趙之半説秦而反其兵因以復合天下之從豈不謬哉夫以全趙猶惴惴不自保彼安能守半趙以自存乎秦有并吞天下之心雖得半趙不盡不止而何以說之諸侯勢去自春申不能從以難秦司空馬獨能之乎故趙幽之亡罪在用韓倉而殺李牧無與司空馬平原令非篤論也秦使王翦攻趙趙使李牧司馬尚禦元作御之李牧數破走秦軍殺秦將桓齮王翦惡之乃多與趙王寵臣郭開等金使為反間曰李牧司馬尚欲與秦反趙以多取封於秦趙王疑之使趙葱及顔㝡史作聚代將斬李牧廢司馬尚後五元作三月王剪因急擊大破趙殺趙軍虜趙王遷及其將顔㝡遂滅趙牧傳有凡六十三章戰國䇿卷六
